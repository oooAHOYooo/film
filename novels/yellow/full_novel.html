  <script>
    const markdown = "# Theology Notes — Full Novel\n\n*Compiled on 3/12/2026, 7:23:46 AM*\n\n---\n\n\n## ACT I — Foundations\n\n---\n\n\n### Chapter 1: Theology Notes\n\n*ACT I — Foundations | ID: theology_notes | File: 01_theology_notes.md*\n\n---\n\nTheology notes live here.\n\nUse this space for structured chapters, essays, or a sequence of reflections.\n\nStart with the question: what is theology for? Define the purpose as love of God and love of neighbor.\n\nFocus:\n- Frame the projectâ€™s scope.\n- Name the posture of humility.\n\n\nQuestion:\nDo we spend too much time romanticising the actual life of Christ? Of his human nature? Rather than search for his kingship before his time on earth.\n\nI asked this casually at a superbowl party and got lost in the answer between Josh Kebabian and Preston Graham. But I thought a bout it - and questioned why I was questioning this. Was the story getting dull for me? Have I heard it too much that my brain, aggorantly thinks that I know everything there is to know about the subject, and then boom doing it again - looking for something other than Christ to fulfill my gaping hole. A habit which I am still prone to do. \n\nAnd then boom - what becomes - what becomes of worship - does that mean that I now praise Jesus on the throne? Is he still in his white robe? Have the imagery and icons of the Cathy's cemented so deep into my mind? But maybe that's a good thing? Santa Claus is easy to conjure up and thus I talk about Santa Claus. Those images help one bring into a target - like the aim in binoculars - a distant little red dot on the white golf ball among the sand. \n\n---\n\n\n### Chapter 2: Revelation and Mystery\n\n*ACT I — Foundations | ID: revelation_and_mystery | File: 02_revelation_and_mystery.md*\n\n---\n\nGod is known because God reveals. Mystery remains, and it is not a failure but a gift.\n\nFocus:\n- Define revelation as gift.\n- Hold mystery without panic.\n\n\n---\n\n\n### Chapter 3: Creation and Goodness\n\n*ACT I — Foundations | ID: creation_and_goodness | File: 03_creation_and_goodness.md*\n\n---\n\nCreation is not an accident; it is declared good. Goodness is foundational, not a later add-on.\n\nFocus:\n- Highlight goodness as baseline.\n- Note beauty as theological evidence.\n\n\n---\n\n\n### Chapter 4: Image of God\n\n*ACT I — Foundations | ID: image_of_god | File: 04_image_of_god.md*\n\n---\n\nHuman dignity flows from bearing Godâ€™s image. This shape is communal, relational, and creative.\n\nFocus:\n- Define imago Dei.\n- Apply to everyday ethics.\n\n\n---\n\n\n### Chapter 5: Fall and Fracture\n\n*ACT I — Foundations | ID: fall_and_fracture | File: 05_fall_and_fracture.md*\n\n---\n\nSin distorts but does not erase. Fracture explains shame, conflict, and alienation.\n\nFocus:\n- Describe the fracture.\n- Keep hope in view.\n\n\n---\n\n\n### Chapter 6: Covenant\n\n*ACT I — Foundations | ID: covenant | File: 06_covenant.md*\n\n---\n\nGodâ€™s promises are relational commitments. Covenant is the spine of the biblical story.\n\nFocus:\n- Trace covenant through history.\n- Show covenantâ€™s demands.\n\n\n---\n\n\n### Chapter 7: Law and Wisdom\n\n*ACT I — Foundations | ID: law_and_wisdom | File: 07_law_and_wisdom.md*\n\n---\n\nLaw guides love; wisdom trains it. Both are meant to shape a faithful life.\n\nFocus:\n- Contrast law and wisdom.\n- Show the formation of character.\n\n\n---\n\n\n### Chapter 8: Prophets and Hope\n\n*ACT I — Foundations | ID: prophets_and_hope | File: 08_prophets_and_hope.md*\n\n---\n\nProphets name truth and call for justice. Hope is not optimism, it is a promise.\n\nFocus:\n- Identify prophetic courage.\n- Define hope as anchored.\n\n\n---\n\n\n## ACT II — Revelation\n\n---\n\n\n### Chapter 9: Incarnation\n\n*ACT II — Revelation | ID: incarnation | File: 09_incarnation.md*\n\n---\n\nGodâ€™s presence is not abstract. The incarnation makes theology tangible and local.\n\nFocus:\n- Explore God-with-us.\n- Connect to everyday life.\n\n\n---\n\n\n### Chapter 10: Atonement\n\n*ACT II — Revelation | ID: atonement | File: 10_atonement.md*\n\n---\n\nThe cross reconciles and heals. Atonement is both justice satisfied and love revealed.\n\nFocus:\n- Survey major atonement images.\n- Keep the tone pastoral.\n\n\n---\n\n\n### Chapter 11: Resurrection\n\n*ACT II — Revelation | ID: resurrection | File: 11_resurrection.md*\n\n---\n\nResurrection is not only future. It is a present sign of new creation.\n\nFocus:\n- Stress the bodily hope.\n- Call for resurrection-shaped living.\n\n\n---\n\n\n### Chapter 12: Spirit and Breath\n\n*ACT II — Revelation | ID: spirit_and_breath | File: 12_spirit_and_breath.md*\n\n---\n\nThe Spirit animates, convicts, and comforts. Breath imagery ties creation to re-creation.\n\nFocus:\n- Define the Spiritâ€™s roles.\n- Offer a practice of attentiveness.\n\n\n---\n\n\n### Chapter 13: Trinity\n\n*ACT II — Revelation | ID: trinity | File: 13_trinity.md*\n\n---\n\nGod is communion: Father, Son, and Spirit. Relationship is the heart of reality.\n\nFocus:\n- Describe perichoresis simply.\n- Connect Trinity to community.\n\n\n---\n\n\n### Chapter 14: Church and Community\n\n*ACT II — Revelation | ID: church_and_community | File: 14_church_and_community.md*\n\n---\n\nThe church is a people, not a product. Community is discipleship made visible.\n\nFocus:\n- Describe the churchâ€™s purpose.\n- Name marks of healthy community.\n\n\n---\n\n\n### Chapter 15: Sacraments\n\n*ACT II — Revelation | ID: sacraments | File: 15_sacraments.md*\n\n---\n\nWater, bread, and wine become places of grace. Sacraments anchor the invisible in the visible.\n\nFocus:\n- Describe baptism and communion.\n- Show how practices form us.\n\n\n---\n\n\n### Chapter 16: Prayer\n\n*ACT II — Revelation | ID: prayer | File: 16_prayer.md*\n\n---\n\nPrayer is conversation and surrender. It is shaped by honesty more than eloquence.\n\nFocus:\n- Offer a rhythm of prayer.\n- Name lament as faithful.\n\n\n---\n\n\n## ACT III — Life Together\n\n---\n\n\n### Chapter 17: Suffering and Lament\n\n*ACT III — Life Together | ID: suffering_and_lament | File: 17_suffering_and_lament.md*\n\n---\n\nPain is not hidden in Scripture. Lament gives language to grief without losing trust.\n\nFocus:\n- Create space for honest grief.\n- Refuse shallow answers.\n\n\n---\n\n\n### Chapter 18: Justice and Mercy\n\n*ACT III — Life Together | ID: justice_and_mercy | File: 18_justice_and_mercy.md*\n\n---\n\nJustice makes things right; mercy makes room for restoration. Both are required for holiness.\n\nFocus:\n- Link justice to neighbor love.\n- Define mercy as active.\n\n\n---\n\n\n### Chapter 19: Kingdom and Eschaton\n\n*ACT III — Life Together | ID: kingdom_and_eschaton | File: 19_kingdom_and_eschaton.md*\n\n---\n\nThe kingdom is already and not yet. Eschatology is a horizon that shapes daily choices.\n\nFocus:\n- Define the kingdomâ€™s tension.\n- Guard against escapism.\n\n\n---\n\n\n### Chapter 20: Scripture and Tradition\n\n*ACT III — Life Together | ID: scripture_and_tradition | File: 20_scripture_and_tradition.md*\n\n---\n\nScripture is primary; tradition is a guide. The conversation is communal and ongoing.\n\nFocus:\n- Explain the canonâ€™s role.\n- Honor faithful inheritance.\n\n\n---\n\n\n### Chapter 21: Conscience and Discernment\n\n*ACT III — Life Together | ID: conscience_and_discernment | File: 21_conscience_and_discernment.md*\n\n---\n\nDiscernment is a habit, not a hack. Conscience is formed in community.\n\nFocus:\n- Offer a discernment framework.\n- Emphasize spiritual maturity.\n\n\n---\n\n\n### Chapter 22: Vocation and Work\n\n*ACT III — Life Together | ID: vocation_and_work | File: 22_vocation_and_work.md*\n\n---\n\nCalling is about faithfulness, not prestige. Work becomes worship when aimed at love.\n\nFocus:\n- Define vocation broadly.\n- Connect labor to service.\n\n\n---\n\n\n### Chapter 23: Hospitality\n\n*ACT III — Life Together | ID: hospitality | File: 23_hospitality.md*\n\n---\n\nWelcome is theology in action. Hospitality makes room for the stranger.\n\nFocus:\n- Describe the spiritual practice.\n- Name the risks and rewards.\n\n\n---\n\n\n## ACT IV — Practice\n\n---\n\n\n### Chapter 24: Technology and Time\n\n*ACT IV — Practice | ID: technology_and_time | File: 24_technology_and_time.md*\n\n---\n\nTools shape hearts. Time is a gift that needs boundaries and sabbath.\n\nFocus:\n- Offer a theology of limits.\n- Call for attention and presence.\n\n\n---\n\n\n### Chapter 25: Beauty and Art\n\n*ACT IV — Practice | ID: beauty_and_art | File: 25_beauty_and_art.md*\n\n---\n\nBeauty is a witness to Godâ€™s glory. Art tells the truth sideways.\n\nFocus:\n- Celebrate creativity.\n- Link beauty to worship.\n\n\n---\n\n\n### Chapter 26: Money and Generosity\n\n*ACT IV — Practice | ID: money_and_generosity | File: 26_money_and_generosity.md*\n\n---\n\nMoney reveals trust. Generosity is a spiritual discipline of freedom.\n\nFocus:\n- Name the power of money.\n- Propose practices of giving.\n\n\n---\n\n\n### Chapter 27: Ecology and Creation Care\n\n*ACT IV — Practice | ID: ecology_and_creation_care | File: 27_ecology_and_creation_care.md*\n\n---\n\nCare for creation is a form of love. The earth is not disposable.\n\nFocus:\n- Connect stewardship to worship.\n- Offer practical commitments.\n\n\n---\n\n\n### Chapter 28: Conflict and Forgiveness\n\n*ACT IV — Practice | ID: conflict_and_forgiveness | File: 28_conflict_and_forgiveness.md*\n\n---\n\nForgiveness is not denial, it is release. Conflict can become a pathway to truth.\n\nFocus:\n- Describe reconciliation steps.\n- Acknowledge hard boundaries.\n\n\n---\n\n\n### Chapter 29: Doubt and Faithfulness\n\n*ACT IV — Practice | ID: doubt_and_faithfulness | File: 29_doubt_and_faithfulness.md*\n\n---\n\nDoubt is not the enemy of faith. Faithfulness is staying in the relationship.\n\nFocus:\n- Normalize questions.\n- Encourage patience with self.\n\n\n---\n\n\n### Chapter 30: Blessing and Sending\n\n*ACT IV — Practice | ID: blessing_and_sending | File: 30_blessing_and_sending.md*\n\n---\n\nTheology leads to mission. Blessing is meant to be carried outward.\n\nFocus:\n- End with commissioning.\n- Invite continued reflection.\n\n\n---\n\n";
    const container = document.getElementById('novelContent');
    marked.setOptions({ breaks: true });
    container.innerHTML = marked.parse(markdown);

    (function initPenguinPages() {
      var viewport = document.getElementById('contentViewport');
      var scrollEl = document.getElementById('contentScroll');
      var pagesEl = document.getElementById('contentPages');
      var inner = scrollEl && scrollEl.querySelector('.novel-content-inner');
      var content = document.getElementById('novelContent');
      var folioEl = document.getElementById('pageFolio');
      if (!viewport || !scrollEl || !pagesEl || !inner || !content) return;
      var style = window.getComputedStyle(document.body);
      var fs = parseFloat(style.fontSize) || 14;
      var lh = parseFloat(style.lineHeight) || 1.25;
      if (isNaN(lh)) lh = 1.25;
      var pageHeightPx = Math.round(35 * fs * lh);
      var contentHeight = content.scrollHeight;
      var totalPages = Math.max(1, Math.ceil(contentHeight / pageHeightPx));
      pagesEl.innerHTML = '';
      for (var i = 0; i < totalPages; i++) {
        var div = document.createElement('div');
        div.className = 'penguin-page-snap';
        div.style.height = pageHeightPx + 'px';
        pagesEl.appendChild(div);
      }
      scrollEl.style.minHeight = (totalPages * pageHeightPx) + 'px';
      inner.style.height = contentHeight + 'px';
      if (folioEl) {
        folioEl.textContent = 'Page 1 of ' + totalPages;
        function updateFolio() {
          var st = viewport.scrollTop;
          var cur = Math.min(totalPages, Math.max(1, Math.floor(st / pageHeightPx) + 1));
          folioEl.textContent = 'Page ' + cur + ' of ' + totalPages;
        }
        viewport.addEventListener('scroll', function() { requestAnimationFrame(updateFolio); });
        window.addEventListener('resize', updateFolio);
      }
    })();

    (function initChapterNav() {
      var content = document.getElementById('novelContent');
      var selectEl = document.getElementById('novelChapterSelect');
      var viewport = document.getElementById('contentViewport');
      if (!content || !selectEl || !viewport) return;
      var chapterHeadings = content.querySelectorAll('h3');
      var chapterHeadingRe = /^Chapter \\d+:/i;
      chapterHeadings.forEach(function(h3, i) {
        var text = (h3.textContent || '').trim();
        if (chapterHeadingRe.test(text)) h3.id = 'chapter-' + (i + 1);
      });
      selectEl.addEventListener('change', function() {
        var value = this.value;
        if (!value) return;
        var el = document.getElementById(value);
        if (el) viewport.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
        this.value = '';
      });
    })();

    (function initRunningHeader() {
      var content = document.getElementById('novelContent');
      var titleEl = document.getElementById('currentChapterTitle');
      var viewport = document.getElementById('contentViewport');
      if (!content || !titleEl || !viewport) return;
      var chapterHeadings = content.querySelectorAll('h3');
      var chapterHeadingRe = /^Chapter \\d+:/i;
      function setChapter(title) { titleEl.textContent = title || ''; }
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          var text = (entry.target.textContent || '').trim();
          if (chapterHeadingRe.test(text)) setChapter(text);
        });
      }, { root: viewport, rootMargin: '-10% 0px -70% 0px', threshold: 0 });
      chapterHeadings.forEach(function(h) {
        if (chapterHeadingRe.test((h.textContent || '').trim())) observer.observe(h);
      });
      if (chapterHeadings.length) setChapter((chapterHeadings[0].textContent || '').trim());
    })();
  </script>
