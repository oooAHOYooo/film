  <script>
    const markdown = "# Field Notes — Full Novel\n\n*Compiled on 3/12/2026, 7:23:46 AM*\n\n---\n\n\n## ACT I — Open Pages\n\n---\n\n\n### Chapter 1: Field Notes\n\n*ACT I — Open Pages | ID: field_notes | File: 01_field_notes.md*\n\n---\n\nField notes, fragments, and journal-style entries live here.\n\nDrop in ideas, dates, and freeform reflections as they come.\n\nStart with fragments: where you are, what you notice, what you canâ€™t stop thinking about.\n\nFocus:\n- Date the entry.\n- Anchor to a sensory detail.\n\n\n---\n\n\n### Chapter 2: Small Inventory\n\n*ACT I — Open Pages | ID: small_inventory | File: 02_small_inventory.md*\n\n---\n\nList the objects on your desk. Let each item tell a small story.\n\nFocus:\n- Name what you keep.\n- Ask why it stayed.\n\n\n---\n\n\n### Chapter 3: Morning Pages\n\n*ACT I — Open Pages | ID: morning_pages | File: 03_morning_pages.md*\n\n---\n\nWrite quickly, without editing. The goal is movement, not polish.\n\nFocus:\n- Three pages of freeform.\n- Notice recurring themes.\n\n\n---\n\n\n### Chapter 4: Dream Fragments\n\n*ACT I — Open Pages | ID: dream_fragments | File: 04_dream_fragments.md*\n\n---\n\nRecord a dream in the morning. Even broken images can be useful later.\n\nFocus:\n- Capture the strongest image.\n- Note the emotion it left.\n\n\n---\n\n\n### Chapter 5: Streetlight Thoughts\n\n*ACT I — Open Pages | ID: streetlight_thoughts | File: 05_streetlight_thoughts.md*\n\n---\n\nWrite what you think when the city goes quiet. The night makes honesty easier.\n\nFocus:\n- Walk or imagine a walk.\n- Let the light guide the tone.\n\n\n---\n\n\n### Chapter 6: Voice Memos\n\n*ACT I — Open Pages | ID: voice_memos | File: 06_voice_memos.md*\n\n---\n\nTranscribe quick notes from your phone. Spoken thoughts have a different rhythm.\n\nFocus:\n- Pick three memos.\n- Expand each by one paragraph.\n\n\n---\n\n\n### Chapter 7: Tiny Theories\n\n*ACT I — Open Pages | ID: tiny_theories | File: 07_tiny_theories.md*\n\n---\n\nOffer a small idea about how the world works. Keep it modest and personal.\n\nFocus:\n- State the theory.\n- Test it with an example.\n\n\n---\n\n\n### Chapter 8: Weather Log\n\n*ACT I — Open Pages | ID: weather_log | File: 08_weather_log.md*\n\n---\n\nRecord the weather as if it mirrors your mood. Let the sky do the talking.\n\nFocus:\n- Describe the dayâ€™s weather.\n- Connect it to an inner shift.\n\n\n---\n\n\n## ACT II — Days\n\n---\n\n\n### Chapter 9: Conversations\n\n*ACT II — Days | ID: conversations | File: 09_conversations.md*\n\n---\n\nRemember a conversation that stayed with you. Write it as dialogue or reflection.\n\nFocus:\n- Capture the exact phrase.\n- Explain why it landed.\n\n\n## Conversation \n1. Not wanting a job because I am some sort of Olympic athelete and getting a job would be equivelent to working at a gas station. \n\n---\n\n\n### Chapter 10: Maps I Drew\n\n*ACT II — Days | ID: maps_i_drew | File: 10_maps_i_drew.md*\n\n---\n\nSketch the map of a place from memory. Words can describe the routes too.\n\nFocus:\n- Name the landmarks.\n- Point out where you got lost.\n\n\n---\n\n\n### Chapter 11: Found Objects\n\n*ACT II — Days | ID: found_objects | File: 11_found_objects.md*\n\n---\n\nWrite about something you found. It doesnâ€™t need to be valuable to matter.\n\nFocus:\n- Describe the object.\n- Imagine its history.\n\n\n---\n\n\n### Chapter 12: Letters Unsent\n\n*ACT II — Days | ID: letters_unsent | File: 12_letters_unsent.md*\n\n---\n\nWrite a letter you will never send. Let it hold the truth.\n\nFocus:\n- Choose a recipient.\n- Leave the ending open.\n\n\n---\n\n\n### Chapter 13: Things I Avoid\n\n*ACT II — Days | ID: things_i_avoid | File: 13_things_i_avoid.md*\n\n---\n\nName the places or topics you dodge. Curiosity can be a gentle invitation.\n\nFocus:\n- List what you avoid.\n- Name a reason.\n\n\n---\n\n\n### Chapter 14: Things I Return To\n\n*ACT II — Days | ID: things_i_return_to | File: 14_things_i_return_to.md*\n\n---\n\nWhat keeps coming back? A song, a line, a memoryâ€”record the pattern.\n\nFocus:\n- List the returns.\n- Write why they persist.\n\n\n---\n\n\n### Chapter 15: The Shape of a Day\n\n*ACT II — Days | ID: the_shape_of_a_day | File: 15_the_shape_of_a_day.md*\n\n---\n\nWrite a day as a shape: a spiral, a straight line, a knot. Let form guide the story.\n\nFocus:\n- Name the shape.\n- Match the narrative to it.\n\n\n---\n\n\n### Chapter 16: Borrowed Lines\n\n*ACT II — Days | ID: borrowed_lines | File: 16_borrowed_lines.md*\n\n---\n\nCollect lines you love and respond to them. Make a mosaic of influence.\n\nFocus:\n- Quote three lines.\n- Answer each in your own voice.\n\n\n---\n\n\n## ACT III — Questions\n\n---\n\n\n### Chapter 17: A Good Question\n\n*ACT III — Questions | ID: a_good_question | File: 17_a_good_question.md*\n\n---\n\nChoose one question that wonâ€™t leave you alone. Follow it for a page.\n\nFocus:\n- State the question plainly.\n- Write without solving it.\n\n\n---\n\n\n### Chapter 18: After Midnight\n\n*ACT III — Questions | ID: after_midnight | File: 18_after_midnight.md*\n\n---\n\nWrite as if it is late and the world is quiet. Let your guard down.\n\nFocus:\n- Describe the room.\n- Say the thing you never say.\n\n\n---\n\n\n### Chapter 19: The Long Walk\n\n*ACT III — Questions | ID: the_long_walk | File: 19_the_long_walk.md*\n\n---\n\nNarrate a walk from start to finish. Each block can be a paragraph.\n\nFocus:\n- Start at the door.\n- End with a changed thought.\n\n\n---\n\n\n### Chapter 20: Notes on Rest\n\n*ACT III — Questions | ID: notes_on_rest | File: 20_notes_on_rest.md*\n\n---\n\nRest is a practice. Write what truly rests you and what only distracts.\n\nFocus:\n- Define rest personally.\n- Name one boundary.\n\n\n---\n\n\n### Chapter 21: Places I Miss\n\n*ACT III — Questions | ID: places_i_miss | File: 21_places_i_miss.md*\n\n---\n\nWrite a place you miss without naming it at first. Let it reveal itself slowly.\n\nFocus:\n- Build with sensory detail.\n- State the name at the end.\n\n\n---\n\n\n### Chapter 22: Mismatched Lists\n\n*ACT III — Questions | ID: mismatched_lists | File: 22_mismatched_lists.md*\n\n---\n\nTwo lists that donâ€™t belong together can spark a story. Let them collide.\n\nFocus:\n- Make list A and list B.\n- Write the bridge between them.\n\n\n---\n\n\n### Chapter 23: A Photograph\n\n*ACT III — Questions | ID: a_photograph | File: 23_a_photograph.md*\n\n---\n\nDescribe a photo as if it is happening now. Time can be rewritten in prose.\n\nFocus:\n- Describe the frame.\n- Imagine what happened before.\n\n\n---\n\n\n## ACT IV — Fragments\n\n---\n\n\n### Chapter 24: The Sound of ___\n\n*ACT IV — Fragments | ID: the_sound_of | File: 24_the_sound_of.md*\n\n---\n\nPick a sound and chase it. Sound is often a memory wearing a mask.\n\nFocus:\n- Name the sound.\n- Tie it to a moment.\n\n\n---\n\n\n### Chapter 25: Half-Finished Scenes\n\n*ACT IV — Fragments | ID: half_finished_scenes | File: 25_half_finished_scenes.md*\n\n---\n\nCollect fragments of scenes. Leave them open so future you can finish them.\n\nFocus:\n- Write three fragments.\n- Mark one to return to.\n\n\n---\n\n\n### Chapter 26: Dialogues\n\n*ACT IV — Fragments | ID: dialogues | File: 26_dialogues.md*\n\n---\n\nWrite a conversation between two parts of yourself. Let them disagree.\n\nFocus:\n- Give each a name.\n- Let one concede something.\n\n\n---\n\n\n### Chapter 27: On Anger\n\n*ACT IV — Fragments | ID: on_anger | File: 27_on_anger.md*\n\n---\n\nAnger is information. Write what it protects and what it hides.\n\nFocus:\n- Name the source.\n- Name the boundary it wants.\n\n\n---\n\n\n### Chapter 28: On Joy\n\n*ACT IV — Fragments | ID: on_joy | File: 28_on_joy.md*\n\n---\n\nJoy is a sudden clarity. Record a moment when it appeared.\n\nFocus:\n- Describe the moment.\n- Explain why it surprised you.\n\n\n---\n\n\n### Chapter 29: On Grief\n\n*ACT IV — Fragments | ID: on_grief | File: 29_on_grief.md*\n\n---\n\nGrief is love continuing. Write the love you are protecting.\n\nFocus:\n- Name who or what is missed.\n- Write one small memorial.\n\n\n---\n\n\n### Chapter 30: On Hope\n\n*ACT IV — Fragments | ID: on_hope | File: 30_on_hope.md*\n\n---\n\nHope is a practiced lens. Write one way you choose it today.\n\nFocus:\n- Describe the choice.\n- End with a simple vow.\n\n\n---\n\n";
    const container = document.getElementById('novelContent');
    marked.setOptions({ breaks: true });
    container.innerHTML = marked.parse(markdown);

    (function initPenguinPages() {
      var viewport = document.getElementById('contentViewport');
      var scrollEl = document.getElementById('contentScroll');
      var pagesEl = document.getElementById('contentPages');
      var inner = scrollEl && scrollEl.querySelector('.novel-content-inner');
      var content = document.getElementById('novelContent');
      var folioEl = document.getElementById('pageFolio');
      if (!viewport || !scrollEl || !pagesEl || !inner || !content) return;
      var style = window.getComputedStyle(document.body);
      var fs = parseFloat(style.fontSize) || 14;
      var lh = parseFloat(style.lineHeight) || 1.25;
      if (isNaN(lh)) lh = 1.25;
      var pageHeightPx = Math.round(35 * fs * lh);
      var contentHeight = content.scrollHeight;
      var totalPages = Math.max(1, Math.ceil(contentHeight / pageHeightPx));
      pagesEl.innerHTML = '';
      for (var i = 0; i < totalPages; i++) {
        var div = document.createElement('div');
        div.className = 'penguin-page-snap';
        div.style.height = pageHeightPx + 'px';
        pagesEl.appendChild(div);
      }
      scrollEl.style.minHeight = (totalPages * pageHeightPx) + 'px';
      inner.style.height = contentHeight + 'px';
      if (folioEl) {
        folioEl.textContent = 'Page 1 of ' + totalPages;
        function updateFolio() {
          var st = viewport.scrollTop;
          var cur = Math.min(totalPages, Math.max(1, Math.floor(st / pageHeightPx) + 1));
          folioEl.textContent = 'Page ' + cur + ' of ' + totalPages;
        }
        viewport.addEventListener('scroll', function() { requestAnimationFrame(updateFolio); });
        window.addEventListener('resize', updateFolio);
      }
    })();

    (function initChapterNav() {
      var content = document.getElementById('novelContent');
      var selectEl = document.getElementById('novelChapterSelect');
      var viewport = document.getElementById('contentViewport');
      if (!content || !selectEl || !viewport) return;
      var chapterHeadings = content.querySelectorAll('h3');
      var chapterHeadingRe = /^Chapter \\d+:/i;
      chapterHeadings.forEach(function(h3, i) {
        var text = (h3.textContent || '').trim();
        if (chapterHeadingRe.test(text)) h3.id = 'chapter-' + (i + 1);
      });
      selectEl.addEventListener('change', function() {
        var value = this.value;
        if (!value) return;
        var el = document.getElementById(value);
        if (el) viewport.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
        this.value = '';
      });
    })();

    (function initRunningHeader() {
      var content = document.getElementById('novelContent');
      var titleEl = document.getElementById('currentChapterTitle');
      var viewport = document.getElementById('contentViewport');
      if (!content || !titleEl || !viewport) return;
      var chapterHeadings = content.querySelectorAll('h3');
      var chapterHeadingRe = /^Chapter \\d+:/i;
      function setChapter(title) { titleEl.textContent = title || ''; }
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          var text = (entry.target.textContent || '').trim();
          if (chapterHeadingRe.test(text)) setChapter(text);
        });
      }, { root: viewport, rootMargin: '-10% 0px -70% 0px', threshold: 0 });
      chapterHeadings.forEach(function(h) {
        if (chapterHeadingRe.test((h.textContent || '').trim())) observer.observe(h);
      });
      if (chapterHeadings.length) setChapter((chapterHeadings[0].textContent || '').trim());
    })();
  </script>
