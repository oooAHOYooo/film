<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Inspiration Gallery | The Fall of Hibisicas</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/summer.css">
    <style>
        :root {
            --accent: #80cbc4;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
        }

        .gallery-header {
            padding: 120px 20px 60px;
            text-align: center;
            background: linear-gradient(180deg, rgba(128, 203, 196, 0.1) 0%, transparent 100%);
        }

        .gallery-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #e0f2f1, #80cbc4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .inspo-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .inspo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #161b22;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item-info {
            padding: 15px;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: #8b949e;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <a href="/pages/spring.html" class="back-link">
        <span>←</span> Back to Spring Hub
    </a>

    <header class="gallery-header">
        <h1 class="gallery-title">Inspiration Gallery</h1>
        <p class="gallery-subtitle">Visual research for <em>The Fall of Hibisicas</em>.</p>
    </header>

    <main class="inspo-container">
        <section class="inspo-section" id="vibes">
            <div id="vibes-grid" class="inspo-grid"></div>
        </section>
    </main>

    <script src="/scripts/spring/inspiration.js"></script>
</body>

</html>
