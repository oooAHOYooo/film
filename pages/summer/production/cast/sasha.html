<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Schedule: SASHA — Summer Production</title>
        <style>
                        :root {
                --prod-accent: #79b8ff;
                --prod-head: rgba(56, 139, 253, 0.12);
                --prod-border: rgba(56, 139, 253, 0.18);
                --prod-tag-bg: rgba(56, 139, 253, 0.1);
                --prod-tag-border: rgba(56, 139, 253, 0.25);
                --prod-row-hover: rgba(56, 139, 253, 0.06);
                --sidebar-w: 260px;
            }
            body { 
                margin: 0; 
                display: flex; 
                flex-direction: column; 
                height: 100vh; 
                overflow: hidden; 
                background: #0d1117;
                color: #c9d1d9;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            }
            .dashboard-container {
                display: flex;
                flex: 1;
                overflow: hidden;
            }
            .sidebar {
                width: var(--sidebar-w);
                background: #161b22;
                border-right: 1px solid var(--prod-border);
                display: flex;
                flex-direction: column;
                padding: 20px;
                overflow-y: auto;
            }
            .main-content {
                flex: 1;
                overflow-y: auto;
                padding: 40px;
                scroll-behavior: smooth;
            }
            .stats-card {
                background: var(--prod-tag-bg);
                border: 1px solid var(--prod-tag-border);
                border-radius: 8px;
                padding: 16px;
                margin-bottom: 24px;
            }
            .stats-title {
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--text-secondary);
                margin-bottom: 8px;
            }
            .stats-value {
                font-size: 1.5rem;
                font-weight: 600;
                color: var(--prod-accent);
            }
            .sidebar-button {
                display: block;
                width: 100%;
                padding: 14px;
                background: #2ea44f;
                color: #fff;
                text-align: center;
                text-decoration: none;
                font-weight: 600;
                border-radius: 6px;
                margin-bottom: 24px;
                font-size: 0.9rem;
                transition: background 0.2s;
            }
            .sidebar-button:hover {
                background: #2c974b;
            }
            .sidebar-nav-title {
                font-size: 0.85rem;
                font-weight: 600;
                margin: 20px 0 10px 0;
                color: var(--prod-accent);
            }
            .sidebar-link {
                display: block;
                padding: 8px 12px;
                color: var(--text-secondary);
                text-decoration: none;
                font-size: 0.9rem;
                border-radius: 6px;
                margin-bottom: 2px;
                transition: all 0.2s;
            }
            .sidebar-link:hover {
                background: var(--prod-row-hover);
                color: var(--prod-accent);
            }
            .production-table {
                width: 100%;
                border-collapse: collapse;
                background: #0d1117;
                border: 1px solid var(--prod-border);
                font-size: 0.9rem;
            }
            .production-table th {
                text-align: left;
                padding: 12px;
                border-bottom: 2px solid var(--prod-border);
                background: #161b22;
                color: var(--prod-accent);
                position: sticky;
                top: -41px;
                z-index: 10;
            }
            .production-table td {
                padding: 12px;
                border-bottom: 1px solid var(--prod-border);
                vertical-align: top;
            }
            .day-divider {
                background: var(--prod-head);
                color: var(--prod-accent);
                font-weight: 600;
                padding: 12px 20px;
                border-left: 4px solid var(--prod-accent);
                margin: 40px 0 20px 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .actor-chip {
                display: inline-block;
                padding: 2px 8px;
                background: rgba(56, 139, 253, 0.15);
                border: 1px solid rgba(56, 139, 253, 0.3);
                border-radius: 12px;
                font-size: 0.75rem;
                margin-right: 4px;
                margin-bottom: 4px;
                color: #58a6ff;
            }
            .click-copy {
                cursor: pointer;
                border-bottom: 1px dashed transparent;
            }
            .click-copy:hover {
                border-bottom-color: var(--prod-accent);
                color: var(--prod-accent);
            }
            .sync-check {
                cursor: pointer;
                opacity: 0.4;
                transition: opacity 0.2s;
            }
            .sync-check:checked {
                opacity: 1;
            }
            .row-dimmed {
                opacity: 0.4;
            }
            @media print {
                .sidebar, .nav-bar, .back-to-top { display: none; }
                .dashboard-container { display: block; }
                .main-content { padding: 0; }
                body { overflow: visible; height: auto; }
            }

            body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, system-ui, sans-serif; margin:0; padding:0; }
            .cast-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
            .cast-header { border-bottom: 1px solid var(--prod-border); padding-bottom: 30px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
            .back-link { color: var(--prod-accent); text-decoration: none; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; transition: opacity 0.2s; }
            .back-link:hover { opacity: 0.7; }
            .cast-stats { display: flex; gap: 40px; margin-bottom: 40px; }
            .stat-box { border-left: 2px solid var(--prod-accent); padding-left: 15px; }
            .stat-label { font-size: 0.75rem; text-transform: uppercase; color: #8b949e; letter-spacing: 0.05em; }
            .stat-value { font-size: 1.5rem; font-weight: 600; color: #fff; }
            .print-btn { background: var(--prod-tag-bg); border: 1px solid var(--prod-tag-border); color: var(--prod-accent); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
            .print-btn:hover { background: var(--prod-row-hover); border-color: var(--prod-accent); }
            @media print {
                body { background: white; color: black; }
                .cast-container { max-width: 100%; margin: 0; padding: 20px; }
                .print-btn, .back-link { display: none; }
                .cast-header { border-color: black; color: black; }
                .cast-stats .stat-value { color: black; }
                .production-table th { background: #f0f0f0; border-color: black; color: black; }
                .production-table td { border-color: #ddd; color: black; }
                .scene-number { color: black; }
                .location-tag { border-color: #ccc; color: black; background: transparent; }
            }
        </style>
    </head>
    <body>
        <div class="cast-container">
            <a href="../../production.html" class="back-link">← Back to Dashboard</a>
            <header class="cast-header">
                <div>
                    <h1 style="margin:0; font-size:2.5rem; color:#fff;">SASHA</h1>
                    <p style="margin:5px 0 0 0; opacity:0.6;">Individual Cast Schedule — Summer Production</p>
                </div>
                <button class="print-btn" onclick="window.print()">🖨️ Print for Set</button>
            </header>

            <div class="cast-stats">
                <div class="stat-box">
                    <div class="stat-label">Total Shoot Days</div>
                    <div class="stat-value">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Scenes</div>
                    <div class="stat-value">1</div>
                </div>
            </div>

            <table class="production-table" style="background:transparent; border-top:none;">
                <thead>
                    <tr>
                        <th style="width:100px;">DAY</th>
                        <th style="width:150px;">DATE</th>
                        <th style="width:60px;">#</th>
                        <th>SCENE DESCRIPTION</th>
                        <th style="width:180px;">LOCATION</th>
                        <th style="width:80px;">DUR</th>
                    </tr>
                </thead>
                <tbody>
                    
      <tr>
        <td style="font-weight:700; color:var(--prod-accent);">DAY 9</td>
        <td style="font-size:0.9rem; opacity:0.8;">Jul 5, 2026</td>
        <td><span class="scene-number">19</span></td>
        <td style="font-style:italic;">The Hymn</td>
        <td><span class="location-tag"></span></td>
        <td style="font-size:0.85rem; opacity:0.7;">2 min</td>
      </tr>
                </tbody>
            </table>

            <footer style="margin-top:60px; padding-top:20px; border-top:1px solid var(--prod-border); font-size:0.8rem; opacity:0.4; text-align:center;">
                Barnacle Film Studio — Generated Breakdown
            </footer>
        </div>
    </body>
</html>
