  <script>
    (function() {
      // Embedded data from compile.js
      const CARDS_DATA = [{"n":1,"id":"arrival","title":"Arrival","act":1,"actTitle":"Arrival & Discovery","summary":"New house, tall grass. He finds a rig in the reeds. Makayla and Asher want his oscillator."},{"n":2,"id":"dallas-night","title":"Sierra's Box","act":1,"actTitle":"Arrival & Discovery","summary":"Can't sleep. Golden flicker in the grass. He opens Sierra's box; the hum starts; the battery dies."},{"n":3,"id":"the-hum","title":"Meet The Neighbors","act":1,"actTitle":"Arrival & Discovery","summary":"Dallas walks outside his house, towards the edge of the property. As he approaches the edge of his yard he watches the tall grass sway in the wind. He looks at the grass for a beat too long, as he nurses the audio…"},{"n":4,"id":"fellowship","title":"Fellowship","act":1,"actTitle":"Arrival & Discovery","summary":"Dallas and Dominic arrive at CPC and find themselves in heat of a picnic. Children are running, friends down light summerwear as they play spike ball, and church goers find themselvees are on a long line for food.…"},{"n":5,"id":"marsh-walk-later","title":"The Merlin App","act":1,"actTitle":"Arrival & Discovery","summary":"Boardwalk through the reeds. They hear birds andSomething moving in the marsh."},{"n":6,"id":"news-vans","title":"News Vans","act":1,"actTitle":"Arrival & Discovery","summary":"News vans in the street. Pat on camera. Marks on Dominic's driveway. Dallas strays and stays."},{"n":7,"id":"the-coordinates","title":"The Coordinates","act":1,"actTitle":"Arrival & Discovery","summary":"Dallas looks around in amazement. The basement is covered with normal basement things - but as his eyes scan the room he notices that there are two beds, room, and clutter. Around the corner there is a workstation…"},{"n":8,"id":"dallas-marsh-walk","title":"The Trailcam","act":1,"actTitle":"Arrival & Discovery","summary":"Dallas tries to bring Howie inside but he won't go. He looks like he wants to go on a walk. So Dallas reasons with the creature and brings him on a walk. The Long Island Sound roars, the waves crashing violently against…"},{"n":9,"id":"dallas-night-work","title":"The Injured One","act":1,"actTitle":"Arrival & Discovery","summary":"Dallas, as he ventures deeper and deeper into the marsh - finds a bioluminest creature"},{"n":10,"id":"shadows-in-wind","title":"Creature Discovery","act":1,"actTitle":"Arrival & Discovery","summary":"As Dallas walks out of the tall grass, he gets the sense that something is following him. The air changes and the hum faintly comes back. Then in the distant, more coyotes begin to howl. A heavy, crushing sound slices…"},{"n":11,"id":"howie-walk-2","title":"Kitchen Triage","act":1,"actTitle":"Arrival & Discovery","summary":"Dallas at home with the creature. Kitchen triage—parchment, macro lens. The creature cries; the equipment flares gold."},{"n":12,"id":"the-burn-mark","title":"The First Night With Creature","act":2,"actTitle":"The Creature","summary":"Wires on the creature's head. It sings through its back-holes. She can't tell anyone."},{"n":13,"id":"entering-grass","title":"The Confrontation","act":2,"actTitle":"The Creature","summary":"The morning air is thick with the scent of ozone. Dominic''s minivan idles in the driveway. Makayla and Asher don't follow him. They wander toward the edge of Dallas's property. Dominic walks right up to Dallas' doorway…"},{"n":14,"id":"creature-rescue","title":"The Connection","act":2,"actTitle":"The Creature","summary":"Makayla and Dallas look on the ground for a while as they sit outside the patio. Howie sleeps peacefully near Dallas' feet nearby. Asher sits alone a few feet away—drawing in his notebook."},{"n":15,"id":"the-burn-mark-2","title":"Makayla's Lair","act":2,"actTitle":"The Creature","summary":"Reverse Device mission born. Dallas calibrates the oscillator using Mr. Mike's numbers. A countdown begins."},{"n":16,"id":"the-escape","title":"Makayla's Lair","act":2,"actTitle":"The Creature","summary":"Makayla, Dallas, and Asher hastily make their way out of the woods, back toward the field, carrying the creature in its box and the heavy, dead oscillator rig. As the crew walk, they begin to notice that the tall grass…"},{"n":17,"id":"entering-grass-2","title":"Makayla's Bond With Creature","act":2,"actTitle":"The Creature","summary":"MAKAYLA, DALLAS, and ASHER are crouched in the mudroom, shoulder-to-shoulder. Makayla stares for a long time at the golden creature. The jagged red lines on her portable viewfinder match the erratic, panicked breathing…"},{"n":18,"id":"life-group-arrives","title":"Life Group Arrives","act":2,"actTitle":"The Creature","summary":"Families arrive in waves. The small kitchen and smaller living room fill. The crowd tries Dominic's toasted Brussels sprouts, passed around on paper plates. Makayla drifts through the kitchen. She opens drawers quietly.…"},{"n":19,"id":"the-hymn","title":"The Hymn","act":2,"actTitle":"The Creature","summary":"Mr. Mike rocks back and forth in the chair. Dallas shuffles through a pile of old equipment—mono cables, spare parts and arranges them all neatly on a desk. The creature doesn't look like it's doing much. It's…"},{"n":20,"id":"red-eyes","title":"The Secret is Out","act":2,"actTitle":"The Creature","summary":"Dominic descends the basement stairs, expecting a stray kitten. Instead: military-grade oscillators, tangles of thick coaxial wire, and Sierra's folder spread open. The shoebox under the heat lamp is empty. The small…"},{"n":21,"id":"creature-missing","title":"The Burn Marks","act":2,"actTitle":"The Creature","summary":"The crew hold the door down."},{"n":22,"id":"marsh-confrontation","title":"The Load-Out","act":3,"actTitle":"The Return","summary":"The burn marks lead from the driveway toward the house—crawling along the siding and spider-webbing up toward the windows. A corrupt vein system trying to infect the home. The wind drops, the howling stops. Then it…"},{"n":23,"id":"predator-attack","title":"The Trench Run","act":3,"actTitle":"The Return","summary":"Dallas and Asher enter the tall grass carrying all of the equipment. The nylon straps bite into Dallas' shoulders - straining the fabric. Dallas stops for a moment in pain, almost dropping the speaker on Asher. He looks…"},{"n":24,"id":"the-perimeter","title":"The Sanctuary & The Siege","act":3,"actTitle":"The Return","summary":"The howling wind suddenly dies down. Makayla breaches through a thick wall of reeds and stops. Dallas, Dominic, and Asher break through behind her, collapsing to their knees in the mud under the weight of the speakers.…"},{"n":25,"id":"the-last-dinner","title":"The Final Blast","act":3,"actTitle":"The Return","summary":"The golden dome of the Elders is failing. Red-Eye shadows are ripping through the barrier, violently canceling out the light. The black rot is spreading rapidly inward across the flattened grass floor. Dallas and…"},{"n":26,"id":"final-echoes","title":"The Morning After","act":4,"actTitle":"Aftermath","summary":"The crew walk back through the tall grass, through neighborhoods, back and slow. The crew huddle around Dallas' house and all sleep on the floor as Mr Mike watches a movie on TV. Janice makes her way through the door."},{"n":27,"id":"aftermath","title":"Little Aftermath","act":4,"actTitle":"Aftermath","summary":"The town is back to normal. People move through their routines. The strange occurrences of the last few days are still on everyone's lips—muted, half-disbelieved. Dallas walks alone into the flattened ring of grass from…"},{"n":28,"id":"full-circle","title":"Full Circle","act":4,"actTitle":"Aftermath","summary":"Makayla sets up her new Lair in the woods to listen to the creatures. Dallas finds his wife's specific hum out in the marsh."}];
      
      const grid = document.getElementById('plotCardsGrid');

      function toRoman(num) {
        const map = [[10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']];
        let n = num, out = '';
        for (const [v, s] of map) {
          while (n >= v) { out += s; n -= v; }
        }
        return out;
      }

      function renderCards(cards) {
        if (!cards || !cards.length) {
          grid.innerHTML = '<p class="plot-cards-loading">No card data available.</p>';
          return;
        }
        
        let currentAct = null;
        cards.forEach(function(card) {
          if (card.act !== currentAct) {
            currentAct = card.act;
            const actLabel = document.createElement('div');
            actLabel.className = 'plot-cards-act-label';
            actLabel.setAttribute('aria-hidden', 'true');
            actLabel.textContent = 'ACT ' + toRoman(card.act) + ' — ' + (card.actTitle || '');
            grid.appendChild(actLabel);
          }
          const cardDiv = document.createElement('div');
          cardDiv.className = 'plot-card';
          cardDiv.innerHTML =
            '<span class="plot-card-number">' + card.n + '</span>' +
            '<h2 class="plot-card-title">' + escapeHtml(card.title) + '</h2>' +
            '<p class="plot-card-summary">' + escapeHtml(card.summary) + '</p>' +
            '<div class="plot-card-links" style="margin-top: auto; display: flex; gap: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 1rem; font-size: 0.8rem;">' +
              '<a href="full_script.html#scene-' + card.n + '" class="plot-card-link" style="text-decoration: none; font-weight: 600;">Full Script</a>' +
              '<a href="scene.html?id=' + encodeURIComponent(card.id) + '" class="plot-card-link" style="text-decoration: none; color: var(--muted); border-left: 1px solid var(--border); padding-left: 0.75rem;">Preview</a>' +
            '</div>';
          grid.appendChild(cardDiv);

        });
      }

      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Render immediately
      renderCards(CARDS_DATA);
    })();
  </script>
</body>
