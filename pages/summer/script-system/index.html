en Triage","act":1,"actTitle":"Arrival & Discovery","summary":"Dallas at home with the creature. Kitchen triage—parchment, macro lens. The creature cries; the equipment flares gold."},{"n":16,"id":"the-burn-mark","title":"The First Night With Creature","act":2,"actTitle":"The Creature","summary":"Dallas is alone. He keeps peering through his late wife's old documents. On the desk is the recorder and all of the tapes next to it. Dallas presses play on the recorder and goes to sleep."},{"n":17,"id":"entering-grass","title":"The Confrontation","act":2,"actTitle":"The Creature","summary":"Dallas awakes with the sunlight hitting his face. He gets up and walks over to his desk. Outside he hears a loud bang and someone cursing in the distance. Dominic''s minivan idles in the driveway. Dominic gets out and…"},{"n":18,"id":"creature-rescue","title":"The Connection","act":2,"actTitle":"The Creature","summary":"Makayla and Dallas look on the ground for a while as they sit outside the patio. Howie sleeps peacefully near Dallas' feet nearby. Asher sits alone a few feet away—he begins to tap on his fingers, and then nods in…"},{"n":19,"id":"the-field-journal","title":"The Field Journal","act":2,"actTitle":"The Creature","summary":"SCENE 14B: THE FIELD JOURNAL s14B.1 — EXT. DALLAS BACKYARD — OLD PICNIC TABLE — CONTINUOUS Makayla and Dallas sit in silence. Asher, a few feet off, threads beads onto string — the quantity matters, we just don't know…"},{"n":20,"id":"the-almost-discovery","title":"The Almost Discovery","act":2,"actTitle":"The Creature","summary":"Late-day light leaks through the kitchen blinds. The creature is hidden beneath a towel inside the makeshift enclosure. A SOFT, IRREGULAR HUM bleeds faintly into the room. Makayla stands rigid at the counter, tightening…"},{"n":21,"id":"the-failed-test","title":"The Failed Test","act":2,"actTitle":"The Creature","summary":"The room is dim, controlled. Every light filtered red. The creature rests inside its enclosure, watching—alert now. Makayla adjusts the oscillator carefully."},{"n":22,"id":"the-tracking-box","title":"Makayla's Tracking Box","act":2,"actTitle":"The Creature","summary":"The crew walk towards the neighborhood and begin the long process of making their journey down golden hour filled woodland area - as they approach a big field open field. At the end of the field are some tall trees.…"},{"n":23,"id":"dominics-confession","title":"Dominic's Confession","act":2,"actTitle":"The Creature","summary":"Crickets. Distant surf. Dominic and Dallas sit side by side. Dominic nurses a cooling mug of coffee."},{"n":24,"id":"the-escape","title":"Back Home","act":2,"actTitle":"The Creature","summary":"Makayla and Dallas hastily make their way out of the woods, back toward the field, carrying all of the equipment from the wooden box. As the two walk, they begin to notice that the tall grass around them is acting…"},{"n":25,"id":"resonance","title":"Resonance","act":2,"actTitle":"The Creature","summary":"Dallas looks at the creature by himself for a long time. Dallas stares for a long time at the golden creature. The jagged red lines on his portable viewfinder match the erratic, panicked breathing of the tiny animal.…"},{"n":26,"id":"life-group-arrives","title":"Life Group Arrives","act":2,"actTitle":"The Creature","summary":"Families arrive in waves. The small kitchen and smaller living room fill. The crowd tries Dominic's toasted Brussels sprouts, passed around on paper plates. The doorbell is heard. Makayla answers the door and sees…"},{"n":27,"id":"the-hymn","title":"The Hymn","act":2,"actTitle":"The Creature","summary":"Dallas shuffles through a pile of old equipment—mono cables, spare parts and arranges them all neatly on a desk. The creature doesn't look like it's doing much. It's breathing, slightly. Dallas struggles to find a bed…"},{"n":28,"id":"red-eyes","title":"The Secret is Out","act":2,"actTitle":"The Creature","summary":"Dominic descends the basement stairs, expecting a str :"The crew walk back through the tall grass, through neighborhoods, back and slow. The crew huddle around Dallas' house and all sleep on the floor as Mr Mike watches a movie on TV. Janice makes her way through the door."},{"n":36,"id":"aftermath","title":"Little Aftermath","act":4,"actTitle":"Aftermath","summary":"The town is back to normal. People move through their routines. The strange occurrences of the last few days are still on everyone's lips—muted, half-disbelieved. Dallas walks alone into the flattened ring of grass from…"},{"n":37,"id":"full-circle","title":"Full Circle","act":4,"actTitle":"Aftermath","summary":"Makayla sets up her new Lair in the woods to listen to the creatures. Dallas finds his wife's specific hum out in the marsh."}];
      
      const grid = document.getElementById('plotCardsGrid');

      function toRoman(num) {
        const map = [[10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']];
        let n = num, out = '';
        for (const [v, s] of map) {
          while (n >= v) { out += s; n -= v; }
        }
        return out;
      }

      function renderCards(cards) {
        if (!cards || !cards.length) {
          grid.innerHTML = '<p class="plot-cards-loading">No card data available.</p>';
          return;
        }
        
        let currentAct = null;
        cards.forEach(function(card) {
          if (card.act !== currentAct) {
            currentAct = card.act;
            const actLabel = document.createElement('div');
            actLabel.className = 'plot-cards-act-label';
            actLabel.setAttribute('aria-hidden', 'true');
            actLabel.textContent = 'ACT ' + toRoman(card.act) + ' — ' + (card.actTitle || '');
            grid.appendChild(actLabel);
          }
          const cardDiv = document.createElement('div');
          cardDiv.className = 'plot-card';
          cardDiv.innerHTML =
            '<span class="plot-card-number">' + card.n + '</span>' +
            '<h2 class="plot-card-title">' + escapeHtml(card.title) + '</h2>' +
            '<p class="plot-card-summary">' + escapeHtml(card.summary) + '</p>' +
            '<div class="plot-card-links" style="margin-top: auto; display: flex; gap: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 1rem; font-size: 0.8rem;">' +
              '<a href="full_script.html#scene-' + card.n + '" class="plot-card-link" style="text-decoration: none; font-weight: 600;">Full Script</a>' +
              '<a href="scene.html?id=' + encodeURIComponent(card.id) + '" class="plot-card-link" style="text-decoration: none; color: var(--muted); border-left: 1px solid var(--border); padding-left: 0.75rem;">Preview</a>' +
            '</div>';
          grid.appendChild(cardDiv);

        });
      }

      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Render immediately
      renderCards(CARDS_DATA);
    })();
