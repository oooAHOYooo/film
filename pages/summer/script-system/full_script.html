ing down the block glows red.\r\n\r\nHe looks again. Closer. The eyes reappear. Swirling through the beating rain and the blades of grass. Watching the house. Little pulses of red light. Inch by inch. Closer to the edge of the yard.\r\n\r\nBlack, twisting patterns—like rotten veins—begin creeping up the driveway concrete. The rain hits them and hisses into steam. \r\n\r\nDOMINIC\r\n(barely a whisper)\r\nWhat is that? \r\n\r\nDallas's hands are white-knuckling the military receiver. The screen isn't just flashing red; it's screaming in static. \r\n\r\nDALLAS\r\nThey're here.\r\n\n\n---\n\n\n### Scene 23: Creature Missing\n\n*ACT II — The Creature | ID: creature-missing | File: s23.md*\n\n---\n\n<!-- scene: 23 file: s23.md nickname: creature-missing -->\n\n# Scene 23: The Burn Marks\r\n<!-- summary: The Red-Eyes swarm the property. Makayla tests the oscillator against the burn marks, proving the phase canceler works. They are trapped and must fight. -->\r\n\r\nEXT. DALLAS'S BACKYARD - CONTINUOUS\r\n\r\nThe burn marks lead from the driveway toward the house—crawling along the siding and spider-webbing up toward the windows. A corrupt vein system trying to infect the home. \r\n\r\nMakayla watches the thick black veins approach the bottom of the porch stairs. She does some frantic mental math. The hum from the tall grass is deafening. \r\n\r\nMAKAYLA\r\nThe battery on the portable speaker won't last long enough. But if we can reverse engineer the frequency... \r\n\r\nMakayla drops to her knees, ripping open Dallas's gear bag. She hauls out a portable speaker, slamming it onto the porch railing, aiming it directly at the creeping burn mark like a shotgun. She rips the wire with her teeth and bridges the crystal into the circuit. \r\n\r\nDALLAS\r\nWait, you're building a phase canceler?\r\n\r\nMAKAYLA\r\nWe have to try! Asher—the numbers! \r\n\r\nAsher doesn't use his notebook. His hands fly over the oscillator dial with muscle memory. 1-1-5-3. \r\n\r\nMakayla hits the trigger. \r\n\r\nA sound like thick glass cracking under pressure pierces the rain. A high-pitched, localized frequency beam hits the lawn. \r\n\r\nThe grass at the edge of the yard sways rhythmically, completely freezing in place despite the gale-force wind. \r\n\r\nDallas, Makayla, and Dominic watch, stunned, as the \"vein\" burn mark physically recoils. It turns from a dark, hissing black—to a sickly brown—and back to a vibrant, natural green. The acoustic beam healed the earth.\r\n\r\nDOMINIC\r\n(breathless, eyes wide)\r\nYou reversed it. \r\n\r\nMakayla looks back at the tree line. The red eyes are multiplying.\r\n\r\nMAKAYLA\r\nWe can't run. They're surrounding the house. We have to set the trap here. Build the acoustic corridor on the lawn. \r\n\r\nDallas nods, his jaw tight. He looks at Dominic. \r\n\r\nDALLAS\r\nI'm going to need help moving the big speakers. \r\n\r\nDominic looks at the fading burn mark on the grass. He looks at Asher, vibrating with anxiety in the cold. Finally, Dominic exhales sharply. \r\n\r\nDOMINIC\r\nShow me where you want them.\r\n\n\n---\n\n\n## ACT III — The Return\n\n---\n\n\n### Scene 24: Marsh Confrontation\n\n*ACT III — The Return | ID: marsh-confrontation | File: s24.md*\n\n---\n\n<!-- scene: 24 file: s24.md nickname: marsh-confrontation -->\n\n# Scene 24: The Elders\r\n<!-- summary: The golden creatures emerge at the edge of the yard. The Red-Eyes attack. Dallas rescues the tiny creature, forcing them to set the trap immediately. -->\r\n\r\nEXT. EDGE OF THE TALL GRASS - CONTINUOUS\r\n\r\nWhile Dallas and Dominic struggle to drag the heavy, military-grade speakers through the thick mud, Makayla and Asher stand near the tree line as tense lookouts. \r\n\r\nSuddenly, a flickering, faint glow bleeds softly through the reeds. Just a few feet away. \r\n\r\nMakayla pushes blindly through the wet grass. \r\n\r\nThere, in a geometric ring of perfectly flattened stalks, is the tiny creature from the shoebox. Its pulse is slowing. The glow in its neck flickering like a dying bulb, dimming into a faint amber. \r\n\r\nSurrounding it are a group of elders—larger, birdlike golden creatures. They are attending to the injured one, their movements gentle and desperate. \r\n\r\nAsher whines, grabbing the sides of his head in sudden pain. The elders look at Asher. One of them tilts its massive head, emitting a soft, deeply resonant hum. Instantly, Asher's tight shoulders drop. His breathing calms. \r\n\r\nThen the wind changes. \r\n\r\nA heavy, crushing sound approaches through the reeds—the massive Red-Eye shadows aren't creeping anymore. They are rocketing toward the light. \r\n\r\nThe elders lift their hands. From their backs, a fine golden mist sprays out into the rain, trying to weave a protective acoustic field. But it's not enough. The Red-Eyes smash through them, erasing the light in violent snaps. They devour the sound. It's an absolute massacre. \r\n\r\nMAKAYLA\r\nDallas!!\r\n\r\nDallas drops his end of the speaker and sprints to the edge of the reeds. He sees the tiny creature lying helplessly in the mud as the massive shadows converge. \r\n\r\nHe doesn't think. He doesn't calculate. He dives into the reeds, scoops the frail, glowing creature against his chest, and scrambles backward toward the porch. \r\n\r\nThe shadows instantly turn their attention from the elders to the house. The entire tree line goes pitch black. The Red-Eyes are coming for them. \r\n\r\nDallas clears the stairs, sliding on the wet wood, and gently places the creature down. \r\n\r\nDALLAS\r\n(to Makayla, screaming over the rain)\r\nWire the sensor! We're out of time!\n\n---\n\n\n### Scene 25: Predator Attack\n\n*ACT III — The Return | ID: predator-attack | File: s25.md*\n\n---\n\n<!-- scene: 25 file: s25.md nickname: predator-attack -->\n\n# Scene 25: The Final Setup\r\n<!-- summary: Intentionally compressed. The crew scrambles to wire the trap. -->\r\n\r\nEXT. DALLAS'S BACKYARD - CONTINUOUS\r\n\r\nThe rain is merciless now, stinging their faces. Dallas and Dominic heave the massive speakers into position on the lawn, angling them toward each other to create a narrow funnel pointing toward the marsh. \r\n\r\nMakayla attaches the sensor between the speakers, her bare, freezing fingers quickly twisting raw copper to Dallas's receiver. The trap is acoustic—invisible. No concrete wall. Just two volatile frequencies waiting to violently collide.\r\n\r\nAsher gives Dominic a quick, frantic pointing tour of the equipment. He reaches for the main dial—then pulls his hand back before touching it. He taps his leg twice instead. \r\n\r\nA small radio on the porch plays thinly through the static—PAT CLENDENEN from the news van, cheerfully welcoming Branford to a beautiful southern New England morning. The contrast is cruel, almost mocking.\r\n\r\nThe trap is set—not a wall to hide behind, but a kill zone explicitly designed to catch a predator. And the hum from the tall grass isn't just loud anymore; it's rattling their bones.\n\n---\n\n\n### Scene 26: The Perimeter\n\n*ACT III — The Return | ID: the-perimeter | File: s26.md*\n\n---\n\n<!-- scene: 26 file: s26.md nickname: the-perimeter -->\n\n# Scene 26: Holding the Line\r\n<!-- summary: Intentionally compressed. Waiting for the strike. -->\r\n\r\nEXT. DALLAS'S PORCH - CONTINUOUS\r\n\r\nDallas wipes the mud from his face and walks back to the house. The crew clusters together tightly on the porch, drenched and shivering in the rain. \r\n\r\nThe injured creature lies safely in its shoebox near the door, its faint golden pulse matching the blinking green LED on the acoustic trap. \r\n\r\nDOMINIC\r\n(staring at the yard)\r\nThis is actually crazy. What are we doing here?\r\n\r\nNo one answers him. They just stare out into the pitch-black abyss of the yard.\r\n\r\nThe storm is here.\r\n\n\n---\n\n\n### Scene 27: The Last Dinner\n\n*ACT III — The Return | ID: the-last-dinner | File: s27.md*\n\n---\n\n<!-- scene: 27 file: s27.md nickname: the-last-dinner -->\n\n# Scene 27: The Climax\r\n<!-- summary: The climax. The storm hits, the power goes out, and the shadow creatures arrive. The phase-cancellation trap is tested. Dominic physically holds the line. -->\r\n\r\nEXT. DALLAS'S BACKYARD - NIGHT\r\n\r\nSiding rattles. The neighborhood is pitch black, stripped of all power. \r\n\r\nDallas, Makayla, Asher, and Dominic stand on the porch, staring out at the yard. The only light comes from the small, blinking green LED on Makayla’s sensor, wired between the two massive speakers facing the marsh.\r\n\r\nDOMINIC\r\n(shouting over the wind)\r\nI can't see anything! Let's just go into the basement!\r\n\r\nMAKAYLA\r\nIf we go down there, we trap ourselves! It has to hold here!\r\n\r\nSuddenly, the wind drops. The rain is still falling, but the howling stops. \r\n\r\nThen it starts. **THE HUM.**\r\n\r\nIt rises from the marsh, a dense, low-grade vibration that rattles Dallas’s teeth. Slowly, at the edge of the tall grass, the darkness itself seems to thicken. \r\n\r\nASHER\r\n(pointing into the void)\r\nThey're coming.\r\n\r\nPairs of red eyes blink into existence. Two. Then four. Then a dozen. They aren't walking—they are drifting, heavy and crushing, actively erasing the sound of the rain as they move closer to the yard. \r\n\r\nDOMINIC\r\n(panicking, stepping back)\r\nWhat is that?! What IS THAT?!\r\n\r\nDallas grips the wooden railing hard enough to splinter it. He watches his military receiver. The waveform on the screen is a jagged, violent mess. \r\n\r\nDALLAS\r\n(to Makayla, eyes glued to screen)\r\nThe frequency is spiking. Wait for them to hit the corridor. \r\n\r\nThe red eyes glide past the edge of the property line. The veins of burn marks stretching across the grass begin to hiss, turning pitch black. The shadows form into horrific, massive silhouettes, reaching out toward the house. \r\n\r\nMAKAYLA\r\nNow! Dallas, hit it!\r\n\r\nDallas slams the master switch on the oscillator. \r\n\r\nA high-pitched, harmonic tone—**115.3 MHz**—blasts through the speakers. It isn’t just loud; it's physically concussive. \r\n\r\nThe leading shadow creature stretches a massive, formless tentacle toward the yard. \r\n\r\nIt hits the empty air between the speakers. \r\n\r\n**CRACK!**\r\n\r\nA brilliant flash of golden static erupts in mid-air. The shadow recoils violently, letting out a horrific gnashing shriek. It didn't hit a wall—it hit the acoustic kill zone. The opposing frequencies collide, creating a dome of sheer sonic force.\r\n\r\nDOMINIC\r\n(covering his ears)\r\nIt's an invisible wall! \r\n\r\nMore shadows rush the perimeter, blind with rage. Snap! Crack! Flashes of golden electricity light up the backyard like a strobe light as each shadow hits the phase-cancellation trap and is violently repelled. The air smells heavily of ozone and burnt earth.\r\n\r\nAsher watches, completely mesmerized. He taps his leg twice. It’s working.\r\n\r\nBut the receiver in Dallas’s hand starts to crackle and smoke. The needle is buried in the red. \r\n\r\nDALLAS\r\nThe crystal! It’s drawing too much current!\r\n\r\nMAKAYLA\r\nHold the line! If we drop the frequency now, they'll erase us!\r\n\r\nThe largest of the shadows rears up, its red eyes burning bright. It throws its entire, massive weight against the center of the acoustic corridor. The right speaker groans, its heavy wooden frame lifting dangerously out of the mud. \r\n\r\nDOMINIC\r\nIt’s tipping! \r\n\r\nDominic—who spent the whole week worrying about parking tickets and lawn care—throws himself into the brutal mud. He grabs the speaker stand, planting his boots deep into the dirt, using his own body weight to anchor the acoustic wall. \r\n\r\nThe golden static flares so bright it blinds them. The shockwave rattles Dominic to his bones, but he doesn't let go. He grits his teeth and holds.\r\n\r\nThe oscillator whines—a desperate, failing sound. \r\n\r\nDALLAS\r\n(screaming)\r\nHold on!\r\n\r\nDallas grabs the dial and forces it perfectly onto **115.3**, reinforcing the signal with everything the battery has left. \r\n\r\nA massive, concussive **BOOM** of golden light shatters outward over the lawn. The shockwave lifts Dallas and Dominic off their feet, knocking them backward. \r\n\r\nSilence. \r\n\r\nTotal silence. \r\n\r\nDallas slowly gets up, groaning. His ears are ringing. He looks out at the yard. \r\n\r\nThe red eyes are gone. The shadows are gone. \r\n\r\nOnly the gentle sway of the tall grass remains, illuminated by faint flashes of natural lightning. Between the two smoking speakers, the blackened burn marks on the grass are slowly, beautifully fading back to green. \r\n\r\nMakayla lets out a massive, shuddering breath. Asher smiles. \r\n\r\nDOMINIC\r\n(stunned, out of breath, covered in mud)\r\nWhat... what did you just do?\r\n\r\nDALLAS\r\n(looking at the smoking receiver)\r\nWe tuned them out.\r\n\n\n---\n\n\n## ACT IV — Aftermath\n\n---\n\n\n### Scene 28: Final Echoes\n\n*ACT IV — Aftermath | ID: final-echoes | File: s28.md*\n\n---\n\n<!-- scene: 28 file: s28.md nickname: final-echoes -->\n\n# Scene 28: The Morning After\r\n<!-- summary: The calm after the storm. Everyone rests after the battle in the backyard. -->\r\n\r\nThe crew huddle around Dallas' apartment and all sleep on the floor as Mr Mike watches a movie on TV. \r\n\r\nJanice makes her way through the door.\r\n\r\nJANICE\r\nLook at all of these sleeping beauties. Dallas, wheres Dallas. Dallas my boy - you were spared from the storm. How are you Mike. \r\n\r\nMR. MIKE\r\nThings are better - things are better than what they were. Yes. \r\n\r\nJANICE\r\nThanks for letting everyone crash here Dallas.\r\n\r\n\n\n---\n\n\n### Scene 29: Aftermath\n\n*ACT IV — Aftermath | ID: aftermath | File: s29.md*\n\n---\n\n<!-- scene: 29 file: s29.md nickname: aftermath -->\n\n<!-- nickname: little aftermath -->\r\n\r\nEXT. BRANFORD - DAY\r\n\r\nThe town is back to normal. People move through their routines. The strange occurrences of the last few days are still on everyone's lips—muted, half-disbelieved.\r\n\r\nEXT. DALLAS HOUSE\r\nDallas looks around at his property—the storm has scattered his equipment. Speakers knocked face-down in the mud. The oscillator on its side, screen cracked. But the sensor Makayla wired between them is still blinking. He picks it up. The screen shows a saved file: one clean recording.\r\n\r\nHe presses play. The sound fills the yard— it is the tune from the golden furry creatures, captured clean. \r\n\r\nDallas holds play for a long moment. He looks at the photo of Sierra on his receiver. \r\n\r\nEXT. BRANFORD - OUTSIDE PIZZA PLACE - DAY\r\n\r\nPAT CLENDENEN stands outside a choppy PIZZA and POST OFFICE - place in Branford, CT. He is being interviewed by his news crew.\r\n\r\nPAT CLENDENEN\r\nThe Nor'easter's last-second shift—call it an unlikely miracle. Either way, a good safety warning. This town's prepared now.\r\n\r\nEXT. CHURCH GROUNDS - DAY\r\n\r\nA church event. Picnic tables. Nica's catered lunch. DOMINIC and DALLAS greet each other. They don't talk much. They sit next to each other and eat. \r\n\r\nIn the distance: Makayla and some younger kids are crouched near the playground, watching something small. Makayla pulls a jar from her bag. A tiny caterpillar. She eases it inside. \r\n\r\nAsher has his notebook open— shapes and symbols fill the pages. \r\n\r\nOn the bench next to him: Sierra's folder, open with cross-referenced sketches and observations, the pages labelled \"Circadian Cycles\"\r\n\r\nINT. DALLAS'S WORKSHOP / HOUSE - DAY\r\n\r\nDallas at his kitchen table and grabs a battery as he walks to his workbench. He begins to fiddle with a recording mechniasm. And feed water to a tiny plant. He finally gets it working. He hits record. From outside, the hum from the tall grass bleeds into the room. He listens. He begins to sketch—notations, marks. An alphabet. \r\n\r\nINT. DALLAS'S BEDROOM - NIGHT\r\n\r\nDallas goes to bed. The device sits on the nightstand. He hears echoes. Something beyond the shadows he saw before. He lies there. Listening. He goes and checks on the plant.\r\n\r\nEXT. DALLAS'S DRIVEWAY - MORNING\r\n\r\nJANICE pulls up. She gets out. She and Dallas hug. She hands him HOWIE's leash. Dallas greets the little dog with affection. Howie's ears twitch. He's disturbed by something out in the tall grass. Dallas looks toward the creek.\r\n\r\nEXT. CREEK BEND - DAY\r\n\r\nDallas walks alone with his wife's receiver in hand. The place where the lawn becomes reed. The same bend from before. Dallas stops. He lifts the receiver. He tunes the dial. The hum rises, falls. He adjusts again. The dial clicks into place. He stands there. Recording. The tall grass does not move - and neither does Dallas. \r\n\r\nIn the Tall Grass Dallas senses the creature - and plays the pure recording of their hum - and realizes that it matches the exact cadence of Sierra's breathing. \n\n---\n\n";
    const MARKDOWN_FILE_NAME = 'creatures_in_the_tall_grass_full_script.md';

    function downloadMarkdown() {
      const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = MARKDOWN_FILE_NAME;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function printMarkdownPdf() {
      const printable = window.open('', '_blank', 'noopener,noreferrer');
      if (!printable) return;
      const escaped = String(markdown)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      const title = document.title.replace(/<\/?[^>]+>/g, '');
      printable.document.write([
        '<!doctype html>',
        '<html lang="en">',
        '<head>',
        '  <meta charset="UTF-8">',
        '  <meta name="viewport" content="width=device-width, initial-scale=1.0">',
        '  <title>' + title + ' - Markdown</title>',
        '  <style>',
        '    body { margin: 1in; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }',
        '    pre { white-space: pre-wrap; line-height: 1.35; font-size: 11pt; }',
        '  </style>',
        '</head>',
        '<body>',
        '  <pre>' + escaped + '</pre>',
        '</body>',
        '</html>',
      ].join('\n'));
      printable.document.close();
      printable.focus();
      printable.print();
      printable.onafterprint = () => printable.close();
    }
    const container = document.getElementById('scriptContent');
    marked.setOptions({ breaks: true });
    container.innerHTML = marked.parse(markdown);

    // Export dropdown: toggle on trigger click, close on outside click or menu action
    (function initExportDropdown() {
      var trigger = document.getElementById('scriptExportTrigger');
      var menu = document.getElementById('scriptExportMenu');
      if (!trigger || !menu) return;
      function open() {
        menu.classList.add('is-open');
        trigger.setAttribute('aria-expanded', 'true');
      }
      function close() {
        menu.classList.remove('is-open');
        trigger.setAttribute('aria-expanded', 'false');
      }
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        if (menu.classList.contains('is-open')) close(); else open();
      });
      menu.querySelectorAll('button').forEach(function(btn) {
        btn.addEventListener('click', function() { close(); });
      });
      document.addEventListener('click', function() { close(); });
    })();

    // Format screenplay elements
    formatScreenplay(document.querySelector('.screenplay-container'));

    // Filmmaking-style page length & runtime (1 page ≈ 1 minute; ~250 words/page)
    // Count from raw markdown so we get the full script (DOM textContent can undercount)
    (function initScriptStatsAndProgress() {
      const WORDS_PER_PAGE = 250;
      const content = document.getElementById('scriptContent');
      const progressFill = document.getElementById('scriptProgressFill');
      const progressLabel = document.getElementById('scriptProgressLabel');
      const progressBar = document.querySelector('.script-progress-bar');

      if (!progressFill) return;

      const wordCount = (typeof markdown === 'string' ? markdown : (content && content.textContent) || '')
        .split(/\s+/)
        .filter(Boolean)
        .length;
      const MIN_PAGES = 90;
      const rawPages = Math.round((wordCount / WORDS_PER_PAGE) * 10) / 10;
      const estimatedPages = Math.max(MIN_PAGES, rawPages);
      const estimatedMinutes = Math.max(MIN_PAGES, Math.round(estimatedPages));

      function updateProgress() {
        const docEl = document.documentElement;
        const scrollTop = docEl.scrollTop || document.body.scrollTop;
        const scrollHeight = docEl.scrollHeight - docEl.clientHeight;
        if (scrollHeight <= 0) {
          progressFill.style.height = '0%';
          progressLabel.textContent = '0 / ' + estimatedMinutes;
          if (progressBar) progressBar.setAttribute('aria-valuenow', 0);
          return;
        }
        const pct = Math.min(1, Math.max(0, scrollTop / scrollHeight));
        const currentMinute = Math.min(estimatedMinutes, Math.floor(pct * estimatedMinutes));
        progressFill.style.height = (pct * 100) + '%';
        progressLabel.textContent = currentMinute + ' / ' + estimatedMinutes;
        if (progressBar) progressBar.setAttribute('aria-valuenow', Math.round(pct * 100));
      }

      updateProgress();
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress);
    })();

    // Scene nav: add ids to scene headings and wire dropdown to scroll
    (function initSceneNav() {
      const content = document.getElementById('scriptContent');
      const selectEl = document.getElementById('scriptSceneSelect');
      if (!content || !selectEl) return;

      const sceneHeadings = content.querySelectorAll('h3');
      const sceneHeadingRe = /^Scene \d+:/i;
      sceneHeadings.forEach((h3, i) => {
        const text = (h3.textContent || '').trim();
        if (sceneHeadingRe.test(text)) {
          h3.id = 'scene-' + (i + 1);
        }
      });

      selectEl.addEventListener('change', function() {
        const value = this.value;
        if (!value) return;
        const el = document.getElementById(value);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        this.value = '';
      });
    })();

    // Status bar: current scene, who's in scene, production tags (updates on scroll)
    (function initStatusBar() {
      const content = document.getElementById('scriptContent');
      const sceneEl = document.getElementById('scriptStatusScene');
      const charsEl = document.getElementById('scriptStatusCharacters');
      const prodEl = document.getElementById('scriptStatusProduction');
      if (!content || !sceneEl) return;

      function getSceneHeadingsInOrder() {
        const h3s = content.querySelectorAll('h3[id^="scene-"]');
        return Array.from(h3s).sort((a, b) => {
          const nA = parseInt(a.id.replace('scene-', ''), 10);
          const nB = parseInt(b.id.replace('scene-', ''), 10);
          return nA - nB;
        });
      }

      function getSceneBlock(sceneH3, nextSceneH3) {
        const chars = new Set();
        let firstSlug = '';
        let node = sceneH3.nextSibling;
        while (node) {
          if (node === nextSceneH3) break;
          if (node.nodeType === 1) {
            if (node.classList && node.classList.contains('character-name')) {
              const name = (node.textContent || '').trim();
              if (name) chars.add(name);
            }
            if (!firstSlug && node.classList && node.classList.contains('scene-heading')) {
              firstSlug = (node.textContent || '').trim();
            }
          }
          node = node.nextSibling;
        }
        return { characters: Array.from(chars), production: firstSlug };
      }

      function updateStatusBar() {
        const sceneHeadings = getSceneHeadingsInOrder();
        if (sceneHeadings.length === 0) return;
        const viewportThreshold = 160;
        let current = sceneHeadings[0];
        for (let i = 0; i < sceneHeadings.length; i++) {
          const top = sceneHeadings[i].getBoundingClientRect().top;
          if (top <= viewportThreshold) current = sceneHeadings[i];
        }
        const title = (current.textContent || '').trim();
        const nextId = current.id.replace('scene-', '');
        const nextNum = parseInt(nextId, 10) + 1;
        const nextScene = document.getElementById('scene-' + nextNum);
        const block = getSceneBlock(current, nextScene || null);
        sceneEl.textContent = title || '—';
        charsEl.textContent = block.characters.length ? block.characters.join(', ') : '—';
        prodEl.textContent = block.production || '—';
      }

      updateStatusBar();
      window.addEventListener('scroll', updateStatusBar, { passive: true });
      window.addEventListener('resize', updateStatusBar);
    })();
    
    function looksLikeActionIntro(text) {
      if (!text || text.length < 15) return false;
      if (/^\(.+\)$/.test(text)) return false;
      if (/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(text)) return false;
      if (/^[A-Z][a-z]+,\s*(?:Mid\s*\d+s|\d+s|[A-Za-z\s]+),/.test(text) && /[a-z]/.test(text)) return true;
      if (/^[A-Z][a-z]+,\s*(?:Mid\s*\d+s|\d+s)\s*[,.]/.test(text)) return true;
      return false;
    }

    function formatScreenplay(container) {
      const content = container.querySelector('.screenplay-content');
      if (!content) return;

      normalizeParagraphBreaks(content);

      const paragraphs = content.querySelectorAll('p');
      let inDialogueBlock = false;
      
      paragraphs.forEach((p, index) => {
        const text = p.textContent.trim();
        const nextP = paragraphs[index + 1];
        const prevP = paragraphs[index - 1];
        
        // Skip if already formatted (but allow normalizeParagraphBreaks output)
        if (!text) return;
        if (p.classList.length > 0 && !p.classList.contains('line-split')) return;
        
        // Scene headings (INT. or EXT. at start of line)
        if (/^(INT\.|EXT\.)/i.test(text)) {
          p.className = 'scene-heading';
          p.textContent = text.toUpperCase();
          inDialogueBlock = false;
          return;
        }
        
        // Transitions (right-aligned, uppercase)
        if (/^(FADE IN|FADE OUT|CUT TO|DISSOLVE TO|SMASH CUT|MATCH CUT)/i.test(text)) {
          p.className = 'transition';
          p.textContent = text.toUpperCase();
          inDialogueBlock = false;
          return;
        }

        // Action break: (action) on its own line — ends dialogue block, next line is action; line is hidden
        if (/^\(action\)$/i.test(text)) {
          p.className = 'action-break';
          p.textContent = '';
          inDialogueBlock = false;
          return;
        }
        
        // Parentheticals (text in parentheses, italic) - check before character names
        if (/^\(.+\)$/.test(text)) {
          p.className = 'parenthetical';
          inDialogueBlock = true;
          return;
        }

        // Action lines that introduce a character or describe action (e.g. "Janice, Mid 50s, puts her hand...")
        // Never treat these as dialogue so they don't get wrapped with the previous speaker
        if (looksLikeActionIntro(text)) {
          p.className = 'action-line';
          inDialogueBlock = false;
          return;
        }
        
        // Character names (all caps, typically short, not scene headings)
        const isAllCaps = /^[A-Z][A-Z\s\.'-]+$/.test(text) && text === text.toUpperCase();
        const isReasonableLength = text.length > 2 && text.length < 35;
        const isNotSceneHeading = !/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(text);
        
        if (isAllCaps && isReasonableLength && isNotSceneHeading) {
          const nextText = nextP ? nextP.textContent.trim() : '';
          const looksLikeDialogue = nextText && (
            /^\(.+\)$/.test(nextText) ||
            (!/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(nextText) && 
             !/^[A-Z][A-Z\s\.'-]+$/.test(nextText))
          );
          
          if (looksLikeDialogue || !prevP || prevP.classList.contains('action-line') || prevP.classList.contains('scene-heading')) {
            p.className = 'character-name';
            inDialogueBlock = true;
            return;
          }
        }
        
        // Dialogue (follows character name / parenthetical / dialogue)
        const looksLikeNewBlock = /^(INT\.|EXT\.|FADE IN|FADE OUT|CUT TO|DISSOLVE TO|SMASH CUT|MATCH CUT)/i.test(text);
        const looksLikeCharacter = isAllCaps && isReasonableLength && isNotSceneHeading;
        if (!looksLikeNewBlock && !looksLikeActionIntro(text) && inDialogueBlock && prevP && (prevP.classList.contains('character-name') || prevP.classList.contains('parenthetical') || prevP.classList.contains('dialogue'))) {
          p.className = 'dialogue';
          inDialogueBlock = true;
          return;
        }
        
        // If we're in a dialogue block but this doesn't match, end the block
        if (looksLikeCharacter || looksLikeNewBlock) {
          inDialogueBlock = false;
        }
        
        // Default: action line
        p.className = 'action-line';
        inDialogueBlock = false;
      });

      // Add markers for last line in dialogue / parenthetical blocks (spacing)
      const ps = content.querySelectorAll('p');
      ps.forEach((p, i) => {
        if (!p.classList.contains('dialogue') && !p.classList.contains('parenthetical')) return;
        const next = ps[i + 1];
        if (!next || (!next.classList.contains('dialogue') && !next.classList.contains('parenthetical'))) {
          if (p.classList.contains('dialogue')) p.classList.add('dialogue-last');
          if (p.classList.contains('parenthetical')) p.classList.add('parenthetical-last');
        }
      });
    }

    // Split <p> blocks that contain <br> into separate <p>s per line.
    // This lets screenplay formatting work even if the markdown uses single newlines.
    function normalizeParagraphBreaks(content) {
      const paragraphs = Array.from(content.querySelectorAll('p'));
      paragraphs.forEach((p) => {
        if (!p.querySelector('br')) return;
        const parts = p.innerHTML
          .split(/<br\s*\/?\s*>/i)
          .map((s) => s.replace(/&nbsp;/g, ' ').trim())
          .filter(Boolean);
        if (parts.length <= 1) return;

        const frag = document.createDocumentFragment();
        parts.forEach((html) => {
          const np = document.createElement('p');
          np.innerHTML = html;
          frag.appendChild(np);
        });
        p.replaceWith(frag);
      });
    }
  </script>
</body>
