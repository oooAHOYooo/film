ooks planted. She begins to dig and unearth various alligator clips hooked up to the bottom roots. \r\n\r\nMAKAYLA\r\nUncle Dom would never understand what we happened today. What we have witnessed. \r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nMakayla hands Dallas a small wooden box. Dallas opens it and finds a small translucent crystal inside—a crude pyramid-like stone. Dallas holds it, fascinated.\r\n\r\nMAKAYLA\r\nWhat do you think?\r\n\r\nDALLAS\r\nSeems like a quartz. \r\n\r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nMakayla walks over and puts the cystal on top of a little bay area device that is also hidden by a bunch of branches. Makayla grabs the crystal - puts it in the center - and turns it on via a bunch of 9V batteries. She points to the two metal rods that are coming out of the portable wooden device - and nudges Dallas to grip. \r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nDallas grips - and has a wild trip.  As he does - a distant cry is heard in the distance. \r\n\r\nDallas wakes up. He gasps, clutching his hand. \r\n\r\nHe looks down. A jagged red line, matching the one on Makayla’s palm, is now etched into his own skin where he gripped the metal rods. It pulses once, then settles into a dull, heavy ache.\r\n\r\nMAKAYLA\r\n(whispering)\r\nIt chose you too.\r\n\r\nMAKAYLA\r\nSo, what do you think?\r\n\r\nDALLAS\r\nWhat is it?\r\n\r\nMAKAYLA\r\nWe don't know. But I wonder what would happen if we hook up the creature to it - and your oscillator. \r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nIn the distance the howls are getting more ganrly. Makayla and Dallas stand silent in fear.\r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nDallas begins to record a bit on his pocket recorder. \r\n\r\nMAKAYLA\r\n(takes a deep breath and contemplates for a while)\r\nWe should go.\n\n---\n\n\n### Scene 15C: Dominic's Confession\n\n*ACT II — The Creature | ID: dominics-confession | File: s15c.md*\n\n---\n\n<!-- scene: 15C file: s15c.md nickname: dominics-confession -->\n\nEXT. DALLAS BACK PORCH – NIGHT (s15c.1)\r\n\r\nCrickets. Distant surf.\r\n\r\nDominic and Dallas sit side by side.  \r\nDominic nurses a cooling mug of coffee.\r\n\r\nDOMINIC  \r\nJanice thinks I believe everything happens for a reason.\r\n\r\nDALLAS  \r\nDo you?\r\n\r\nDOMINIC  \r\n(chuckles)\r\nNo. I think things happen. And people try not to drown in them.\r\n\r\nHe looks out at the tall grass.\r\n\r\nDOMINIC  \r\nMr. Mike used to scare the hell out of me with his stories.  \r\nThen they stopped being stories.\r\n\r\nHe glances at Dallas—meaningful.\r\n\r\nDOMINIC  \r\nIf there’s something out there—something big—I hope it doesn’t need people like me.\r\n\r\nDALLAS  \r\nWhy not?\r\n\r\nDOMINIC  \r\nBecause I’d want to help. \r\n\r\nThe distant HUM rolls through the ground—barely audible.\r\n\r\nDominic doesn’t hear it.\r\n\r\nDallas does.\r\n\r\n``\n\n---\n\n\n### Scene 16: Back Home\n\n*ACT II — The Creature | ID: the-escape | File: s16.md*\n\n---\n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n# Scene 16: Back Home\r\n\r\nEXT. DALLAS BACKYARD (s16.1)\r\nMakayla and Dallas hastily make their way out of the woods, back toward the field, carrying all of the equipment from the wooden box. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAs the two walk, they begin to notice that the tall grass around them is acting universally restless. The two walk in uneasy silence as the summer glow lights their pace. \r\n\r\n\r\nEXT. BRANFORD TOWN GREEN - DAY (s16.2)\r\n\r\nThe two walk through the backstreets of Branford with the creature covered in a towel drapped over the dog backpack. \r\n\r\nEXT. DALLAS'S HOUSE - DAY (s16.3)\r\n\r\nAs they approach the driveway, the two look suspciously at the tall grass around Dallas's house. \r\n\r\nINT. DALLAS' KITCHEN\r\nThe crew find Asher in the kitchen, pacing back and forth. \r\n\r\nAsher begins to shake and falls to the ground. His eyes look directly at the sky and he begins to cry.\r\n\r\nASHER\r\n(in trance)\r\nLeave us alone. Leave us alone. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher begins to cry and shake. Dallas and Makayla rush to his side.\r\n\r\nMAKAYLA\r\nAsher!\r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher slowly wakes up. \r\n\r\nMAKAYLA\r\nBreathe. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDallas looks at the tall grass. His spare handheld oscilloscope begins to beep. The crew, little by little, hear the distinct faint hum following them.\r\n\r\nMAKAYLA\r\nBreathe. Breathe. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher slowly lowers his breathing. A doorbell is heard off screen.\r\n\r\nINT. DALLAS'S HOUSE - HALLWAY - DAY (s16.4)\r\n\r\nBefore they can even touch the doorknob, Dominic pulls up in his minivan and honks the horn. Janice is aggressively leaning out the passenger window.\r\n\r\nJANICE\r\n(yelling out the window)\r\nYou kids! Howie my baby. Why is he in the backpack?\r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDallas and Makayla look at each other in fear.\r\n\r\nMAKAYLA\r\nThat's not Howie. \r\n\r\nJANICE\r\nWhat?\r\n\r\nMAKAYLA\r\n(confused)\r\nWe found an injured rabbit and Mr. Dallas has tools to help. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nJanice looks at Dallas dumbfounded. \r\n\r\nJANICE\r\nWhat?... Kid's get in the car - and leave Mr. Dallas alone - he's coming to our life group tonight and I am sure he needs to get rest a bit and get ready. \r\n\r\nDALLAS\r\nIt's okay. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nMakayla hands Dallas the backpack and gently lets the creature in. She walks to the car with Asher.\r\n\r\nJANICE\r\nSo you now I got to go home and clean this out before Howie gets in, is that what this means? \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDominic comes out from the other side door and throws the minivan into drive.\n\n---\n\n\n### Scene 17: Resonance\n\n*ACT II — The Creature | ID: resonance | File: s17.md*\n\n---\n\n<!-- scene: 17 file: s17.md nickname: resonance -->\n\n<!-- nickname: resonance -->\r\n\r\nINT. DALLS BASEMENT (s17.1)\r\n\r\nDallas looks at the creature by himself for a long time. \r\n\r\nDallas stares for a long time at the golden creature. The jagged red lines on his portable viewfinder match the erratic, panicked breathing of the tiny animal. \r\n\r\nThe creature is not doing so good - but seems to be glowing - and the distant hum perks up again. \r\n\r\nDallas walks over and then paces around the room; He taps various equipments and thinks and thinks. Dallas looks at the photo of Sierra taped to his receiver. \r\n\r\nDallas grabs the crystal that Makayla left him and hooks it up to the alligator clips - seems like the creature is interacting with it somehow. \r\n\r\nDallas gently turns the dial on his receiver and dials the volume up just enough to create a soft, resonant hum in the basement. \r\n\r\nThe creature's ears twitch. It stops its erratic movements. Slowly, it opens its mouth and emits a low, melodic tone, matching the frequency Dallas is broadcasting. As it sings, the golden glow in its neck grows stronger, pushing back the shadows in the room.\r\n\r\nA doorbell is heard off screen. \r\n\r\nINT. DALLAS NIGHTTIME (S17.2)\r\n\r\nDALLAS sleeps next to the the setup. He hears a beep beep and looks at the workshop. The creature is gone!. \r\n\r\nEXT. DALLAS BACKYARD - NIGHT (S17.3)\r\n\r\nDallas runs outside and looks around. But to no avail.\n\n---\n\n\n### Scene 18: Life Group Arrives\n\n*ACT II — The Creature | ID: life-group-arrives | File: s18.md*\n\n---\n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n<!-- nickname: life-group-arrives -->\r\n\r\nINT. DOMINIC'S KITCHEN / LIVING ROOM - NIGHT (s18.1)\r\n\r\nFamilies arrive in waves. The small kitchen and smaller living room fill. The crowd tries Dominic's toasted Brussels sprouts, passed around on paper plates.\r\n\r\nThe doorbell is heard.\r\n\r\nINT. DOMINIC'S HALLWAY (S18.2)\r\nMakayla answers the door and sees Dallas. She quietly hushes him to the corner. \r\n\r\nMAKAYLA\r\nDallas, what happened? How is it doing?\r\n\r\nDOMINIC\r\nIt ran away. \r\n\r\nMAKAYLA\r\nIt what?!\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nSuddenly a loud bang is heard off screen. Makayla and Dallas turn to look. Mr Mike is heard off screen.\r\n\r\nMR. MIKE\r\nWhat the heck is that? Asher. \r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla and Dallas hush downstairs to find the creature has made it somehow in the basement. Makayla quickly rushes to grab a box for it. \r\n\r\nINT. DOMINIC's KITCHEN (S18.3)\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla drifts through the kitchen. She opens drawers quietly. Finds sugar cubes meant for coffee. Pockets one without a word. She continues to look and finds a bunch of tupawear. She grabs a couple of them. \r\n\r\nDominic catches her slipping the sugar into her pocket. He wipes his hands on a dish towel.\r\n\r\nDOMINIC\r\nWhat are you doing Makayla. \r\n\r\nMAKAYLA\r\nNothing. Just... getting sugar.\r\n\r\nDOMINIC\r\nFor what? Where's Dallas? \r\n\r\nMAKAYLA\r\nHe's downstairs. He... found a stray cat outside. It's really sick. He's nursing it. I was getting it some sugar water.\r\n\r\nDOMINIC\r\nA cat? Alright. Well, tell him not to grow too attached - Howie is enough for us - okay? What you doing with that Tupawear - you going to put the cat in that?\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla nods quickly and slips away.\r\n\r\nDownstairs, the volume of the creature frequency pulses rhythmically through the floorboards.\r\n\r\nINT. DALLAS BASEMENT - CONTINUOUS (s18.4)\r\nDallas is sweating. He turns the dial up. Dallas walks over to the small creature and gently rubs its furry head. \r\n\r\nMAKAYLA \r\nIf we keep broadcasting... maybe we can teach it. If it learns the frequency, it can return to the marsh and you know - avoid those red-eye demon things. \r\n\r\nMAKAYLA\r\nWe could to teach it.\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla clicks a \"Master\" switch on the device. A small, protective green light flickers on.\r\n\r\nMAKAYLA\r\nCome on. \r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe glowing creature in the shoebox mimics the tone, its golden light flaring brighter with each successful note. But the louder it sings, the harder the walls of the basement shake. \r\n\r\nHOWIE stays curled in the corner of the stairs, disturbed, whimpering. \r\n\r\nINT. DOMINIC's LIVING ROOM - UPSTAIRS CONTINUOUS (s18.5)\r\nThe last family arrive late for life group: a young couple—JOSH and SARAH—with their newborn, JP. Dominic paces in the kitchen. Mr. Mike mutters in his chair, staring at the weather through the window. \r\n\r\nThe glass pane rattles violently. \r\n\r\nMR. MIKE\r\n(to himself)\r\nThey are listening to the song. They don't like the song.\r\n\r\nDOMINIC\r\nWe have brownies about to be ready.\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla tries to shuffle past people who are hovering around a kitchen island grabbing popcorn and brownies. \r\n\r\nJOSH\r\nMakayla, how's your mom doing?\r\n\r\nMAKAYLA\r\nShe's doing better thanks.\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla darts past the crowd and heads for the stairs.\r\n\r\nA lifegroup member JOSH, 36, Tall and blonde, talks to PAT CLENDENEN, 60s. \r\n\r\nJOSH\r\nHow is it going for you?\r\n\r\nPAT\r\nBusy week. It's tracking that it'll hit us some point later tonight. \r\n\r\nJOSH\r\nDo you think there will be flooding. \r\n\r\nPAT\r\nDefinitely. \r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe two eat carrots and dip. \r\n\r\nJOSH\r\nDominic, where's the host.\r\n\r\nDOMINIC\r\nHe's downstairs in the basement - not feeling so good.\r\n\r\nSARAH\r\nHe knows we're here?\r\n\r\nDOMINIC\r\nYeah - he should be up in a second.\r\n\r\nMAKAYLA\r\nI'll go and check on him.\r\n\r\nINT. DOMINIC'S BASEMENT - CONTIOUS (s18.6)\r\nDownstairs, the creature is not doing so good - but seems to be glowing - and the distant hum perks up again. \r\n\r\nMakayla joins him and brings over some sugar cubes to thte table. The creature is unresponsive.\r\n\r\nThe sound of the LifeGroup singing \"Great Is Thy Faithfulness\" is muffled by the heavy basement door. Upstairs, the heavy footsteps of Dominic and the first LifeGroup guests begin to echo through the ceiling.\r\n\r\n\r\nINT. DOMINIC'S LIVING ROOM - CONTINUOUS (s18.7)\r\n\r\nTYLER\r\nAlright crew, glad we are all here - gathered together. On this breezy summer night. \r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe group giggle a bit as the wind picks up. The group in a circle all look at eacother. \r\n\r\nINT. DOMINIC'S BASEMENT - CONTINOUS (s18.8)\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe creature lays out a little whipmer. \r\n\r\nDallas adjusts the dial again. The creature quiets. The lights stabilize.\r\n\r\nMR. MIKE walks in behind him. He takes one look at the room and freaks out—like a dog afraid of thunder. He points at the basement door.\r\n\r\nMR. MIKE\r\nWhat is here? What is going on downstairs?!\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nDominic steps between Mr. Mike and the stairs. He guides him back by the elbow.\r\n\r\nMAKAYLA\r\nEasy. Easy. Nothing. \r\n\r\nMR. MIKE\r\nThere is something down here. DOMINIC DOMINIC\r\n\r\nMAKAYLA\r\nMr. Mike what is wrong?\r\n\r\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla signals to Asher who drops a plate on purpose.  \r\n\r\nMR MIKE. \r\nWhat in the world?! Makayla - what is going on?!\n\n---\n\n\n### Scene 19: The Hymn\n\n*ACT II — The Creature | ID: the-hymn | File: s19.md*\n\n---\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n<!-- nickname: the-hymn -->\r\n<!-- summary:  -->\r\n\r\nINT. DOMINIC'S BASEMENT - SAME TIME (s19.1)\r\n\r\nDallas shuffles through a pile of old equipment—mono cables, spare parts and arranges them all neatly on a desk.\r\n\r\n The creature doesn't look like it's doing much. It's breathing, slightly. Dallas struggles to find a bed for it. He settles on an old shoebox—pauses when he sees his wife's handwriting on one, sets that aside—and gently nestles the creature inside. Its little feet curl tightly. It breathes slowly.\r\n\r\nHe finds a way to poke a hole in something so it can drink. The creature, laying beside him in the makeshift shoebox, begins to glow. \r\n\r\nMAKAYLA and ASHER watch from the staircase. Makayla comes down. She takes out the crystal from her pocket. It begins to glow. \r\n\r\nHer hair lifts. As she grips the crystal, she feels a warmth spread through her hand.  The creature seems to respond to her touch of the crystal. \r\n\r\nShe pulls her hand away. The creature's glow dims.\r\n\r\nINT. DOMINIC'S LIVING ROOM - LATER (s19.2)\r\nPeople at lifegroup mill and talk. Someone asks where Dallas is.\r\n\r\nDOMINIC\r\nWe found a little cat. Dallas is downstairs nursing it.\r\n\r\nA woman stands—early fifties, warm.\r\n\r\nWOMAN\r\nI'm a retired vet. I could take a look.\r\n\r\nDOMINIC\r\nI mean— no, that's okay. I think that cat's just sleeping. We could check after?\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nAn elderly woman nods. Everyone agrees. Someone asks how Howie is doing—where is Howie.  BLAKE, one of the young couples, leads the group. \r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nSARAH, the vet, notices a physical reaction to her cup of tea - and watches it ripple in a strange way. \r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDominic closes the windows and blinds.\r\n\r\nDOMINIC\r\nGetting rough out there.\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nTYLER, 32, a young man with a guitar, hands out music sheets.\r\n\r\nTYLER\r\nWould anyone like to say any words before we start?\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nThey begin to sing a hymn. As the voices rise, the hum from the basement begins to rise with them.\r\n\r\nMR. MIKE barges through the basement door. Visualablly agitated. He’s gripping a worn, leather-bound Bible, but he isn’t looking at it. He’s looking at the windows.\r\n\r\nMR. MIKE\r\nIt’s happening again. The '71 wind. Do you hear it? The Red Eyes are in the eaves! They’re sniffing the house!\r\n\r\nTYLER\r\nHello Mr. Mike - thank you for joining us! We're just about to start the hymn.\r\n\r\nMR. MIKE\r\n(ignoring him, to Dallas)\r\nYou brought it in here. The golden one. You brought the target to the shore!\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDallas joins behind Mr. Mike and sits down, Makayla and Asher pile next to him.\r\n\r\nTYLER\r\nOh - and some more friends. We hear there is a cat downstairs. How is it doing?\r\n\r\nMAKAYLA\r\nIt's doing good. \r\n\r\nTYLER\r\nAnd Dallas is it? Everyone this is Dallas - he is new in town.\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDallas smiles a bit and rests nervously on the couch.\r\nThe overhead lights dim and then turn back. \r\n\r\nTYLER\r\nYes, on this stormy day - we can still experience grace.\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nThe outside window turns into a slow pulse that matches the rhythm of the room. Sarah's tea ripples in her cup, concentric rings expanding outward in perfect time.\r\n\r\nThe hum starts to upset people as it becomes unbearable.\r\n\r\nSubtle at first. Then undeniable. The floorboards vibrate. The lights pulse lower and lower. People look at each other.\r\n\r\nDallas and Makayla exchange a look across the circle. Dallas adjusts his sleeve, trying to hide his arm, but he can see Makayla doing the same.\r\n\r\nUnder the skin of their forearms, the jagged lines are glowing. Not gold—but a sickly, rhythmic red that matches the concentric ripples in Sarah's tea. Each time the group hits a high note, the marks burn.\r\n\r\nSASHA\r\nWhat was that?\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nThe group listen in silence.\r\n\r\nPAT CLENDENEN\r\nMust be the wind. The boys in the office just texted me that the pressure's dropping fast.\r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDallas stares at the basement door. During a silent moment of reflection, the hum starts again. Everyone is unsettled. What was that noise? The group settles on the weird weather—the storm, the patterns plaguing Branford. \r\n\r\nIn time, people leave. Hugs. Goodbyes. Dominic waves them out. He waits for the last person to leave. \r\n\r\nINT. DOMINIC'S DOORWAY - CONTIOUS (s19.3)\r\nPat Clendenen walks out and puts his hand out to shake Dominic and Dallas' hand. As he does so, he notices from the corner of his eye the burn mark on the ground.\r\n\r\nINT. DOMINIC'S HALLWAY- CONTIOUS (s19.4)\r\nDominic shuts the door. \r\n\r\nDOMINIC\r\nAlright, let's see this cat. \r\n\r\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDominic heads toward the basement alone. Dallas's stomach drops. He and Makayla exchange a panicked look. Asher starts bouncing his leg.\n\n---\n\n\n### Scene 20: The Secret is Out\n\n*ACT II — The Creature | ID: red-eyes | File: s20.md*\n\n---\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n# Scene 20: The Secret is Out\r\n\r\n\r\nINT. DOMINIC'S BASEMENT - CONTINUOUS (s20.1)\r\n\r\nDominic descends the basement stairs, expecting a stray kitten. \r\n\r\nInstead: military-grade oscillators, tangles of thick coaxial wire, and Sierra's folder spread open. The shoebox under the heat lamp is empty. The small basement hopper window is busted open, rain blowing in from the outside.\r\n\r\nINT. DOMINIC'S LIVING ROOM - CONTINUOUS (s20.2)\r\n\r\nDallas frantically taps his receiver. The needle flickers back and forth between frequencies. \r\n\r\nMAKAYLA\r\nDallas! Where is it?\r\n\r\nDALLAS\r\nIt's gone. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nFrom the direction of the marsh—a cry emerges that sounds like the creature. \r\n\r\nMAKAYLA\r\nIt went back.\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nBefore Dallas can move, DOMINIC appears at the top of the basement stairs holding Sierra's folder of anatomical creature sketches. His face is pale. He looks at Dallas like he doesn't know him.\r\n\r\nDOMINIC\r\nDallas... what is this? \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDallas makes eye contact with Dominic. Outside, the hum increases and Dallas' eyes fall toward the window. Out at the tall grass swaying in the dark. The Red-Eyes are pulsing at the edge of the property.\r\n\r\nMAKAYLA\r\nWe have to get out there and find it before the Red-Eyes do.\r\n\r\nDOMINIC\r\nThe what? Makayla what is going on? Where's the cat?\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla looks at Dominic with a serious expression.\r\n\r\nDOMINIC\r\nMakayla! I told everybody we had a cat! You’ve got military weapons down there.  \r\n\r\nMAKAYLA\r\nUncle, listen—\r\n\r\nDOMINIC\r\nNiece, I listen. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla points hard at the window. Asher walks over to Dominic and hands him the device with the cystral on it.\r\n\r\nDOMINIC\r\nI don't get it. What is this? \r\n\r\nASHER\r\nIt's to keep them at bay.\r\n\r\nDOMINIC\r\nKeep what at bay?\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nAsher points to the window. Dominic glances out the window and sees the red eyes. He turns back to Asher and then to Makayla. \r\n\r\nSuddenly, the lights in the house flicker and within a moment, the room plunges into pitch black. \r\n\r\nINT. DOMINIC'S LIVING ROOM - CONTINUOUS (s20.3)\r\n\r\nMakayla reaches from her backpack and grabs a bunch of flashlights and starts to hand them out to everyone. \r\n\r\nDOMINIC\r\nWe can't go out there.\r\n\r\nMAKAYLA\r\nWe have to.\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDominic looks defeated. From the corner of the room Mr. Mike rocks back and forth in his chair. Dominic rushes over to see him. \r\n\r\nDOMINIC\r\nMr. Mike, are you okay?\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMr. Mike looks at Dominic with a blank expression. He points toward the window. \r\n\r\nMR. MIKE\r\nThey're going to come. Look outside. The marks. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla looks out the window and sees the burn marks on the grass. \r\n\r\nMAKAYLA\r\nDallas. Look. \r\n\r\nEXT. DOMINIC'S BACKYARD - CONTINUOUS (s20.4)\r\n\r\nDallas, Makayla and Asher walk outside in the backyard and witness the burn marks lead from the driveway toward the house—crawling along the siding and spider-webbing up toward the windows. A corrupt vein system trying to infect the home. \r\n\r\nMakayla stares at the black veins on the wood. She slowly rolls up her wet sleeve. \r\n\r\nBeneath her skin, identical black, twisting veins pulse faintly along her forearm. \r\n\r\nDallas sees it. He rips back his own jacket sleeve. His wrist is covered in the same creeping rot. \r\n\r\nHe looks up at the towering shadows at the edge of the property. The hum from the tall grass is deafening. \r\n\r\nMAKAYLA\r\nDo you think this will work?\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDallas nods. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla drops to her knees, ripping open Dallas's gear bag. She scrambles out a portable speaker, slamming it onto the porch railing, aiming it directly at the creeping burn mark like a shotgun. \r\n\r\nDallas rips the wire with his teeth and bridges the crystal into the circut. \r\n\r\nMAKAYLA\r\n Asher—the numbers!\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nAsher's hands fly over the oscillator dial with  1-1-5-3. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla hits the trigger. \r\n\r\nA sound like thick glass cracking under pressure pierces the air. A high-pitched, localized frequency beam hits the lawn. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nThe grass at the edge of the yard sways rhythmically,in a direction opposit of  the wind. \r\n\r\nDallas, Makayla, Asher and Dominic watch, stunned, as the \"vein\" burn mark physically recoils. \r\n\r\nIt turns from a dark black—to a sickly brown—and back to a vibrant, natural green. The acoustic beam healed the earth.\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla looks back at the tree line.\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDallas nods, his jaw tight. He looks at Dominic. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDominic looks at the fading burn mark on the grass. He looks at Asher, vibrating with anxiety in the cold. Finally, Dominic exhales sharply. \r\n\r\nDOMINIC\r\nI think I am going to sit down, not feeling so good. \r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDominic sits down on the outside porch.\r\n\r\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla lifts the sparking portable speaker. She sweeps the invisible acoustic beam across the yard like a lighthouse beam. The a small glint of a red eye - is glimmering in the distance.  A wall of Red-Eye shadows violently flinches, peeling back into the reeds and leaving a temporary, circular safe zone in the pouring rain. \r\n\r\nThe orbs turn into red orb and then grow into a shadow which takes shape into a humanoid darkness with red eyes.\r\n\r\nBut there are too many. Hundreds of red eyes begin to dot the tree line. The sheer numbers are overwhelming the small portable speaker.\r\n\r\nThe crew turn and sprint back into the house, slamming the door.\n\n---\n\n\n### Scene 21: The Burn Marks\n\n*ACT II — The Creature | ID: creature-missing | File: s21.md*\n\n---\n\n<!-- scene: 21 file: s21.md nickname: creature-missing -->\n\n# Scene 21: The Burn Marks\r\n\r\nINT. DALLAS LIVING ROOM (s21.1)\r\nThe crew hold the door down.\r\n\r\nDOMINIC\r\nOkay - what is happening. \r\n\r\n<!-- scene: 21 file: s21.md nickname: creature-missing -->\n\n(action)\nMakayla and Asher run towards the window. \r\n\r\nMakayla's eyes widen as she see the glow from the creature in the tall grass. \r\n\r\nMakayla runs to the table and grabs the tracker. On the display it shows a tiny beep. \r\n\r\nMakayla abruptly turns, grabs a flashlight and runs out the front door. \r\n\r\nEXT. DALLAS'S BACKYARD - NIGHT (s21.2)\r\nDominic bursts through the porch door after her. The wind whips his hair. Asher and Dallas follow close behind. \r\n\r\nMakayla runs straight for the tall grass at the edge of their house. Dominic follows her.\r\n\r\nDallas and Asher stop at the edge of the porch. In the distance: a pair of eyes. Bright. Dim. Bright. Red. And then gone. \r\n\r\nThey look again. Closer. The eyes reappear. Swirling through the beating wind and the tall grass. They seem like they following Makayla's flashlight.\n\n---\n\n\n### Scene 21B: The Infection\n\n*ACT II — The Creature | ID: the-infection | File: s21b.md*\n\n---\n\n<!-- scene: 21B file: s21b.md nickname: the-infection -->\n\n# Scene 21b: The Infection\n\nINT. DALLAS KITCHEN - NIGHT (MOMENTS LATER) (s21b.1)\n\nDallas slams the heavy oak door shut, throwing the bolt. Outside, the wind howls, a rhythmic, predatory sound that rattles the window panes.\n\nDominic leans against the counter, breathing hard, his hand trembling as he grips his inhaler. Asher is already at the table, eyes fixed on the creature in its box.\n\nDALLAS\n(to Makayla)\nYou saw them. How many?\n\nMAKAYLA\n(voice shaking)\nToo many. They’re circling the house, Dallas. They aren’t just looking for the creature anymore. They’re looking for—\n\nShe stops. She gasps, clutching her right arm. \n\nDALLAS\nMakayla?\n\nMakayla slowly peels back the sleeve of her windbreaker. The jagged \"burn mark\" on her palm has changed. It is no longer a faint scar; it is a vivid, pulsing crimson vein that has crawled up her wrist and is spider-webbing toward her elbow.\n\nThe red light in the vein pulses in perfect synchronization with the rhythmic thrum of the storm outside.\n\nDOMINIC\n(horrified)\nWhat is that? Makayla, what is that on your arm?\n\nMakayla doesn't answer. She looks at Dallas.\n\nDALLAS\n(low voice)\nIt’s in us.\n\nDallas rolls up his own sleeve. The mark on his forearm is even worse—the skin around the jagged line is starting to look thin, almost waxy. The black rot from the marsh seems to be tracing his circulatory system.\n\nASHER\n(without looking up)\nIt’s writing over you.\n\nEveryone turns to Asher. He is tapping the table in the same rhythm as the pulses on their skin.\n\nASHER\nThe signal from the marsh... it’s not just sound. It’s a blueprint. If we don’t get the creature back to the center... if we don't sync the frequency...\n\nDALLAS\n(finishing the thought)\n...there won't be anything left of us to save.\n\nDominic looks from the pulsing marks to the roaring storm outside the window. The \"rescue mission\" is gone. This is survival.\n\nDALLAS\n(to Dominic)\nGet the speakers. We’re going now.\n\nDOMINIC\nIn this? Dallas, you'll die out there!\n\nDALLAS\n(staring at his arm)\nI’m dying in here, Dom.\n\nDallas grabs his heavy coat. The \"Trench Run\" has begun.\n\n---\n\n\n## ACT III — The Return\n\n---\n\n\n### Scene 22: The Load-Out\n\n*ACT III — The Return | ID: marsh-confrontation | File: s22.md*\n\n---\n\n<!-- scene: 22 file: s22.md nickname: marsh-confrontation -->\n\n# Scene 22: The Load-Out\r\n\r\nEXT. DALLAS'S BACKYARD - CONTINUOUS (s22.1)\r\nThe burn marks lead from the driveway toward the house—crawling along the siding and spider-webbing up toward the windows. A corrupt vein system trying to infect the home. \r\n\r\nThe wind drops, the howling stops. Then it starts. The Hum. \r\n\r\nIt rises from the marsh, a dense, low-grade vibration that rattles Dallas’s teeth. Slowly, at the edge of the tall grass, the darkness itself seems to thicken. \r\n\r\nAsher and Dallas look at each other. \r\n\r\nASHER\r\n(pointing into the void)\r\nThey're coming. \r\n\r\n<!-- scene: 22 file: s22.md nickname: marsh-confrontation -->\n\n(action)\nAsher begins to pace nervously back and forth. Mr. Mike in the inside begins to call for him. He looks at Dallas, then outside, and puts the headphones on and goes inside with Mr. Mike. \r\n\r\n<!-- scene: 22 file: s22.md nickname: marsh-confrontation -->\n\n(action)\nFrom the edge of their property, pairs of red eyes blink into existence. Two. Then four. Then a dozen. They drift back and forth, actively erasing the sound of the wind as they move closer to the yard. \r\n\r\nThe house shudders violently. The rotting black veins creep on the grass towards the front door. The red glowing eyes bleed through the window panes.\r\n\r\nEXT. MARSH - CONTINOUS (s22.2)\r\nMakayla runs towards the golden light. Hums around her grow deafening. Dominic chases after her. \r\n\r\nEXT. DALLAS HOUSE - CONTINOUS (s22.3)\r\nIt’s a frantic, desperate load-out. Dallas heaves a massive speaker onto his shoulders, wrapping heavy nylon straps around his chest to distribute the weight. \r\n\r\nThe front door bows inward, the wood groaning and cracking under immense, unseen pressure. Black rot explodes across the grass towards the door. \r\n\r\nDallas signals for Asher. Asher flips a screen and the black forces repell. Dallas nods.  \r\n\r\n\r\n\r\n\r\nThe massive, formless shadows pour into the house—\r\n\r\n\r\nbut Dallas is already sprinting toward the edge of the tall grass. He plunges into the suffocating darkness of the marsh.\n\n---\n\n\n### Scene 23: The Trench Run\n\n*ACT III — The Return | ID: predator-attack | File: s23.md*\n\n---\n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n# Scene 23: The Trench Run\r\n\r\nEXT. TALL GRASS - CONTINUOUS (s23.1)\r\nDallas enters the tall grass carrying the speaker.  The nylon straps bite into Dallas' shoulders - straining the fabric. \r\n\r\nDallas stops for a moment in pain. Dallas looks down at the little green light on the tracker, and then looks down at his hand - the black veins pulse under his skin, Dallas in pain, drops the speaker into into the mud with a wet heavy thunk.\r\n\r\nDallas looks at his arm it begins to look transulent. \r\n\r\nIn the distance Makayla begins to cry. \r\n\r\nSuddenly, Dominic appears and runs towards Dallas.\r\n\r\nDOMINIC\r\nDallas have you seen her? I can't find her? What's that a tracker? Does it show where Makayla is? \r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDominic begins to pace around and hits his inhaler.  A giant roar is heard off in the distance.\r\n\r\nDOMINIC\r\nMAKAYLA!  \r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDallas and Dominic continue to make their way with the spaeker. Dallas drops to the ground.  \r\n\r\nDOMINIC\r\nDallas you okay?\r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDallas grips his arm tightly and stoticly marches onward.  Dominic takes another big hit of his inhaler. \r\n\r\nAs they cross into the threshold, they plunged into  sensory deprivation. \r\n\r\nThe tall grass towers over their heads, ten feet high and thick like jungle vines. The wind is howling, whipping the stalks in violent, unpredictable rhythms. \r\n\r\nIt is pitch black. The only light is the small, blinking green LED on Makayla’s chest rig. Dallas and Dominic follow it.\r\n\r\nDallas catches up with Dominic and Makayla who are out of breath in the pitch black. \r\n\r\nDOMINIC\r\nMakayla, lets go back.\r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nMakayla moves forward. \r\n\r\nMAKAYLA\r\nI saw the creature but it vanished. Dallas, those things are after it. \r\n\r\nEverybody moves quickly in single file. Makayla is leading, sweeping the handheld speaker back and forth like a flashlight. Behind her is Dominic, hunched low, clutching the backpack with the golden creature. Dallas takes up the rear, breathing heavily, his boots sinking deep into the marsh mud under the crushing eighty-pound weight of the massive speakers. \r\n\r\nMAKAYLA\r\nStraight ahead. \r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nThe air is thick, humid. Heavy. The \"veins\" of black rot are everywhere on the ground, hissing as the air hits them. \r\n\r\nMAKAYLA\r\nThey're above us. \r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDallas looks up. Above the swaying tops of the grass, massive, formless shadows drift lazily through the storm clouds like storm surges. They are hunting. Searching. Hundreds of glowing red eyes piercing the dark. \r\n\r\nSuddenly, a massive shadow drops down into the grass fifty feet ahead of them. \r\n\r\nThe concussive force of its landing knocks Dominic to his knees. His speaker groans, the heavy wood sliding dangerously on his shoulder. \r\n\r\nDOMINIC\r\nI'm slipping. \r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nMakayla freezes. The Red-Eye is directly in their path, thrashing through the reeds. Its black, rotting tendrils search the dirt in a wide arc. \r\n\r\nMAKAYLA\r\n(panic rising)\r\nIt's patrolling. \r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nThe shadow creeps closer. Forty feet. Thirty feet. The black rot spreads toward Dominic's boot. \r\n\r\nINT. DALLAS'S HOUSE - NIGHT (CONTINOUS CUT TO) (s23.2)\r\nAsher and Mr. Mike pace back and forth. Asher checks the dials on the machine - and nervously looks out the window. \r\n\r\nMR. MIKE\r\n(to himself)\r\nCome on, come on, come on...\r\n\r\nEXT. MARSH - CONTINUOUS (s23.3)\r\n\r\nIt stops. Its massive red eyes scan the area. It senses something. The silence stretches. Dallas tightens his grip on the nylon strap holding his speaker. \r\n\r\nAsher steps forward from behind Makayla. He closes his eyes and reaches his hand out toward the swaying grass. He taps his leg twice. He begins to hum. \r\n\r\nIt's a bizarre, off-key sound—but mathematically perfect to the exact frequency he heard the creature make earlier. \r\n\r\nThe Red-Eye snaps its head in the opposite direction. Off to the right. Following the echo of Asher's voice, which he mysteriously managed to throw fifty feet away. \r\n\r\nThe massive shadow turns and drifts off into the darkness, chasing the ghost sound. \r\n\r\nMakayla exhales slowly. \r\n\r\nMAKAYLA\r\nAsher... how did you do that?\r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nAsher just points forward into the dark. \r\n\r\nASHER\r\nWe have to keep moving. The center is close. \r\n\r\nDominic groans, pulling his boot out of a foot of thick, sucking mud. He adjusts the eighty-pound weight on his shoulder. Dallas grabs his arm, helping him up. \r\n\r\nDALLAS\r\nYou good?\r\n\r\nDOMINIC\r\n(gritting teeth)\r\nNever better. Just a light hike in the country. Let's go. \r\n\r\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nThey push forward, deeper into the howling void.\n\n---\n\n\n### Scene 24: The Sanctuary & The Siege\n\n*ACT III — The Return | ID: the-perimeter | File: s24.md*\n\n---\n\n<!-- scene: 24 file: s24.md nickname: the-perimeter -->\n\n# Scene 24: The Sanctuary & The Siege\r\n\r\nEXT. CENTER OF THE MARSH - LATER (s24.1)\r\n\r\nThe howling wind suddenly dies down. \r\n\r\nMakayla breaches through a thick wall of reeds and stops. Dallas, Dominic, and Asher break through behind her, collapsing to their knees in the mud under the weight of the speakers. \r\n\r\nThey are standing in a perfect, geometric ring of flattened grass. It’s almost perfectly circular, about fifty feet in diameter. The tall stalks around the edge are woven together tight like a wicker basket, forming an impenetrable wall. \r\n\r\nInside the ring, it is completely calm. The storm raging directly above them doesn't penetrate the space. It’s eerily tranquil. \r\n\r\nAnd it is glowing. \r\n\r\nSitting in a circle in the center of the flattened grass are the Golden Elders. They are slightly bigger than the injured creature. About a foot taller than the injured creature, covered in thick, iridescent golden fur. They look ancient. Wise. \r\n\r\nThey are humming. A deep, resonant, multi-chord frequency that visibly vibrates the air around them, creating a faint, shimmering golden dome over the sanctuary. \r\n\r\n The glowing pulse in its neck, which had been weak and erratic, suddenly flares bright gold as it hears the song. \r\n\r\nAsher lifts the small creature and gently sets it down in the mud. The tiny being stumbles forward, letting out a high-pitched chirp. \r\n\r\nOne of the giant Elders turns its head. It sees the baby. \r\n\r\nThe Elder approaches it with deliberate grace. And begins to gently sway. \r\n\r\nThe Elder looks up at Asher. Then at Dallas. It slowly bows its head, emitting a single, isolated note of pure, acoustic note that rattles Dallas's ribs in the best possible way. \r\n\r\nMakayla looks at her screen. The jagged red lines are spiking massively at the edge of the circle. They're blocking the shadows. \r\n\r\nA heavy, crushing sound slams into the woven wall of grass on the edge of the circle. The air shudders violently. \r\n\r\nThe peace is broken instantly. \r\n\r\nDozens of massive, corrupted Red-Eye shadows burst through the woven grass perimeter. The black rot spreads across the sanctuary floor instantly. \r\n\r\nThe Elders rise to their feet, roaring—and make sound, that act as acoustic blasts of golden light. From their backs, a fine golden mist sprays into the air, trying to weave the protective field thicker. \r\n\r\nIt’s a horrific clash of physics. The golden mist meets the black shadows in violent, ozone-scented snaps. The Red-Eyes begin to swarm like ghouls devour the light in their flight. \r\n\r\nDOMINIC\r\nWhat the heck is even that?\r\n\r\n<!-- scene: 24 file: s24.md nickname: the-perimeter -->\n\n(action)\nThe massive Red-Eyes swarm the largest Golden Elder, ripping into its acoustic field with jagged, corrupted static. The Elder is pushed back toward the center of the ring, shielding the injured one. \r\n\r\nDominic looks at the massive wooden speakers lying in the mud. \r\n\r\nDominic screams, an animalistic roar of adrenaline and fear, and heaves the eighty-pound speaker off the ground. Dallas grabs the other. \r\n\r\nThey wade through the chaotic crossfire of light and shadow, positioning the two massive wooden frames in a V-shape in the very center of the ring.\n\n---\n\n\n### Scene 25: The Final Blast\n\n*ACT III — The Return | ID: the-last-dinner | File: s25.md*\n\n---\n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n# Scene 25: The Final Blast\r\n\r\nEXT. CENTER OF THE MARSH - LATER (s25.1)\r\n\r\nThe golden dome of the Elders is failing. \r\n\r\nRed-Eye shadows are ripping through the barrier, violently canceling out the light. The black rot is spreading rapidly inward across the flattened grass floor. \r\n\r\nDallas and Dominic are in the center, struggling to keep the massive eighty-pound wooden speakers standing upright in the thick marsh mud. They are aimed outward, creating a narrow funnel toward the advancing shadow horde. \r\n\r\nDALLAS\r\n(screaming over the chaos of frequencies)\r\nMakayla! The wires! Hurry!\r\n\r\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nMakayla drops to her knees in the mud. She is trembling, cold, covered in rain and ozone. She pulls the thick copper wires from the speakers toward the oscillator strapped to her chest. \r\n\r\nShe twists the cold copper around the small, translucent crystal. Her fingers slip. \r\n\r\nMAKAYLA\r\nIt won't catch! The humidity is destroying the connection!\r\n\r\nASHER\r\nThey're breaking through!\r\n\r\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nThe largest Elder groans, a deep sub-bass sound, as a massive Red-Eye slams into it, throwing it backward. The Elder falls to the mud, its golden fur dimming as the shadow begins to erase its frequency completely. \r\n\r\nThe horde of massive, formless red-eyed shadows surges forward toward the center. Toward the baby. Toward the crew. \r\n\r\nDOMINIC\r\n(holding a speaker steady)\r\nMakayla!\r\n\r\nMAKAYLA\r\n(frantically twisting bare wire)\r\nI'm trying. \r\n\r\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nShe wraps the copper tight and bites down hard on the connection to crimp the cold wire against the crystal. The small screen on her chest flares green. The connection holds. \r\n\r\nAsher holds out his palm again and begins to trace his index finger along its edges. \r\n\r\nASHER\r\nWait!\r\n\r\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nAsher runs over and adjusts the dial to 1154\r\n\r\nMAKAYLA \r\nHit it! \r\n\r\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nAs Makayla goes to fire the pulse from the speaker.\r\n\r\nThey are suddenly hit from the side. A massive shadow sweeps its rotting tendrils across the mud. The concussive, silent force of its movement slams into the left speaker. \r\n\r\nThe heavy wooden frame groans, lifting dangerously out of the mud. It is tipping over. If it falls, the acoustic wall will fail and the feedback loop will kill them all. \r\n\r\nDOMINIC\r\nIt’s tipping! \r\n\r\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nDominic throws himself entirely into the brutal, rotting mud. \r\n\r\nHe grabs the listing speaker stand, planting his boots deep into the dirt, using his own body weight to anchor the acoustic frame upright. The deafing sound begins to engulf him. He screams in agonizing pain but doesn't let go. \r\n\r\n\r\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nDallas grabs the oscillator dial on Makayla's chest and forces it perfectly onto **115.3**, reinforcing the signal with everything the battery has left. \r\n\r\nThe golden creatures respond to this and begin to glow and hover closer together like a cluster. A massive, concussive **BOOM** of golden light shatters outward over the marsh. \r\n\r\nThe shockwave is incredible. It throws Dallas, Makayla, and Asher completely off their feet, knocking them backward into the mud. \r\n\r\nA brilliant flash of golden static erupts inside the claustrophobic walls of the flattened grass. The wall of Red-Eyes recoils violently, letting out a horrific gnashing shriek as the frequency literally burns them. \r\n\r\nThe sheer sonic force ripples through the entire marsh, flattening the tall grass for hundreds of yards in every direction. The massive shadows are instantly vaporized into thin, harmless grey smoke. \r\n\r\nSilence. \r\n\r\nTotal silence. \r\n\r\nThe wind stops. \r\n\r\nDallas slowly gets up, groaning. His ears are ringing furiously. He looks out at the marsh. \r\n\r\nThe red eyes are gone. The shadows are gone. \r\n\r\nThe tall grass is flattened all around them, illuminated by faint flashes of natural lightning. \r\n\r\nDallas looks down at his wrist. The black, rotting veins beneath his skin are gone. He looks over at Makayla. She is staring at her own forearm. Clean. He looks over at Dominic, who is lying in the mud, panting, completely unharmed. The shockwave purged the contagion from the earth and from their blood. \r\n\r\nThe Golden Elders rise to their feet. The baby chirps happily. \r\n\r\nThe largest Elder looks at the crew. It doesn't roar. It just nods its, turns, and leads its clan deeper into the remaining marsh, disappearing into the mist. \r\n\r\nMakayla lets out a massive, shuddering breath.\n\n---\n\n\n## ACT IV — Aftermath\n\n---\n\n\n### Scene 26: The Morning After\n\n*ACT IV — Aftermath | ID: final-echoes | File: s26.md*\n\n---\n\n<!-- scene: 26 file: s26.md nickname: final-echoes -->\n\n# Scene 26: The Morning After\r\n<!-- scene: 26 file: s26.md nickname: final-echoes -->\n\n(action)\nEXT. TALL GRASS (s26.1)\r\nThe crew walk back through the tall grass, through neighborhoods, back and slow. \r\n\r\nINT. DOMINICS HOUSE (s26.2)\r\nThe crew huddle around Dallas' house and all sleep on the floor as Mr Mike watches a movie on TV. \r\n\r\nJanice makes her way through the door.\r\n\r\nJANICE\r\nLook at all of these sleeping beauties. \r\n\r\n<!-- scene: 26 file: s26.md nickname: final-echoes -->\n\n(action)\nMR. Mike walks in behind Janice and walks right over to Dallas - out for a good old fashion handshake. \r\n\r\nMR. MIKE\r\nDallas, wheres Dallas. Dallas my boy - you were spared from the storm. \r\n\r\nDALLASHow are you Mike. \r\n\r\nMR. MIKE\r\nThings are better - things are better than what they were. Yes. \r\n\r\nJANICE\r\nThanks for letting everyone crash here Dallas. Dominic, Makayla, lets go.\n\n---\n\n\n### Scene 27: Aftermath\n\n*ACT IV — Aftermath | ID: aftermath | File: s27.md*\n\n---\n\n<!-- scene: 27 file: s27.md nickname: aftermath -->\n\n<!-- nickname: little aftermath -->\r\n\r\nEXT. BRANFORD - DAY (s27.1)\r\n\r\nThe town is back to normal. People move through their routines. The strange occurrences of the last few days are still on everyone's lips—muted, half-disbelieved.\r\n\r\nEXT. CENTER OF THE MARSH - DAY (s27.2)\r\nDallas walks alone into the flattened ring of grass from the night before. The storm is gone. He finds his heavy equipment where they left it—speakers knocked face-down in the mud. The oscillator on its side, screen cracked. But the sensor Makayla wired between them is still blinking. He picks it up. The screen shows a saved file: one clean recording.\r\n\r\nHe presses play. The sound fills the quiet marsh— it is the tune from the golden furry creatures, captured clean. \r\n\r\nDallas holds play for a long moment. He looks at the photo of Sierra on his receiver. \r\n\r\nEXT. BRANFORD - OUTSIDE PIZZA PLACE - DAY (s27.3)\r\n\r\nPAT CLENDENEN, microphone in hand, stands by a windy flag by the PIZZA and POST OFFICE - place on 142 branford road. \r\n\r\nPAT CLENDENEN\r\nThe Nor'easter's last-second shift—call it an unlikely miracle. Either way, a good safety warning. This town's prepared now.\r\n\r\nEXT. CHURCH GROUNDS - DAY (s27.4)\r\n\r\nA church event. Picnic tables. Nica's catered lunch. DOMINIC and DALLAS greet each other. They don't talk much. They sit next to each other and eat. \r\n\r\nDallas holds a tray of Chicken Primevera. \r\n\r\nMR. MIKE sits at the end of the table, peacefully eating a piece of cornbread. He looks out toward the edge of the woods and smiles softly. \r\n\r\nMR. MIKE\r\n(to himself)\r\nQuiet now. The numbers are finally right. Javarice would have loved the quiet.\r\n\r\nINT. DALLAS'S WORKSHOP / HOUSE - DAY (s27.5)\r\n\r\nDallas at his kitchen table and grabs a battery as he walks to his workbench. He begins to fiddle with a recording mechniasm. And feed water to a tiny plant. He finally gets it working. He hits record. From outside, a low hum, different from before, bleeds into the room. He listens. He begins to sketch—notations, marks. An alphabet.\n\n---\n\n\n### Scene 28: Full Circle\n\n*ACT IV — Aftermath | ID: full-circle | File: s28.md*\n\n---\n\n<!-- scene: 28 file: s28.md nickname: full-circle -->\n\n# Scene 28: Full Circle\r\n<!-- summary: Makayla sets up her new Lair in the woods to listen to the creatures. Dallas finds his wife's specific hum out in the marsh. -->\r\n\r\nEXT. MAKAYLA'S LAIR - DAY (s28.1)\r\n\r\nMakayla walks up to the wooden structure in the woods. Asher is already there, stringing up a new, much larger antenna between the trees. The trail cameras have been repositioned to face deeper into the marsh.\r\n\r\nMakayla pulls the small, translucent crystal out of her pocket.  She places it gently onto a newly built bay area device. \r\n\r\nThe screen flares to life, a clean, perfect, golden sine wave, emerges on screen. \r\n\r\nMakayla puts on a pair of headphones. \r\n\r\nINT. DALLAS'S BEDROOM - NIGHT (s28.2)\r\n\r\nDallas goes to bed. The device sits on the nightstand. He hears echoes. Something beyond the shadows he saw before. He lies there. Listening. He goes and checks on the plant.\r\n\r\nEXT. DALLAS'S DRIVEWAY - MORNING (s28.3)\r\n\r\nJANICE pulls up. She gets out. She and Dallas hug. She hands him HOWIE's leash. Dallas greets the little dog with affection. Howie's ears twitch. He's disturbed by something out in the tall grass. Dallas looks toward the creek.\r\n\r\nEXT. CREEK BEND - DAY (s28.4)\r\n\r\nDallas walks alone with his wife's receiver in hand. The place where the lawn becomes reed. The same bend from before. Dallas stops. He lifts the receiver. He tunes the dial. The hum rises, falls. He adjusts again. The dial clicks into place. He stands there. Recording. The tall grass does not move - and neither does Dallas. \r\n\r\nIn the Tall Grass Dallas senses the creature - and plays the pure recording of their hum - and realizes that it matches the exact cadence of Sierra's song.\n\n---\n\n";
    const MARKDOWN_FILE_NAME = 'creatures_in_the_tall_grass_full_script.md';

    function downloadMarkdown() {

      const link = document.createElement('a');
      link.href = url;
      link.download = MARKDOWN_FILE_NAME;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    const container = document.getElementById('scriptContent');

    // Export dropdown: toggle on trigger click, close on outside click or menu action
    (function initExportDropdown() {
      var trigger = document.getElementById('scriptExportTrigger');
      var menu = document.getElementById('scriptExportMenu');
      if (!trigger || !menu) return;
      function open() {
        menu.classList.add('is-open');
        trigger.setAttribute('aria-expanded', 'true');
      }
      function close() {
        menu.classList.remove('is-open');
        trigger.setAttribute('aria-expanded', 'false');
      }
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        if (menu.classList.contains('is-open')) close(); else open();
      });
      menu.querySelectorAll('button').forEach(function(btn) {
        btn.addEventListener('click', function() { close(); });
      });
      document.addEventListener('click', function() { close(); });
    })();

    // Format screenplay elements
    formatScreenplay(document.querySelector('.screenplay-container'));

    // Filmmaking-style page length & runtime (1 page ≈ 1 minute; ~250 words/page)
    // Count from raw markdown so we get the full script (DOM textContent can undercount)
    (function initScriptStatsAndProgress() {
      const WORDS_PER_PAGE = 250;
      const content = document.getElementById('scriptContent');
      const progressFill = document.getElementById('scriptProgressFill');
      const progressLabel = document.getElementById('scriptProgressLabel');
      const progressBar = document.querySelector('.script-progress-bar');

      if (!progressFill) return;

      const wordCount = (typeof markdown === 'string' ? markdown : (content && content.textContent) || '')
        .split(/\s+/)
        .filter(Boolean)
        .length;
      const MIN_PAGES = 90;
      const rawPages = Math.round((wordCount / WORDS_PER_PAGE) * 10) / 10;
      const estimatedPages = Math.max(MIN_PAGES, rawPages);
      const estimatedMinutes = Math.max(MIN_PAGES, Math.round(estimatedPages));

      function updateProgress() {
        const docEl = document.documentElement;
        const scrollTop = docEl.scrollTop || document.body.scrollTop;
        const scrollHeight = docEl.scrollHeight - docEl.clientHeight;
        if (scrollHeight <= 0) {
          progressFill.style.height = '0%';
          progressLabel.textContent = '0 / ' + estimatedMinutes;
          if (progressBar) progressBar.setAttribute('aria-valuenow', 0);
          return;
        }
        const pct = Math.min(1, Math.max(0, scrollTop / scrollHeight));
        const currentMinute = Math.min(estimatedMinutes, Math.floor(pct * estimatedMinutes));
        progressFill.style.height = (pct * 100) + '%';
        progressLabel.textContent = currentMinute + ' / ' + estimatedMinutes;
        if (progressBar) progressBar.setAttribute('aria-valuenow', Math.round(pct * 100));
      }

      updateProgress();
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress);
    })();

    // Scene nav: add ids to scene headings and wire dropdown to scroll
    (function initSceneNav() {
      const content = document.getElementById('scriptContent');
      const selectEl = document.getElementById('scriptSceneSelect');
      if (!content || !selectEl) return;

      const sceneHeadings = content.querySelectorAll('h3');
      const sceneHeadingRe = /^Scene \d+:/i;
      sceneHeadings.forEach((h3, i) => {
        const text = (h3.textContent || '').trim();
        if (sceneHeadingRe.test(text)) {
          h3.id = 'scene-' + (i + 1);
        }
      });

      selectEl.addEventListener('change', function() {
        const value = this.value;
        if (!value) return;
        const el = document.getElementById(value);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        this.value = '';
      });
    })();

    // Status bar: current scene, who's in scene, production tags (updates on scroll)
    (function initStatusBar() {
      const content = document.getElementById('scriptContent');
      const sceneEl = document.getElementById('scriptStatusScene');
      const charsEl = document.getElementById('scriptStatusCharacters');
      const prodEl = document.getElementById('scriptStatusProduction');
      if (!content || !sceneEl) return;

      function getSceneHeadingsInOrder() {
        const h3s = content.querySelectorAll('h3[id^="scene-"]');
        return Array.from(h3s).sort((a, b) => {
          const nA = parseInt(a.id.replace('scene-', ''), 10);
          const nB = parseInt(b.id.replace('scene-', ''), 10);
          return nA - nB;
        });
      }

      function getSceneBlock(sceneH3, nextSceneH3) {
        const chars = new Set();
        let firstSlug = '';
        let node = sceneH3.nextSibling;
        while (node) {
          if (node === nextSceneH3) break;
          if (node.nodeType === 1) {
            if (node.classList && node.classList.contains('character-name')) {
              const name = (node.textContent || '').trim();
              if (name) chars.add(name);
            }
            if (!firstSlug && node.classList && node.classList.contains('scene-heading')) {
              firstSlug = (node.textContent || '').trim();
            }
          }
          node = node.nextSibling;
        }
        return { characters: Array.from(chars), production: firstSlug };
      }

      function updateStatusBar() {
        const sceneHeadings = getSceneHeadingsInOrder();
        if (sceneHeadings.length === 0) return;
        const viewportThreshold = 160;
        let current = sceneHeadings[0];
        for (let i = 0; i < sceneHeadings.length; i++) {
          const top = sceneHeadings[i].getBoundingClientRect().top;
          if (top <= viewportThreshold) current = sceneHeadings[i];
        }
        const title = (current.textContent || '').trim();
        const nextId = current.id.replace('scene-', '');
        const nextNum = parseInt(nextId, 10) + 1;
        const nextScene = document.getElementById('scene-' + nextNum);
        const block = getSceneBlock(current, nextScene || null);
        sceneEl.textContent = title || '—';
        charsEl.textContent = block.characters.length ? block.characters.join(', ') : '—';
        prodEl.textContent = block.production || '—';
      }

      updateStatusBar();
      window.addEventListener('scroll', updateStatusBar, { passive: true });
      window.addEventListener('resize', updateStatusBar);
    })();
    
    function looksLikeActionIntro(text) {
      if (!text || text.length < 15) return false;
      if (/^\(.+\)$/.test(text)) return false;
      if (/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(text)) return false;
      if (/^[A-Z][a-z]+,\s*(?:Mid\s*\d+s|\d+s|[A-Za-z\s]+),/.test(text) && /[a-z]/.test(text)) return true;
      if (/^[A-Z][a-z]+,\s*(?:Mid\s*\d+s|\d+s)\s*[,.]/.test(text)) return true;
      return false;
    }

    function formatScreenplay(container) {
      const content = container.querySelector('.screenplay-content');
      if (!content) return;

      normalizeParagraphBreaks(content);

      const paragraphs = content.querySelectorAll('p');
      let inDialogueBlock = false;
      
      paragraphs.forEach((p, index) => {
        const text = p.textContent.trim();
        const nextP = paragraphs[index + 1];
        const prevP = paragraphs[index - 1];
        
        // Skip if already formatted (but allow normalizeParagraphBreaks output)
        if (!text) return;
        if (p.classList.length > 0 && !p.classList.contains('line-split')) return;
        
        // Scene headings (INT. or EXT. at start of line)
        if (/^(INT\.|EXT\.)/i.test(text)) {
          p.className = 'scene-heading';
          
          // Check for scene ID at the end: (s01.1)
          const idMatch = text.match(/\((s\d+\.\d+)\)$/i);
          if (idMatch) {
            const id = idMatch[1].toLowerCase();
            const cleanText = text.replace(idMatch[0], '').trim();
            p.innerHTML = '<span class="scene-id">' + id + '</span>' + cleanText.toUpperCase();
          } else {
            p.textContent = text.toUpperCase();
          }
          
          inDialogueBlock = false;
          return;
        }
        
        // Transitions (right-aligned, uppercase)
        if (/^(FADE IN|FADE OUT|CUT TO|DISSOLVE TO|SMASH CUT|MATCH CUT)/i.test(text)) {
          p.className = 'transition';
          p.textContent = text.toUpperCase();
          inDialogueBlock = false;
          return;
        }

        // Action break: (action) on its own line — ends dialogue block, next line is action; line is hidden
        if (/^\(action\)$/i.test(text)) {
          p.className = 'action-break';
          p.textContent = '';
          inDialogueBlock = false;
          return;
        }
        
        // Parentheticals (text in parentheses, italic) - check before character names
        if (/^\(.+\)$/.test(text)) {
          p.className = 'parenthetical';
          inDialogueBlock = true;
          return;
        }

        // Action lines that introduce a character or describe action (e.g. "Janice, Mid 50s, puts her hand...")
        // Never treat these as dialogue so they don't get wrapped with the previous speaker
        if (looksLikeActionIntro(text)) {
          p.className = 'action-line';
          inDialogueBlock = false;
          return;
        }
        
        // Character names (all caps, typically short, not scene headings)
        const isAllCaps = /^[A-Z][A-Z\s\.'-]+$/.test(text) && text === text.toUpperCase();
        const isReasonableLength = text.length > 2 && text.length < 35;
        const isNotSceneHeading = !/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(text);
        
        if (isAllCaps && isReasonableLength && isNotSceneHeading) {
          const nextText = nextP ? nextP.textContent.trim() : '';
          const looksLikeDialogue = nextText && (
            /^\(.+\)$/.test(nextText) ||
            (!/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(nextText) && 
             !/^[A-Z][A-Z\s\.'-]+$/.test(nextText))
          );
          
          if (looksLikeDialogue || !prevP || prevP.classList.contains('action-line') || prevP.classList.contains('scene-heading')) {
            p.className = 'character-name';
            p.setAttribute('data-character', text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''));
            inDialogueBlock = true;
            return;
          }
        }
        
        // Dialogue (follows character name / parenthetical / dialogue)
        const looksLikeNewBlock = /^(INT\.|EXT\.|FADE IN|FADE OUT|CUT TO|DISSOLVE TO|SMASH CUT|MATCH CUT)/i.test(text);
        const looksLikeCharacter = isAllCaps && isReasonableLength && isNotSceneHeading;
        if (!looksLikeNewBlock && !looksLikeActionIntro(text) && inDialogueBlock && prevP && (prevP.classList.contains('character-name') || prevP.classList.contains('parenthetical') || prevP.classList.contains('dialogue'))) {
          p.className = 'dialogue';
          inDialogueBlock = true;
          return;
        }
        
        // If we're in a dialogue block but this doesn't match, end the block
        if (looksLikeCharacter || looksLikeNewBlock) {
          inDialogueBlock = false;
        }
        
        // Default: action line
        p.className = 'action-line';
        inDialogueBlock = false;
      });

      // Add markers for last line in dialogue / parenthetical blocks (spacing)
      const ps = content.querySelectorAll('p');
      ps.forEach((p, i) => {
        if (!p.classList.contains('dialogue') && !p.classList.contains('parenthetical')) return;
        const next = ps[i + 1];
        if (!next || (!next.classList.contains('dialogue') && !next.classList.contains('parenthetical'))) {
          if (p.classList.contains('dialogue')) p.classList.add('dialogue-last');
          if (p.classList.contains('parenthetical')) p.classList.add('parenthetical-last');
        }
      });
    }

    // Split <p> blocks that contain <br> into separate <p>s per line.
    // This lets screenplay formatting work even if the markdown uses single newlines.
    function normalizeParagraphBreaks(content) {
      const paragraphs = Array.from(content.querySelectorAll('p'));
      paragraphs.forEach((p) => {
        if (!p.querySelector('br')) return;
        const parts = p.innerHTML
          .split(/<br\s*\/?\s*>/i)
          .map((s) => s.replace(/&nbsp;/g, ' ').trim())
          .filter(Boolean);
        if (parts.length <= 1) return;

        const frag = document.createDocumentFragment();
        parts.forEach((html) => {
          const np = document.createElement('p');
          np.innerHTML = html;
          frag.appendChild(np);
        });
        p.replaceWith(frag);
      });
    }
  </script>
</body>
