  <script>
    const markdown = "# Creatures in the Tall Grass Script — Full Script\n\n*Compiled on 4/24/2026, 12:24:57 PM*\n\n---\n\n\n## ACT I — Arrival & Discovery\n\n---\n\n\n### Scene 1: Arrival & Discovery\n\n*ACT I — Arrival & Discovery | ID: arrival | File: s01.md*\n\n---\n\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n<!-- nickname: arrival -->\r\n<!-- summary: New house, tall grass. He finds a broken stake and black rot in the reeds. Makayla and Asher want his oscillator. -->\r\n\r\nEXT. DALLAS NEW HOUSE - DAY (s01.1)\r\n\r\nDallas stares at the Tall Grass outside his house as he unloads boxes from a big pile. Dallas scans the new backyard, there are some old rusty lawn furtniture and a picnic table that seems to be adjacent to a fence of grass \r\n\r\nDallas goes into the grass a little bit. He stops. At the edge of the reeds is a jagged, dead patch of earth—a circle of black, oily rot where nothing grows. In the center of the rot, a single wooden stake has been driven into the ground, but it’s been snapped off, the top half gone. \r\n\r\nAs Dallas examines the broken wood, he hears a distinct bicycle ring.\r\n\r\nMAKAYLA\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nMakayla, 22, and Asher, 14 — approach on bikes. They watch Dallas for a while.\r\n\r\nASHER\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nThey approach Dallas slowly as one of the boxes draws their curiosity. Makayla watches Dallas pull out a military grade Oscillator.\r\n\r\nMAKAYLA\r\n(to Asher but loud enough for Dallas to hear)\r\nYou know that could be used to track the baseline between the cries of the Binzos and the howls of the Oragraph. They don't really know for sure though, and of course, none of it really matters if a Nidus is forming. That's an apex predator situation. \r\n\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nAsher nods with his headphones on. Makayla approaches Dallas. \r\n\r\nMAKAYLA\r\nHello there.\r\n\r\nDALLAS\r\nHello.\r\n\r\nMAKAYLA\r\nI'm Makayla.\r\n\r\nDALLAS\r\nDallas. \r\n\r\nMAKAYLA\r\nNice to meet you.\r\n\r\nDALLAS\r\nYou too.\r\n\r\nMAKAYLA\r\nDid you just move here?\r\n\r\nDALLAS\r\nYes\r\n\r\nMAKAYLA\r\nIs that an Oscillator?\r\n\r\nDALLAS\r\nYes. \r\n\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nMakayla looks at Asher and whispers something in his ear. He nods. She returns glances to Dallas and inches her bike closer. \r\n\r\nMAKAYLA\r\nDo you think my brother Asher could borrow it some time? \r\n\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nDallas looks at the Oscillator and then at Asher.\r\n\r\nMAKAYLA\r\nHe'll need it. \r\n\r\nDALLAS\r\nWhat would he need it for?\r\n\r\nMAKAYLA\r\nTell him Asher. \r\n\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nAsher stands silent, still tracing a pattern on his palm. He doesn't look up.\r\n\r\nMAKAYLA\r\nDoes it work?\r\n\r\nDALLAS\r\nIt does.\r\n\r\nMAKAYLA\r\nWhat's the range on it?\r\n\r\nDALLAS\r\nI'm not sure.\r\n\r\nMAKAYLA\r\nWell okay. Asher, do you have any more questions?\r\n\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nMakayla turns to Asher. He shakes his head no—still not looking up, finger tapping his other fingers in an almost morse code type of way. \r\n\r\nMAKAYLA\r\nOkay then. Good to know. Can we borrow it?\r\n\r\nDALLAS\r\nSure.\r\n\r\n<!-- scene: 1 file: s01.md nickname: arrival -->\n\n(action)\nMakayla and Asher peddle their bikes away with their new oscilattor.     Dallas watches curiously and then peers at the swinging breeze of the tall grass. \r\n\r\nDallas looks down at a box of old equipment and stretches down to pick it up.\n\n---\n\n\n### Scene 2: Sierra's Box\n\n*ACT I — Arrival & Discovery | ID: dallas-night | File: s02.md*\n\n---\n\n<!-- scene: 2 file: s02.md nickname: dallas-night -->\n\n# Scene 2: Sierra's Box\r\n<!-- summary: Can't sleep. Golden flicker in the grass. He opens Sierra's box; the hum starts; the battery dies. -->\r\n\r\nINT. DALLAS KITCHEN - SUNSET (s02.1)\r\nDallas looks at his new surroundings. He opens drawers and closes others. Cut to : Dallas looks at a gift basket - filled with fresh fruit and items. Cut to: He hasitly begins to put forth a frozen pizza. Cut to: Dallas hangs on the couch and begins to watch tv. On the screen a weatherman talks about the upcoming Branford weather.  \r\n\r\nA noise is heard off screen. \r\n\r\nEXT. DALLAS DRIVEWAY (s02.2)\r\nDallas goes outside and stares for a while at the edge of his property - along it a long fence of conneticut's finest natural tall grass. \r\n\r\nDallas looks back at his house - and begins to go on a walk. \r\n\r\nEXT. BRANFORD AT NIGHT MONTAGES (s02.3)\r\n\r\nDallas walks around at night with a recorder in his hand. As he walks along the different coastal - he takes a big deep breath and looks saddened at the coast. He records the sounds of the ocean. \r\n\r\nOn the way home - he records the breeze of the tall grass. \r\n\r\nINT. DALLAS NEW HOUSE - LIVINGROOM - Early NIGHT (s02.4)\r\nDallas walks in again and looks again at his new place. He looks at the windows, he looks at the doors, he looks at the cielings. He walks towards a group of large moving boxes scaterred in the center of the living room. \r\n\r\nDallas opens up the box labelled \"Field Notes - Branford\" to find sketches of butterflies and caterpillars and scattered drawings of curious insects. As he turns the pages, the butterflies seem to morph into creatures with wings.  Angels.  He flips through some of the pages, some containing sketches of the grass and a golden creature. And a bunch of math. Dallas closes it.\r\n\r\nDallas reaches again for the bottom of the box, covered in dust, sumberged by cables, Dallas finds a pair of retro, ruby-red headphones. Next to the headphones is a small casette player. On the back of the player, Dallas peels back a piece of duct tape to reveal a photo sticker. A photo of Dallas and a woman, both sporting heavy audio headsets, laughing as they capture noise in a field of grass. Dalla's thumb rushes over her face. \r\n\r\nDallas walks over to the ruby red casette player - he thumbs over the play button fails to do so. \r\n\r\nDallas gently closes the box of headphones and gear. He takes a deep breath and opens up another box laying adjacent. He carefully pulls out a heavy military-grade desktop audio recorder, another portable audio recorder, and a small portable Oscillator on his desk. \r\n\r\nINT. DALLAS BATHROOM - NIGHT (s02.5)\r\n\r\nDallas takes a shower - and as he zones out from the sounds of the hot water, a faint hum interrupts from the far outside. \r\n\r\nAs he takes a shower the audio tape of the ruby red cassette player fills the room. It is of a woman and her field notes and also her song.  As it plays and as Dallas continues to mourn in the shower, he begins to hear a faint hum interrupt from the far outside. \r\n\r\nDallas dries off, stops the tape, and peers through the steam of the bathroom window. The hum grows louder. \r\n\r\nINT. DALLAS DOWNSTAIRS - NIGHT (s02.6)\r\nDallas rushes downstairs as the hum grows louder. Dallas, recorder in hand, scrambles toward the window and brings to record. The needle spikes. Dallas begins to adjust the dial - and begins to hear a whimpering faint, pure, harmonic tone. The sound abrutly stops. And then it starts up again. The sound abrutly stops. And then starts up again. This time in a pulsing pattern. Dallas looks at his watch and begins to time it. One Second. Stop. One second - top. Five seconds. Three seconds. \r\n\r\nSuddenly hum sounds like it is moving away and its loudness begins to grow faint. Looking down at the his recording, Dallas notes a spike in the waveform on the low frequency range. \r\n\r\nThe battery dies on the recorder. Dallas smacks the back in fustration. Scrambling, he tears through a box of equipment for but none of them have batteries. \r\n\r\nFrustrated, Dallas abandones the equipment and heads for the door. \r\n\r\nEXT. DALLAS HOUSE - NIGHT (s02.7)\r\n\r\nDallas stands alone watching the tall grass sway agaisnt the salt breeze. Coyotes howl in the distance and the hum decreases in scale and size as the starry night disappears into the distance of the tall marsh grass. He sees a faint golden glow pulse once, twice, five times, three times. \r\n\r\nIn the distance a thunderstorm.\n\n---\n\n\n### Scene 3: The Hum\n\n*ACT I — Arrival & Discovery | ID: the-hum | File: s03.md*\n\n---\n\n<!-- scene: 3 file: s03.md nickname: the-hum -->\n\n<!-- nickname: Meet the Neighbors -->\r\n\r\nEXT. DALLAS HOUSE - NEXT DAY MORNING (s03.1)\r\nDallas walks outside his house, towards the edge of the property. As he approaches the edge of his yard he watches the tall grass sway in the wind. He looks at the grass for a beat too long, as he nurses the audio recorder in his hand. As he does so, he becomes dazed.\r\n\r\nAs Dallas dazes onward, a man approaches him from the sidewalk near his house. \r\n\r\nDOMINIC AMARANTO, early 40s, wearing a bright salmon covered short sleeve button walks up to Dallas with vigor. \r\n\r\nDOMINIC\r\nMy neighbor!\r\n\r\nDALLAS\r\nWhat's that?\r\n\r\nDOMINIC\r\nMy beighbor, neighbor - you're my neighbor - I think we're neighbors - right? You just moved yeah? Dominic - I live nextdoor. Where you coming from?\r\n\r\nDALLAS\r\nOh yeah - nice to meet you. Dallas.   \r\n\r\nDOMINIC\r\nYou here on some university position? Last guy who was here was here for 3 years and then moved on to better things up in Guilford. How is the house? Do they furnish it? \r\n\r\nDALLAS\r\nYeah. \r\n\r\nDOMINIC\r\nDallas? Dallas, what a name - where you from? \r\n\r\nDALLAS\r\nIndiana.\r\n\r\nDOMINIC\r\nIndyANNA - far from Branford. \r\n\r\nDALLAS\r\nYeah.\r\n\r\nDOMINIC\r\nWhat you know about Branford?\r\n\r\nDALLAS\r\nNot much. \r\n\r\nDOMINIC\r\nSo what brings you to here?\r\n\r\nDALLAS\r\nWork.\r\n\r\nDOMINIC\r\nOh yeah? What kind of work?\r\n\r\nDALLAS\r\nResearch mostly. \r\n\r\nDOMINIC\r\nOoo - big guy - Yale? \r\n\r\nDALLAS\r\nQuinnipiac \r\n\r\nDOMINIC\r\nOooo - right on - nice. What kind of research?  \r\n\r\nDALLAS\r\nBioacoustics. \r\n\r\nDOMINIC\r\nBio-acoustics. That's the study of sound - yeah? Yeah. Right on. Alright listen - I'm about to head to the green right now - you up for a walk? My car is parked down in the center of town and I need to go get it... What's that in your hand?\r\n\r\nDALLAS\r\nAn audio recorder. I was going to go into town to get some new batteries.  \r\n\r\nDOMINIC\r\nInto town? Where you headed? Rudy's got that. Let's go - I'll buy you a coffee.\r\n\r\n<!-- scene: 3 file: s03.md nickname: the-hum -->\n\n(action)\nDallas nods and Dominic leads the way as the two begin their trek towards Brandford town green. \r\n\r\nEXT. BRANFORD NEIGHBORHOOD - MOMENTS LATER (s03.2)\r\n\r\nDallas and Dominic begin to walk down the sidewalks towards town. \r\n\r\nDOMINIC\r\nYou don't have a car?\r\n\r\nDALLAS\r\nNo - no car.\r\n\r\nDOMINIC\r\nYeah. Me neither - well I drive - for sure, but yeah, I share one with my sister.\r\n\r\nEXT. TOWN BRANFORD MONTAGE (s03.3)\r\n\r\nDallas and Dominic through coastal sidewalks, neighborhoods, and natural marsh fences. As they approach one patch of tall marsh grass in particular, Dallas stops.\r\n\r\nDallas, checks if Dominic is looking and when he isn't - he takes records a bit with the audio recorder and points it's microphone toward the grass. \r\n\r\nDOMINIC\r\n(spotting Dallas)\r\nBe careful - I heard some coyotes up in that the other night when I was walking Howie. Some people say the noises are from owls - but I know its coyotes. \r\n\r\nEXT. TOWN CENTER - DAY (s03.4)\r\nDallas and Dominic walk toward a small hardware store. \r\n\r\nINT. HARDWARE STORE (s03.5)\r\n<!-- scene: 3 file: s03.md nickname: the-hum -->\n\n(action)\nDominic waves to the unfriendly man at the counter and brings Dallas to the battery section. \r\n\r\n<!-- scene: 3 file: s03.md nickname: the-hum -->\n\n(action)\nDallas finds the correct batteries and grabs it off the shelf. The two exit the shop.\r\n\r\nEXT. BRANFORD GREEN (s03.6)\r\n\r\nDallas and Dominic walk past the town green. The building looks closed. Dominic stops dead. A neon orange ticket flutters under his windshield wiper.\r\n\r\nDOMINIC\r\nOh, this is great. Cool. \r\n\r\n<!-- scene: 3 file: s03.md nickname: the-hum -->\n\n(action)\nHe rips the ticket off and walks around to see if anyone is looking, he crumbles it up and puts it in his pocket. Dominic takes out an inhaler out of his pocket and takes a massive rip. \r\n\r\nHe bends downs and grabs a key from the bottom of the car and starts it up. \r\n\r\nINT. DOMINIC's SISTER's CAR (s03.7)\r\n\r\nDominic opens the car and gestures Dallas to get in - non-chantanly the parking ticket in the glove box. \r\n\r\nDOMINIC\r\nYou hungry?\r\n\r\nDALLAS\r\n(still in a daze)\r\nYeah\r\n\r\nDOMINIC\r\nGood -  my church is doing a fellowship lunch - little picnic - I'm on cleanup duty and got to lock up when they are done. I could drop you off home first but it would be out of the way - You want to come for the ride? \r\n\r\nDALLAS\r\nSure. \r\n\r\n<!-- scene: 3 file: s03.md nickname: the-hum -->\n\n(action)\nDominic drives towards the church. \r\n\r\nDOMINIC\r\nNice - yeah - it's nice to be the new guy in town - good old branford.\n\n---\n\n\n### Scene 4: The Fellowship\n\n*ACT I — Arrival & Discovery | ID: fellowship | File: s04.md*\n\n---\n\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n<!-- nickname: fellowship -->\r\nEXT. CHURCH FELLOWSHIP LAWN - LATE AFTERNOON (s04.1)\r\n\r\nDallas and Dominic arrive at CPC and find themselves in heat of a picnic. Children are running, friends down light summerwear as they play spike ball, and church goers find themselvees are on a long line for food. \r\n\r\nDallas looks around at all of the new faces but does not make great eye contact. Dominic takes a deep breath and approaches the long line. \r\n\r\nDominic carries a package of water and puts it under one of the fold up tables. As he does so, people look at Dallas and begin to greet him. \r\n\r\nDOMINIC\r\nLine is long today - they must got Nicas. Everyone's all downing what they can before the storm. \r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nAs they wait in line, people begin to turn around and talk to them. One lady, MARY, 55 turns around and shakes Dallas' hand enthusiastically.\r\n\r\nMARY\r\nWell hey there sunshine - what's your name?\r\n\r\nDALLAS\r\nDallas\r\n\r\nMARY\r\nDallas... Dallas, Dominic where did you get this Califorina boy from? My name is Mary - do you like chicken primevera?\r\n\r\nDALLAS\r\nNever really had it.\r\n\r\nMARY\r\nWell you should, its great.... So you ready for some proper New England weather?\r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nAnother turns around and greets Dallas. An older gentleman PAUL WILDLY, 72, approaches. \r\n\r\nPAUL\r\nThey claim it'll be historic. Apparently, we haven't had a storm like this since 1971 when Nixon took the US off the gold standard. Paul, nice to meet you. \r\n\r\nDALLAS\r\nDallas. \r\n\r\nPAUL\r\nNow, where are you from?\r\n\r\nDALLAS\r\nIndiana\r\n\r\nPAUL\r\nOo - then you must know of William Henry Harrison - our 9th president, served as Indiana's governor back when it was just a terriority. \r\n\r\nMARY\r\nPaul, stop that. Honey - if you need I can make you some chicken primevera tonight. \r\n\r\nDOMINIC\r\nHe's okay, Ms. Mary thank you. \r\n\r\nDALLAS\r\nThank you. \r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nDallas and Dominic sit in a circle of folded pull up chairs. \r\n\r\nJANICE AMARANTO, Mid 50s, approaches the line holding a small dog in her arms. She taps Dominic's shoulder.\r\n\r\nDOMINIC\r\n(greeting the dog)\r\nHowie.\r\n\r\nJANICE\r\n(greeting Dominic)\r\nYeah - he's doing much better. He's been having little scares hasn't heeeee - the thunder last night really scared him - he doesn't like the thunder. Dominic, listen, you all set for dinner? You got the brussel sprouts?\r\n\r\nDOMINIC\r\nGot them. Should be good to go. \r\n\r\nJANICE\r\nThanks again little brother. Listen - did you give Mr. Mike his mediciation? - He has to take them now at 4:30pm - an hour or so before dinner. Make sure he takes it with some cheese or something. \r\n\r\nDOMINIC\r\nYes.\r\n\r\nJANICE\r\n(noticing Dallas)\r\nWhat's wrong you for not introducing me to your friend Dominic  - who is this? \r\n\r\nDOMINIC\r\nDallas.\r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nDallas smiles and puts out his hand.\r\n\r\nJANICE\r\nNice to meet you Dallas. Dominic hold Howie for a second I go to go make sure that I didn't lock the car. \r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nJanice abrutly leaves. \r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nMakayla and Asher approach from afar to the line. \r\n\r\nDOMINIC\r\nDallas, these are my niece and nephew - Makayla and Asher.\r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nMakayla and Asher don't make direct eye contact with Dallas but fake a polite smile. Makayla taps Asher's headphones and nods toward the far end of the church lawn. Between the bushes and garden. \r\n\r\nThe two leave the line walk over to a corner spot by the end of the church yard and huddle over a pile of brush.\r\n\r\nDallas takes a bite of his chicken but doesn't eat much. He's distracted by what Makayla and Asher are looking at the distance. \r\n\r\n<!-- scene: 4 file: s04.md nickname: fellowship -->\n\n(action)\nThey finish eating. The group begins to disperse.\n\n---\n\n\n### Scene 5: The Merlin App\n\n*ACT I — Arrival & Discovery | ID: marsh-walk-later | File: s05.md*\n\n---\n\n<!-- scene: 5 file: s05.md nickname: marsh-walk-later -->\n\n# Scene 5: The Merlin App\r\n<!-- summary: Boardwalk through the reeds. They hear birds andSomething moving in the marsh. -->\r\n\r\nEXT. MARSH TRAIL - LATER (s05.1)\r\nThe sun is dipping. Dallas and Dominic walk back home - along a wooden boardwalk that cuts through the tall, golden-yellow reeds.\r\n\r\nDominic and Dallas walk quietly for a while. Dominic looks out to the tall grass.\r\n\r\nDOMINIC\r\nThe kids are always out here planting down cameras. Makayla says that they are geotagging or something. I don't know. \r\n\r\n<!-- scene: 5 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nThe two hear a distant cry - that could be a bird. Dallas looks at Dominic.\r\n\r\nDOMINIC\r\n(to himself)\r\nYeah.\r\n\r\n<!-- scene: 5 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDominic pulls out his phone, tapping an app.\r\n\r\nDOMINIC\r\nHey check this - It listens to the chirps and tells you the species. They got a lot of offspree here - Coastal stuff mostly—Egret, Plover. You should get it if you're working at Quinnipiac.\r\n\r\n<!-- scene: 5 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDominic struggles to get the app to work and begins to pace a bit. \r\n\r\nDOMINIC\r\nYeah - I wanted to be a writer but it never really worked out - but I'm writing now - maybe one day I'll tell a story of these marlins.\r\n\r\n<!-- scene: 5 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nHe grabs his Asmatha inhaler and takes a deep breath.\r\n\r\nDOMINIC\r\n(in anger)\r\nSometimes I wonder if this all is just make believe.\r\n\r\n<!-- scene: 5 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDallas looks onward empathically. \r\n\r\nDALLAS\r\nWhat do you mean?\r\n\r\nDOMINIC\r\nThis whole existence - being alive - its so overwhelming and then boom - you are gone. \r\n\r\nDALLAS\r\nYeah.\r\n\r\nDOMINIC\r\n(to himself)\r\nBoom - Gone. \r\n\r\n<!-- scene: 5 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDallas and Dominic walk slowly and Dallas looks out to the tall grass for a while.\n\n---\n\n\n### Scene 6: News Vans\n\n*ACT I — Arrival & Discovery | ID: news-vans | File: s06.md*\n\n---\n\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n# Scene 6: News Vans\r\n<!-- summary: News vans in the street. Pat on camera. Marks on Dominic's driveway. Dallas strays and stays. -->\r\n\r\nEXT. BRANFORD NEIGHBORHOOD - CONTINUOUS (s06.1)\r\n\r\nDallas and Dominic reach back to their neighborhood. Outside, nestled between their house, three news vans are parked haphazardly. \r\n\r\nDominic parks the car and the two get out to see. \r\n\r\nPAT CLENDENEN, MID 50s, is outside their house in front of news cameras. \r\n\r\nPAT CLENDENEN\r\n(to camera)\r\nHey Micky, thanks for having me on. Out here today in my hometown of Branford, CT. Pretty excited to be back home. So if you are in anywhere in costal connecticut, all the way up to Rhode Island today, some parts of southern mass all the way towards Boston. This is New England weather for you, always unpredictable - always on the bleeding edge....So in that spirit, today we'll see sun to clouds, breezy, warm with a late day shower possible. But the real attention - and the reason we are here - is to bring attention to a possible development along the shores.... We are staying on top of a trend through the rest of this week - as any shift could dramatically impose a threat - this costasl community. act the entire state. The european models are showing signings that we might be in for a big one and while we're all hoping the Nor'easter stays out at sea, the current models suggest a wild weekend for the shoreline. \r\n\r\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n(action)\nDominic scoffs as they walk past.\r\n\r\nDOMINIC\r\nPat's been predicting the end of the world every Tuesday for ten years.\r\n\r\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n(action)\nThe camera cuts. Pat notices Dominic and waves at him from afar. \r\n\r\nPAT CLENDENEN\r\nDominic! See you Thursday! \r\n\r\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n(action)\nDominic waves back at Pat. He looks at Dallas and shrugs. The two continue past the news vans.\r\n\r\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n(action)\nThe wind gusts, catching a news umbrella and nearly toppling it. The hum in Dallas's pocket recorder spikes for a split second.\r\n\r\nEXT. DOMINIC'S HOUSE (s06.2)\r\n\r\nThey arrive back at Dominic's. Two large plastic trash bins are sprawled across the driveway, trash strewn everywhere.\r\n\r\nDOMINIC\r\nLook at this. Those raccoons! \r\n\r\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n(action)\nDominc takes a deep breath and takes a hit of his inhaler.\r\n\r\nDOMINIC\r\nI try to do the right thing and I keep getting kicked. \r\n\r\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n(action)\nDominic kicks a stray milk carton. He looks at the garbage cans around his house, then at Dallas.\r\n\r\nDOMINIC\r\nListen, I got to get the furniture before Janice has her women's group tonight. I got to go check on Mike and bring in another fan from the basement. You good? \r\n\r\n<!-- scene: 6 file: s06.md nickname: news-vans -->\n\n(action)\nDallas notices that there are some weird burn marks on the ground. He gazes at them for a bit of time. The burn marks are like black sands, not disimmilar to veins on the ground. \r\n\r\nDallas walks over to the burn marks and touches them. He looks at his skin reacts a bit to the marks and he takes a little nearby leaf with the mark and puts it in his pocket. \r\n\r\nDALLAS\r\n(hesitates)\r\nYeah\r\n\r\nDOMINIC\r\nDo you want to stay for a bit?\r\n\r\nDALLAS\r\nSure.\n\n---\n\n\n### Scene 7: The Coordinates\n\n*ACT I — Arrival & Discovery | ID: the-coordinates | File: s07.md*\n\n---\n\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n<!-- nickname: the-coordinates -->\r\nINT. JACE'S BASEMENT (s07.1)\r\nDallas looks around in amazement. The basement is covered with normal basement things - but as his eyes scan the room he notices that there are two beds, room, and clutter. Around the corner there is a workstation filled with old CRT machines and what not.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at all of the different audio and acoustic devices scattered across the room. On the cieling there are tiny beeds hung from strings - tiny with different colors. \r\n\r\nDOMINIC\r\nThis was formerly our shared basement - but, now, my niece and nephew live here have occupied. They just love this basement... Here, help me grab the fan. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at all of the different audio and acoustic devices scattered across the room. Dallas walks over to one and sees the similar trail cam that he found on his property - but, this one is different. It has a small antenna attached to it. \r\n\r\nDominic taps Dallas on the shoulder, breaking him out of his gaze and together they slowly move the AC unit upstairs. \r\n\r\nINT. DOMINIC'S BASEMENT (s07.2)\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic helps Dallas shove a heavy oak table against the wall. As they move - Dominic knocks over a photo frame - and Dallas grabs it. On the ground is a small, framed photo of a woman and a young boy on Dominic's shoulders.\r\n\r\nDominic bends down to grab the photo for a bit. \r\n\r\nDOMINIC\r\nDo you have kids?\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic hands Dallas the photo. \r\n\r\nDALLAS\r\nNo. \r\n\r\nDOMINIC\r\n(looking at the photo)\r\nI had a family once. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas falls mute. \r\n\r\nDOMINIC\r\nNo kid now, no wife now. Just the niece and nephew. Janice and Mr. Mike. My lot in life. I'll take it.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic takes a hit of his inhaler. And reaches out for a handshake. \r\n\r\nDOMINIC\r\nIt has been nice hanging out with you Dallas - thanks for coming and helping today. \r\n\r\nDALLAS\r\nOh you're welcome. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic scans the room and finds his gaze upon the corner. MR. MIKE (mid 70s) begins to wake up from his  rocking chair, staring fixedly at the floor. Mr. Mike scans the room and then outside and then takes a deep breath before he begins to violintely scratch the wood of the table using a jagged nail. \r\n\r\nDOMINIC \r\nMr. Mike! Mr. Mike, what are you doing?! \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike suddenly looks up, his eyes milky but sharp. He points a finger at the window.\r\n\r\nMR. MIKE\r\nSorry, I had to write something down. It was important that I wrote something down. Dominic. Dominic! \r\n\r\nDOMINIC\r\nYes? \r\n\r\nMR. MIKE\r\nShe's here!\r\n\r\nDOMINIC\r\nWhose here? Could you not scratch the table anymore? Whose here? \r\n\r\nMR. MIKE\r\nYour sister. Makayla. Asher\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic dashes for the door and opens it. In pops Janice with Makayla and Asher. \r\n\r\nAsher runs straight towards Mr. Mike and kneels down before him. Makayla side eyes Dallas. \r\n\r\nMR. MIKE \r\nOne one five three. One one five three. She's here - Dominic - Janice is here - ASHER! Is that you? Come here. Five five five five.  \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike points to the window. \r\n\r\nMR. MIKE\r\nDo you see? \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nAsher's eyes widen when he sees what Mr. Mike has been writing. He already has his sticky note out; he copies the numbers, taps the page twice, then runs to Makayla and shows her. She puts the note in her pocket. \r\n\r\nJANICE (Early 50s) marches in, balancing two bags of groceries and a set of keys between her teeth. Makayla walks over and helps with a bag and hands Asher the keys. \r\n\r\nJANICE\r\n I-95 you know how it is. Listen, Dominic, what's the status - how we doing on the sprouts? You need to boil them first and then sear them. Alright? Last time you just boiled them and it didn't work... Dallas, you got to teach your friend here how to cook. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nJanice begins a frantic search for her keys, which she just put down. She stumbles upon Dallas's heavy audio recorder.\r\n\r\nJANICE \r\nWhat is this? A boat anchor?\r\n\r\nDALLAS\r\nIt's a recorder. \r\n\r\nJANICE\r\nA recorder? You taping this conversation? I'm kidding, you could, la la la la laaaa. Dallas do you want to have some dinner with us? \r\n\r\nDALLAS\r\nUm, no - I should be going back. Thank you though.  \r\n\r\nJANICE\r\nYou sure honey? \r\n\r\nDOMINIC\r\nYeah Janice, Dallas needs to settle a bit. \r\n\r\nDALLAS\r\nYeah, I got some food back at home, so, I'll be okay.  \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike in the distance begins to get agitated. He rocks slowly in his rocking chair and taps his fingers. \r\n\r\nMR. MIKE\r\nThey are being hunted. Javerias told me. They are being hunted.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla walks over to Asher, who is still kneeling besides Mr. Mike, listening intently.\r\n\r\nMAKAYLA\r\nWho is Javerias?\r\n\r\nMR. MIKE\r\nJaverias, Javerias, he told me. I haven't seen them since the big blow in '71. The Red Eyes. They come when the pressure drops and the sky turns that bruised color. Back then, they took the whole center marsh—swallowed it whole. Javerias said if you hurt one—even if it was by mistake—they transform. They turn into the shadow ones. The predators. And when the wind picks up tonight, the Nidus will open, just like it did for the gold standard. They're coming back to finish the harvest.\r\n\r\nJANICE\r\n(from the Kitchen)\r\nMr. Mike calm down my friend woof - dinner will be ready soon. \r\n\r\nMR. MIKE\r\nAre you making the sprouts?\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nJanice walks over and grabs Howie from her doggie backpack and rests him on the floor. Howie rushes over to Dallas. \r\n\r\nJANICE\r\nHowie, wait, no no - well, look at that. He likes you Dallas. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas kneels down to meet the dog Howie. They embrace.  \r\n\r\nMR. MIKE\r\nWhen I was growing up we didn't have a dog, we had a cat - Misty - this dog is no good. \r\n\r\nJANICE\r\nStop it Michael. Mr. Dallas - would you like to watch him sometime? \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nHowie motions to Dallas like he wants to be held.\r\n\r\nDALLAS\r\nSure. \r\n\r\nMAKAYLA\r\nHow about tomorrow? \r\n\r\nJANICE\r\nYeah - I mean - we could drop him off in the morning. What do you think Dallas?\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at Howie - and the dog looks back at him.\r\n\r\nJANICE\r\nActually... Want to take him tonight? Do a little dry run? He'll sleep on the couch like a baby. I don't want you alone in that new house of yours - say how is it? Did they treat it nice? Dominic, where are you? Yeah, take him tonight sweetie - go on a big walk along the shore -  Lord knows I got can't walk him like I used to with my knees.\r\n\r\nDALLAS\r\nSure. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at the dog - the dog Howie looks back at the man Dallas. Makayla walks over and places the portable Oscillator from Dallas' hand. \r\n\r\nMAKAYLA\r\nIt didn't work.\r\n\r\nDALLAS\r\nNo?\r\n\r\nMAKAYLA\r\n(thinking)\r\nWill it actually record the frequencies? Or does it just display? How do you record?\r\n\r\nDALLAS\r\nThere's a memory card in there. But it writes in an old format. \r\n\r\nMAKAYLA\r\nWhat format? \r\n\r\nDALLAS\r\nB24FF\r\n\r\nMAKAYLA\r\nOkay, I've already copied them and don't think it worked. Thank you though. \r\n\r\nJANICE\r\nMakayla whats that - give it back. \r\n\r\nDALLAS\r\nIt's fine. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at Makayla and back at Asher who is still kneeling by Mr. Mike. \r\n\r\nDOMINIC\r\nMakayla, I showed Dallas your little basement dwelling.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla looks over to Dallas with sus looks.  \r\n\r\nMAKAYLA\r\nOkay great.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike from the living rooms gets agitated. He begins rocking back and forth in his chair. \r\n\r\n\r\nMR MIKE\r\nThe numbers are off. Asher knows. The numbers are off.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike continues to rock - he looks over - ignores Makayala's gaze and locks eye contact with Asher.\r\n\r\nMR. MIKE\r\nThe numbers are wrong. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla walks over to Dallas.\r\n\r\nMAKAYLA\r\nDoes it pick up frequencies below the human range? \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas nods. \r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nAsher, meanwhile, ignores the conversation, eyes fixed on the distant bushes at the edge of the property. The leaves flutter, though there is no wind. His finger traces a ripple on his hand.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic begins to light the gas to start boiling the brussels but the lighter doesnt work. \r\nJanice throws up her hands and goes outside for a smoke. Dallas follows her with Howie.\r\n\r\nEXT. DOMINIC'S PATIO (s07.3)\r\n\r\nJANICE\r\nThank you again Dallas.\r\n\r\n<!-- scene: 7 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas begins to walk across the street to his house.\n\n---\n\n\n### Scene 7B: Mr. Mike's Warning\n\n*ACT I — Arrival & Discovery | ID: mr-mikes-warning | File: s07b.md*\n\n---\n\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\ns07B — INT. DOMINIC'S BASEMENT — CONTINUOUS\r\n(Slots in between Scene 7.2 and the end of Scene 7. After Mr. Mike has rambled about Javerias and Janice has gone outside for a smoke. Dominic is in the kitchen, out of frame. Dallas is alone with Mr. Mike and the dog.)\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas stands near the table, holding the frame with the photo of Dominic's family. He sets it down gently.\r\nMr. Mike rocks in his chair. He has stopped muttering. His eyes are on Dallas now. Focused. Different.\r\n    \r\nMR. MIKE\r\nCome here.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas glances toward the kitchen. Dominic is out of earshot. He walks over.\r\n\r\nMR. MIKE\r\nCloser. Come closer. \r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas crouches beside the rocking chair. Mr. Mike reaches out and takes Dallas's wrist. His grip is stronger than it should be.\r\n\r\nMR. MIKE\r\nYou listen to me.   \r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas doesn't move.\r\n\r\nMR. MIKE\r\nJaverias told me this when I was seven. My father's age. I'm telling you now. You're going to need it.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nA beat. Mr. Mike's eyes are clear. No fog. No wandering.\r\n\r\nMR. MIKE\r\nIf you find one of the bright ones. Hurt. Bleeding. Anything.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nHe tightens his grip on Dallas's wrist.\r\n\r\nMR. MIKE\r\nYou leave it.\r\n\r\nDALLAS\r\n(quiet)\r\nWhat?\r\n\r\nMR. MIKE\r\nYou don't touch it. You don't take it. You don't try to help. You leave it. \r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nMr. Mike looks at him for a long moment. His lip trembles.\r\n\r\nMR. MIKE\r\nIf you touch the hurt one, you make the dark one. And then you become the dark one. \r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas stares at him.\r\n\r\nMR. MIKE\r\nEvery time. Every single time.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nHe lets go of Dallas's wrist.\r\n\r\nMR. MIKE\r\nI touched one. When I was a boy. I didn't know. Javerias came the next week. Told me what I did.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nA pause. The rocker creaks once.\r\n\r\nMR. MIKE\r\nThe dark one is still out there.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas stares out the window and on the floor. \r\n\r\nFrom the kitchen:\r\nDOMINIC (O.S.)\r\nDallas — you want water?\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nThe spell breaks. Mr. Mike blinks. His eyes cloud over again. He looks at Dallas like he's not sure who he is.\r\n\r\nMR. MIKE\r\n(confused, gentle)\r\nWho are you?\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas stands slowly. His hand goes to his own wrist — rubbing where Mr. Mike gripped it.\r\n\r\nDALLAS\r\n(calling back)\r\nNo, I'm okay.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nMr. Mike starts humming to himself. Something tuneless. He's gone again.\r\n\r\n<!-- scene: 7B file: s07b.md nickname: mr-mikes-warning -->\n\n(action)\nDallas looks at his wrist one more time, then at the rocking chair. Then at the window, toward the tall grass.\n\n---\n\n\n### Scene 8: The Trailcam\n\n*ACT I — Arrival & Discovery | ID: dallas-marsh-walk | File: s08.md*\n\n---\n\n<!-- scene: 8 file: s08.md nickname: dallas-marsh-walk -->\n\n# Scene 8: The Trailcam\r\n\r\nEXT. DALLAS HOUSE - MOMENTS LATER (s08.1)\r\n\r\nDallas tries to bring Howie inside but he won't go. He looks like he wants to go on a walk. So Dallas reasons with the creature and brings him on a walk. \r\n\r\nEXT. BRANFORD ROCKS - EVENING (s08.2)\r\nThe Long Island Sound roars, the waves crashing violently against the Branford rocks. Dallas walks Howie along the edge of his neighborhood.\r\n\r\nDallas steps off the boardwalk onto a narrow dirt path that runs behind the houses, where lawns thin into reeds and the creek bends toward the marsh.\r\n\r\nAs Howie, Dallas holds his portable Oscillator out. The needle begins to flutter.\r\n\r\nHowie stops. His ears perk up and swivel like small radar dishes toward the dark reeds in the distance. \r\n\r\nIn the far distance, a single coyote barks. Then another. A chain reaction of domestic fear starts in the neighborhood, followed by the high, thin yip of coyotes further inland.\r\n\r\nThe winds pick up and Dallas and Howie march forward. \r\n\r\nEXT. EDGE OF THE MARSH (s08.3)\r\n\r\nDallas ties Howie to a nearby tree. The dog isn't just whimpering; he's pulling at the leash, eyes fixed on the reeds. \r\n\r\nDallas walks into the marsh. The \"Hum\" is louder here, a dense vibration that makes his vision vibrate.\r\n\r\ns08.4 — EXT. INTO THE MARSH (s08.4)\r\n\r\nHe finds the spot. A makeshift wooden trap, but it's been... compromised. A thick ring of oily black rot circles the wood, the grass within the circle dead and brittle.\r\n\r\nDallas finds the trailcam. The lens is cracked, but the \"Record\" light is still blinking a faint, dying red. \r\n\r\nSuddenly, a heavy **CONCUSSIVE THUD** hits the mud thirty feet away. It's not a footstep; it's the sound of something heavy landing from a great height.\r\n\r\nThe Hum stops instantly. The silence is absolute.\r\n\r\nDallas freezes. He doesn't look toward the sound. Every instinct screams *prey*. He rips the trailcam from its mounting, his fingers fumbling with the nylon straps.\r\n\r\nA low, guttural chittering sound rises from the grass behind him.\r\n\r\nDallas doesn't wait. He bolts. He grabs Howie's leash in a dead run, nearly pulling the dog off his feet as they scramble back toward the safety of the boardwalk.\n\n---\n\n\n### Scene 8B: The Research Beat\n\n*ACT I — Arrival & Discovery | ID: the-research-beat | File: s08b.md*\n\n---\n\n<!-- scene: 8B file: s08b.md nickname: the-research-beat -->\n\n# SCENE 9B: THE RESEARCH BEAT\r\n\r\ns08b.1 — INT. DALLAS HOUSE - DESK - NIGHT\r\n\r\nThe house is quiet, save for the hum of a refrigerator and the soft, rhythmic scratching of Howie’s paws on the hardwood in the next room. \r\n\r\nDallas sits in the dark. He plugs the trailcam into his laptop. The screen flickers with grainy, infrared night-vision footage.\r\n\r\nHe presses PLAY.\r\n\r\nON SCREEN: A cluster of four Golden Creatures are huddling in a circle. They are beautiful—pulsing with a soft, harmonic light. They are \"singing\" in a visible way, the air around them shimmering.\r\n\r\nSuddenly, a massive, formless shadow drops from the top of the frame. \r\n\r\nIt’s a **RED EYE**. It doesn't bite the first Golden One; it simply touches it. The golden light is instantly \"overwritten\" by a jagged, red-black corruption. The creature doesn't scream—it **disintegrates** into the marsh floor, leaving only a patch of black rot behind.\r\n\r\nThe group scatters. The camera shakes as the Red Eye turns toward the lens.\r\n\r\nOne Golden One—smaller than the others—is hit by a trailing tendril of rot. Its light flickers, turning a sickly amber. It limps toward a gnarled tree in the distance before the footage cuts to static.\r\n\r\nDallas leans back, his face pale. He's not looking at \"biology.\" He's looking at an execution.\r\n\r\nDallas reaches into the box of his old things and pulls out the folder: *FIELD NOTES — BRANFORD 2004*. \r\n\r\nHe flips through the sketches of butterflies and caterpillars until he reaches a page near the back. \r\n\r\nHis eyes widen. \r\n\r\nOn the page, in Sierra's handwriting: *Response at 115.3 MHz.* \r\n\r\nNext to it is a crude sketch of the \"perfect ladder\" waveform. It matches his screen exactly. \r\n\r\nDallas leans back. He looks at the oscillator. He reaches out and slowly dials the frequency to **115.3**. \r\n\r\nThe needle doesn't just flutter; it *locks*. A pure, steady tone begins to resonate from the speakers—a sound so clean it feels like a physical presence in the room. \r\n\r\nFrom the living room, Howie begins to howl.\r\n\r\nDallas cuts the power. Silence. \r\n\r\nINT. MAKAYLA'S BEDROOM - SAME TIME (s08b.2)\r\n\r\nOn a messy desk covered in birding guides and disassembled electronics, a small, translucent crystal sits in a petri dish.\r\n\r\nAs the hum from Dallas's house resonates through the neighborhood, the crystal suddenly flares. A bright, predatory gold light bleeds from its center, scorching a small black ring into the wooden desk.\r\n\r\nMakayla reaches out, her fingers inches away, then pulls back as she feels the heat. Her eyes widen. It's the first time it has ever reacted.\n\n---\n\n\n### Scene 8C: The Threshold\n\n*ACT I — Arrival & Discovery | ID: the-threshold | File: s08c.md*\n\n---\n\n<!-- scene: 8C file: s08c.md nickname: the-threshold -->\n\n# SCENE 9C: THE THRESHOLD\r\n\r\ns08c.1 — EXT. DALLAS HOUSE - PORCH - NIGHT\r\n\r\nDallas stands on the porch, holding the trailcam in his hand like a weapon.\r\n\r\nHe looks at the yard. The two **RED PINPRICKS** of light are back, but they aren't in the marsh. They are at the edge of his driveway.\r\n\r\nAs Dallas watches, the red eyes pulse. In his hand, the trailcam’s \"Record\" light pulses back in the exact same rhythm. \r\n\r\nThey aren't just watching him. They are \"sniffing\" the data he just stole. \r\n\r\nA jagged line of black rot begins to crawl up the porch steps, hissing as it touches the treated wood. Dallas slams the door and locks it, but he can hear the rhythmic scratching of something \"testing\" the siding of the house.\n\n---\n\n\n### Scene 8D: The Return\n\n*ACT I — Arrival & Discovery | ID: the-return | File: s08d.md*\n\n---\n\n<!-- scene: 8D file: s08d.md nickname: the-return -->\n\n# SCENE 8D: THE RETURN\r\n\r\ns08d.1 — EXT. EDGE OF THE MARSH - NIGHT\r\n\r\nThe world is different at night. The boardwalk is a pale spine cutting through a sea of black reeds. \r\n\r\nDallas walks alone. He isn't carrying just his oscillator; he has a heavy-duty spotlight and his wife's old medical kit.\r\n\r\nHe knows exactly where he's going. He saw the tree in the footage.\r\n\r\nThe needle on the Oscillator is pinned at 115.3, but the sound coming through the headphones is different now, it’s a rhythmic, sobbing trill. \r\n\r\nDallas doesn't hesitate at the edge of the reeds. He knows the Red Eye is out there, somewhere in the sky, but he also knows the survivor won't last the night.\r\n\r\nHe plunges into the tall grass, the beam of his spotlight cutting through the tall grass like a blade.\n\n---\n\n\n### Scene 9: The Injured One\n\n*ACT I — Arrival & Discovery | ID: dallas-night-work | File: s09.md*\n\n---\n\n<!-- scene: 9 file: s09.md nickname: dallas-night-work -->\n\n# Scene 9: The Injured One\r\n<!-- summary: Dallas, as he ventures deeper and deeper into the marsh - finds a bioluminest creature -->\r\n\r\nEXT. DEEP INSIDE THE TALL MARSH (s09.1)\r\n\r\nDallas stands slowly, scanning the reeds around him. Nothing much seems out there - just the gentle sway of grass and the disappointed sound of his own breathing.\r\n\r\nDallas pushes through a dense curtain of reeds. Dust motes dance in a whirlwind of color refracting the sunset into jagged prisms on his face. \r\n\r\nDallas steps deeper, following the fading glow. \r\n\r\nAll around him is light reeeds blowing in a whirlwind of light and color. \r\n\r\nAs Dallas' eyes adjust to this new brightness - the world around him slowly blurs. \r\n\r\nThere in the distance Dallas sees a gnarled tree that stands alone among the reeds.  \r\n\r\nDallas approaches the tree and as he does - he notices that inside of the gnarl, curled up, tucked away,  lives a small orb shaped creature - slightly bioluminest - and clearly injured. \r\n\r\nThe creature is a cloudlike - cottonball, powder-puff animal. \r\n\r\nSmall round It skin is fluffy pulsing with a soft glow. Round. Covered in dense, dirty white fur like a dandelion seed head. It looks like a small owl. Its large eyes are closed. With no visible mouth, it looks a bit like a living cotton ball with shivering, transulent ears. \r\n \r\nDallas reaches out. His hand trembles. He touches the creature's back. The creature flinches but doesn't move away. \r\n\r\nDallas hears his equipment beep louder and louder - the closer his hand gets to the creature. \r\n\r\nSuddenly, the wind returns. A violent gust. Shadows in the distance start to fill the sky and hover over Dallas and the creature. Dallas in a daze, slowly grabs the creature and gently places it in his jacket and begins to walk without looking back.\n\n---\n\n\n### Scene 10: The Chase\n\n*ACT I — Arrival & Discovery | ID: shadows-in-wind | File: s10.md*\n\n---\n\n<!-- scene: 10 file: s10.md nickname: shadows-in-wind -->\n\n# Scene 10: The Chase\r\n<!-- nickname: Creature discovery -->\r\n\r\nEXT. TALL GRASS - MOMENTS LATER (s10.1)\r\n\r\nAs Dallas walks out of the tall grass, he gets the sense that something is following him.\r\n\r\nThe air changes and the hum faintly comes back. Then in the distant, more coyotes begin to howl. \r\n\r\nA heavy, crushing sound slices through the reeds—something massive rocketing toward him like an arrow.\r\n\r\nDallas breaks into a sprint. He reaches the stunted cedar tree— where Howie is tied, who is a blur of panic, barking at the wall of grass.\r\n\r\nDallas grabs the leash and doesn't stop running until the marsh is far behind them.\r\n\r\nEXT. BRANFORD MONTAGE (s10.2)\r\n\r\nDallas walks briskly past the same neighborhood route he took before. \r\n\r\nEXT. DALLAS DRIVEWAY (s10.3)\r\n\r\nAt the edge of his driveway, he finally stops—gasping. The creature is motionless in his coat, but its neck glow pulses weak, fading amber.\n\n---\n\n\n### Scene 11: Kitchen Triage\n\n*ACT I — Arrival & Discovery | ID: howie-walk-2 | File: s11.md*\n\n---\n\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n# Scene 11: Kitchen Triage\r\n<!-- summary: Dallas at home with the creature. Kitchen triage—parchment, macro lens. The creature cries; the equipment flares gold. -->\r\n\r\nINT. DALLAS KITCHEN - DUSK (s11.1)\r\nDallas rushes to bring the creature inside. He grabs an aluminion pan and lines it with parchment paper. The creature seems to be asleep. \r\n\r\nHowie barks outside. Dallas rushes to grab him.\r\n\r\nINT. DALLAS KITCHEN - MOMENTS LATER (s11.2)\r\nHowie is in the living room couch nervously peering out the window. Dallas finds himself alone with the creature trying to understand it as he observes its features with thick macro monoculars. \r\n\r\nAs Dallas peers closer, he notices that it has marks underneath its eye. As Dallas touches the marks the creature suddenly wakes up and lets out a cry.\r\n\r\nAs the creature cries - Dallas notices that all of the screens on his equipment transform a sudden burst of golden static. The hue gets so vibrant and bright that permant golden marks are left scattered across all of his equipment near the creature. \r\n\r\nThe creature lets out a final whimper and slowly falls back to sleep. Dallas - looks at the mark again, as its sparkles and then fades. \r\n\r\nINT. DALLAS WORKSHOP (s11.3)\r\n\r\nDallas enters the workshop and grabs a bunch of things. \r\n\r\nDallas begins to construct a livable habit that the creature could live in. He grabs spare objects around his workbench and constructs. \r\n\r\nHe peers over at the creature and notices that it is breathing heavily. He covers it with a blanket - and a makeshift box - as he notices that the light hurts it. \r\n\r\nDallas flicks the switch and the box turns into a redlight. \r\n\r\n\r\nINT. DALLAS DESK - NIGHT (s11.3)\r\n\r\nThe day has turned to night and Dallas is still tinkering with this habitat creation. From it - a bunch of wires are hooked up haphazardly to his makeshift computer. \r\n\r\nDallas is peered over his computer and begins to scan a program between different spectrums. \r\n\r\nDallas tries dials different frequiences to broadcast - but nothing. Dallas look at the recordings of the day that captured and finds that there is a peak on the GHz frequency 115.2GHZ. \r\n\r\nHe listens to the recording. At first, nothing but the usual low-grade rumble of the marsh. Then—a pulse. \r\n\r\nIn the distance Dallas hears the hum again.\r\n\r\nDallas goes over and tends to the creature - but this time it is visually shaken. Dallas sits next to it on a chair and waits for it to calm down. \r\n\r\nDallas puts the creature in his new makeshift box. \r\n\r\nAs Dallas sits - his eyes get heavy - and he suddenly catches himself snoozing. He gets up - and sees Sierra's tape recorder on the desk. He stumbles over for a bit and presses play. A small little melody of Sierra playing piano and singing gently engulfs the air.  \r\n\r\nAs he does, he notices that the creatures' cry begins to cease - but as it does - so does the recording. \r\n\r\nHe replays the clip. But nothing, it is blank. Dallas plays it again, distraught.\r\n\r\nHis elbow brushes the stack of Sierra's folders. One slides open—a corner of a sketch visible. Something golden. He pushes it closed without looking. \r\n\r\nAs he is listening another burst hits the ongoing recording. Dallas looks up from his desk and peers outside. Another faint hum.  \r\n\r\nA doorbell is heard off screen breaking Dallas out of his trance.\r\n\r\nINT. DALLAS' HOUSE - HALLWAY - NIGHT (s11.4)\r\nDallas opens the door to find Dominic.\r\n\r\nDOMINIC\r\nThank you for watching Howie - how did he do? \r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nDallas looks over to Howie who is resting on the sofa, exhausted, sleeping. \r\n\r\nDALLAS\r\nGood\r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nAsher looks behind Dallas at all of the equipment. Dallas hands Howie over to Dominic. \r\n\r\nDOMINIC\r\nOkay - we'll - we'll be on our way. Hey - we're doing a lifegroup tomorrow night at our place - you should come. \r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nDallas peers toward the kitchen.\r\n\r\nDALLAS\r\nYeah, should be good. \r\n\r\nDOMINIC\r\nOkay... Hey - everything okay?\r\n\r\nDALLAS\r\nYeah - sorry - I'm just a little tired. \r\n\r\nDOMINIC\r\nAlright well rest well big guy. \r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nAsher and Dominic and Howie leave and walk into the next side door. Dallas watches them - and then watches the tall grass sway in the wind. \r\n\r\nDallas rushes to the workstation and finds that the creature sleeping peacefully.\n\n---\n\n\n## ACT II — The Creature\n\n---\n\n\n### Scene 12: The Burn Mark & Costco\n\n*ACT II — The Creature | ID: the-burn-mark | File: s12.md*\n\n---\n\n<!-- scene: 12 file: s12.md nickname: the-burn-mark -->\n\n<!-- nickname: THE FIRST NIGHT WITH CREATURE  -->\r\n\r\n\r\nINT. DALLAS DESK - NIGHT - MOMENTS LATER (s12.1)\r\n\r\nDallas is alone. He keeps peering through his late wife's old documents. \r\n\r\nOn the desk is the recorder and all of the tapes next to it.  \r\n\r\nDallas presses play on the recorder and goes to sleep.\n\n---\n\n\n### Scene 13: The Confrontation\n\n*ACT II — The Creature | ID: entering-grass | File: s13.md*\n\n---\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n# Scene 13: The Confrontation\r\n\r\nINT. DALLAS BEDROOM - NEXT MORNING\r\n\r\nDallas awakes with the sunlight hitting his face. He gets up and walks over to his desk. Outside he hears a loud bang and someone cursing in the distance. \r\n\r\nEXT. DALLAS HOUSE - NEXT MORNING (s13.1)\r\n\r\nDominic''s minivan idles in the driveway. Dominic gets out and checks the pressure on one of its tires. \r\n\r\nDominic takes a deep breath and takes off his shoes. He finds a patch of grass and touches it. \r\n\r\nMakayla and Asher wander toward the edge of Dallas's property, kneeling over when they get to the edge. \r\n\r\nDominic walks right up to Dallas' doorway and knocks loudly. \r\n\r\nMAKAYLA\r\nAsher, look.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nTowards the edge of the yard is a jagged, burn mark in the grass that resembles paint splatters on a canvas - scattered across the green grass. It looks as if a drip of yellow blood is around it - acreating a trail towards Dallas' window. At its center lies a small, translucent crystal.\r\n\r\nMakayla kneels and touches it. Her hair flutters, static electricity pulling the strands toward the stone. She quickly pockets it.\r\n\r\nShe pulls her hand back, staring at her palm. A faint, jagged red line—identical to the pattern in the grass—is etched into her skin like a ghost-vein. She rubs it, but it doesn't fade. It feels warm.\r\n\r\nMakayla notices a trail leading from the edge of the grass toward Dallas.\r\n\r\nDallas walks outside and Dominic bangs his hand on the car door. As Do\r\n\r\nDOMINIC\r\nDallas! Gosh what a whirlwind. Listen, I know this is a lot but I'm wondering if you could watch Howie again? Listen, our church has a bible study - you should come. That okay?\r\n\r\nDALLAS\r\nYeah that's fine. \r\n\r\nDOMINIC\r\nGood. \r\n\r\nMAKAYLA\r\nDominic, no worries Mr. Dallas we'll watch Howie. \r\n\r\nDOMINIC\r\nYeah? You trying to get out of the ride to costco? \r\n\r\nMAKAYLA\r\nMaybe. \r\n\r\nDOMINIC\r\nAlright fine - but you owe me one. If your mother comes back before I do tell her I am at costco - and then I got to probably do another thousand things.\r\n\r\nMAKAYLA\r\nOkay.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nDominic drives away. \r\n\r\nEXT. DALLAS's HOUSE -  DOORWAY (s13.2)\r\nMakayla stares at Dallas for a good while - and reads his eyes.\r\n\r\nMAKAYLA\r\nI think we shoud talk.\r\n\r\nDALLAS\r\nYeah?\r\n\r\nMAKAYLA\r\nYes. \r\n\r\nDALLAS\r\nOkay.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla turns and points to the burn marks. \r\n\r\nMAKAYLA\r\nWhat is that outside your house?\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nDallas looks outside, towards the burn marks on the edge of \r\nthe tall grass. His eyes widen. \r\n\r\nDALLAS\r\nI am not sure. \r\n\r\nA whimper is heard from the kitchen. \r\n\r\nMAKAYLA\r\nWhat is that?\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla pushes past Dallas and runs to the kitchen. Asher and Dallas stand \r\nsilent looking at each other for a beat too long. \r\n\r\nINT. DALLAS KITCHEN - MOMENTS LATER (s13.3)\r\n\r\nDallas and Makayla hover around the table at the makeshift aquarium Dallas constructed.\r\n\r\nAsher walks arounds and takes his headphones off and grabs the ruby red headphones on the kitchen table. He puts them on and listens to the recording. \r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla pulls out her portable viewfinder and begins to inspect the creature further. \r\n\r\nMAKAYLA\r\nHow long has it been here for?\r\n\r\nDALLAS\r\nSince last night. \r\n\r\nMAKAYLA\r\nLook at this, look how it breathes.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nThe pair look closer at the creature - it seems to breath through its back. \r\nMakayla touches the creature gently - which causes the screen Oscillator around \r\nit to spark.\r\n\r\nMAKAYLA\r\nWe can't tell anyone about this.\r\n\r\n(action)walks over and\r\nMakayla turns to Dallas who nods in agreement. \r\n\r\nEXT. DALLAS HOUSE - PICNIC BENCH (s13.4)\r\nDallas adjusts his position on the picnic bench and gently walks towards the \r\nedge of the tall grass. \r\n\r\nMAKAYLA\r\nMr. Dallas, where did you find it?\r\n\r\nDALLAS\r\nA couple of miles away. I am not sure exactly. It was during my walk with \r\nHowie.\r\n\r\nMAKAYLA\r\nHow did Howie react to it?\r\n\r\nDALLAS\r\nHe didn't really - I tied him up before I ventured off the trail. \r\n\r\nMAKAYLA\r\nWhy did you take it?\r\n\r\nDALLAS\r\nIt looked like it was injured.\r\n\r\nMAKAYLA\r\nAnd you could fix it? \r\n\r\nDALLAS\r\nI think so. \r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nDallas grabs a heat lamp and begins to examine the creature. Asher in the \r\ndistance stands off, afraid to look at the creature.\n\n---\n\n\n### Scene 14: The Connection\n\n*ACT II — The Creature | ID: creature-rescue | File: s14.md*\n\n---\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n# Scene 14: The Connection\r\nEXT. DALLAS BACKYARD - OLD PICNIC TABLE (s14.1)\r\n\r\nMakayla and Dallas look on the ground for a while as they sit outside the patio. Howie sleeps peacefully near Dallas' feet nearby. \r\n\r\nAsher sits alone a few feet away—he begins to tap on his fingers, and then nods in approval. He takes some string from his pocket and begins to quietly thread various quanity of beads. \r\n\r\nMAKAYLA\r\nWhat do you do when you are sad? \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at Howie and then at Makayla.\r\n\r\nDALLAS\r\nI don't know.\r\n\r\nMAKAYLA\r\nYour wife was an Epistemologist? \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at the sky and then at the ground and then at the burn marks at the edge of the property. \r\n\r\nMAKAYLA\r\nShe studied how fish communicate underwater?\r\n\r\nDALLAS\r\nShe did.\r\n\r\nMAKAYLA\r\nSounds like a smart lady.\r\n\r\nDALLAS\r\nShe was... How did you know that?\r\n\r\nMAKAYLA\r\nHow did I know what?\r\n\r\nDALLAS\r\nHow did you know that my wife was an Epistemologist. \r\n\r\nMAKAYLA\r\nI've read her papers. Read her book.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas nods and looks at the ground.\r\n\r\nMAKAYLA\r\nOur moms gone too. But we're still here and now we are here living with her baby brother - in Branford - - nextdoor to a bioacoustics engineer.... who found the creature I have been looking for my entire adult life... Dallas, what are we going to do? \r\n\r\nDALLAS\r\nI'm not sure. \r\n\r\nMAKAYLA\r\nThat habitat you built. What is that about?\r\n\r\nDALLAS\r\nI think it is senstivie to UV light. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla nods. \r\n\r\nDALLAS\r\nI'm not sure yet. I'll tell you when I find it.\r\n\r\nMAKAYLA\r\nSounds good. Hopefully we all are still here...\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at Makayla with curisoity. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nA gentle breeze blows through the sky. Asher begins to pace around and bob his head a bit back and forth. Suddenly, he stops in his tracks and proceeds to walk slowly into the house. \r\n\r\nMakayla looks back and him and continues to fiddle with the Oscillator.\r\n\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas and Makayla sit for a while on the long old picnic table outside his house. In the distance the creature begins to cry and then it fades. Makayla turns to look and then thinks for a moment. \r\n\r\nMAKAYLA\r\nWe need to document this... Dallas. We can't tell anyone, not until we document this. The sound it made. We should try to record that.\r\n\r\nDALLAS\r\nI've been.\r\n\r\nMAKAYLA\r\nYou've been what?\r\n\r\nDALLAS\r\nI've been recording it's sound and... it seems to be recording back. \r\n\r\nMAKAYLA\r\nWhat do you mean?\r\n\r\nDALLAS\r\nI'm not sure. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe breeze overwhelms them both in the distance they begin to hear the faint pulse of a dark deep hum. \r\n\r\nINT. KITCHEN - CONTINUOUS (s14.2)\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe room grows quiet.  Asher, alone, busies himself trying to connect wires up to the makeshift computer on the counter. He stops as, looks down at the cables and then far off in the distance, then on the ground, then the tall grass. His finger traces something on his leg—the same pattern, over and over. \r\n\r\nOutside the window, the wind picks up. \r\n\r\nAsher begins to tap and tap and tap, and his head begins to shake and shake and shake. He crashes to the ground.\r\n\r\nEXT. DALLAS BACKYARD - OLD PICNIC TABLE - CONTINUOUS (s14.3)\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nA loud thump is heard from outside. Makayla runs into Dalla's kitchen.\r\n\r\nINT. DALLAS' KITCHEN - MOMENTS LATER (s14.4)\r\n\r\nMakayla holds Asher by the head as he shakes on the ground. Makayla begins to sway and hum to him gently. She puts her hand on his chest and he breathes. \r\n\r\nDALLAS\r\nIs he okay? \r\n\r\nMAKAYLA\r\nHe's fine... He's just doing Asher stuff. I think he's just processing. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla takes a deep breath as Asher relaxes. \r\n\r\nMAKAYLA\r\nSit up.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla makes Asher sit up and brings him a glass of water. As she is pouring it - she notices the creature sleeping peacefully below the heat lamp. \r\n\r\nMAKAYLA\r\nI find it interesting that your wife was an epistemologist - you know, they used to think that the sea was silent - but it's not. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks around at his kitchen island - which has turned part into a triage hospital station. A portable oscilloscope is wired up to the creature.  The device pulses in a rhythmic, golden jagged line — in sync with the creature's heartbeat.\r\n\r\nIn the distance they hear howls - and then silence again. \r\n\r\nThe creature begins to fade - Dallas turns the dial into another frequency range and waits until it is asleep. \r\n\r\nMAKAYLA\r\n(to Dallas)\r\nWhat does that do?\r\n\r\nDALLAS\r\n(whispering)\r\nIt changes the frequency I am broadcasting.\r\n\r\nMAKAYLA\r\nWhy are you broadcasting?\r\n\r\nDALLAS\r\nI'm trying to get a response.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe two look at the creature on the table. \r\n\r\nMAKAYLA\r\nIt looks like the creature is responding to it.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla looks at Dallas and then at the creature and pulls out a small prototype from her backpack. \r\n\r\nThe two look at each other for a moment.\r\n\r\nDALLAS\r\nWhat is that?\r\n\r\nMAKAYLA\r\nAn amplifier.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nShe turns to the creature and turns it on. The creature starts to wiggle.\r\n\r\nBehind the creature's smooth sine wave, a second signal appears—jagged, arrhythmic. It pulses in sharp, irregular bursts, riding underneath the creature's frequency like static beneath music.\r\n\r\nMAKAYLA\r\nThat's not coming from the creature. That's drawing from outside.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe group looks at the creature and then at the oscilloscope and then at the sway of the tall grass outside. \r\n\r\nMAKAYLA\r\nDallas - I have to show you something.\n\n---\n\n\n### Scene 14B: The Field Journal\n\n*ACT II — The Creature | ID: the-field-journal | File: s14b.md*\n\n---\n\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n# SCENE 14B : #####\r\n\r\nSCENE 14B: THE FIELD JOURNAL\r\n\r\n\r\ns14B.1 — EXT. DALLAS BACKYARD — OLD PICNIC TABLE — CONTINUOUS\r\nMakayla and Dallas sit in silence. Asher, a few feet off, threads beads onto string — the quantity matters, we just don't know why yet.\r\n\r\nMakayla reaches into her backpack and pulls out a soft-covered field journal. The cover is warped from water, held together with a rubber band. She doesn't open it right away. She holds it in her lap.\r\n\r\nMAKAYLA\r\nMy mom's. \r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nShe sets it on the picnic table between them. Dallas looks at it but doesn't touch it.\r\n\r\nMAKAYLA\r\nYou can look.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nDallas opens it. The first pages are careful — a woman's handwriting, pencil sketches of the marsh, dated entries. \r\nObservations. Frequencies. \r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nA small drawing of a Golden creature in the margin — recognizable. Similar to the one in his kitchen.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nDallas turns the page. The handwriting changes. Younger. Messier. Makayla's. Then Asher's geometric doodles. The sketches get more detailed. Different Golden creatures at different sizes.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nDallas turns another page and stops.On the left side of the spread: a Golden creature, curled, peaceful. On the right side: the same body — same proportions, same ears, same frame — but wrong. Transparent fur. Black veins under the skin. Eyes, where there weren't eyes before. Red.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nAn arrow between them. No words.\r\n\r\nDALLAS\r\n(quiet)\r\nWhat am I looking at?\r\n\r\nMAKAYLA\r\nThat's what I wanted to show you.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nDallas stares at the page. His thumb traces the arrow.\r\n\r\nDALLAS  \r\nThey're the same.\r\n\r\nMAKAYLA\r\nThey're the same.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nA beat.\r\n\r\nDALLAS\r\nOne turns into the other?\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nMakayla looks at Asher. He's stopped threading. He's listening, but not looking up.\r\n\r\nMAKAYLA\r\nDon't know for sure. \r\n\r\nDALLAS\r\nWhat's your guess?\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nMakayla doesn't answer right away. She picks at a splinter on the picnic table.\r\n\r\nMAKAYLA\r\nWhen they get hurt. They change.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nDallas looks toward the kitchen window. Toward the creature inside.\r\n\r\nDALLAS\r\nThe one I found was injured.\r\n\r\nMAKAYLA\r\nI know.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nA gust of wind moves through the tall grass at the edge of the property. Asher's head turns toward it. Just slightly.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nDallas closes the journal carefully.\r\n\r\nDALLAS\r\nYour mom saw one? \r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nMakayla doesn't answer.\r\nThe wind picks up again. In the far distance, barely audible — not quite a howl, not quite a hum. Something in between.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nAsher stops threading.\r\n\r\nASHER\r\n(quietly, to himself)\r\nThey're listening.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nMakayla and Dallas both turn to him. He doesn't elaborate. He goes back to his beads.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nMakayla picks up the journal and slides it back into her pack.\r\n\r\nMAKAYLA\r\nWe should go inside. Check on it.\r\n\r\n<!-- scene: 14B file: s14b.md nickname: the-field-journal -->\n\n(action)\nThey stand. Dallas glances back at the tall grass one more time before following her in.\n\n---\n\n\n### Scene 14C: The Almost Discovery\n\n*ACT II — The Creature | ID: the-almost-discovery | File: s14c.md*\n\n---\n\n<!-- scene: 14C file: s14c.md nickname: the-almost-discovery -->\n\nINT. DALLAS HOUSE – LATE AFTERNOON (s14c.1)\r\n\r\nLate-day light leaks through the kitchen blinds. The creature is hidden beneath a towel inside the makeshift enclosure. A SOFT, IRREGULAR HUM bleeds faintly into the room.\r\n\r\nMakayla stands rigid at the counter, tightening a cable connection that doesn’t need tightening.  \r\nAsher sits cross‑legged on the floor, threading beads. His fingers pause.\r\n\r\nA KNOCK at the door.\r\n\r\nAll three freeze.\r\n\r\nAnother knock—cheerful, familiar.\r\n\r\nDOMINIC (O.S.)\r\nDallas? You home? Janice said you might have our step ladder.\r\n\r\nMakayla and Dallas lock eyes.\r\n\r\nDALLAS\r\n(low)\r\nStay quiet.\r\n\r\nMakayla shakes her head—already moving.\r\n\r\nMAKAYLA\r\nWe can’t act weird.\r\n\r\nAsher begins tapping his fingers faster.\r\n\r\n---\r\n\r\nINT. DALLAS HOUSE – FRONT ENTRY – CONTINUOUS (s14c.2)\r\n\r\nDallas opens the door. Dominic stands there, winded, holding Howie’s leash.\r\n\r\nDOMINIC  \r\nThere he is! Hey—sorry to bug you. The storm knocked something loose on our gutter.\r\n\r\nHowie tries to pull past Dominic—ears flat, tail stiff.\r\n\r\nDOMINIC  \r\nHe’s been like this all afternoon. Won’t stop staring at your backyard.\r\n\r\nDallas forces a smile.\r\n\r\nDALLAS  \r\nWeather’s been strange.\r\n\r\nDOMINIC  \r\nTell me about it—Pat’s already texting doom.\r\n\r\nThey share a short laugh. The HUM beneath the house deepens—to almost imperceptible.\r\n\r\nDominic tilts his head.\r\n\r\nDOMINIC  \r\nYou hear that?\r\n\r\nDALLAS  \r\nHear what?\r\n\r\nDominic listens another beat. Shrugs.\r\n\r\nDOMINIC  \r\nProbably my sinuses. Allergies. Or ghosts.  \r\n\r\n(then)  \r\nMind if I set the ladder by your fence?\r\n\r\nDALLAS  \r\nSure.\r\n\r\n---\r\n\r\nINT. DALLAS KITCHEN – CONTINUOUS (s14c.3)\r\n\r\nDominic steps inside. The HUM vibrates a glass of water on the counter—just enough to ripple.\r\n\r\nMakayla slides between Dominic and the enclosure casually.\r\n\r\nMAKAYLA  \r\nHey Uncle Dom.\r\n\r\nDOMINIC  \r\nOh—hey kiddo.\r\n\r\nHe eyes the equipment scattered around.\r\n\r\nDOMINIC  \r\nWow. Place looks like NASA threw up.\r\n\r\nDALLAS  \r\nWork stuff.\r\n\r\nDOMINIC  \r\nYou educators—always overprepared.\r\n\r\nAsher’s bead string slips from his fingers and CLATTERS to the floor.\r\n\r\nDOMINIC  \r\nHey buddy.\r\n\r\nAsher doesn’t respond.\r\n\r\nDominic steps once more toward the counter—toward the towel.\r\n\r\nMakayla moves **immediately**.\r\n\r\nMAKAYLA  \r\nSo—uh—Janice said you were fixing the porch light too?\r\n\r\nDOMINIC  \r\nYeah—\r\n\r\nThe creature STIRS beneath the towel. A muted WHIMPER—felt more than heard.\r\n\r\nThe oscillators flicker GOLD for half a second.\r\n\r\nDominic freezes.\r\n\r\nDOMINIC  \r\nOkay. That—\r\n\r\nMakayla reaches out and SLAMS a power switch. Darkness. Silence.\r\n\r\nHowie WHINES softly.\r\n\r\nA beat.\r\n\r\nDOMINIC  \r\n…Storm’s coming quick.\r\n\r\nMakayla smiles too fast.\r\n\r\nMAKAYLA  \r\nWe should all stay inside tonight.\r\n\r\nDominic nods slowly. Something unsettled—but unspoken.\r\n\r\nDOMINIC  \r\nYeah.  \r\n(then, lighter)  \r\nAlright—ladder can wait. Dinner smells like it’s burning anyway.\r\n\r\nHe turns to leave.\r\n\r\nAt the door, Dominic pauses.\r\n\r\nDOMINIC  \r\nDallas?\r\n\r\nDALLAS  \r\nYeah?\r\n\r\nDOMINIC  \r\nIf you ever need help—  \r\n(gestures vaguely)  \r\n—with whatever this is… just ask.\r\n\r\nDallas nods.\r\n\r\nDominic leaves.\r\n\r\nSilence.\r\n\r\nAsher finally exhales.\r\n\r\nASHER  \r\n(quiet)\r\nThat was close.\r\n\r\nMakayla doesn’t answer. She stares at the towel—at the faint GOLDEN GLOW bleeding through.\n\n---\n\n\n### Scene 15A: The Failed Test\n\n*ACT II — The Creature | ID: the-failed-test | File: s15a.md*\n\n---\n\n<!-- scene: 15A file: s15a.md nickname: the-failed-test -->\n\nINT. DALLAS WORKSHOP – EVENING (s15a.1)\r\n\r\nThe room is dim, controlled. Every light filtered red.  \r\nThe creature rests inside its enclosure, watching—alert now.\r\n\r\nMakayla adjusts the oscillator carefully.\r\n\r\nMAKAYLA  \r\nLow amplitude. No broadcast outside the room. And if it, reacts badly - we stop. \r\n\r\n<!-- scene: 15A file: s15a.md nickname: the-failed-test -->\n\n(action)\nAsher stands in the corner, tense.\r\n\r\nMakayla nods—a count—and gently brings the signal online.\r\n\r\nA pure tone hums.\r\n\r\nThe creature lifts its head.\r\n\r\nIts ears twitch—not in fear—but recognition.\r\n\r\nIt emits a SOFT, QUESTIONING NOTE.\r\n\r\nThe oscilloscope spikes—mirroring the sound.\r\n\r\nMakayla smiles.\r\n\r\nMAKAYLA  \r\nSee? It’s—\r\n\r\nSuddenly the creature SHUDDERS.\r\n\r\nThe golden light falters—fractures—echoing strangely.\r\n\r\nNot pain.\r\n\r\nLoneliness.\r\n\r\nAsher steps forward sharply and CUTS THE POWER.\r\n\r\nSilence.\r\n\r\nThe creature curls in on itself.\r\n\r\nMakayla stares at the dead screen. Swallows.\r\n\r\nMAKAYLA  \r\nI… didn’t mean—\r\n\r\nASHER  \r\nYou interrupted it.\r\n\r\nMakayla looks at him.\r\n\r\nASHER  \r\nIt was talking to something else.\r\n\r\nBeat.\r\n\r\nDALLAS  \r\nSomething outside?\r\n\r\nAsher nods.\r\n\r\nASHER  \r\nYou called it away.\r\n\r\nMakayla slowly kneels beside the enclosure—not touching.\r\n\r\nMAKAYLA  \r\nI thought we were helping.\r\n\r\nThe creature peeks one eye open. The glow returns—dim, wary.\r\n\r\nMakayla finally understands.\r\n\r\n``\n\n---\n\n\n### Scene 15B: Makayla's Tracking Box\n\n*ACT II — The Creature | ID: the-tracking-box | File: s15b.md*\n\n---\n\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n# Scene 15: Makayla's Tracking Box\r\n\r\nEXT. NEIGHBORHOODS - EVENING (s15.1)\r\nThe crew walk towards the neighborhood and begin the long process of making their journey down golden hour filled woodland area - as they approach a big field open field. At the end of the field are some tall trees. Dallas stops and peers around. \r\n\r\nMAKAYLA\r\nDid you know that peptide crystals conduct electricity? \r\n\r\nDALLAS\r\nI've heard. \r\n\r\nMAKAYLA\r\nEverything does... which begs the question - what exactly is electricity? \r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nThe crew walk into the field and find a small wooden chest on the ground, hidden beneath a field of tall grass. \r\n\r\nEXT. MAKAYLA'S SPECIAL WOODED SPOT - CONTINUOUS (s15.2)\r\nAs they approach the structure, they can see that it is a small wooden structure hidden by fallen trees and branches. \r\n\r\nInside the structure there is a wooden box. Makayla opens it. Inside there are various trail cameras and recording equipment. On the bottom of the box, Makayla pulls out various cables and wires connected to a  small crystal. \r\n\r\nOne device in particular intrigues Dallas. It is an old cart that has a perptual motion machine on it. Dallas walks over to it and admires it.\r\n\r\nMAKAYLA\r\nThat's our attempt at a perpetual motion machine...\r\n\r\n\r\n\r\nMAKAYLA\r\nDon't worry Mr. Dallas - soon you'll hear all about my brother's inventions - they are going to change the world... He just needs to rest a bit. \r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nDallas looks at one of the inventions on the ground. \r\n\r\nMAKAYLA\r\nDo you believe in fate Mr. Dallas?\r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nDallas shakes his head no. \r\n\r\n<!-- scene: 15B file: s15b.md nickname: the-tracking-box -->\n\n(action)\nMakayla picks up a small flower that l
