  <script>
    const markdown = "# Creatures in the Tall Grass Script — Full Script\n\n*Compiled on 3/14/2026, 8:04:01 AM*\n\n---\n\n\n## ACT I — Arrival & Discovery\n\n---\n\n\n### Scene 1: Arrival & Discovery\n\n*ACT I — Arrival & Discovery | ID: arrival | File: s01.md*\n\n---\n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n<!-- nickname: arrival -->\n<!-- summary: New house, tall grass. He finds a rig in the reeds. Makayla and Asher want his oscillator. -->\n\nEXT. DALLAS NEW HOUSE - DAY\n\nDallas stares at the Tall Grass outside his house as he unloads boxes from a big pile. Dallas scans the new backyard, there are some old rusty lawn furtniture and a picnic table that seems to be adjacent to a fence of grass \n\nDallas goes into the grass a little bit and as he does he notices that there is a makeshift trailcam - a small camera rig on a stick. Upon further examination he notices that it is not a trap but a recording device of sorts. \n\nAs Dallas examines he hears a distinct bicycle ring.\n\nMAKAYLA, 22 and ASHER, 14 — approach on bikes. They watch Dallas for a while.\n\nThey approach Dallas slowly as one of the boxes draws their curiousity. Makayla watches Dallas pull out a military grade Oscillator.\n\nMAKAYLA\n(to Asher but loud enough for Dallas to hear)\nYou know that could be used to track the baseline between the cries of the Binzos and the howls of the Oragraph. But neither really matters if a Nidus is forming. That's an apex predator situation. \n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nAsher nods with his headphones on. Makayla approaches Dallas. \n\nMAKAYLA\nHello there\n\nDALLAS\nHello.\n\nMAKAYLA\nI'm Makayla.\n\nDALLAS\nDallas. \n\nMAKAYLA\nNice to meet you.\n\nDALLAS\nYou too.\n\nMAKAYLA\nDid you just move here?\n\nDALLAS\nYes\n\nMAKAYLA\nDid you turn off my trap?\n\nDallas\nNo. \n\nMAKAYLA\nIs that an Oscillator?\n\nDALLAS\nYes. \n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nMakayla looks at Asher and whispers something in his ear. He nods. She returns glances to Dallas and inches her bike closer. \n\nMAKAYLA\nDo you think my brother Asher could borrow it some time? \n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nDallas looks at the Oscillator and then at Asher.\n\nMAKAYLA\nHe'll need it. \n\nDALLAS\nWhat would he need it for?\n\nMAKAYLA\nTell him Asher. \n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nAsher stands silent, still tracing a pattern on his palm. He doesn't look up.\n\nMAKAYLA\nDoes it work?\n\nDALLAS\nIt does.\n\nMAKAYLA\nWhat is the range on it?\n\nDALLAS\nI'm not sure.\n\nMAKAYLA\nWell okay. Asher, do you have any more questions?\n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nMakayla turns to Asher. He shakes his head no—still not looking up, finger moving on his palm. \n\nMAKAYLA\nOkay then. Good to know. Can we borrow it?\n\nDALLAS\nSure.\n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nMakayla and Asher peddle their bikes away with their new oscilattor.     Dallas watches curiously and then peers at the swinging breeze of the tall grass. \n\nDallas looks down at a box of old equipment and stretches down to pick it up. \n\n\n---\n\n\n### Scene 2: Dallas Night\n\n*ACT I — Arrival & Discovery | ID: dallas-night | File: s02.md*\n\n---\n\n<!-- scene: 02 file: s02.md nickname: dallas-night -->\n\n# Scene 2: Sierra's Box\n<!-- summary: Can't sleep. Golden flicker in the grass. He opens Sierra's box; the hum starts; the battery dies. -->\n\nINT. DALLAS KITCHEN - SUNSET\nDallas looks at his new surroundings and begins to take out silverwear out of a box labelled \"Kitchen\". \n\nCUT TO:\n\nThe Kitchen is spotless and well organized for what it is. Dallas takes out a bag of groceries and gets some flour and some dough. He hasitly begins to put forth a pizza. \n\nA noise is heard off screen. \n\nEXT. DALLAS DRIVEWAY\nDallas goes outside hands still covered in flour. he stares for a while at the edge of his property - along it a long fence of conneticut's finest natural tall grass. \n\nINT. DALLAS NEW HOUSE - NIGHT\n\nDallas struggles to fall asleep in his new home. He hears strange noises from outside. As he looks out the window he sees a flicker of a faint gold light. \n\nCurious and awake - Dallas heads downstairs and begins to unpack boxes. The room is sparse, filled with a few pieces of furniture.\n\nDallas opens up the box to find sketches of butterflies and caterpillars and loads of curious insects drawings. As he turns the pages, the butterflies and the drawings turn more into creatures with wings.  Angels.  One of the folders slips open as he lifts it—inside, a glimpse of hand-drawn sketches and a tab labeled \"FIELD NOTES — BRANFORD.\" He flips through some of the pages, some showing sketches of the grass and a golden creature. And a bunch of math. Dallas closes it without looking and sets the stack aside.\n\nIn the bottom of the box, covered in dust, sumberged by cables, Dallas finds and pair of retro, ruby-red headphones. Next to the headphones is a small casette player. On the back of the player, Dallas peels back a piece of duct tape to reveal a photo sticker. A photo of Dallas and a woman, both sporting heavy audio headsets, laughing as they capture noise in a field of grass. Dalla's thumb rushes over her face. Dallas thumbs over the play button but fails to. \n\nOn the side on the inside of the headphone, Dallas peels back a piece of duct tape to reveal a photo sticker. The photo shows Dallas and a woman, both wearing heavy audio headsets, laughing in a field of grass. Dallas's thumb rushes over her face. \n\nDallas gently closes the box of headphones and gear. He takes a deep breath and opens up another box laying adjacent. He carefully pulls out a heavy military-grade desktop audio recorder, another portable audio recorder, and a small portable Oscillator. \n\nINT. DALLAS BATHROOM - NIGHT\n\nDallas takes a shower - and as he zones out from the sounds of the hot water, a faint hum interrupts from the far outside. \n\nDallas dries off and peers through his steamy bathroom window as the hum grows louder. \n\nINT. DALLAS DOWNSTAIRS - NIGHT\nDallas rushes downstairs as the hum grows louder. Dallas, recorder in hand, scrambles toward the window and brings to record. The needle spikes. Dallas begins to adjust the dial - and begins to hear a whimpering faint, pure, harmonic tone. The sound abrutly stops. And then it starts up again. The sound abrutly stops. And then starts up again. This time in a pulsing pattern. Dallas looks at his watch and begins to time it. One Second. Stop. One second - top. Five seconds. Three seconds. \n\nSuddenly hum sounds like it is moving away and its loudness begins to grow faint. Looking down at the his recording, Dallas notes a spike in the waveform on the low frequency range. \n\nThe battery dies on the recorder. Dallas smacks the back in fustration. Scrambling, he tears through a box of equipment for but none of them have batteries. \n\nFrustrated, Dallas abandones the equipment and heads for the door. \n\nEXT. DALLAS HOUSE - NIGHT\n\nDallas stands alone watching the tall grass sway agaisnt the salt breeze. Coyotes howl in the distance and the hum decreases in scale and size as the starry night disappears into the distance of the tall marsh grass.\n\nINT. DALLAS HOUSE - BEDROOM - NIGHT\n\nDallas struggles to go to sleep. His eyes fixed on the ceiling, he hears more faint cries and looks out the window and then from outside his window he sees, a faint golden glow, pulse - once. twice. five times. three times. \n\nIn the distance a storm brews. A thunderstorm. \n\n\n---\n\n\n### Scene 3: The Hum\n\n*ACT I — Arrival & Discovery | ID: the-hum | File: s03.md*\n\n---\n\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n<!-- nickname: Meet the Neighbors -->\n\nEXT. DALLAS HOUSE - NEXT DAY MORNING\nDallas walks outside his house, towards the edge of the property. As he approaches the edge of his yard he watches the tall grass sway in the wind. He looks at the grass for a beat too long, as he nurses the audio recorder in his hand. As he does so, he becomes dazed.\n\nAs Dallas dazes onward, a man approaches him from the sidewalk near his house. \n\nDOMINIC AMARANTO, early 40s, wearing a bright salmon covered short sleeve button walks right up to Dallas with vigor. \n\nDOMINIC\nNeighbor!\n\nDALLAS\nWhat's that?\n\nDOMINIC\nNeighbor, neighbor - you're my neighbor - I think we're neighbors. Hey! Dominic - nice to meet you - I live nextdoor - did you just move here?\n\nDALLAS\nOh yeah - nice to meet you.  \n\nDOMINIC\nYeah, put her there. I'm Dominic... So you must be here on some university position? Last guy who was here was here for 3 years and then moved to Guilford. How is the house? Do they furnish it? \n\nDALLAS\nYeah. \n\nDOMINIC\nNice - who you work for Yale?\n\nDALLAS\nQuinnipiac nice... Sorry - what's your name? \n\nDALLAS\nDallas\n\nDOMINIC\nDallas? Dallas, what a name - where you from? \n\nDALLAS\nIndiana.\n\nDOMINIC\nIndyANNA - far from Branford. \n\nDALLAS\nYeah.\n\nDOMINIC\nWhat you know about Branford?\n\nDALLAS\nNot much. \n\nDOMINIC\nSo what brings you to here?\n\nDALLAS\nWork.\n\nDOMINIC\nOh yeah? What kind of work?\n\nDALLAS\nResearch mostly. \n\nDOMINIC\nOoo - big guy - Yale? \n\nDALLAS\nQuinnipiac \n\nDOMINIC\nOooo - right on - nice. What kind of research?  \n\nDALLAS\nBioacoustics. \n\nDOMINIC\nBio-acoustics. That's the study of sound - yeah? Yeah. Right on. Alright listen - I'm about to head to the green right now - you up for a walk? My car is parked down in the center of town and I need to go get it... What's that in your hand?\n\nDALLAS\nAn audio recorder. I was going to go into town anyway to get it. \n\nDOMINIC\nOh yeah? Rudy's got that. Let's go - I'll buy you a coffee.\n\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDallas accepts. The two begin to wander off toward. Branford. \n\nEXT. BRANFORD NEIGHBORHOOD - MOMENTS LATER\n\nDallas and Dominic begin to walk down the sidewalks towards town. \n\nDOMINIC\nYou don't have a car?\n\nDALLAS\nNo - no car.\n\nDOMINIC\nYeah. Me neither - well I drive - for sure, but yeah, I share one with my sister.\n\nEXT. TOWN BRANFORD MONTAGE\n\nDallas and Dominic through coastal sidewalks, neighborhoods, and natural marsh fences. As they approach one patch of tall marsh grass in particular, Dallas stops.\n\nDallas, checks if Dominic is looking and when he isn't - he takes records a bit with the audio recorder and points it's microphone toward the grass. \n\nDOMINIC\n(spotting Dallas)\nBe careful - I heard some coyotes up in that the other night when I was walking Howie. Some people say the noises are from owls - but I know its coyotes. \n\nEXT. TOWN CENTER - DAY\nDallas and Dominic walk toward a small hardware store. \n\nINT. HARDWARE STORE\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDominic waves to the unfriendly man at the counter and brings Dallas to the battery section. \n\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDallas finds the correct batteries and grabs it off the shelf. The two exit the shop.\n\nEXT. BRANFORD GREEN\n\nDallas and Dominic walk past the town green. The building looks closed. Dominic stops dead. A neon orange ticket flutters under his windshield wiper.\n\nDOMINIC\nOh, this is great. Cool. \n\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nHe rips the ticket off and walks around to see if anyone is looking, he crumbles it up and puts it in his pocket. Dominic takes out an inhaler out of his pocket and takes a massive rip. \n\nHe bends downs and grabs a key from the bottom of the car and starts it up. \n\nINT. DOMINIC's SISTER's CAR\n\nDominic opens the car and gestures Dallas to get in - non-chantanly the parking ticket in the glove box. \n\nDOMINIC\nYou hungry?\n\nDALLAS\n(still in a daze)\nYeah\n\nDOMINIC\nGood -  my church is doing a fellowship lunch - little picnic - I'm on cleanup duty and got to lock up when they are done. I could drop you off home first but it would be out of the way - You want to come for the ride? \n\nDALLAS\nSure. \n\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDominic drives towards the church. \n\nDOMINIC\nNice - yeah - it's nice to be the new guy in town - good old branford. \n\n\n\n\n\n---\n\n\n### Scene 4: The Fellowship\n\n*ACT I — Arrival & Discovery | ID: fellowship | File: s04.md*\n\n---\n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n<!-- nickname: fellowship -->\nEXT. CHURCH FELLOWSHIP LAWN - LATE AFTERNOON\n\nDallas and Dominic arrive at CPC and find themselves in heat of a picnic. Children are running, friends down light summerwear as they play spike ball, and church goers find themselvees are on a long line for food. \n\nDallas looks around at all of the new faces but does not make great eye contact. Dominic takes a deep breath and approaches the long line. \n\nDominic carries a package of water and puts it under one of the fold up tables. As he does so, people look at Dallas and begin to greet him. \n\nDOMINIC\nLine is long today - they must got Nicas. Everyone's all downing what they can before the storm. \n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nAs they wait in line, people begin to turn around and talk to them. One lady, MARY, 55 turns around and shakes Dallas' hand enthusiastically.\n\nMARY\nWell hey there sunshine - what's your name?\n\nDALLAS\nDallas\n\nMARY\nDallas... Dallas, Dominic where did you get this Califorina boy from? My name is Mary - do you like chicken primevera?\n\nDALLAS\nNever really had it.\n\nMARY\nWell you should, its great.... So you ready for some proper New England weather?\n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nAnother turns around and greets Dallas. An older gentleman PAUL WILDLY, 72, approaches. \n\nPAUL\nThey claim it'll be historic. Apparently, we haven't had a storm like this since 1971 when Nixon took the US off the gold standard. Paul, nice to meet you. \n\nDALLAS\nDallas. \n\nPAUL\nNow, where are you from?\n\nDALLAS\nIndiana\n\nPAUL\nOo - then you must know of William Henry Harrison - our 9th president, served as Indiana's governor back when it was just a terriority. \n\nMARY\nPaul, stop that. Honey - if you need I can make you some chicken primevera tonight. \n\nDOMINIC\nHe's okay, Ms. Mary thank you. \n\nDALLAS\nThank you. \n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nDallas and Dominic sit in a circle of folded pull up chairs. \n\nJANICE AMARANTO, Mid 50s, approaches the line holding a small dog in her arms. She taps Dominic's shoulder.\n\nDOMINIC\n(greeting the dog)\nHowie.\n\nJANICE\n(greeting Dominic)\nYeah - he's doing much better. He's been having little scares hasn't heeeee - the thunder last night really scared him - he doesn't like the thunder. Dominic, listen, you all set for dinner? You got the brussel sprouts?\n\nDOMINIC\nGot them. Should be good to go. \n\nJANICE\nThanks again little brother. Listen - did you give Mr. Mike his mediciation? - He has to take them now at 4:30pm - an hour or so before dinner. Make sure he takes it with some cheese or something. \n\nDOMINIC\nYes.\n\nJANICE\n(noticing Dallas)\nWhat's wrong you for not introducing me to your friend Dominic  - who is this? \n\nDOMINIC\nDallas.\n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nDallas smiles and puts out his hand.\n\nJANICE\nNice to meet you Dallas. Dominic hold Howie for a second I go to go make sure that I didn't lock the car. \n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nJanice abrutly leaves. \n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nMakayla and Asher approach from afar to the line. \n\nDOMINIC\nDallas, these are my niece and nephew - Makayla and Asher.\n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nMakayla and Asher don't make direct eye contact with Dallas but fake a polite smile. Makayla taps Asher's headphones and nods toward the far end of the church lawn. Between the bushes and garden. \n\nThe two leave the line walk over to a corner spot by the end of the church yard and huddle over a pile of brush.\n\nDallas takes a bite of his chicken but doesn't eat much. He's distracted by what Makayla and Asher are looking at the distance. \n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nThey finish eating. The group begins to disperse. \n\n---\n\n\n### Scene 5: Marsh Trail\n\n*ACT I — Arrival & Discovery | ID: marsh-walk-later | File: s05.md*\n\n---\n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n# Scene 5: The Merlin App\n<!-- summary: Boardwalk through the reeds. They hear birds andSomething moving in the marsh. -->\n\nEXT. MARSH TRAIL - LATER\nThe sun is dipping. Dallas and Dominic walk back home - along a wooden boardwalk that cuts through the tall, golden-yellow reeds.\n\nDominic and Dallas walk quietly for a while. Dominic looks out to the tall grass.\n\nDOMINIC\nThe kids are always out here planting down cameras. Makayla says that they are geotagging or something. I don't know. \n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nThe two hear a distant cry - that could be a bird. Dallas looks at Dominic.\n\nDOMINIC\n(to himself)\nYeah.\n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDominic pulls out his phone, tapping an app.\n\nDOMINIC\nHey check this - It listens to the chirps and tells you the species. They got a lot of offspree here - Coastal stuff mostly—Egret, Plover. You should get it if you're working at Quinnipiac.\n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDominic struggles to get the app to work and begins to pace a bit. \n\nDOMINIC\nYeah - I wanted to be a writer but it never really worked out - but I'm writing now - maybe one day I'll tell a story of these marlins.\n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nHe grabs his Asmatha inhaler and takes a deep breath.\n\nDOMINIC\n(in anger)\nSometimes I wonder if this all is just make believe.\n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDallas looks onward empathically. \n\nDALLAS\nWhat do you mean?\n\nDOMINIC\nThis whole existence - being alive - its so overwhelming and then boom - you are gone. \n\nDALLAS\nYeah.\n\nDOMINIC\n(to himself)\nBoom - Gone. \n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDallas and Dominic walk slowly and Dallas looks out to the tall grass for a while. \n\n\n---\n\n\n### Scene 6: News Vans & Trash Cans\n\n*ACT I — Arrival & Discovery | ID: news-vans | File: s06.md*\n\n---\n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n# Scene 6: News Vans\n<!-- summary: News vans in the street. Pat on camera. Marks on Dominic's driveway. Dallas strays and stays. -->\n\nEXT. BRANFORD NEIGHBORHOOD - CONTINUOUS\n\nDallas and Dominic reach back to their neighborhood. Outside, nestled between their house, three news vans are parked haphazardly. \n\nDominic parks the car and the two get out to see. \n\nPAT CLENDENEN, MID 50s, is outside their house in front of news cameras. \n\nPAT CLENDENEN\n(to camera)\nHey Rob, thanks for having me on. Out here today in my hometown of Branford, CT. Pretty excited to be back home. So if you are in anywhere in costal connecticut, all the way up to Rhode Island today, some parts of southern mass all the way towards Boston. This is New England weather for you, always unpredictable - always on the bleeding edge....So in that spirit, today we'll see sun to clouds, breezy, warm with a late day shower possible. But the real attention - and the reason we are here - is to bring attention to a possible development along the shores.... We are staying on top of a trend through the rest of this week - as any shift could dramatically impose a threat - this costasl community. act the entire state. The european models are showing signings that we might be in for a big one and while we're all hoping the Nor'easter stays out at sea, the current models suggest a wild weekend for the shoreline. \n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDominic scoffs as they walk past.\n\nDOMINIC\nPat's been predicting the end of the world every Tuesday for ten years.\n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nThe camera cuts. Pat notices Dominic and waves at him from afar. \n\nPAT CLENDENEN\nDominic! See you Thursday! \n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDominic waves back at Pat. He looks at Dallas and shrugs. The two continue past the news vans.\n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nThe wind gusts, catching a news umbrella and nearly toppling it. The hum in Dallas's pocket recorder spikes for a split second.\n\nEXT. DOMINIC'S HOUSE \n\nThey arrive back at Dominic's. Two large plastic trash bins are sprawled across the driveway, trash strewn everywhere.\n\nDOMINIC\nLook at this. Those raccoons! \n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDominc takes a deep breath and takes a hit of his inhaler.\n\nDOMINIC\nI try to do the right thing and I keep getting kicked. \n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDominic kicks a stray milk carton. He looks at the garbage cans around his house, then at Dallas.\n\nDOMINIC\nListen, I got to get the furniture before Janice has her women's group tonight. I got to go check on Mike and bring in another fan from the basement. You good? \n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDallas notices that there are some weird burn marks on the ground. He gazes at them for a bit of time. The burn marks are like black sands, not disimmilar to veins on the ground. \n\nDallas walks over to the burn marks and touches them. He looks at his skin reacts a bit to the marks and he takes a little nearby leaf with the mark and puts it in his pocket. \n\nDALLAS\n(hesitates)\nYeah\n\nDOMINIC\nDo you want to stay for a bit?\n\nDALLAS\nSure.\n\n\n---\n\n\n### Scene 7: The Coordinates\n\n*ACT I — Arrival & Discovery | ID: the-coordinates | File: s07.md*\n\n---\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n<!-- nickname: the-coordinates -->\nINT. JACE'S BASEMENT \nDallas looks around in amazement. The basement is covered with normal basement things - but as his eyes scan the room he notices that there are two beds, room, and clutter. Around the corner there is a workstation filled with old CRT machines and what not.\n\nDOMINIC\nThis was formerly our basement - but my niece and nephew live here now. They love that basement vibe. Here, help me grab the fan. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at all of the different audio and acoustic devices scattered across the room. On the wall - there are numbers and markings similar to the three beats he wrote down. \n\nDominic taps Dallas on the shoulder, breaking him out of his gaze and together they slowly move the AC unit upstairs. \n\nINT. DOMINIC'S BASEMENT\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic helps Dallas shove a heavy oak table against the wall. As they move - Dominic knocks over a photo frame - and Dallas grabs it. On the ground is a small, framed photo of a woman and a young boy on Dominic's shoulders.\n\nDominic bends down to grab the photo for a bit. \n\nDOMINIC\nDo you have kids?\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic hands Dallas the photo. \n\nDALLAS\nNo. \n\nDOMINIC\n(looking at the photo)\nI had a family once. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas falls mute. \n\nDOMINIC\nNo kid now, no wife now. Just the niece and nephew. Janice and Mr. Mike. My lot in life. I'll take it.\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic takes a hit of his inhaler. And reaches out for a handshake. \n\nDOMINIC\nIt has been nice hanging out with you Dallas - thanks for coming and helping today. \n\nDALLAS\nOh you're welcome. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic scans the room and finds his gaze upon the corner. MR. MIKE (mid 70s) begins to wake up from his  rocking chair, staring fixedly at the floor. Mr. Mike begins to scratch something into the wood of the end table with a jagged nail.\n\nDOMINIC \nMr. Mike! Mr. Mike, what are you doing?! \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike suddenly looks up, his eyes milky but sharp. He points a finger at the window.\n\nMR. MIKE\nSorry, I had to write something down. Dominic. \n\nDOMINIC\nYeah?\n\nMR. MIKE\nShe's here!\n\nDOMINIC\nWhose here? Why are you scratching the table?\n\nMR. MIKE\nYour sister. Makayla. Asher\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic dashes for the door and opens it. In pops Janice with Makayla and Asher. \n\nAsher runs straight towards Mr. Mike and kneels down before him. Makayla side eyes Dallas. \n\nMR. MIKE \nOne. ONE. FIVE. THREE. She's here - Dominic - Janice is here - ASHER! Is that you? Come here. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike points to the window. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nAsher's eyes widen when he sees what Mr. Mike has been writing. He already has his sticky note out; he copies the numbers, taps the page twice, then runs to Makayla and shows her. She puts the note in her pocket. \n\nJANICE (Early 50s) marches in, balancing two bags of groceries and a set of keys between her teeth. Makayla walks over and helps with a bag and hands Asher the keys. \n\nJANICE\n I-95 you know how it is. Listen, Dominic, what's the status - how we doing on the sprouts? You need to boil them first and then sear them. Alright? Last time you just boiled them and it didn't work... Dallas, you got to teach your friend here how to cook. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nJanice begins a frantic search for her keys, which she just put down. She stumbles upon Dallas's heavy audio recorder.\n\nJANICE \nWhat is this? A boat anchor?\n\nDALLAS\nIt's a recorder. \n\nJANICE\nA recorder? You taping this conversation? I'm kidding, you could, la la la la laaaa. Dallas do you want to have some dinner with us? \n\nDALLAS\nUm, no - I should be going back. Thank you though.  \n\nJANICE\nYou sure honey? \n\nDOMINIC\nYeah Janice, Dallas needs to settle a bit. \n\nDALLAS\nYeah, I got some food back at home, so, I'll be okay.  \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike in the distance begins to get agitated. He rocks slowly in his rocking chair and taps his fingers. \n\nMR. MIKE\nThey are being hunted. Javerias told me. They are being hunted.\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla walks over to Asher, who is still kneeling besides Mr. Mike, listening intently.\n\nMAKAYLA\nWho is Javerias?\n\nMR. MIKE\nJaverias, Javerias, he told me. I miss him. He was good. Kind. Normal. He told me things when I was little - just a kid - important things. He told me that when you hurt one - even if it was by mistake and you had no reason to - they will eventually they will transform into the other one - the darker one - and they wont stay  kind forever. And some decided not to be kind - and are predators. Javerias. If the winds get them - they will take charge.\n\nJANICE\n(from the Kitchen)\nMr. Mike calm down my friend woof - dinner will be ready soon. \n\nMR. MIKE\nAre you making the sprouts?\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nJanice walks over and grabs Howie from her doggie backpack and rests him on the floor. Howie rushes over to Dallas. \n\nJANICE\nHowie, wait, no no - well, look at that. He likes you Dallas. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas kneels down to meet the dog Howie. They embrace.  \n\nMR. MIKE\nWhen I was growing up we didn't have a dog, we had a cat - Misty - this dog is no good. \n\nJANICE\nStop it Michael. Mr. Dallas - would you like to watch him sometime? \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nHowie motions to Dallas like he wants to be held.\n\nDALLAS\nSure. \n\nMAKAYLA\nHow about tomorrow? \n\nJANICE\nYeah - I mean - we could drop him off in the morning. What do you think Dallas?\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at Howie - and the dog looks back at him.\n\nJANICE\nActually... Want to take him tonight? Do a little dry run? He'll sleep on the couch like a baby. I don't want you alone in that new house of yours - say how is it? Did they treat it nice? Dominic, where are you? Yeah, take him tonight sweetie - go on a big walk along the shore -  Lord knows I got can't walk him like I used to with my knees.\n\nDALLAS\nSure. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at the dog - the dog Howie looks back at the man Dallas. Makayla walks over and places the portable Oscillator from Dallas' hand. \n\nMAKAYLA\nIt didn't work.\n\nDALLAS\nNo?\n\nMAKAYLA\n(thinking)\nWill it actually record the frequencies? Or does it just display? How do you record?\n\nDALLAS\nThere's a memory card in there. But it writes in an old format. \n\nMAKAYLA\nWhat format? \n\nDALLAS\nB24FF\n\nMAKAYLA\nOkay, I've already copied them and don't think it worked. Thank you though. \n\nJANICE\nMakayla whats that - give it back. \n\nDALLAS\nIt's fine. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at Makayla and back at Asher who is still kneeling by Mr. Mike. \n\nDOMINIC\nMakayla, I showed Dallas your little basement dwelling.\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla looks over to Dallas with sus looks.  \n\nMAKAYLA\nOkay great.\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike from the living rooms gets agitated. He begins rocking back and forth in his chair. \n\n\nMR MIKE\nThe numbers are off. Asher knows. The numbers are off.\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike continues to rock - he looks over - ignores Makayala's gaze and locks eye contact with Asher.\n\nMR. MIKE\nThe numbers are wrong. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla walks over to Dallas.\n\nMAKAYLA\nDoes it pick up frequencies below the human range? \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas nods. \n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nAsher, meanwhile, ignores the conversation, eyes fixed on the distant bushes at the edge of the property. The leaves flutter, though there is no wind. His finger traces a ripple on his hand.\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic begins to light the gas to start boiling the brussels but the lighter doesnt work. \nJanice throws up her hands and goes outside for a smoke. Dallas follows her with Howie.\n\nEXT. DOMINIC'S PATIO\n\nJANICE\nThank you again Dallas.\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas begins to walk across the street to his house.\n\n\n---\n\n\n### Scene 8: Dallas Marsh Walk\n\n*ACT I — Arrival & Discovery | ID: dallas-marsh-walk | File: s08.md*\n\n---\n\n<!-- scene: 08 file: s08.md nickname: dallas-marsh-walk -->\n\n# Scene 8: The Trailcam\n\nEXT. DALLAS HOUSE - MOMENTS LATER\n\nDallas tries to bring Howie inside but he won't go. He looks like he wants to go on a walk. So Dallas reasons with the creature and brings him on a walk. \n\nEXT. BRANFORD ROCKS - EVENING\nThe Long Island Sound roars, the waves crashing violently against the Branford rocks. Dallas walks Howie along the edge of his neighborhood.\n\nDallas steps off the boardwalk onto a narrow dirt path that runs behind the houses, where lawns thin into reeds and the creek bends toward the marsh.\n\nAs Howie, Dallas holds his portable Oscillator out. The needle begins to flutter.\n\nHowie stops. His ears perk up and swivel like small radar dishes toward the dark reeds in the distance. \n\nIn the far distance, a single coyote barks. Then another. A chain reaction of domestic fear starts in the neighborhood, followed by the high, thin yip of coyotes further inland.\n\nThe winds pick up and Dallas and Howie march forward. \n\nEXT. EDGE OF THE MARSH \nDallas stands before the edge of the Marsh. As he gazes, everything increasingly becomes still. The winds lower. The waves begin to mute themselves. Then, the HUM begins.\n\nIt starts as a vibration in Dallas's teeth, then moves to his chest. It is a deep, dense, multi-layered sound—a living reed being forced through a massive throat.\n\nDallas stands in a daze, his hand tightening on Howie's leash. The tall grass pulses in time with the sound.\n\nThe sun sets, casting long shadows across the tall grass. Dallas dials his recorder clicking softly as he adjusts the frequency.\n\nDallas stops at the creek's edge right outside his property lines and gazes towards the distant outer marsh. The tall grass stretches endlessly before him, golden-yellow reeds swaying gently despite the lack of wind.\n\nDallas ties Howie to a nearby tree and walks into the marsh. \n\nEXT. INTO THE MARSH\nReceiver in hand, Dallas walks deeper into the marsh. \n\nThere in the distance he sees a distubrance. He walks over to a makeshift trap with a trailcam over it. He notices that it is wired to a solar pack and away from itself. \n\nHis equipment begins to beep. Dallas flips open his handheld scope and watches the waveform settle into an otherworldly pattern.\n\nDallas clicks \"Record,\" then checks the timestamp twice. The trace snaps into a perfect ladder of lines, and Dallas lowers the scope as if it's suddenly heavy.\n\nFrom the distance, a flicker of golden light pulses deep within the marsh. Dallas notices it—but it's gone.\n\nDallas takes a step forward, then another. The reeds part before him, closing behind him as he disappears into the tall grass.\n\nHowie whine and ties them up to a lone tree. Dallas bends down and pets Howie on the head, with a smile.\n\n\n---\n\n\n### Scene 9: Dallas Night Work\n\n*ACT I — Arrival & Discovery | ID: dallas-night-work | File: s09.md*\n\n---\n\n<!-- scene: 09 file: s09.md nickname: dallas-night-work -->\n\n# Scene 9: The Injured One\n<!-- summary: Dallas, as he ventures deeper and deeper into the marsh - finds a bioluminest creature -->\n\nEXT. DEEP INSIDE THE TALL MARSH \n\nDallas stands slowly, scanning the reeds around him. Nothing much seems out there - just the gentle sway of grass and the disappointed sound of his own breathing.\n\nDallas pushes through a dense curtain of reeds. Dust motes dance in a whirlwind of color refracting the sunset into jagged prisms on his face. \n\nDallas steps deeper, following the fading glow. \n\nAll around him is light reeeds blowing in a whirlwind of light and color. \n\nAs Dallas' eyes adjust to this new brightness - the world around him slowly blurs. \n\nThere in the distance Dallas sees a gnarled tree that stands alone among the reeds.  \n\nDallas approaches the tree and as he does - he notices that inside of the gnarl, curled up, tucked away,  lives a small orb shaped creature - slightly bioluminest - and clearly injured. \n\nThe creature is a cloudlike - cottonball, powder-puff animal. \n\nSmall round It skin is fluffy pulsing with a soft glow. Round. Covered in dense, dirty white fur like a dandelion seed head. It looks like a small owl. Its large eyes are closed. With no visible mouth, it looks a bit like a living cotton ball with shivering, transulent ears. \n \nDallas reaches out. His hand trembles. He touches the creature's back. The creature flinches but doesn't move away. \n\nDallas hears his equipment beep louder and louder - the closer his hand gets to the creature. \n\nSuddenly, the wind returns. A violent gust. Shadows in the distance start to fill the sky and hover over Dallas and the creature. Dallas in a daze, slowly grabs the creature and gently places it in his jacket and begins to walk out without looking back. \n\n\n---\n\n\n### Scene 10: Shadows in Wind\n\n*ACT I — Arrival & Discovery | ID: shadows-in-wind | File: s10.md*\n\n---\n\n<!-- scene: 10 file: s10.md nickname: shadows-in-wind -->\n\n# Scene 10: The Chase\n<!-- nickname: Creature discovery -->\n\nEXT. TALL GRASS - MOMENTS LATER\n\nDallas picks up the creature and begins to walk out of the tall grass. As he does, he gets the sense that something is following him.\n\nThe air changes and the hum faintly comes back. Then in the distant, more coyotes begin to howl around. \n\nA heavy, crushing sound slices through the reeds—something massive rocketing toward him like an arrow.\n\nDallas breaks into a sprint. He reaches the stunted cedar tree—HOWIE where Howie is tied, who is a blur of panic, barking at the wall of grass.\n\nDallas grabs the leash and doesn't stop running until the marsh is far behind them.\n\nEXT. BRANFORD MONTAGE\n\nDallas walks briskly past the same neighborhood stuff he did before.\n\nEXT. DALLAS DRIVEWAY\n\nAt the edge of his driveway, he finally stops—gasping. The creature is motionless in his coat, but its neck glow pulses weak, fading amber.\n\n\n---\n\n\n### Scene 11: Howie Walk (Edge of Marsh)\n\n*ACT I — Arrival & Discovery | ID: howie-walk-2 | File: s11.md*\n\n---\n\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n# Scene 11: Kitchen Triage\n<!-- summary: Dallas at home with the creature. Kitchen triage—parchment, macro lens. The creature cries; the equipment flares gold. -->\n\nINT. DALLAS KITCHEN - DUSK\nDallas rushes to bring the creature inside. He grabs an aluminion pan and lines it with parchment paper. The creature seems to be asleep. \n\nHowie barks outside. Dallas rushes to grab him.\n\nINT. DALLAS KITCHEN - MOMENTS LATER\nHowie is in the living room couch nervously peering out the window. The camera pans and finds Dallas alone with the creature trying to understand it as he observes its features with thick macro monoculars. \n\nAs Dallas peers closer, he notices that it has marks underneath its top wing. As Dallas touches the marks the creature suddenly wakes up and lets out a cry.\n\nAs the creature cries - Dallas notices that all of the screens on his equipment turn slowly into golden static. The hue gets so vibrant and bright that permant golden marks are left scattered across all of his equipment near the creature. \n\nThe creature lets out a final whimper and slowly falls back to sleep. Dallas - looks at the mark again, as its sparkles and then fades. \n\nOutside the hum begins again, reverbating the kitchen. \n\nEXT. DALLAS BACKYARD - EVENING AFTERNOON\n\nDallas runs outside with his audio recording equipment in his hand. The hum is growing into a faint roar from the distant marsh. \n\nAs he begins to record - the hum ceases - and he notices that the creature inside is crying loudly. \n\nINT. DALLAS KITCHEN - MOMENTS LATER\n\nDallas approaches the creature - and notices that is not crying, but still seemingly asleep.\n\nINT. DALLAS DESK - NIGHT\n\nDallas is peered over his computer and begins to scan a program between different frequecnies. Connected to his computer is a usb that seemingly posts.\n\nDallas tries different frequiences to broadcast - but nothing. \n\nDallas look at the recordings of the day that captured and finds that there is a peak on the GHz frequency 115.2GHZ. \n\nThe heavy receiver sits on the workshop table, wired to his laptop. \n\nHe listens. At first, nothing but the usual low-grade rumble of the marsh. Then—a pulse. Something layered, almost rhythmic.\n\nIn the distance Dallas heres the creature cry again.\n\nINT. DALLAS KITCHEN\n\nDallas steps off the boardwalk onto a narrow dirt path that runs behind the houses, where lawns thin into reeds and the creek bends toward the marsh.\n\nDallas goes over and tends to the creature - but this time it is visually shaken. Dallas sits next to it on a chair and waits for it to calm down. \n\nAs Dallas sits - his eyes get heavy - and he suddenly catches himself snoozing. He gets up - and sees Sierra's tape recorder on the desk. He stumbles over for a bit and presses play. \n\nAs he does, he notices that the creatures' cry begins to cease - but as it does - so does the recording. Dallas realizes that  her voice dissolve into the creature's ongoing frequency. \n\nHe replays the clip. But nothing, it is blank. Dallas plays it again, distraught.\n\nHis elbow brushes the stack of Sierra's folders. One slides open—a corner of a sketch visible. Something with wings. He pushes it closed without looking. \n\nAs he is listening another burst hits the ongoing recording. Dallas looks up from his desk and peers outside. Another faint hum.  \n\nINT. DALLAS' HOUSE - KITCHEN - EVENING\n\nDallas stands at the window, staring into the ripping field. The storm is brewing, but the movement in the grass is wrong.\n\nDallas goes to look at the creature in his makeshift box. It is breathing. Dallas begins to examine all of the blood - it seems to have darkened. \n\nHe touches the photo of his late wife on the side of the receiver. The contact is long.\n\nThe hum begins again, lower this time. His equipment remains silent, unable to register the frequency, but the windows of the house begin to rattle in their frames. \n\n<div class=\"script-addition\">\n\n> addition\n\n\nThe overhead light dims—not a flicker, but a slow, steady drain, as if something is pulling the current out of the walls. Then it returns to full brightness.\n\nA doorbell is heard off screen breaking Dallas out of his trance.\n\nINT. DALLAS' HOUSE - HALLWAY - NIGHT\n\nDallas opens the door to find Dominic.\n\nDOMINIC\nThank you for watching Howie - how did he do? \n\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nDallas looks over to Howie who is resting on the sofa, exhausted, sleeping. \n\nDALLAS\nGood\n\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nAsher looks behind Dallas at all of the equipment. Dallas hands Howie over to Dominic. \n\nDOMINIC\nOkay - we'll - we'll be on our way. Hey - are you still okay with hosting lifegroup on Thursday.\n\nDALLAS\nThis Thursday?\n\nDOMINIC\nYeah, is that still good?\n\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nDallas peers toward the kitchen.\n\nDALLAS\nYeah, should be good. \n\nDOMINIC\nOkay... Hey - everything okay?\n\nDALLAS\nYeah - sorry - I'm just a little tired. \n\nDOMINIC\nAlright well rest well big guy. \n\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nAsher and Dominic and Howie leave and walk into the next side door. Dallas watches them - and then watches the tall grass sway in the wind. \n\nDallas rushes to the kitchen and finds that the creature sleeping peacefully. \n\n\n\n---\n\n\n## ACT II — The Creature\n\n---\n\n\n### Scene 12: The Burn Mark & Costco\n\n*ACT II — The Creature | ID: the-burn-mark | File: s12.md*\n\n---\n\n<!-- scene: 12 file: s12.md nickname: the-burn-mark -->\n\n<!-- nickname: THE FIRST NIGHT WITH CREATURE  -->\n<!-- summary: Wires on the creature's head. It sings through its back-holes. She can't tell anyone. -->\n\nINT. DALLAS DESK\n\nDallas is alone. He keeps peering through his late wife's old documents. \n\nOn the desk is the recorder and all of the tapes next to it.  Howie cries out in the distance. \n\nINT. KITCHEN\n\nDallas lays tiny wires on the creature's head, connecting them to his handheld. \nWhen the creature is calm, it emits a low, melodic tone through the holes in its back. The creature's holes shift—the sound becomes a sad cry, like a whimper.\n\nINT. DALLAS ROOM - NIGHT\nDallas falls asleep on his futon. \n\nINT. DALLAS ROOM - NEXT MORNING\n\nDallas wakes up to find the place a mess. He gently puts down all of the notes. As he does, he reads one page from the Sierra box - with much interest. \n\n\n---\n\n\n### Scene 13: Entering Grass & The Hollow\n\n*ACT II — The Creature | ID: entering-grass | File: s13.md*\n\n---\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n# Scene 13: The Confrontation\n<!-- summary: Burn mark in the grass. The Mother's Vision: a silhouette in the reeds whispers a lullaby. The stake is now personal. -->\nEXT. DALLAS HOUSE - NEXT MORNING\n\nThe morning air is thick with the scent of ozone. Dominic''s minivan idles in the driveway. \n\nMakayla and Asher don't follow him. They wander toward the edge of Dallas's property.\n\nDominic walks right up to Dallas' doorway and knocks loudly. \n\nMAKAYLA\nAsher, look.\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nIn the middle of the yard is a jagged, blackened  burn mark in the grass that resembles beads in paint hitting a white canvas - but on the green grass. It looks as if a drip of yellow blood is around it - acreating a trail. At its center lies a small, translucent crystal.\n\nMakayla kneels and touches it. Her hair begins to flutter, static electricity pulling the strands toward the stone. She quickly pockets it.\n\nMakayla notices a trail leading from the edge of the grass toward Dallas.\n\nEXT. DALLAS's HOUSE -  DOORWAY \nMakayla stares at Dallas for a good while - and reads his eyes.\n\nMAKAYLA\nI think we shoud talk.\n\nDALLAS\nYeah?\n\nMAKAYLA\nYes. \n\nDALLAS\nOkay.\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla turns to the burn marks. \n\nMAKAYLA\nWhat is that outside your house?\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nDallas looks outside and sees that there are a bunch of burn marks on the edge of the tall grass. \n\nA whimper is heard from the kitchen. \n\nMAKAYLA\nWhat is that?\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla pushes past Dallas and runs to the kitchen. \n\nINT. DALLAS KITCHEN - MOMENTS LATER\n\nDallas and Makayla hover around the table at the makeshift aquarium Dallas constructed.\n\nASHER\nWhat is it?\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla pulls out her portable viewfinder and begins to inspect the creature further. \n\nMAKAYLA\nI am not sure... How long has it been here for?\n\nDALLAS\nAround 2 hours.\n\nMAKAYLA\nLook at this, look how it breathes.\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nThe pair look closer at the creature - it seems to brath through its back. Makayla touches the creature gently - which causes the Oscillator around it to spark.\n\nMAKAYLA\nWe can't tell anyone about this.\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla turns to Dallas who nods in agreement.\n\nMAKAYLA\nMr. Dallas, where did you find it?\n\nDALLAS\nI am not sure exactly. It was dark. \n\nMAKAYLA\nAnd why did you grab it?\n\nDALLAS\nIt looked like it was injured.\n\nMAKAYLA\nAnd is it?\n\nDALLAS\nI think so. \n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nDallas walks over and pulls over his bright electronic lamp over it. Where it shows the different burn marks. \n\nMAKAYLA\nLook at that!\n\n\nMakayla turns to Dallas. \n\nMAKAYLA\nGreat - okay Dallas - where is it. \n\nINT. DALLAS KITCHEN\n\nMakayla stand dumbfounded looking at the creature - they can't believe it. They walk around Makayla stares at it for a good while. \n\nMakayla brushes the creature's wing, hears a lullaby, and sees her mothers silheottue in the distance. \n\nMakayla shakes her head and looks at Dallas.\n\n\n\n\n---\n\n\n### Scene 14: Creature Rescue\n\n*ACT II — The Creature | ID: creature-rescue | File: s14.md*\n\n---\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n# Scene 14: The Connection\n<!-- summary: They sit with the creature. Evidence. A bond. Howie at their feet. -->\n\nINT. DALLAS KITCHEN\nDallas sits on a stool and in an almost daze watches Makayla from far away as she and Asher look at the creature from afar. \n\nMakayla begins to sketch the creature. Careful, precise lines. The back-holes. The ears. The glow. She is documenting it the way a scientist would, not the way a teenager would.\n\nEXT. DALLAS BACKYARD - OLD PICNIC TABLE \n\nMakayla and Dallas look on the ground for a while as they sit outside the patio. Howie sleeps peacefully near Dallas' feet nearby.\n\nAsher sits alone a few feet away—drawing in his notebook. Not the creature; repeating shapes, like the burn mark pattern.\n\nMAKAYLA\nSo your wife was an Epistemologist? \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at Makayla. \n\nMAKAYLA\nShe studied how fish communicate underwater. \n\nDALLAS\nShe did.\n\nMAKAYLA\nI'm sorry for your loss.\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at the ground.\n\nMAKAYLA\nOur mom died too.  Janice was her sister, Dominic is her younger brother. We used to live with her - but now we stay with Uncle Dominic - nextdoor to a bioacoustics engineer.... What's it like?\n\nDALLAS\nWhat's what like?\n\nMAKAYLA\nYour job.\n\nDALLAS\nIt's fine. \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe room grows quiet.  Asher, breaking the tension, appears busy trying to connect wires up to the computer. But he stops as he looks at the distance, then the ground, then the tall grass. His finger traces something on his leg—the same pattern, over and over. \n\nOutside the window, the wind picks up.  Dallas looks out the window.\n\nMAKAYLA\nWhat is it?\n\nEXT. DALLAS BACKYARD - OLD PICNIC TABLE - CONTINUOUS\n\nThe group look out  at the edge of the tall grass\n\nDALLAS\nIs Asher okay?\n\nMAKAYLA\nHe's fine... He's just processing. \n\nDALLAS\nAnd how are you doing?\n\nMAKAYLA\nI'm fine.\n\nDALLAS\nWhat did you see?\n\nMAKAYLA\nNot sure... I'm not sure - I feel a bit uninspired. \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla takes a deep breath and looks at Dallas.\n\nMAKAYLA\nWhat do you do when you are sad? Like sad all the time. \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at Howie and then at Makayla.\n\nDALLAS\nI don't know.\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas and Makayla sit for a while on the long old picnic table outside his house.\n\nMAKAYLA\nWe need to document this... Dallas. \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla looks at Asher and then back at the house. \n\nMAKAYLA\nWe can't tell anyone about this. The sound it made. We should try to record that.\n\nMAKAYLA\nThe frequiences that that creature is making.\n\nDALLAS\nIt seems to be recording.\n\nMAKAYLA\nRecording what? \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe breeze overwhelms them both.\n\nINT. DALLAS'S KITCHEN - LATER\n\nMakayla and Dallas walk into the kitchen and find the creature sleeping peacefully below the heat lamp. \n\nMAKAYLA\nI find it interesting that your wife was an epistemologist - you know, Scientists used to think that the sea was silent - but our ears just can't pick up the right frequenies.\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks around at his kitchen island - which has turned part into a triage hospital station. He’s wired a portable oscilloscope.  The device pulses in a rhythmic, golden jagged line — in sync with the creature's heartbeat.\n\nIn the distance they hear howls - and then silence again. \n\nThe creature begins to fade - Dallas turns the dial into another frequency range and waits until it is asleep. \n\nMAKAYLA\n(to Dallas)\nWhat does that do?\n\nDALLAS\n(whispering)\nIt changes the frequency I am broadcasting.\n\nMAKAYLA\nIt looks like the creature is responding to it.\n\nDallas\nYes. \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla looks down and thinks for a moment.\n\nMAKAYLA\n(to Dallas)\nYou know, Mr. Mike has been telling Asher things for years... They have some special bond.... Mr. Mike's grandfather was an explorer - who claims that he knew of a creature like this that his father saw when he first immigrated. \n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMeanwhile,Asher comes in and gathers around the creature too—notebook in one hand, pencil still. He doesn't draw it. Just watches. His finger traces a small pattern on the edge of the island. \n\nDallas adjusts the dial on his military receiver to a 115.3 MHz frequency. The creature's breathing stabilizes. It lets out a low, melodic tone through its back-holes.\n\nMakayla leans over the oscilloscope. She points at the screen. \n\nMakayla looks at Dallas and then at the creature and pulls out a small prototype from her backpack. \n\nThe two look at each other for a moment.\n\nDALLAS\nWhat is that?\n\nMAKAYLA\nAn amplifier.\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla turns and places the crystal she has found inside a palceholder for where a battery would go on a circut board.\n\nShe turns to the creature and turns it on. \n\nThe creature starts to wiggle.\n\nBehind the creature's smooth sine wave, a second signal appears—jagged, arrhythmic. It pulses in sharp, irregular bursts, riding underneath the creature's frequency like static beneath music.\n\nMAKAYLA (CONT'D)\nThat's not coming from the creature. That's drawing from outside.\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe group looks at the creature and then at the oscilloscope and then at the sway of the tall grass outside. \n\nMAKAYLA\nDallas - I have something I want to show you. \n\n\n---\n\n\n### Scene 15: The Burn Mark\n\n*ACT II — The Creature | ID: the-burn-mark-2 | File: s15.md*\n\n---\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n# Scene 15: Makayla's Lair\n<!-- summary: Reverse Device mission born. Dallas calibrates the oscillator using Mr. Mike's numbers. A countdown begins. -->\n\nEXT. NEIGHBORHOODS - EVENING \nThe crew walk towards the neighborhood and begin the long process of making their journey down golden hour filled woodland area - as they approach a big field open field. At the end of the field are some tall trees. \n\nMAKAYLA\nDid you know some peptide crystals can conduct electricity? \n\nDALLAS\nYeah.\n\nMAKAYLA\nEverything does... which begs the question - what exactly is electricity? \n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nThe crew walk into the field and find a small wooden structure hidden inside. \n\nEXT. MAKAYLA'S LAIR - CONTINUOUS\nAs they approach the structure, they can see that it is a small wooden structure made out of fallen trees and branches. \n\nImmeditaley outside the structure, seems like there are some trail cameras and other surveillance equipment.  \n\nOne device in particular intrigues Dallas. It is an old cart that has a perptual motion machine on it. Dallas walks over to it and admires it.\n\nMAKAYLA\nThat's Ashers perpetual motion machine. \n\nASHER\nIt's not ready. \n\nMAKAYLA\nDon't worry Mr. Dallas - soon you'll hear all about my brother's inventions - they are going to change the world.\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nDallas looks at asher and then back at Asher. \n\nMAKAYLA\nDo you believe in fate Mr. Dallas?\n\nDALLAS\nI am not sure.\n\nMAKAYLA\nMy father left Asher and I this random bit of land in Branford, in his will. My uncle isn't keen on touching or doing anything with it - so Asher and I built this. \n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nDallas nods. \n\nMAKAYLA\n(ignoring his question)\nAnd funny thing about fate, is - right as we were searching this land - we found this.\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla picks up a small flower that looks planted.\n\nMAKAYLA\nDominic wouldn't understand what we happened today. Some people live their whole lives in the shadows, thinking that\n\nINT. MAKAYLA'S LAIR - CONTINUOUS\n\nMakayla gives Dallas a tour of the outdoor lair. Around a semi-permanent wooden structure made out of fallen trees and branches. \n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla points to a small wooden box and gestures Asher to open it up. He walks over over the cables laid on the floor and does. \n\nASHER\n(to Dallas)\nHere.\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher hands Dallas a small wooden box. Dallas opens it and finds a small translucent crystal inside—a crude pyramid-like stone. Dallas holds it, fascinated.\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher taps it twice against Dallas's palm before letting go—his tell when he's sure about something. \n\nMAKAYLA\nWhat do you think?\n\nDALLAS\nSeems like a common quartz crystal..\n\nMAKAYLA\nAsher show him.\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher walks over and puts the cystal on top of a little bay area device . As he does - Makayla walks over to her computer running linux and starts typing away. Soon a program emerges that seemingly measures waveforms. \n\nMAKAYLA\n(to Dallas)\nDo you know what this?\n\nDALLAS\nSeems like a frequency analyzer...\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla makes a couple of clicks and looks at Asher - she nods. \n\nMAKAYLA\n(to Dallas)\nDo you know what this is?\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nDallas looks onward, the computer's monitor's waveforms and graphs seem to be moving in sync with Asher as he places the crystal on top of the device. It reacts viollently to it. \n\nDallas looks on in amazement.\n\nEXT. MAKAYLAS LAIR\n\nMakayla and Dallas sit on a wooden stool and watch Asher as he prepares for a small fire.\n\nMAKAYLA\nI think that the crystal is picking up something. And that creature. Like that wasn't normal. \n\nMAKAYLA\nThat is a reverse audiophone - capable of taking a recording and then projecting it back into reverse. I built it last summer - well Asher did the heavy lifting. \n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher hands Dallas a small translucent crystal in the shape of a crude pyramid-like stone. He taps it twice against Dallas's palm before letting go—his tell when he's sure about something. \n\nMAKAYLA\nAsher no.\n\nDallas holds the object in his hands fasicanted. Makayla takes it away and pockets it.\n\nMAKAYLA\nLook at it. It's vibrating at the same rate as your pulse. \n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla stops and thinks for a moment.\n\nMAKAYLA\nAsher, do you know the numbers Mr. Mike writes? \n\nASHER\nMaybe. I don't know. What do you mean?\n\nMAKAYLA\nDallas, dial in the tune to 11.53\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nDallas changes the notes of his oscillator and suddenly the creature wakes up. \n\nMakayla dashes to her computer. She rewinds the waveform recordings and finds a spike.\n\nMAKAYLA\n11.53\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nThe creature begins to glow - and then the dark shadows grow on the screen and completely decimate the small creature on the ground. \n\nMakayla looks at the dying creature. \n\nMAKAYLA\nDallas - could you interpret these readings and compile in your mind or something and tell me what they mean?\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla hands Dallas a bunch of papers to look through. \n\nMAKAYLA\nThis crystal - it is a phase inverter. If we run your Oscillator through it - it won't just broadcast sound - it should create a shield - a dome of silence needed to bring it back to its nest.\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla, Dallas, and Asher huddle around the creature and watch it fade as the equipment begins to flicker and die.\n\nINT. LAIR MONTAGE\nMakayla and Dallas rig up the dials - Dallas connects the Oscillator into a shoulder rig with the crystal on the center and puts the prototype on the table. \n\nMAKAYLA\nWe need to bring this to the place where you found the creature. \n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla turns on the prototype - and nothing happens - but suddenly the creature wakes up and begins to howl  - making all of the equipment in the lair act funny.\n\nAsher clutches the creature to his chest. The creature begins to stir—and Asher's notebook slips from his hand. His pencil rolls. He begins to shake. Then he's on the floor. \n\nMAKAYLA\nAsher!\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla runs to rescue Asher who is laying on the floor with his eyes wide open and his mouth wide open.\n\nASHER\nBring me back. \n\nMAKAYLA\nAsher - what?!\n\nASHER \n(in a trance)\nBring me back. \n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher snaps out of it and the crew are visuably shaken. Makayla holds Asher close and whipsers that it will be alright. \n\nDallas looks on and then at the equipment. The portable oscilloscope screen flickers and dies. The battery is dead.\n\nMAKAYLA\nWe have to go. \n\n\n\n---\n\n\n### Scene 16: The Escape\n\n*ACT II — The Creature | ID: the-escape | File: s16.md*\n\n---\n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n# Scene 16: Makayla's Lair\n\nEXT. MAKAYLA'S LAIR\nMakayla, Dallas, and Asher hastily make their way out of the woods, back toward the field, carrying the creature in its box and the heavy, dead oscillator rig.\n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAs the crew walk, they begin to notice that the tall grass around them is acting universally restless. The crew walk in uneasy silence as the summer glow lights their pace. \nEXT. BRANFORD TOWN GREEN - DAY\n\nThe crew walk through the backstreets of Branford with the creature covered in a towel drapped over Makayla's dog backpack. \n\nEXT. DALLAS'S HOUSE - DAY\n\nAs they approach the driveway, the crew look suspciously at the tall grass around Dallas's house. The creature in Makayla's backpack - begins to cry a bit. \n\nAsher begins to shake and falls to the ground. His eyes look directly at the sky and he begins to cry.\n\nASHER\n(in trance)\nLeave us alone. Leave us alone. \n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher begins to cry and shake. Dallas and Makayla rush to his side.\n\nMAKAYLA\nAsher!\n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher slowly wakes up. \n\nMAKAYLA\nBreathe. \n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDallas looks at the tall grass. His spare handheld oscilloscope begins to beep. The crew, little by little, hear the distinct faint hum following them.\n\nMAKAYLA\nThis too shall pass. Breathe. Good. We'll fix this.\n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher slowly lowers his breathing \n\nEXT. DALLAS'S HOUSE\nThe crew finally walks up to Dallas's house, exhausted and muddy. Makayla and Asher walk up to the front door holding the backpack.\n\nBefore they can even touch the doorknob, Dominic pulls up in his minivan and honks the horn. Janice is aggressively leaning out the passenger window.\n\nJANICE\n(yelling out the window)\nYou kids! Howie my baby. Why is he in the backpack?\n\nMAKAYLA\nThat's not Howie. \n\nJANICE\nWhat?\n\nMAKAYLA\n(confused)\nWe found an injured rabbit and Mr. Dallas has tools to help. \n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nJanice looks at Dallas dumbfounded. \n\nJANICE\nWhat?... Kid's get in the car - and leave Mr. Dallas alone - he's hosting life group tonight and I am sure he needs to get ready. \n\nDALLAS\nIt's okay. \n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nMakayla hands Dallas the backpack and gently lets the creature in. She walks to the car with Asher.\n\nJANICE\nSo you now I got to go home and clean this out before Howie gets in, is that what this means? \n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDominic comes out from the other side door and throws the minivan into park and steps out, carrying three massive trays of toasted Brussels sprouts and a stack of hymnals. He looks at Dallas. \n\nDOMINIC\nDallas, my man! You got the living room vacuumed? Here are some food - we'll heat up later. \n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDallas stops dead in his tracks. \n\nDOMINIC\nWhat? \n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDallas and Makayla exchange a wide-eyed, terrified look. The creature shifts gently in the shoebox on the kitchen island, beginning to glow. \n\nDOMINIC\nAlright see you later buddy. \n\n---\n\n\n### Scene 17: Entering Grass\n\n*ACT II — The Creature | ID: entering-grass-2 | File: s17.md*\n\n---\n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n<!-- nickname: Makayla's Bond with Creature -->\n<!-- summary: Oscilloscope on the creature. 115.3 MHz. Makayla: it's pulling power from the grid. -->\nINT. DALLS BASEMENT\n\nMAKAYLA, DALLAS, and ASHER are crouched in the mudroom, shoulder-to-shoulder. \n\nMakayla stares for a long time at the golden creature. The jagged red lines on her portable viewfinder match the erratic, panicked breathing of the tiny animal. \n\nMAKAYLA\n(whispering, to Dallas)\nI think it's dying. \n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nThe creature is not doing so good - but seems to be glowing - and the distant hum perks up again. \n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nDallas walks over and then paces around the room; Asher and Makayla watch him. He taps various equipments and thinks and thinks. Dallas looks at the photo of Sierra taped to his receiver. \n\nDALLAS\nSierra believed that some bio-acoustics could be used as communication.  A defense mechanism.  They were camouflage.\n\nMAKAYLA\nAnd you?\n\nDALLAS\nAnd me what?\n\nMAKAYLA\nWhat do you believe?\n\nDALLAS\nI don't know...\n\nMAKAYLA\nAsher thinks your special. He told me the day that we all met. \n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nDallas looks at Asher. And then down at his hands holding the oscillator.\n\nDALLAS\nWhy do you want to find that creature?\n\nMAKAYLA\nWhy do you?\n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nDallas thinks for a while. \n\nDallas\nIt's hurt. \n\nMAKAYLA\nIt is hurt.\n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nAsher walks over to the oscillator and begins to dial it.\n\nASHER\n(Trance like)\nOne - one - five - three. \n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nDallas gently turns the dial on his receiver to **mak115.3 MHz**. He dials the volume up just enough to create a soft, resonant hum in the basement. \n\nThe creature's ears twitch. It stops its erratic movements. Slowly, it opens its mouth and emits a low, melodic tone, matching the frequency Dallas is broadcasting. As it sings, the golden glow in its neck grows stronger, pushing back the shadows in the room.\n\nMAKAYLA\n(amazed)\nIt's mimicking.\n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nDallas walks over to the small creature and gently rubs its furry head. \n\nMAKAYLA \nIf we keep broadcasting... maybe we can teach it. If it learns the frequency, it can return to the marsh and you know - avoid those red-eye demon things. \n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nThe summer breeze blows through the open basement window. \n\nMAKAYLA\nWe could to teach it.\n\n<!-- scene: 17 file: s17.md nickname: entering-grass-2 -->\n\n(action)\nMakayla clicks a \"Master\" switch on the device. A small, protective green light flickers on.\n\n\n---\n\n\n### Scene 18: Life Group Arrives\n\n*ACT II — The Creature | ID: life-group-arrives | File: s18.md*\n\n---\n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n<!-- nickname: life-group-arrives -->\n<!-- summary: Lifegroup tonight. Dominic drops off the music. The creature's downstairs—then Mr. Mike freaks. Everyone sees it. -->\n\nINT. DALLAS'S KITCHEN / LIVING ROOM - NIGHT\n\nFamilies arrive in waves. The small kitchen and smaller living room fill. The crowd tries Dominic's toasted Brussels sprouts, passed around on paper plates.\n\nMakayla drifts through the kitchen. She opens drawers quietly. Finds sugar cubes meant for coffee. Pockets one without a word.\n\nDominic catches her slipping the sugar into her pocket. He wipes his hands on a dish towel.\n\nDOMINIC\nWhat are you doing? \n\nMAKAYLA\nNothing. Just... getting sugar.\n\nDOMINIC\nFor what? You don't drink coffee. Where's Dallas? People are asking for the host.\n\nMAKAYLA\nHe's downstairs. We... found a stray cat outside. It's really sick. He's nursing it. I was getting it some sugar water.\n\nDOMINIC\nA cat? Alright. Well, tell him not to get bit. And tell him to come up soon.\n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla nods quickly and slips away.\n\nDownstairs, the volume of the creature frequency pulses rhythmically through the floorboards.\n\nINT. DALLAS BASEMENT - CONTINUOUS\nDallas is sweating. He turns the dial up. \n\nDALLAS\nCome on. \n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe glowing creature in the shoebox mimics the tone, its golden light flaring brighter with each successful note. But the louder it sings, the harder the walls of the basement shake. \n\nHOWIE stays curled in the corner of the stairs, disturbed, whimpering. \n\nINT. DALLAS LIVING ROOM - UPSTAIRS CONTINUOUS\nThe last family arrive late for life group: a young couple—JOSH and SARAH—with their newborn, JP. Dominic paces in the kitchen. Mr. Mike mutters in his chair, staring at the weather through the window. \n\nThe glass pane rattles violently. \n\nMR. MIKE\n(to himself)\nThey are listening to the song. They don't like the song.\n\nDOMINIC\nWe have brownies about to be ready.\n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla tries to shuffle past people who are hovering around a kitchen island grabbing popcorn and brownies. \n\nJOSH\nMakayla, how's your mom doing?\n\nMAKAYLA\nShe's doing better thanks.\n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla darts past the crowd and heads for the stairs.\n\nA lifegroup member JOSH, 36, Tall and blonde, talks to PAT CLENDENEN, 60s. \n\nJOSH\nHow is it going for you?\n\nPAT\nBusy week. It's tracking that it'll hit us some point later tonight. \n\nJOSH\nDo you think there will be flooding. \n\nPAT\nDefinitely. \n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe two eat carrots and dip. \n\nJOSH\nDominic, where's the host.\n\nDOMINIC\nHe's downstairs in the basement - not feeling so good.\n\nSARAH\nHe knows we're here?\n\nDOMINIC\nYeah - he should be up in a second.\n\nMAKAYLA\nI'll go and check on him.\n\nINT. BASEMENT - CONTIOUS\nDownstairs, the creature is not doing so good - but seems to be glowing - and the distant hum perks up again. \n\nMakayla joins him and brings over some sugar cubes to thte table. The creature is unresponsive.\n\nThe sound of the LifeGroup singing \"Great Is Thy Faithfulness\" is muffled by the heavy basement door. Upstairs, the heavy footsteps of Dominic and the first LifeGroup guests begin to echo through the ceiling.\n\n\nINT. LIVING ROOM - CONTINUOUS\n\nTYLER\nAlright crew, glad we are all here - gathered together. On this breezy summer night. \n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe group giggle a bit as the wind picks up. The group in a circle all look at eacother. \n\nINT. DALLAS' BASEMENT - CONTINOUS\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nThe creature lays out a little whipmer. \n\nDallas adjusts the dial again. The creature quiets. The lights stabilize.\n\nMR. MIKE walks in behind him. He takes one look at the room and freaks out—like a dog afraid of thunder. He points at the basement door.\n\nMR. MIKE\nWhat is here? What is going on downstairs?!\n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nDominic steps between Mr. Mike and the stairs. He guides him back by the elbow.\n\nMAKAYLA\nEasy. Easy. Nothing. \n\nMR. MIKE\nThere is something down here. DOMINIC DOMINIC\n\nMAKAYLA\nMr. Mike what is wrong?\n\n<!-- scene: 18 file: s18.md nickname: life-group-arrives -->\n\n(action)\nMakayla signals to Asher who drops a plate on purpose.  \n\nMR MIKE. \nWhat in the world?!\n\n\n---\n\n\n### Scene 19: The Hymn\n\n*ACT II — The Creature | ID: the-hymn | File: s19.md*\n\n---\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n<!-- nickname: the-hymn -->\n<!-- summary:  -->\n\nINT. DALLAS'S BASEMENT - SAME TIME\nMr. Mike rocks back and forth in the chair. \n\nDallas shuffles through a pile of old equipment—mono cables, spare parts and arranges them all neatly on a desk.\n\n The creature doesn't look like it's doing much. It's breathing, slightly. Dallas struggles to find a bed for it. He settles on an old shoebox—pauses when he sees his wife's handwriting on one, sets that aside—and gently nestles the creature inside. Its little feet curl tightly. It breathes slowly.\n\nHe finds a way to poke a hole in something so it can drink. The creature, laying beside him in the makeshift shoebox, begins to glow. \n\nMAKAYLA and ASHER watch from the staircase. Makayla comes down. She takes out the crystal from her pocket. It begins to glow. \n\nHer hair lifts. As she grips the crystal, she feels a warmth spread through her hand.  The creature seems to respond to her touch of the crystal. \n\nShe pulls her hand away. The creature's glow dims.\n\nINT. DALLAS'S LIVING ROOM - LATER\nPeople at lifegroup mill and talk. Someone asks where Dallas is.\n\nDOMINIC\nWe found a little cat. Dallas is downstairs nursing it.\n\nA woman stands—early fifties, warm.\n\nWOMAN\nI'm a retired vet. I could take a look.\n\nDOMINIC\nI mean— no, that's okay. I think that cat's just sleeping. We could check after?\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nAn elderly woman nods. Everyone agrees. Someone asks how Howie is doing—where is Howie.  BLAKE, one of the young couples, leads the group. \n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nSARAH, the vet, notices a physical reaction to her cup of tea - and watches it ripple in a strange way. \n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDominic closes the windows and blinds.\n\nDOMINIC\nGetting rough out there.\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nTYLER, 32, a young man with a guitar, hands out music sheets.\n\nTYLER\nWould anyone like to say any words before we start?\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nThey begin to sing a hymn. As the voices rise, the hum from the basement begins to rise with them.\n\nMR. MIKE barges through the basement door. Visualablly agitated. \n\nTYLER\nHello Mr. Mike - thank you for joining us!\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDallas joins behind Mr. Mike and sits down, Makayla and Asher pile next to him.\n\nTYLER\nOh - and some more friends. We hear there is a cat downstairs. How is it doing?\n\nMAKAYLA\nIt's doing good. \n\nTYLER\nAnd Dallas is it? Everyone this is Dallas - he is new in town.\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDallas smiles a bit and rests nervously on the couch.\nThe overhead lights dim and then turn back. \n\nTYLER\nYes, on this stormy day - we can still experience grace.\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nThe outside window turns into a slow pulse that matches the rhythm of the room. Sarah's tea ripples in her cup, concentric rings expanding outward in perfect time.\n\nThe hum starts to upset people as it becomes unbearable.\n\nSubtle at first. Then undeniable. The floorboards vibrate. The lights pulse lower and lower. People look at each other.\n\nSASHA\nWhat was that?\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nThe group listen in silence.\n\nPAT CLENDENEN\nMust be the wind. The boys in the office just texted me that the pressure's dropping fast.\n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDallas stares at the basement door. During a silent moment of reflection, the hum starts again. Everyone is unsettled. What was that noise? The group settles on the weird weather—the storm, the patterns plaguing Branford. \n\nIn time, people leave. Hugs. Goodbyes. Dominic waves them out. He waits for the last person to leave. \n\nINT. DOORWAY - CONTIOUS\nPat Clendenen walks out and puts his hand out to shake Dominic and Dallas' hand. As he does so, he notices from the corner of his eye the burn mark on the
