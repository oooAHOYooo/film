  <script>
    const markdown = "# Creatures in the Tall Grass Script — Full Script\n\n*Compiled on 3/4/2026, 9:09:52 AM*\n\n---\n\n\n## ACT I — Arrival & Discovery\n\n---\n\n\n### Scene 1: Arrival & Discovery\n\n*ACT I — Arrival & Discovery | ID: arrival | File: s01.md*\n\n---\n\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n<!-- nickname: arrival -->\r\n<!-- summary: New house, tall grass. He finds a rig in the reeds. Makayla and Asher want his oscillator. -->\r\n\r\nEXT. DALLAS NEW HOUSE - DAY\r\n\r\nDallas stares at the Tall Grass outside his house as he unloads boxes from a big pile. Dallas scans the new backyard, there are some old rusty lawn furtniture and a picnic table that seems to be adjacent to a fence of grass \r\n\r\nDallas goes into the grass a little bit and as he does he notices that there is a makeshift trailcam - a small camera rig on a stick. Upon further examination he notices that it is not a trap but a recording device of sorts. \r\n\r\nAs Dallas examines he hears a distinct bicycle ring.\r\n\r\nMAKAYLA, 22 and ASHER, 14 — approach on bikes. Asher has a small spiral notebook in his back pocket; he's tracing something on his palm with his finger as they roll up. They watch Dallas for a while.\r\n\r\nThey approach Dallas slowly as one of the boxes draws their curiousity. Makayla watches Dallas pull out a military grade Oscillator.\r\n\r\nMAKAYLA\r\n(to Asher but loud enough for Dallas to hear)\r\nYou know that could be used to track the baseline difference between the cry of the BinzoBee and the howl of the Ophragah. Did you know that peptide crystal act kind of as a biologicial bridge. \r\n\r\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nAsher nods. Makayla approaches Dallas. \r\n\r\nMAKAYLA\r\nHey mister. \r\n\r\nDALLAS\r\nYes?\r\n\r\nMAKAYLA\r\nDid you just move here?\r\n\r\nDALLAS\r\nYes.\r\n\r\nMAKAYLA\r\nDid you turn off my trap?\r\n\r\nDallas\r\nNo. \r\n\r\nMAKAYLA\r\nIs that an Oscillator?\r\n\r\nDALLAS\r\nYes. \r\n\r\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nMakayla looks at Asher and whispers something in his ear. He nods. She returns glances to Dallas and inches her bike closer. \r\n\r\nMAKAYLA\r\nDo you think my brother Asher could borrow it some time? \r\n\r\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nDallas looks at the Oscillator and then at Asher.\r\n\r\nMAKAYLA\r\nHe'll need it. We'll need it. I'll need it too. \r\n\r\nDALLAS\r\nWhat would you need it for?\r\n\r\nMAKAYLA\r\nTell him Asher. \r\n\r\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nAsher stands silent, still tracing a pattern on his palm. Sheepish. He doesn't look up.\r\n\r\nMAKAYLA\r\nDoes it work?\r\n\r\nDALLAS\r\nIt does\r\n\r\nMAKAYLA\r\nWhat is the range on it?\r\n\r\nDALLAS\r\nI'm not sure.\r\n\r\nMAKAYLA\r\nWell okay. Asher, do you have any more questions?\r\n\r\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nMakayla turns to Asher. He shakes his head no—still not looking up, finger moving on his palm. \r\n\r\nMAKAYLA\r\nOkay then. Byeeee. \r\n\r\n<!-- scene: 01 file: s01.md nickname: arrival -->\n\n(action)\nMakayla and Asher peddle their bikes away. Dallas watches curiously and then peers at the swinging breeze of the tall grass. \r\n\r\nDallas looks down at a box of old equipment and stretches down to pick it up. \r\n\n\n---\n\n\n### Scene 2: Dallas Night\n\n*ACT I — Arrival & Discovery | ID: dallas-night | File: s02.md*\n\n---\n\n<!-- scene: 02 file: s02.md nickname: dallas-night -->\n\n# Scene 2: Sierra's Box\r\n<!-- summary: Can't sleep. Golden flicker in the grass. He opens Sierra's box; the hum starts; the battery dies. -->\r\n\r\nINT. DALLAS NEW HOUSE - NIGHT\r\n\r\nDallas struggles to fall asleep in his new home. He hears strange noises from outside. As he looks out the window he sees a flicker of a faint gold light. \r\n\r\nCurious and wide awake - Dallas finishes unpacking boxes. The room is sparse, filled with a few pieces of furniture.\r\n\r\nHe hears a noise from outside. Dallas pauses and peers through his living room window. \r\n\r\nDallas looks back at a pile of unopened boxes in the middle of his living room. He hestitates but makes his way towards a box marked \"Sierra\".\r\n\r\nDallas opens up the box to find sketches of butterflies - and other insects. As he turns the pages, the butterflies and the drawings turn more into creatures with wings.  Angels.  One of the folders slips open as he lifts it—inside, a glimpse of hand-drawn sketches and a tab labeled \"FIELD NOTES — BRANFORD.\" He flips through some of the pages, some showing sketches of the grass and a golden creature.Dallas closes it without looking and sets the stack aside.\r\n\r\nDallas takes a sigh and closes the box. He opens up another box next to it and pulls out a heavy military-grade desktop Oscillator, a portable audio recorder, an a portable Oscillator. \r\n\r\nIn the bottom of the box, covered in dust, sumberged by cables,  Dallas finds and pair of retro ruby-red headphones.\r\n\r\nOn one of the headphones, Dallas peels back a piece of duct tape to reveal a photo sticker.\r\n\r\nThe photo shows Dallas and a woman, both wearing heavy audio headsets, laughing in a field of grass.\r\n\r\nDallas's thumb rushes over her face. \r\n\r\nDallas presses the sticker on the side of his receiver.\r\n\r\nAs he does this, he hears a HUM emerging from outside. The sound is faint and he listens intently.\r\n\r\nDallas grabs a recorder on his desk and scrambles toward the window and brings to record. The needle spikes. Dallas begins to turn the dial - tuning his instrument towards a pure, harmonic tone that cuts through the air like butter. Dallas holds the dial. One second. Two. Three. It's clean. It's proof. \r\n\r\nThe hum begins to grow fainter and fainter. Looking down at the tuning instrument, Dallas sees it a spike in the waveform around the note of E. \r\n\r\nThe battery dies. Scrambling, Dallas looks through his box of equipment for other devices but they all take C batteries.\r\n\r\nDallas, fustrated, abandones the equipment and heads for the door. \r\n\r\nEXT. DALLAS HOUSE - NIGHT\r\n\r\nDallas stands alone watching the tall grass sway agaisnt the salt breeze. Coyotes howl in the distance and seems to be decreasing in scale and size as the night disappears into the distance of the tall marsh grass.\r\n\r\nINT. DALLAS HOUSE - BEDROOM - NIGHT\r\n\r\nDallas struggles to go to sleep. As he hears more faint cries he looks out the window and sees a faint golden glow. \r\n\n\n---\n\n\n### Scene 3: The Hum\n\n*ACT I — Arrival & Discovery | ID: the-hum | File: s03.md*\n\n---\n\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n<!-- nickname: the-hum -->\r\n<!-- summary: Walk to town with Dominic. Birds pointed at the marsh. Streetlight flickers. Fellowship invite. -->\r\n\r\nEXT. DALLAS HOUSE - NEXT DAY MORNING\r\nDallas walks outside his house, towards the edge of the property. As he approaches the edge of his yard he watches the tall grass sway in the wind. He looks at the grass for a beat too long, as he nurses the C battery in his hand. As he does so, he becomes dazed.\r\n\r\nA faint hum is heard off in the distance of the tall grass - low from the earth. Dallas looks at his watch and begins clicking with his hand. And then he writes down some numbers on a sticky note. \"3, 5, 1\" \r\n\r\nAs Dallas focuses, he notices a man approaching him from the sidewalk near his house. \r\n\r\nDOMINIC AMARANTO, early 40s, wearing a bright salmon covered short sleeve button walks right up to Dallas with vigor. \r\n\r\nDOMINIC\r\nNeighbor!\r\n\r\nDALLAS\r\nWhat's that?\r\n\r\nDOMINIC\r\nYou are my neighbor - I live nextdoor - I think we saw you the other day driving by - did you just move here?\r\n\r\nDALLAS\r\nOh hello - yes. \r\n\r\nDOMINIC\r\nNice to meet you. I'm Dominic - this is Branford. \r\n\r\nDALLAS\r\nNice to meet you too. I'm Dallas. \r\n\r\nDOMINIC\r\nDallas, what a name - where you from? \r\n\r\nDALLAS\r\nIndiana.\r\n\r\nDOMINIC\r\nIndyANNA - that's far from Branford. \r\n\r\nDALLAS\r\nYeah.\r\n\r\nDOMINIC\r\nWhat you know about Branford?\r\n\r\nDALLAS\r\nNot much. \r\n\r\nDOMINIC\r\nSo what you doing around here?\r\n\r\nDALLAS\r\nWork.\r\n\r\nDOMINIC\r\nWhat kind of work?\r\n\r\nDALLAS\r\nI do research mostly. \r\n\r\nDOMINIC\r\nWhat kind of research? Yale hire you? \r\n\r\nDALLAS\r\nNo, actually I'm going to be going between Qunipiac and Southern\r\n\r\nDOMINIC\r\nNice man. What you doing there.\r\n\r\nDALLAS\r\nBioacoustics. \r\n\r\nDOMINIC\r\nBio-acoutsitcs. Right on. Alright listen - I'm headed into the town green right now - you want to go for a walk. What's that in your hand?\r\n\r\nDALLAS\r\nA battery so I could show the teller the reference.\r\n\r\nDOMINIC\r\nShow the teller the reference? What is that - that a C battery - Rudy's got that. Let's go - I'll buy you a coffee.\r\n\r\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDallas accepts. \r\n\r\nThe two begin to wander off towards Branford. \r\n\r\nDOMINIC\r\nYou don't have a car?\r\n\r\nDALLAS\r\nNo - no car.\r\n\r\nDOMINIC\r\nYeah. Me neither - well I can drive - yeah, I share one with my sister, she's borrowing mine.\r\n\r\nEXT. TOWN BRANFORD MONTAGE\r\n\r\nDallas and Dominic through coastal sidewalks, neighborhoods, and natural marsh fences. As they approach one patch of tall marsh grass in particular, Dallas stops.\r\n\r\nDallas, sheepishly, checks if Dominic is looking and when he isn't - he takes out a small oscillator and records.  \r\n\r\nDOMINIC\r\nBe careful - there are coyotes up in that. Some people say the noises are from owls - but I know its coyotes. \r\n\r\n\r\n\r\nEXT. TOWN CENTER - DAY\r\n\r\nDallas and Dominic walk toward a small hardware store. \r\n\r\nINT. HARDWARE STORE\r\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDominic waves to the unfriendly man at the counter and brings Dallas to the battery section. \r\n\r\nDOMINIC\r\nSo where you from?\r\n\r\nDALLAS\r\nIndiana.\r\n\r\nDOMINIC\r\nINDIANAAAA - how'd you land up here in Branford?\r\n\r\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDallas finds the correct batteries and grabs it off the shelf. \r\n\r\nDALLAS\r\nWork.\r\n\r\nDOMINIC\r\nYeah? Where abouts? Yale?\r\n\r\nDALLAS\r\nQuinipiac. \r\n\r\nDOMINIC\r\nThat's refreshing... What are you doing with Quinipiac\r\n\r\nDALLAS\r\nMostly field and bioacoustics. \r\n\r\n\r\nThe building looks closed. Dominic stops dead. A neon orange ticket flutters under his windshield wiper.\r\n\r\nDOMINIC\r\nYou got to be kidding me!\r\n\r\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nHe rips the ticket off and walks around to see if anyone is looking - and finds a secret key. \r\n\r\nAs Dominic struggles to look for the key, Dallas' glance finds himself looking up at the power lines with the birds acting weird. On a sagging power line, thirty birds sit in a perfect, silent row. They aren't preening or chirping. Every single beak is pointed South-East. Toward the marsh.\r\n\r\nThe streetlight above them flickers. Once. Twice. Then steadies. Dallas watches it for a beat, then looks back at the birds.\r\n\r\nDominic opens the car and gestures Dallas to get in - non-chantanly the parking ticket in the glove box. \r\n\r\nDOMINIC\r\nYou hungry?\r\n\r\nDALLAS\r\n(still in a daze)\r\nYeah\r\n\r\nDOMINIC\r\nGood -  my church is doing a fellowship lunch - little picnic - I got to go to the bakery and bring a tray. You should come. \r\n\r\nDALLAS\r\nSure. \r\n\r\n<!-- scene: 03 file: s03.md nickname: the-hum -->\n\n(action)\nDOMINIC\r\nNice - yeah - it's nice to be the new guy in town - good old branford. \r\n\r\n\r\n\r\n\n\n---\n\n\n### Scene 4: The Fellowship\n\n*ACT I — Arrival & Discovery | ID: fellowship | File: s04.md*\n\n---\n\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n<!-- nickname: fellowship -->\r\n<!-- summary: Church picnic. Dallas meets Makayla and Asher. Janice hands off Howie. -->\r\n\r\nEXT. CHURCH FELLOWSHIP LAWN - LATE AFTERNOON\r\n\r\nDallas and Dominic arrive at CPC and find themselves in heat of a picnic. Children are running, friends down light summerwear as they play spike ball, and church goers find themselvees are on a long line getting food. Dallas looks around at all of the new faces but does not make great eye contact. Dominic takes a deep breath and approaches the long line. \r\n\r\nDominic carries a package of water and puts it under one of the fold up tables. As he does so, people look at Dallas and begin to greet him. \r\n\r\nDOMINIC\r\nAlright buddy - let's wait on line I guess. \r\n\r\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nDominic and Dallas wait on line to be served at fellowship lunch. As they do people begin to turn around and talk to them. One lady, MARY, 55 turns around and shakes Dallas' hand enthustiaclly.\r\n\r\nMARY\r\nWell hey there sunshine\r\n\r\nDALLAS\r\nHello\r\n\r\nMARY\r\nDominic where did you get this Califorina boy from? My name is Mary - do you like chicken primevro?\r\n\r\nDALLAS\r\nNever really had it\r\n\r\nMARY\r\nWell you should, its great.... So you ready for some proper New England weather?\r\n\r\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nAnother turns around and greets Dallas. An older gentleman PAUL WILDLY, 72, \r\n\r\nPAUL\r\nThe forecasters say that it is going to be historic one. Hasn't been this bad since 1977 - when Nixon was still in office. Paul, nice to meet you. \r\n\r\nDALLAS\r\nNice to meet you.\r\n\r\nPAUL\r\nNow, where are you from?\r\n\r\nDALLAS\r\nIndiana\r\n\r\nPAUL\r\nOo - then you must know of William Henry Harrison - our 9th president, served as Indiana's governor back when it was just a terriority. \r\n\r\nMARY\r\nPaul, stop that. Honey - if you need I can make you some chicken primevera\r\n\r\nDOMINIC\r\nHe's okay Ms Mary thank you\r\n\r\nDALLAS\r\nThank you. \r\n\r\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nDallas and Dominic sit in a circle of folded pull up chairs. \r\n\r\nJANICE AMARANTO, Mid 50s, approaches the line holding a small dog in her arms. She taps Dominic's shoulder.\r\n\r\nDOMINIC\r\n(greeting the dog)\r\nHowie.\r\n\r\nJANICE\r\n(greeting Dominic)\r\nYeah - he's doing much better. He's been having little scares hasn't heeeee - the thunder - he doesn't like the thunder. Dominic did you get the brussel sprouts like I asked?\r\n\r\nDOMINIC\r\nGot them. Should be good to go. \r\n\r\nJANICE\r\nThanks brother. Listen - did you give Mr Mike his mediciation - he has to take them now at 4:30pm - an hour or so before dinner. \r\n\r\nDOMINIC\r\nYes.\r\n\r\nJANICE\r\nWhat's wrong you with - who is this? \r\n\r\nDOMINIC\r\nDallas.\r\n\r\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nDallas smiles and puts out his hand.\r\n\r\nJANICE\r\nNice to meet you Dallas. Dominic hold Howie for a second I go to go make sure that I didn't lock the car. \r\n\r\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nJanice abrutly leaves. \r\n\r\nDOMINIC\r\nDallas, these are my niece and nephew - Makayla and Asher.\r\n\r\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nMakayla and Asher don't say much but wait on line. Asher is doodling in his small spiral notebook—grids, repeating shapes. Makayla taps his shoulder and nods toward the far end of the church lawn. Between the bushes and garden. \r\n\r\nThe two leave the line walk over to a corner spot by the end of the church yard and huddle over a pile of brush.\r\n\r\nJANICE\r\nSo what happened Dominic. \r\n\r\nDOMINIC\r\nYeah - and it had a ticket.\r\n\r\nJANICE\r\nHow much. \r\n\r\nDOMINIC\r\nA good amount. \r\n\r\nJANICE\r\nThat's great. \r\n\r\nJanice leaves the line of food.\r\n\r\nDallas takes a plate but doesn't eat much. He's distracted by what Makayla and Asher are looking at the distance. \r\n\r\nJanice, noticing that Dallas is a little quiet - tries to spark conversation. \r\n\r\n\r\n<!-- scene: 04 file: s04.md nickname: fellowship -->\n\n(action)\nThey finish eating. The group begins to disperse. \n\n---\n\n\n### Scene 5: Marsh Trail\n\n*ACT I — Arrival & Discovery | ID: marsh-walk-later | File: s05.md*\n\n---\n\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n# Scene 5: The Merlin App\r\n<!-- summary: Boardwalk through the reeds. They hear birds andSomething moving in the marsh. -->\r\n\r\nEXT. MARSH TRAIL - LATER\r\nThe sun is dipping. Dallas and Dominic walk back home - along a wooden boardwalk that cuts through the tall, golden-yellow reeds.\r\n\r\nDominic and Dallas walk quietly for a while. Dominic looks out to the tall grass.\r\n\r\nDOMINIC\r\nThe kids are always out here planting down cameras. Makayla says that they are geotagging or something. I don't know. \r\n\r\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nThe two hear a distant cry - that could be a bird. Dallas looks at Dominic.\r\n\r\nDOMINIC\r\n(to himself)\r\nYeah.\r\n\r\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDominic pulls out his phone, tapping an app.\r\n\r\nDOMINIC\r\nHey check this - It listens to the chirps and tells you the species. They got a lot of offspree here - Coastal stuff mostly—Egret, Plover. You should get it if you're working at Quinnipiac.\r\n\r\nDOMINIC\r\nYeah - I wanted to be a writer but it never really worked out for me - so I am writing now - and going to tell a story of these marlins\r\n\r\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDominic sees some garbage on the cans - and starts having a bit of a tough time breathing. He grabs his Asmatha inhaler and takes a deep breath.\r\n\r\nDOMINIC\r\n(in anger)\r\nSometimes I wonder if this all is just make believe.\r\n\r\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDallas looks onward empathically. \r\n\r\nDALLAS\r\nWhat do you mean?\r\n\r\nDOMINIC\r\nThis whole existence - being alive - its so overwhelming and then boom - you are gone. \r\n\r\nDALLAS\r\nYeah.\r\n\r\nDOMINIC\r\n(to himself)\r\nBoom - Gone. \r\n\r\n<!-- scene: 05 file: s05.md nickname: marsh-walk-later -->\n\n(action)\nDallas and Dominic look out for a while near the tall grass. \r\n\n\n---\n\n\n### Scene 6: News Vans & Trash Cans\n\n*ACT I — Arrival & Discovery | ID: news-vans | File: s06.md*\n\n---\n\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n# Scene 6: News Vans\r\n<!-- summary: News vans in the street. Pat on camera. Marks on Dominic's driveway. Dallas strays and stays. -->\r\n\r\nEXT. BRANFORD NEIGHBORHOOD - CONTINUOUS\r\n\r\nDallas and Dominic reach back to their neighborhood. Outside, nestled between their house, three news vans are parked haphazardly. \r\n\r\nDominic parks the car and the two get out to see. \r\n\r\nPAT CLENDENEN, MID 50s, is outside their house in front of news cameras. \r\n\r\nPAT CLENDENEN\r\n(to camera)\r\nHey Rob, thanks for having me on. Ought here today in my hometown of Branford, CT. Pretty excited to be back home. So if you are in anywhere in costal connecticut, all the way up to Rhode Island today, some parts of southern mass all the way towards Boston. This is New England weather for you, always unpredictable - always on the bleeding edge.\r\nSo in that spirit, today we'll see sun to clouds, breezy, warm with a late day shower possible. But the real attention - and the reason we are here - is to bring attention to a possible development along the shores. \r\nWe are staying on top of a trend through the rest of this week - as any shift could dramatically impose a threat - this costasl community. act the entire state. The computer models are showing better agreement. \r\nand while we're all hoping the Nor'easter stays out at sea, the current models suggest a wild weekend for the shoreline. \n\n<div class=\"script-addition\">\n\n> addition\n\n\r\nWe're also getting reports of rolling brownouts along the Route 146 corridor—UI says it's weather-related surges, but they're sending a crew to check the Branford substation.\r\n\r\nHopefully, it holds off until after Sunday's\r\n\r\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDominic scoffs as they walk past.\r\n\r\nDOMINIC\r\nPat's been predicting the end of the world every Tuesday for ten years.\r\n\r\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nThe wind gusts, catching a news umbrella and nearly toppling it. The hum in Dallas's pocket receiver spikes for a split second.\r\n\r\nEXT. DOMINIC'S HOUSE \r\n\r\nThey arrive back at Dominic's. Two large plastic trash bins are sprawled across the driveway, trash strewn everywhere.\r\n\r\nDOMINIC\r\nLook at this. Those raccoons! \r\n\r\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDominc takes a deep breath and begins to do a stretch to calm down. \r\n\r\nDOMINIC\r\nI try to do the right thing in life and keep getting kicked. \r\n\r\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDominic kicks a stray milk carton. He looks at the garbage cans around his house, then at Dallas.\r\n\r\nDOMINIC\r\nListen, I got to get the furniture before Janice has her women's group tonight. I got to go check on Mike and bring in another fan from the basement. You good? \r\n\r\n<!-- scene: 06 file: s06.md nickname: news-vans -->\n\n(action)\nDallas notices that there are some weird burn marks on the ground. He gazes at them for a bit of time. The burn marks are like black sands, not disimmilar to veins on the ground. \r\n\r\nDallas walks over to the burn marks and touches them. He looks at his skin and they have a weird mark on them. He takes a little leaf and puts it in his pocket. \r\n\r\nDALLAS\r\n(hesitates)\r\nYeah\r\n\r\nDOMINIC\r\nDo you want to stay for a bit?\r\n\r\nDALLAS\r\nSure. \r\n\n\n---\n\n\n### Scene 7: The Coordinates\n\n*ACT I — Arrival & Discovery | ID: the-coordinates | File: s07.md*\n\n---\n\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n<!-- nickname: the-coordinates -->\r\n<!-- summary: The kids' basement. Mr. Mike scratches numbers. Makayla and Asher grab the coordinates; she wants the oscillator. -->\r\n\r\nINT. JACE'S BASEMENT \r\n\r\nDallas looks around in amazement. The basement is covered with normal basement things - but then there are two beds - and around the corner there is a workstation filled with old CRT machines and what not.\r\n\r\nDOMINIC\r\nYeah, my niece and nephew live here. They moved in a couple of months ago. I keep trying to get them to stay in the guestroom, but they just want to be living in the basement... Here, help me grab the fan. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at all of the different equipment scattered across the room. Different audio and aoustic equipment that he seems familiar with. On the wall - there are numbers and marking similar to the three beats he wrote down. \r\n\r\nDallas and Dominic move the wall fan - as they go to install it. \r\n\r\nINT. DOMINIC'S BASEMENT\r\n\r\nDallas helps Dominic shove a heavy oak table against the wall. As they move - Dominic knocks over a photo frame - and Dallas grabs it. On the ground is a small, framed photo of a woman and a young boy.\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas grabs the leg of the table and pushes. The two look at the table for a while. \r\n\r\nDOMINIC\r\nDo you have any kids?\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic hands Dallas a portrait of his wife. \r\n\r\nDALLAS\r\nNo. \r\n\r\nDOMINIC\r\nThis was mine. And my wife. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas falls mute. \r\n\r\nDOMINIC\r\nNow I just have my niece and nephew. \r\n\r\nDominic scans the room and finds his gaze upon the corner. MR. MIKE (70s) sits in a rocking chair, staring fixedly at the floor. He is scratching something into the wood of the end table with a jagged nail.\r\n\r\nDOMINIC \r\nMr. Mike! Mr. Mike, what are you doing?! \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nThe camera reveals Mr. Mike to be drawing a complex geometrical pattern\r\nMr. Mike suddenly looks up, his eyes milky but sharp. He points a finger at the window.\r\n\r\nMR. MIKE\r\nShe's here! Hey Dominic! Look - she's here.\r\n\r\nDOMINIC\r\nWhose here? Why are you scratching the table?\r\n\r\nMR. MIKE\r\nYour sister.\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic dashes for the door and opens it. In pops Janice with Makayla and Asher. \r\n\r\nDallas meanwhile walks towards Mr. Mike before Dominic blocks his view.\r\n\r\nMR. MIKE \r\nOne. ONE. FIVE. THREE. She's here - Dominic - Janice is here - ASHER! - it is playing the same one Elena chased. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla and Asher bust through the door. \r\n\r\nAsher rushes over to Mr. Mike. His eyes widen when he sees what Mr. Mike has been writing. He already has his notebook out; he copies the numbers, taps the page twice, then runs to Makayla and shows her. She jots them on her palm. \r\n\r\nAsher hands the coordinates to Makayla. She runs downstairs with them. Dallas watches her. \r\n\r\nINT. DOMINIC'S KITCHEN - LATE AFTERNOON\r\n\r\nJANICE (40s) marches in, balancing two bags of groceries and a set of keys between her teeth. \r\n\r\nJANICE\r\n I-95 is hell on Earth.  Dominic, why aren't you cooking the sprouts already? We need to boil them first and then sear them. Last time you just boiled them and it was a disgusting mush... Hi Dallas. \r\n\r\nDOMINIC\r\nI was just about to.  \r\n\r\nJANICE\r\nOkay. Good, Good. That's good. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nJanice begins a frantic search for her keys, which she just put down. She stumbles over Dallas's heavy receiver on the floor.\r\n\r\nJANICE \r\nWhat is this? A boat anchor?\r\n\r\nDALLAS\r\nIt's a receiver. For work.\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike in the distance begins to get agitated. He rocks slowly in his rocking chair and taps his fingers. \r\n\r\nMR. Mike\r\nThey are being hunted. Javarice told me. They are being hunted.\r\n\r\nASHER\r\nWho is Javerias?\r\n\r\nMR. Mike\r\nHe was a good man. He told me things when I was little - things have since come true. \r\n\r\n\r\n\r\nAnd when you hurt one - eventually they will transform into the other one - they wont stay kind forever. If the winds get them - they will take charge.\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nJanice walks over and grabs Howie from the car and hands them to Dallas.\r\n\r\nJANICE\r\nDo you mind watching Howie for a bit this afternoon? - I have to take everyone to Costco and the lines are going to be longer than my patience.\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at the dog - the dog Howie looks back at the man Dallas. \r\n\r\nMakayla walks over and grabs the portable Oscillator from  Dallas' hand. \r\n\r\nMAKAYLA\r\nHave you given any thought to what I asked you the other day?\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDallas looks at Makayla and back at Asher. Without making eye contact with Dallas she begins to twist and turn the dials on the Oscillator. \r\n\r\nMAKAYLA\r\nYou should, Let my brother borrow it. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nAsher, igorning Makayla, walks over to Mr. Mike and stands besides him in his rocking chair.\r\n\r\nDOMINIC\r\nMakayla, I showed Dallas your little hideout. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla looks over to Dallas with sus looks.  \r\n\r\nMAKAYLA\r\nSo you saw the equipment?\r\n\r\nDALLAS\r\nYes.\r\n\r\nMAKAYLA\r\nWhat did you think?\r\n\r\nDALLAS\r\nWhat is it for?\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla rolls her eyes and walks over to Mr. Mike who is rocking back and forth in his chair. \r\n\r\nMAKAYLA\r\nMr. Mike? What's wrong?\r\n\r\nMR MIKE\r\nThe numbers are off. Asher knows. The numbers are off.\r\n\r\nMAKAYLA\r\nWhat numbers?\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMr. Mike doesn't answer but continues to rock - he looks over - ignores Makayala's gaze and locks eye contact with Asher.\r\n\r\nMR. MIKE\r\nThe numbers are wrong. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nMakayla walks over to Dallas.\r\n\r\nMAKAYLA\r\nDoes it pick up frequencies below the human range? \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nAsher, meanwhile, ignores the conversation, eyes fixed on the distant bushes at the edge of the property. The leaves ripple, though there is no wind. His finger traces the same ripple on the glass.\r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nDominic begins to light the gas to start boiling the brussels but the lighter doesnt work. \r\nJanice throws up her hands and goes outside for a smoke. \r\n\r\nDALLAS\r\nCrap, I got to go to the store. \r\n\r\nJANICE\r\nI'm coming with you. Kids - let's go. \r\n\r\n<!-- scene: 07 file: s07.md nickname: the-coordinates -->\n\n(action)\nThe crew leave with the little dog howie. \r\n\r\nDOMINIC\r\n(yelling from the door)\r\n Dallas, thanks for watching Howie!\r\n\r\nThe family vanishes in a blur of activity, leaving Dallas standing in the sudden, ringing silence with HOWIE, the small dog.\r\n\n\n---\n\n\n### Scene 8: Dallas Marsh Walk\n\n*ACT I — Arrival & Discovery | ID: dallas-marsh-walk | File: s08.md*\n\n---\n\n<!-- scene: 08 file: s08.md nickname: dallas-marsh-walk -->\n\n# Scene 8: The Trailcam\r\n<!-- summary: Trailcam. Waveform ladder. Golden flicker in the hollow. He grabs the injured one—something chases him out. -->\r\nEXT. BRANFORD ROCKS - EVENING\r\n\r\nThe Long Island Sound roars, the waves crashing violently against the Branford rocks. Dallas walks Howie along the edge of his neighborhood.\r\n\r\nDallas steps off the boardwalk onto a narrow dirt path that runs behind the houses, where lawns thin into reeds and the creek bends toward the marsh.\r\n\r\nAs Howie, Dallas holds his portable Oscillator out. The needle isn't just moving; it's spiking. The closer they get to the tall grass, the more violent the readings become. \r\n\r\nIt seems like the readings are pointing closer and closer to marsh by his house.\r\n\r\nHowie stops. His ears perk up and swivel like small radar dishes toward the dark reeds in the distance. \r\n\r\nIn the far distance, a single coyote barks. Then another. A chain reaction of domestic fear starts in the neighborhood, followed by the high, thin yip of coyotes further inland.\r\n\r\nThe winds pick up and Dallas and Howie march forward. \r\n\r\nEXT. EDGE OF THE MARSH \r\n\r\nDallas stands before the edge of the Marsh. As he gazes, everything increasingly becomes still. The winds lower. The waves begin to mute themselves. Then, the HUM begins.\r\n\r\nIt starts as a vibration in Dallas's teeth, then moves to his chest. It is a deep, dense, multi-layered sound—a living reed being forced through a massive throat.\r\n\r\nDallas stands in a daze, his hand tightening on Howie's leash. The tall grass pulses in time with the sound.\r\n\r\nThe sun sets, casting long shadows across the tall grass. Dallas dials his receiver clicking softly as he adjusts the frequency.\r\n\r\nDallas stops at the creek's edge and pans his gaze towards the outer marsh. The tall grass stretches endlessly before him, golden-yellow reeds swaying gently despite the lack of wind.\r\n\r\nDallas ties Howie to a nearby tree and walks into the marsh. \r\n\r\nEXT. INTO THE MARSH\r\n\r\nReceiver in hand, Dallas walks deeper into the marsh. \r\n\r\nThere in the distance he sees a distubrance. He walks over to a makeshift trap with a trailcam over it. He notices that it is wired to a solar pack and away from itself. \r\n\r\nHis equipment begins to beep. Dallas flips open his handheld scope and watches the waveform settle into an otherworldly pattern.\r\n\r\nDallas clicks \"Record,\" then checks the timestamp twice. The trace snaps into a perfect ladder of lines, and Dallas lowers the scope as if it's suddenly heavy.\r\n\r\nFrom the distance, a flicker of golden light pulses deep within the marsh. Dallas notices it—but it's gone.\r\n\r\nDallas takes a step forward, then another. The reeds part before him, closing behind him as he disappears into the tall grass.\r\n\r\n\r\n\n\n---\n\n\n### Scene 9: Dallas Night Work\n\n*ACT I — Arrival & Discovery | ID: dallas-night-work | File: s09.md*\n\n---\n\n<!-- scene: 09 file: s09.md nickname: dallas-night-work -->\n\n# Scene 9: The Injured One\r\n<!-- summary: Dallas, as he ventures deeper and deeper into the marsh - finds a bioluminest creature -->\r\n\r\nEXT. DEEP INSIDE THE TALL MARSH \r\n\r\nDallas stands slowly, scanning the reeds around him. Nothing. Just the gentle sway of grass and the sound of his own breathing.\r\n\r\nDallas pushes through a dense curtain of reeds. Dust motes dance in a whirlwind of color refracting the sunset into jagged prisms on his face. \r\n\r\nDallas steps deeper, following the fading glow. \r\n\r\nAll around him is light reeeds blowing in a whirlwind of light and color. \r\n\r\nAs Dallas' eyes adjust to this new brightness - the world around him slowly blurs. \r\n\r\nThere in the distance Dallas sees a gnarled tree that stands alone among the reeds.  \r\n\r\nDallas approaches the tree and as he does - he notices that inside of the gnarl, curled up, tucked away,  lives a small orb shaped creature - slightly bioluminest - and clearly injured. \r\n\r\nThe creature is a cloudlike - cottonball, powder-puff animal. \r\n\r\nSmall round It skin is fluffy pulsing with a soft glow. Round. Covered in dense, dirty white fur like a dandelion seed head. It looks like a small owl. Its large eyes are closed. With no visible mouth, it looks a bit like a living cotton ball with shivering, transulent ears. \r\n \r\nDallas reaches out. His hand trembles. He touches the creature's back. The creature flinches but doesn't move away. \r\n\r\nDallas hears his equipment beep louder and louder - the closer his hand gets to the creature. \r\n\r\nSuddenly, the wind returns. A violent gust. Shadows in the distance start to fill the sky and hover over Dallas and the creature. Dallas in a daze, slowly grabs the creature and gently places it in his jacket and begins to walk out without looking back. \r\n\n\n---\n\n\n### Scene 10: Shadows in Wind\n\n*ACT I — Arrival & Discovery | ID: shadows-in-wind | File: s10.md*\n\n---\n\n<!-- scene: 10 file: s10.md nickname: shadows-in-wind -->\n\n# Scene 10: The Chase\r\n<!-- nickname: Creature discovery -->\r\n\r\nEXT. TALL GRASS - MOMENTS LATER\r\n\r\nDallas picks up the creature and begins to walk out of the tall grass. As he does, he gets the sense that something is following him.\r\n\r\nThe air changes and the hum faintly comes back. Then in the distant, more coyotes begin to howl around. \r\n\r\nA heavy, crushing sound slices through the reeds—something massive rocketing toward him like an arrow.\r\n\r\nDallas breaks into a sprint. He reaches the stunted cedar tree—HOWIE where Howie is tied, who is a blur of panic, barking at the wall of grass.\r\n\r\nDallas grabs the leash and doesn't stop running until the marsh is far behind them.\r\n\r\nEXT. BRANFORD MONTAGE\r\n\r\nDallas walks briskly past the same neighborhood stuff he did before.\r\n\r\nEXT. DALLAS DRIVEWAY\r\n\r\nAt the edge of his driveway, he finally stops—gasping. The creature is motionless in his coat, but its neck glow pulses weak, fading amber.\r\n\n\n---\n\n\n### Scene 11: Howie Walk (Edge of Marsh)\n\n*ACT I — Arrival & Discovery | ID: howie-walk-2 | File: s11.md*\n\n---\n\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n# Scene 11: Kitchen Triage\r\n<!-- summary: Dallas at home with the creature. Kitchen triage—parchment, macro lens. The creature cries; the equipment flares gold. -->\r\n\r\nINT. DALLAS KITCHEN - DUSK\r\nDallas rushes to bring the creature inside. He grabs an aluminion pan and lines it with parchment paper. The creature seems to be asleep. \r\n\r\nHowie barks outside. Dallas rushes to grab him.\r\n\r\nINT. DALLAS KITCHEN - MOMENTS LATER\r\nHowie is in the living room couch nervously peering out the window. The camera pans and finds Dallas alone with the creature trying to understand it as he observes its features with thick macro monoculars. \r\n\r\nAs Dallas peers closer, he notices that it has marks underneath its top wing. As Dallas touches the marks the creature suddenly wakes up and lets out a cry.\r\n\r\nAs the creature cries - Dallas notices that all of the screens on his equipment turn slowly into golden static. The hue gets so vibrant and bright that permant golden marks are left scattered across all of his equipment near the creature. \r\n\r\nThe creature lets out a final whimper and slowly falls back to sleep. Dallas - looks at the mark again, as its sparkles and then fades. \r\n\r\nOutside the hum begins again, reverbating the kitchen. \r\n\r\nEXT. DALLAS BACKYARD - EVENING AFTERNOON\r\n\r\nDallas runs outside with his audio recording equipment in his hand. The hum is growing into a faint roar from the distant marsh. \r\n\r\nAs he begins to record - the hum ceases - and he notices that the creature inside is crying loudly. \r\n\r\nINT. DALLAS KITCHEN - MOMENTS LATER\r\n\r\nDallas approaches the creature - and notices that is not crying, but still seemingly asleep.\r\n\r\nINT. DALLAS DESK - NIGHT\r\n\r\nDallas is peered over his computer and begins to scan a program between different frequecnies. Connected to his computer is a usb that seemingly posts.\r\n\r\nDallas tries different frequiences to broadcast - but nothing. \r\n\r\nDallas look at the recordings of the day that captured and finds that there is a peak on the GHz frequency 115.2GHZ. \r\n\r\nThe heavy receiver sits on the workshop table, wired to his laptop. \r\n\r\nHe listens. At first, nothing but the usual low-grade rumble of the marsh. Then—a pulse. Something layered, almost rhythmic.\r\n\r\nIn the distance Dallas heres the creature cry again.\r\n\r\nINT. DALLAS KITCHEN\r\n\r\nDallas steps off the boardwalk onto a narrow dirt path that runs behind the houses, where lawns thin into reeds and the creek bends toward the marsh.\r\n\r\nDallas goes over and tends to the creature - but this time it is visually shaken. Dallas sits next to it on a chair and waits for it to calm down. \r\n\r\nAs Dallas sits - his eyes get heavy - and he suddenly catches himself snoozing. He gets up - and sees Sierra's tape recorder on the desk. He stumbles over for a bit and presses play. \r\n\r\nAs he does, he notices that the creatures' cry begins to cease - but as it does - so does the recording. Dallas realizes that  her voice dissolve into the creature's ongoing frequency. \r\n\r\nHe replays the clip. But nothing, it is blank. Dallas plays it again, distraught.\r\n\r\nHis elbow brushes the stack of Sierra's folders. One slides open—a corner of a sketch visible. Something with wings. He pushes it closed without looking. \r\n\r\nAs he is listening another burst hits the ongoing recording. Dallas looks up from his desk and peers outside. Another faint hum.  \r\n\r\nINT. DALLAS' HOUSE - KITCHEN - EVENING\r\n\r\nDallas stands at the window, staring into the ripping field. The storm is brewing, but the movement in the grass is wrong.\r\n\r\nDallas goes to look at the creature in his makeshift box. It is breathing. Dallas begins to examine all of the blood - it seems to have darkened. \r\n\r\nHe touches the photo of his late wife on the side of the receiver. The contact is long.\r\n\r\nThe hum begins again, lower this time. His equipment remains silent, unable to register the frequency, but the windows of the house begin to rattle in their frames. \n\n<div class=\"script-addition\">\n\n> addition\n\n\r\nThe overhead light dims—not a flicker, but a slow, steady drain, as if something is pulling the current out of the walls. Then it returns to full brightness.\r\n\r\nA doorbell is heard off screen breaking Dallas out of his trance.\r\n\r\nINT. DALLAS' HOUSE - HALLWAY - NIGHT\r\n\r\nDallas opens the door to find Dominic.\r\n\r\nDOMINIC\r\nThank you for watching Howie - how did he do? \r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nDallas looks over to Howie who is resting on the sofa, exhausted, sleeping. \r\n\r\nDALLAS\r\nGood\r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nAsher looks behind Dallas at all of the equipment. Dallas hands Howie over to Dominic. \r\n\r\nDOMINIC\r\nOkay - we'll - we'll be on our way. Hey - are you still okay with hosting lifegroup on Thursday.\r\n\r\nDALLAS\r\nThis Thursday?\r\n\r\nDOMINIC\r\nYeah, is that still good?\r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nDallas peers toward the kitchen.\r\n\r\nDALLAS\r\nYeah, should be good. \r\n\r\nDOMINIC\r\nOkay... Hey - everything okay?\r\n\r\nDALLAS\r\nYeah - sorry - I'm just a little tired. \r\n\r\nDOMINIC\r\nAlright well rest well big guy. \r\n\r\n<!-- scene: 11 file: s11.md nickname: howie-walk-2 -->\n\n(action)\nAsher and Dominic and Howie leave and walk into the next side door. Dallas watches them - and then watches the tall grass sway in the wind. \r\n\r\nDallas rushes to the kitchen and finds that the creature sleeping peacefully. \r\n\r\n\n\n---\n\n\n## ACT II — The Creature\n\n---\n\n\n### Scene 12: The Burn Mark & Costco\n\n*ACT II — The Creature | ID: the-burn-mark | File: s12.md*\n\n---\n\n<!-- scene: 12 file: s12.md nickname: the-burn-mark -->\n\n<!-- nickname: THE FIRST NIGHT WITH CREATURE  -->\r\n<!-- summary: Wires on the creature's head. It sings through its back-holes. She can't tell anyone. -->\r\n\r\nINT. DALLAS DESK\r\n\r\nDallas is alone. He keeps peering through his late wife's old documents. \r\n\r\nOn the desk is the recorder and all of the tapes next to it. \r\n\r\nINT. KITCHEN\r\n\r\nDallas lays tiny wires on the creature's head, connecting them to his handheld. \r\nWhen the creature is calm, it emits a low, melodic tone through the holes in its back. The creature's holes shift—the sound becomes a sad cry, like a whimper.\r\n\r\nINT. DALLAS ROOM - NIGHT\r\nDallas falls asleep on his futon. \r\n\r\nINT. DALLAS ROOM - NEXT MORNING\r\n\r\nDallas wakes up to find the place a mess. He gently puts down all of the notes. As he does, he reads one page from the Sierra box - with much interest. \r\n\n\n---\n\n\n### Scene 13: Entering Grass & The Hollow\n\n*ACT II — The Creature | ID: entering-grass | File: s13.md*\n\n---\n\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n# Scene 13: The Confrontation\r\n<!-- summary: Burn mark in the grass. The Mother's Vision: a silhouette in the reeds whispers a lullaby. The stake is now personal. -->\r\nEXT. DALLAS HOUSE - NEXT MORNING\r\n\r\nThe morning air is thick with the scent of ozone. Dominic''s minivan idles in the driveway. \r\n\r\nMakayla and Asher don't follow him. They wander toward the edge of Dallas's property.\r\n\r\nDominic walks right up to Dallas' doorway and knocks loudly. \r\n\r\nMAKAYLA\r\nAsher, look.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nIn the middle of the yard is a jagged, blackened  burn mark in the grass that resembles beads in paint hitting a white canvas - but on the green grass. It looks as if a drip of yellow blood is around it - acreating a trail. At its center lies a small, translucent crystal.\r\n\r\nMakayla kneels and touches it. Her hair begins to flutter, static electricity pulling the strands toward the stone. She quickly pockets it.\r\n\r\nMakayla notices a trail leading from the edge of the grass toward Dallas.\r\n\r\nEXT. DALLAS's HOUSE -  DOORWAY \r\nMakayla stares at Dallas for a good while - and reads his eyes.\r\n\r\nMAKAYLA\r\nI think we shoud talk.\r\n\r\nDALLAS\r\nYeah?\r\n\r\nMAKAYLA\r\nYes. \r\n\r\nDALLAS\r\nOkay.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla turns to the burn marks. \r\n\r\nMAKAYLA\r\nWhat is that outside your house?\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nDallas looks outside and sees that there are a bunch of burn marks on the edge of the tall grass. \r\n\r\nA whimper is heard from the kitchen. \r\n\r\nMAKAYLA\r\nWhat is that?\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla pushes past Dallas and runs to the kitchen. \r\n\r\nINT. DALLAS KITCHEN - MOMENTS LATER\r\n\r\nDallas and Makayla hover around the table at the makeshift aquarium Dallas constructed.\r\n\r\nASHER\r\nWhat is it?\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla pulls out her portable viewfinder and begins to inspect the creature further. \r\n\r\nMAKAYLA\r\nI am not sure... How long has it been here for?\r\n\r\nDALLAS\r\nAround 2 hours.\r\n\r\nMAKAYLA\r\nLook at this, look how it breathes.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nThe pair look closer at the creature - it seems to brath through its back. Makayla touches the creature gently - which causes the Oscillator around it to spark.\r\n\r\nMAKAYLA\r\nWe can't tell anyone about this.\r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nMakayla turns to Dallas who nods in agreement.\r\n\r\nMAKAYLA\r\nMr. Dallas, where did you find it?\r\n\r\nDALLAS\r\nI am not sure exactly. It was dark. \r\n\r\nMAKAYLA\r\nAnd why did you grab it?\r\n\r\nDALLAS\r\nIt looked like it was injured.\r\n\r\nMAKAYLA\r\nAnd is it?\r\n\r\nDALLAS\r\nI think so. \r\n\r\n<!-- scene: 13 file: s13.md nickname: entering-grass -->\n\n(action)\nDallas walks over and pulls over his bright electronic lamp over it. Where it shows the different burn marks. \r\n\r\nMAKAYLA\r\nLook at that!\r\n\r\n\r\nMakayla turns to Dallas. \r\n\r\nMAKAYLA\r\nGreat - okay Dallas - where is it. \r\n\r\nINT. DALLAS KITCHEN\r\n\r\nMakayla stand dumbfounded looking at the creature - they can't believe it. They walk around Makayla stares at it for a good while. \r\n\r\nMakayla brushes the creature's wing, hears a lullaby, and sees her mothers silheottue in the distance. \r\n\r\nMakayla shakes her head and looks at Dallas.\r\n\r\n\r\n\n\n---\n\n\n### Scene 14: Creature Rescue\n\n*ACT II — The Creature | ID: creature-rescue | File: s14.md*\n\n---\n\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n# Scene 14: The Connection\r\n<!-- summary: They sit with the creature. Evidence. A bond. Howie at their feet. -->\r\n\r\nINT. DALLAS KITCHEN\r\nDallas sits on a stool and in an almost daze watches Makayla from far away as she and Asher look at the creature from afar. \r\n\r\nMakayla begins to sketch the creature. Careful, precise lines. The back-holes. The ears. The glow. She is documenting it the way a scientist would, not the way a teenager would.\r\n\r\nEXT. DALLAS BACKYARD - OLD PICNIC TABLE \r\n\r\nMakayla and Dallas look on the ground for a while as they sit outside the patio. Howie sleeps peacefully near Dallas' feet nearby.\r\n\r\nAsher sits alone a few feet away—drawing in his notebook. Not the creature; repeating shapes, like the burn mark pattern.\r\n\r\nMAKAYLA\r\nSo your wife was an Epistemologist? \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at Makayla. \r\n\r\nMAKAYLA\r\nShe studied how fish communicate underwater. \r\n\r\nDALLAS\r\nShe did.\r\n\r\nMAKAYLA\r\nI'm sorry for your loss.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at the ground.\r\n\r\nMAKAYLA\r\nOur mom died too.  Janice was her sister, Dominic is her younger brother. We used to live with her - but now we stay with Uncle Dominic. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe room grows quiet.  Asher, breaking the tension, appears busy trying to connect wires up to the computer. But he stops as he looks at the distance, then the ground, then the tall grass. His finger traces something on his leg—the same pattern, over and over. \r\n\r\nOutside the window, the wind picks up.  Dallas looks out the window.\r\n\r\nMAKAYLA\r\nWhat is it?\r\n\r\nEXT. DALLAS BACKYARD - OLD PICNIC TABLE - CONTINUOUS\r\n\r\nThe group look out  at the edge of the tall grass\r\n\r\nDALLAS\r\nIs Asher okay?\r\n\r\nMAKAYLA\r\nHe's fine... He's just processing. \r\n\r\nDALLAS\r\nAnd how are you doing?\r\n\r\nMAKAYLA\r\nI'm fine.\r\n\r\nDALLAS\r\nWhat did you see?\r\n\r\nMAKAYLA\r\nNot sure... I'm not sure - I feel a bit uninspired. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla takes a deep breath and looks at Dallas.\r\n\r\nMAKAYLA\r\nWhat do you do when you are sad? Like sad all the time. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks at Howie and then at Makayla.\r\n\r\nDALLAS\r\nI don't know.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas and Makayla sit for a while on the long old picnic table outside his house.\r\n\r\nMAKAYLA\r\nWe need to document this... Dallas. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla looks at Asher and then back at the house. \r\n\r\nMAKAYLA\r\nWe can't tell anyone about this. The sound it made. We should try to record that.\r\n\r\nMAKAYLA\r\nThe frequiences that that creature is making.\r\n\r\nDALLAS\r\nIt seems to be recording.\r\n\r\nMAKAYLA\r\nRecording what? \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe breeze overwhelms them both.\r\n\r\nINT. DALLAS'S KITCHEN - LATER\r\n\r\nMakayla and Dallas walk into the kitchen and find the creature sleeping peacefully below the heat lamp. \r\n\r\nMAKAYLA\r\nI find it interesting that your wife was an epistemologist - you know, Scientists used to think that the sea was silent - but our ears just can't pick up the right frequenies.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nDallas looks around at his kitchen island - which has turned part into a triage hospital station. He’s wired a portable oscilloscope.  The device pulses in a rhythmic, golden jagged line — in sync with the creature's heartbeat.\r\n\r\nIn the distance they hear howls - and then silence again. \r\n\r\nThe creature begins to fade - Dallas turns the dial into another frequency range and waits until it is asleep. \r\n\r\nMAKAYLA\r\n(to Dallas)\r\nWhat does that do?\r\n\r\nDALLAS\r\n(whispering)\r\nIt changes the frequency I am broadcasting.\r\n\r\nMAKAYLA\r\nIt looks like the creature is responding to it.\r\n\r\nDallas\r\nYes. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla looks down and thinks for a moment.\r\n\r\nMAKAYLA\r\n(to Dallas)\r\nYou know, Mr. Mike has been telling Asher things for years... They have some special bond.... Mr. Mike's grandfather was an explorer - who claims that he knew of a creature like this that his father saw when he first immigrated. \r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMeanwhile,Asher comes in and gathers around the creature too—notebook in one hand, pencil still. He doesn't draw it. Just watches. His finger traces a small pattern on the edge of the island. \r\n\r\nDallas adjusts the dial on his military receiver to a 115.3 MHz frequency. The creature's breathing stabilizes. It lets out a low, melodic tone through its back-holes.\r\n\r\nMakayla leans over the oscilloscope. She points at the screen. \r\n\r\nMakayla looks at Dallas and then at the creature and pulls out a small prototype from her backpack. \r\n\r\nThe two look at each other for a moment.\r\n\r\nDALLAS\r\nWhat is that?\r\n\r\nMAKAYLA\r\nAn amplifier.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nMakayla turns and places the crystal she has found inside a palceholder for where a battery would go on a circut board.\r\n\r\nShe turns to the creature and turns it on. \r\n\r\nThe creature starts to wiggle.\r\n\r\nBehind the creature's smooth sine wave, a second signal appears—jagged, arrhythmic. It pulses in sharp, irregular bursts, riding underneath the creature's frequency like static beneath music.\r\n\r\nMAKAYLA (CONT'D)\r\nThat's not coming from the creature. That's drawing from outside.\r\n\r\n<!-- scene: 14 file: s14.md nickname: creature-rescue -->\n\n(action)\nThe group looks at the creature and then at the oscilloscope and then at the sway of the tall grass outside. \r\n\r\nMAKAYLA\r\nDallas - I have something I want to show you. \r\n\n\n---\n\n\n### Scene 15: The Burn Mark\n\n*ACT II — The Creature | ID: the-burn-mark-2 | File: s15.md*\n\n---\n\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n# Scene 15: Makayla's Lair\r\n<!-- summary: Reverse Device mission born. Dallas calibrates the oscillator using Mr. Mike's numbers. A countdown begins. -->\r\n\r\nEXT. NEIGHBORHOODS - EVENING \r\nThe crew walk towards the neighborhood and begin the long process of making their journey down golden hour filled woodland area - as they approach a big field open field. At the end of the field are some tall trees. \r\n\r\nMAKAYLA\r\nDid you know some peptide crystals can conduct electricity? \r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nThe crew walk into the field and find a small wooden structure hidden inside. \r\n\r\nEXT. MAKAYLA'S LAIR - CONTINUOUS\r\nAs they approach the structure, they can see that it is a small wooden structure made out of fallen trees and branches. \r\n\r\nImmeditaley outside the structure, seems like there are some trail cameras and other surveillance equipment.  \r\n\r\nOne device in particular intrigues Dallas. He grabs it and holds it up to his ear. \r\n\r\nMAKAYLA\r\nDo you believe in fate Mr. Dallas?\r\n\r\nDALLAS\r\nI am not sure.\r\n\r\nMAKAYLA\r\nWell you tell me how, last year - before my father passed - he left us a bit of random land in his will. You are looking at a solid acre of Amaranto land. Uncle Dominic and Aunt Janice aren't keen on touching or doing anything with it - so Asher and I built this. \r\n\r\nDALLAS\r\nWhat is it?\r\n\r\nMAKAYLA\r\n(ignoring his question)\r\nAnd funny thing about fate, is - right as we were searching this land - we found this.\r\n\r\nINT. MAKAYLA'S LAIR - CONTINUOUS\r\n\r\nMakayla gives Dallas a tour of the outdoor lair. Around a semi-permanent wooden structure made out of fallen trees and branches. \r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla points to a small wooden box and gestures Asher to open it up. He walks over over the cables laid on the floor and does. \r\n\r\nASHER\r\n(to Dallas)\r\nHere.\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher hands Dallas a small wooden box. Dallas opens it and finds a small translucent crystal inside—a crude pyramid-like stone. Dallas holds it, fascinated.\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher taps it twice against Dallas's palm before letting go—his tell when he's sure about something. \r\n\r\nMAKAYLA\r\nWhat do you think?\r\n\r\nDALLAS\r\nSeems like a common quartz crystal..\r\n\r\nMAKAYLA\r\nAsher show him.\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher walks over and puts the cystal on top of a little bay area device . As he does - Makayla walks over to her computer running linux and starts typing away. Soon a program emerges that seemingly measures waveforms. \r\n\r\nMAKAYLA\r\n(to Dallas)\r\nDo you know what this?\r\n\r\nDALLAS\r\nSeems like a frequency analyzer...\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla makes a couple of clicks and looks at Asher - she nods. \r\n\r\nMAKAYLA\r\n(to Dallas)\r\nDo you know what this is?\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nDallas looks onward, the computer's monitor's waveforms and graphs seem to be moving in sync with Asher as he places the crystal on top of the device. It reacts viollently to it. \r\n\r\nDallas looks on in amazement.\r\n\r\nEXT. MAKAYLAS LAIR\r\n\r\nMakayla and Dallas sit on a wooden stool and watch Asher as he prepares for a small fire.\r\n\r\nMAKAYLA\r\nI think that the crystal is picking up something. And that creature. Like that wasn't normal. \r\n\r\nMAKAYLA\r\nThat is a reverse audiophone - capable of taking a recording and then projecting it back into reverse. I built it last summer - well Asher did the heavy lifting. \r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher hands Dallas a small translucent crystal in the shape of a crude pyramid-like stone. He taps it twice against Dallas's palm before letting go—his tell when he's sure about something. \r\n\r\nMAKAYLA\r\nAsher no.\r\n\r\nDallas holds the object in his hands fasicanted. Makayla takes it away and pockets it.\r\n\r\nMAKAYLA\r\nI think the crystal is a biological semi-conductor and somehow - the creature needs it - to purify it from the darkness. \r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla stops and thinks for a moment.\r\n\r\nMAKAYLA\r\nAsher, do you know the numbers Mr. Mike writes? \r\n\r\nASHER\r\nMaybe. I don't know. What do you mean?\r\n\r\nMAKAYLA\r\nDallas, dial in the tune to 11.53\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nDallas changes the notes of his oscillator and suddenly the creature wakes up. \r\n\r\nShe rewinds the tapes - and finds the glow - and then the dark shadows grow on the screen and completely decimate the small creature on the ground. \r\n\r\nMakayla looks at the dying creature. \r\n\r\nMAKAYLA\r\nDallas - could you interpret these readings and compile in your mind or something and tell me what they mean?\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla hands Dallas a bunch of papers to look through. \r\n\r\nMAKAYLA\r\nThis crystal - it is a phase inverter. If we run your Oscillator through it - it won't just broadcast sound - it should create a shield - a dome of silence needed to bring it back to its nest.\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla, Dallas, and Asher huddle around the creature. \r\n\r\nINT. LAIR MONTAGE\r\nMakayla and Dallas rig up the dials - Dallas connects the Oscillator into a shoulder rig with the crystal on the center and puts the prototype on the table. \r\n\r\nMAKAYLA\r\nWe need to bring this to the place where you found the creature. \r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla turns on the prototype - and nothing happens - but suddenly the creature wakes up and begins to howl loudly - making all of the equipment in the lair act funny.\r\n\r\nAsher clutches the creature to his chest. The creature begins to stir—and Asher's notebook slips from his hand. His pencil rolls. He begins to shake. Then he's on the floor. \r\n\r\nMAKAYLA\r\nAsher!\r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nMakayla runs to rescue Asher who is laying on the floor with his eyes wide open and his mouth wide open.\r\n\r\nASHER\r\nBring me back. \r\n\r\n<!-- scene: 15 file: s15.md nickname: the-burn-mark-2 -->\n\n(action)\nAsher snaps out of it and the crew are visuably shaken. Makayla holds Asher close and whipsers that it will be alright. \r\n\r\nDallas looks on and then at the equipment. \r\n\r\nMAKAYLA\r\nWe have to go. Now. \r\n\r\n\n\n---\n\n\n### Scene 16: The Escape\n\n*ACT II — The Creature | ID: the-escape | File: s16.md*\n\n---\n\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n# Scene 16: Asher Trance\r\n\r\nEXT. MAKAYLA'S LAIR\r\n\r\nMakayla and Dallas and Asher begin to make there way hastly out of the woods back to the field. \r\n\r\nAs the crew walk, they begin to notice that the tall grass around them is acting unusual. The crew walk in unease silence. \r\n\r\nAs they do - they see that dark figures are haunting them - but from a distance. \r\n\r\nAsher begins to shake and falls down to the ground. His eyes look directly at the sky and he begins to cry.\r\n\r\nASHER\r\n(in trance)\r\nLeave us alone. Leave us alone. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher begins to cry and shake. Dallas and Makayla rush to his side.\r\n\r\nMAKAYLA\r\nAsher!\r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nAsher slowly wakes up. \r\n\r\nMAKAYLA\r\nBreathe. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDallas looks at the tall grass - his portable oscilloscope begins to beep. The crew, little by little hear the distinct faint hum. \r\n\r\nMAKAYLA\r\nAsher, what did you see?\r\n\r\nASHER\r\nNot much - I don't really remember.\r\n\r\nMAKAYLA\r\nWhat don't you remember?\r\n\r\nASHER\r\nI don't know. \r\n\r\nMAKAYLA\r\nThe creature just gave you a direct communication from an intelligence outside of humanity and you can't tell me what they said or told you? \r\n\r\nASHER\r\nI guess not. \r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nMakayla huffs and walks faster. She circles around the wigwam and looks back at Asher.\r\n\r\nMAKAYLA\r\nI'm sorry little brother. \r\n\r\nEXT. DALLAS HOUSE\r\n\r\nThe crew walk back to Dallas's house. Makayla and Asher walk up to the front door and take Howie who was inside this time. Dominic pulls up and honks the horn.\r\n\r\nJANICE\r\n(leaning out the window)\r\nYou kids! I said the basement was off limits tonight so you're in Dallas basement now.\r\n\r\nMAKAYLA\r\nDallas, Uncle Dominic can't know about this. No one can. Not until we get more evidence. He'll freak out and make us take it back.\r\n\r\n<!-- scene: 16 file: s16.md nickname: the-escape -->\n\n(action)\nDallas looks onward and waves. \r\n\r\nDOMINIC\r\n(out the window)\r\nDallas, you ready. \n\n---\n\n\n### Scene 17: Makeshift Hospital\n\n*ACT II — The Creature | ID: makeshift-hospital | File: s17.md*\n\n---\n\n<!-- scene: 17 file: s17.md nickname: makeshift-hospital -->\n\n<!-- nickname: Back Home  -->\r\nINT. DALLAS MUDROOM - NIGHT (DURING LIFEGROUP)\r\n\r\nThe sound of the LifeGroup singing \"Great Is Thy Faithfulness\" is muffled by the heavy basement door. \r\n\r\nMAKAYLA, DALLAS, and ASHER are crouched in the mudroom, shoulder-to-shoulder. Dallas is strapping the Oscillator rig over his jacket. The Crystal is locked in the center, humming with the frequency of a low-voltage wire.\r\n\r\nMakayla taps the screen on her portable viewfinder. It’s a mess of jagged red lines.\r\n\r\nMAKAYLA\r\n(whispering)\r\nThe Shadows are spiking at the Creek Bend. We have ten minutes before the Crystal hits the inversion limit. If it burns out out there, we're blind.\r\n\r\n<!-- scene: 17 file: s17.md nickname: makeshift-hospital -->\n\n(action)\nDallas tightens the straps on the Oscillator rig over his jacket. The Crystal is locked in the center, humming with the frequency of a low-voltage wire.\r\n\r\n<!-- scene: 17 file: s17.md nickname: makeshift-hospital -->\n\n(action)\nAsher looks at his notebook and says 115.3.\r\n\r\n<!-- scene: 17 file: s17.md nickname: makeshift-hospital -->\n\n(action)\nMakayla clicks a \"Master\" switch on the device. A small, protective green light flickers on. \r\n\n\n---\n\n\n### Scene 18: Entering Grass\n\n*ACT II — The Creature | ID: entering-grass-2 | File: s18.md*\n\n---\n\n<!-- scene: 18 file: s18.md nickname: entering-grass-2 -->\n\n<!-- nickname: Makayla's Bond with Creature -->\r\n<!-- summary: Oscilloscope on the creature. 115.3 MHz. Makayla: it's pulling power from the grid. -->\r\n\r\n\r\n\r\nINT. DALLAS BASEMENT\r\n\r\nMakayla stares for a long time looking at the creature. \r\n\r\nMAKAYLA\r\n(to Dallas)\r\nI think it's dying. \r\n\r\n<!-- scene: 18 file: s18.md nickname: entering-grass-2 -->\n\n(action)\nDallas walks over and looks at the creature. He turns the dial on his receiver to a different frequency. The creature begins to perk up.\r\n\r\nMAKAYLA\r\nIt told me that it needs to go back. \r\n\r\nDALLAS\r\nBack where?\r\n\r\nMAKAYLA \r\nTo where you grabbed it.\r\n\r\n<!-- scene: 18 file: s18.md nickname: entering-grass-2 -->\n\n(action)\nThe summer breeze blows through the open window. \r\n\r\nMAKAYLA\r\n(to Dallas)\r\nWe are going to have to go before the red eyes take it. And take us. \r\n\n\n---\n\n\n### Scene 19: Life Group Arrives\n\n*ACT II — The Creature | ID: life-group-arrives | File: s19.md*\n\n---\n\n<!-- scene: 19 file: s19.md nickname: life-group-arrives -->\n\n<!-- nickname: life-group-arrives -->\r\n<!-- summary: Lifegroup tonight. Dominic drops off the music. The creature's downstairs—then Mr. Mike freaks. Everyone sees it. -->\r\n\r\nINT. DALLAS'S KITCHEN / LIVING ROOM - NIGHT\r\n\r\nFamilies arrive in waves. The small kitchen and smaller living room fill. The crowd tries Dominic's toasted Brussels sprouts, passed around on paper plates.\r\n\r\nMakayla drifts through the kitchen. She opens drawers quietly. Finds sugar cubes meant for coffee. Pockets one without a word.\r\n\r\nINT. DALLAS'S KITCHEN - EVENING\r\n\r\nDallas brings the creature inside. \r\n\r\nThe creature begins to fade. Dallas gently places it in the makeshift bed he created the dial to a normal frequency. The creature settles. Sleeps.\r\n\r\nHOWIE stays in the corner by the door, disturbed, waiting for his owner. Dallas tries to hide the creature. The moment it cries, the world outside echoes. The ugly hum answers from somewhere far away. The hum floods the town. Windows rattle. \r\n\r\nINT. DALLAS LIVING ROOM\r\n\r\nINT. DALLAS'S HALL - MOMENTS LATER\r\n\r\nThe first family for the life group: a young couple—JOSH and SARAH—with their newborn, JP. They introduce themselves to Dallas. He acts off. Distant. Dominic paces in the kitchen. Mr. Mike mutters in his chair, staring at the weather through the window. It's getting worse.\r\n\r\nMR. MIKE\r\n(to himself)\r\nThis is all a farce. They should be out there. Return it.\r\n\r\nJosh and Sarah know to ignore him. They smile, make small talk. Mr. Mike keeps muttering, almost in frustration.\r\n\r\nMR. MIKE\r\nOne-one-five point two. Hertz. Hertz.\r\n\r\nMAKAYLA \r\nWe have brownies about to be ready.\r\n\r\nJOSH\r\nMakayla, how's your mom doing?\r\n\r\nMAKAYLA\r\nShe's doing better thanks.\r\n\r\nJOSH\r\nDominic, where's the host.\r\n\r\nDOMINIC\r\nHe's downstairs in the basement - not feeling so good.\r\n\r\nSARAH\r\nHe knows we're here.\r\n\r\nDOMINIC\r\nYeah - he should be up in a second.\r\n\r\nMAKAYLA\r\nI'll go and check on him.\r\n\r\nINT. BASEMENT - CONTIOUS\r\n\r\nDallas glances at the basement door. Downstairs, the creature is not doing so good - but seems to be glowing - and the distant hum perks up again. \r\n\r\nINT. LIVING ROOM - CONTIOUS\r\n\r\nTYLER\r\nAlright crew, how is everyone's weeks going.\r\n\r\n<!-- scene: 19 file: s19.md nickname: life-group-arrives -->\n\n(action)\nThe group in a circle all look at eacother. \r\n\r\n\r\nINT. DALLAS' BASEMENT - CONTINOUS\r\n\r\n<!-- scene: 19 file: s19.md nickname: life-group-arrives -->\n\n(action)\nThe creature lays out a little whipmer. \r\n\r\nDallas adjusts the dial again. The creature quiets. The lights stabilize.\r\n\r\nMR. MIKE walks in behind him. He takes one look at the room and freaks out—like a dog afraid of thunder. He points at the basement door.\r\n\r\nMR. MIKE\r\nWhat is here? What is going on downstairs?!\r\n\r\nDominic steps between Mr. Mike and the stairs. He guides him back by the elbow.\r\n\r\nDOMINIC\r\nEasy. Easy. Nothing. Just\r\n\r\nMR. MIKE\r\nThere is something down there. \r\n\r\nDOMINIC\r\nWhat is going on. Mr. Mike what is wrong?\r\n\r\n<!-- scene: 19 file: s19.md nickname: life-group-arrives -->\n\n(action)\nMakayla signals to Asher who drops a plate on purpose.  \r\n\r\nDOMINIC\r\nWhat in the world?!\r\n\r\n<!-- scene: 19 file: s19.md nickname: life-group-arrives -->\n\n(action)\nDominic rushes over to the kitchen and sees that the brownies tray is smashed on the ground.\n\n---\n\n\n### Scene 20: Basement Huddle\n\n*ACT II — The Creature | ID: basement-huddle | File: s20.md*\n\n---\n\n<!-- scene: 20 file: s20.md nickname: basement-huddle -->\n\n# Scene 20: Back in Branford\r\n<!-- summary: The town is falling apart. Dallas and Makayla scavenge for protection. The Faraday Cage plan. -->\r\n\r\nEXT. BRANFORD TOWN COMMONS - DAY\r\n\r\nThe town is a ghost of itself. Streetlights flicker in broad daylight. A parked car’s alarm chirps rhythmically, then dies as its battery is sucked dry.\r\n\r\nMakayla and Dallas walk quickly toward a hardware store at the edge of the commons.\r\n\r\nMAKAYLA\r\nThe grid is bleeding. 115.3 MHz. It’s not just the creature anymore—something else is pulling the power. Resonant inductive coupling on a massive scale.\r\n\r\nDALLAS\r\n(looking at his dead Gauss meter)\r\nThe magnetic field is so localized it’s turning the marsh into a False North. We can’t navigate by compass.\r\n\r\nINT. HARDWARE STORE - CONTINUOUS\r\n\r\nThe store is empty, the power out. Dallas moves to the back, grabbing rolls of copper mesh.\r\n\r\nDALLAS\r\nIf we're going into that marsh, we need protection from the infrasound and the electrical bursts. \r\n\r\nMAKAYLA\r\n(grabbing a soldering iron and wire)\r\nFaraday cages. If we line our gear with this copper mesh, we can ground the attacks. Redirect the energy before it hits our nerves.\r\n\r\n<!-- scene: 20 file: s20.md nickname: basement-huddle -->\n\n(action)\nDallas starts cutting the mesh with heavy shears. Makayla watches him, a bit of the bravado fading.\r\n\r\nMAKAYLA\r\nYou think it’s going to work? The \"Anti-Wave\"?\r\n\r\nDALLAS\r\nIt has to. The crystal is the only thing that can flip the phase. Constructive resonance for the light, destructive for the shadow.\r\n\r\n<!-- scene: 20 file: s20.md nickname: basement-huddle -->\n\n(action)\nOutside, a transformer on a pole blows with a shower of blue sparks. The town goes completely dark. \r\n\r\nMAKAYLA\r\n(quietly)\r\nWe’re out of time. \r\n\r\nEXT. BRANFORD TOWN COMMONS - CONTINUOUS\r\n\r\nThey step out of the store, gear modified with crude copper shielding. They look toward the tall grass of the marsh, which is now swaying against the wind. \r\n\n\n---\n\n\n### Scene 21: The Hymn\n\n*ACT II — The Creature | ID: the-hymn | File: s21.md*\n\n---\n\n<!-- scene: 21 file: s21.md nickname: the-hymn -->\n\n<!-- nickname: the-hymn -->\r\n<!-- summary:  -->\r\n\r\nINT. DALLAS'S BASEMENT - SAME TIME\r\n\r\nDallas shuffles through a pile of old equipment—mono cables, spare parts. The creature doesn't look like it's doing much. It's breathing, slightly. Dallas struggles to find a bed for it. He settles on an old shoebox—pauses when he sees his wife's handwriting on one, sets that aside—and gently nestles the creature inside. Its little feet curl tightly. It breathes slowly.\r\n\r\n\r\nHe finds a way to poke a hole in something so it can drink. MAKAYLA and ASHER watch from the staircase. Makayla comes down. She takes out the crystal. It begins to glow. Her hair lifts. She and the creature seem to communicate—a beat of shared attention. The creature's glow dims as she pulls her hand away.\r\n\r\nINT. DALLAS'S LIVING ROOM - LATER\r\n\r\nPeople mill and talk. Someone asks where Dallas is.\r\n\r\n\r\nDOMINIC\r\nWe found a little cat. Dallas is downstairs nursing it.\r\n\r\nA woman stands—early fifties, warm.\r\n\r\nWOMAN\r\nI'm a retired vet. I could take a look.\r\n\r\nDOMINIC\r\nI mean— no, that's okay. I think that cat's just sleeping. We could check after?\r\n\r\nAn elderly woman nods. Everyone agrees. Someone asks how Howie is doing—where is Howie. JOSH, one of the young couples, leads the group. \r\n\r\nHe starts an opening ice breaker. Dallas, Dominic, Makayla, and Asher sit silent. \r\n\r\n<!-- scene: 21 file: s21.md nickname: the-hymn -->\n\n(action)\nSARAH, the vet, notices a physical reaction to her cup of tea - and watches it ripple in a strange way. \r\n\r\n<!-- scene: 21 file: s21.md nickname: the-hymn -->\n\n(action)\nDominic closes the windows and blinds.\r\n\r\nDOMINIC\r\nGetting rough out there\r\n\r\n<!-- scene: 21 file: s21.md nickname: the-hymn -->\n\n(action)\nTYLER, 32, a young man with a guitar, hands out music sheets.\r\n\r\nTYLER\r\nWould anyone like to say any words before we start?\r\n\r\nThey begin to sing a hymn. As the voices rise, the hum from the basement begins to rise with them.\r\n\r\nMR. MIKE barges through the front door with JANICE guiding him inside. \r\n\r\nMR. MIKE\r\nWhere is it? Where is it?\r\n\r\nJANICE\r\nOh, calm down Mr. Mike, we are here now.\r\n\r\nTYLER\r\nHello Mr. Mike - thank you for joining us!\r\n\r\n\r\n\r\n\r\n\n\n<div class=\"script-addition\">\n\n> addition\n\n\r\nThe overhead lights dim in time with the creature's harmonics—a slow pulse that matches the rhythm of the hymn. Sarah's tea ripples in her cup, concentric rings expanding outward in perfect time.\r\n\n\n</div>\n\n\r\n\r\nThe hum starts to upset people as it becomes unbearable.\r\n\r\nSubtle at first. Then undeniable. The floorboards vibrate. \n\n<div class=\"script-addition\">\n\n> addition\n\nThe lights pulse lower and lower. \n\n</div>\n\nPeople look at each other.\r\n\r\nAMY\r\nWhat was that?\r\n\r\n<!-- scene: 21 file: s21.md nickname: the-hymn -->\n\n(action)\nThe group listen in silence.\r\n\r\nPAT CLENDENEN\r\nMust be the wind. The boys in the office just texted me that the pressure's dropping fast.\r\n\r\nDallas stares at the basement door. The sound isn't the wind. It's an answer.\r\n\r\nDuring a silent moment of reflection, the hum starts again. Everyone is unsettled. What was that noise? The group settles on the weird weather—the storm, the patterns plaguing Branford. \r\n\r\nIn time, people leave. Hugs. Goodbyes. Dominic waves them out. He waits for the last person to leave. Then he rushes downstairs with the kids.\r\n\r\nINT. BASEMENT\r\n\r\nThe creature has escaped!\r\n\r\n\r\nHe searches the kitchen, the hall, haphazard. Makayla makes desperate eye contact with DALLAS, who is by the window with his equipment.\r\n\r\nMAKAYLA\r\nDallas, where is it?\r\n\r\nDALLAS\r\nI am not sure. \r\n\r\nThe crew search high and low. From a distance Dominic calls them to come upstairs for they are about to do praise reports. \r\n\r\nMAKAYLA\r\nWhat happened?\r\n\r\nDallas doesn't answer. Makayla reads his face.\r\n\r\nMAKAYLA\r\nThe creature?\r\n\r\n<!-- scene: 21 file: s21.md nickname: the-hymn -->\n\n(action)\nDallas nods. Makayla grabs his device off the table. DOMINIC appears and grabs her wrist. The three of them stand there. From the direction of the marsh—a cry. Distant, unmistakable. The creature. Then the hum, low and everywhere.\r\n\r\nMakayla pulls free. She turns to both of them. Her eyes dart in the direction of the tall grass on the edge of Dallas' yard. \r\n\r\nA beat. Dallas stares at her.\r\n\r\nMAKAYLA (CONT'D)\r\nWe have to go back.\r\n\r\nDallas looks at the tall grass. At the reading. At her. Then toward the house—Howie. They grab him and start down the trail.\r\n\n\n---\n\n\n### Scene 22: Red Eyes\n\n*ACT II — The Creature | ID: red-eyes | File: s22.md*\n\n---\n\n<!-- scene: 22 file: s22.md nickname: red-eyes -->\n\n# Scene 22: Sierra's Folder\r\n<!-- summary: They find it in the gnarl. It's fading. Sierra's folder: if the Red-Eyes take them, it's all ghost stories. They'll return it. -->\r\nEXT. DALLAS PORCH\r\n\r\nMakayla, Asher and Dallas stand outside. The hum rises. Asher's hand is in his pocket—on the crystal. He's not drawing. \r\n\r\nMAKAYLA\r\nWe should go to the fortress—we got to find a way to see what's going on in there.\r\n\r\nASHER\r\nI don't want to go back, Makayla.\r\n\r\nMAKAYLA\r\nThat's fair. Dallas we'll go.\r\n\r\n<!-- scene: 22 file: s22.md nickname: red-eyes -->\n\n(action)\nDominic takes the last package of grocies back into his minivan.\r\n\r\nThey work in silence—listening, adjusting, mapping the signal. Makayla pulls out Sierra's folder and cross-references a frequency notation with what's on screen. A match.\r\n\r\n\r\nINT. DALLAS'S STUDY - SAME TIME\r\n\r\nMakayla sits cross-legged on the floor. Around her: a scattered pile of folders, cassettes, and loose pages. A label on the box reads \"SIERRA.\" She opens a manila folder and stops. Inside: hand-drawn sketches—anatomical, careful. Golden creatures with back-holes and translucent ears. Dated 1978.\r\n\r\nShe flips through. More sketches. Frequency notations. A map of the marsh with circles drawn in red ink. Sierra had documented everything.\r\n\r\nMakayla carries the folder outside.\r\n\r\nEXT. DALLAS'S BACKYARD - CONTINUOUS\r\n\r\nShe holds the open folder in front of Dallas. He stares at the sketches. His wife's handwriting. He can't speak.\r\n\r\nMAKAYLA\r\nThey've been here since the seventies. Hiding in the noise.\r\n\r\nShe closes the folder. Holds it against her chest.\r\n\r\nMAKAYLA (CONT'D)\r\nIf the Red-Eyes take them out tonight, this folder is just a collection of ghost stories. I'm not letting them become a myth again.\r\n\r\nDallas looks at her. Then back at the grass.\r\n\n\n</div>\n\n\r\n\r\nDominic comes outside.\r\n\r\nDOMINIC\r\nWind's picking up.\r\n\r\nDallas doesn't
