 ground.\n\nINT. HALLWAY- CONTIOUS\nDominic shuts the door. \n\nDOMINIC\nAlright, let's see this cat. \n\n<!-- scene: 19 file: s19.md nickname: the-hymn -->\n\n(action)\nDominic heads toward the basement alone. Dallas's stomach drops. He and Makayla exchange a panicked look. Asher starts bouncing his leg.\n\n\n---\n\n\n### Scene 20: Red Eyes\n\n*ACT II — The Creature | ID: red-eyes | File: s20.md*\n\n---\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n# Scene 20: The Secret is Out\n\n\nINT. BASEMENT - CONTINUOUS\n\nDominic descends the stairs, expecting a stray kitten. \n\nInstead: military-grade oscillators, tangles of thick coaxial wire, and Sierra's folder spread open. The shoebox under the heat lamp is empty. The small basement hopper window is busted open, rain blowing in from the outside.\n\nINT. DALLAS'S LIVING ROOM - CONTINUOUS\n\nDallas frantically taps his receiver. The needle flickers back and forth between frequencies. \n\nMAKAYLA\nDallas! Where is it?\n\nDALLAS\nIt's gone. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nFrom the direction of the marsh—a cry emerges that sounds like the creature. \n\nMAKAYLA\nIt went back.\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nBefore Dallas can move, DOMINIC appears at the top of the basement stairs holding Sierra's folder of anatomical creature sketches. His face is pale. He looks at Dallas like he doesn't know him.\n\nDOMINIC\nDallas... what is this? \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDallas makes eye contact with Dominic. Outside, the hum increases and Dallas' eyes fall toward the window. Out at the tall grass swaying in the dark. The Red-Eyes are pulsing at the edge of the property.\n\nMAKAYLA\nWe have to get out there and find it before the Red-Eyes do.\n\nDOMINIC\nThe what? Makayla what is going on? Where's the cat?\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla looks at Dominic with a serious expression.\n\nDOMINIC\nMakayla! I told everybody we had a cat! You’ve got military weapons down there.  \n\nMAKAYLA\nUncle, listen—\n\nDOMINIC\nNiece, I listen. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla points hard at the window. Asher walks over to Dominic and hands him the device with the cystral on it.\n\nDOMINIC\nI don't get it. What is this? \n\nASHER\nIt's to keep them at bay.\n\nDOMINIC\nKeep what at bay?\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nAsher points to the window. Dominic glances out the window and sees the red eyes. He turns back to Asher and then to Makayla. \n\nSuddenly, the lights in the house flicker and within a moment, the room plunges into pitch black. \n\nINT. DALLAS'S LIVING ROOM - CONTINUOUS\n\nMakayla reaches from her backpack and grabs a bunch of flashlights and starts to hand them out to everyone. \n\nDOMINIC\nWe can't go out there.\n\nMAKAYLA\nWe have to.\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDominic looks defeated. From the corner of the room Mr. Mike rocks back and forth in his chair. Dominic rushes over to see him. \n\nDOMINIC\nMr. Mike, are you okay?\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMr. Mike looks at Dominic with a blank expression. He points toward the window. \n\nMR. MIKE\nThey're going to come. Look outside. The marks. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla looks out the window and sees the burn marks on the grass. \n\nMAKAYLA\nDallas. Look. \n\nEXT. DALLAS'S BACKYARD - CONTINUOUS\n\nDallas, Makayla and Asher walk outside in the backyard and witness the burn marks lead from the driveway toward the house—crawling along the siding and spider-webbing up toward the windows. A corrupt vein system trying to infect the home. \n\nMakayla stares at the black veins on the wood. She slowly rolls up her wet sleeve. \n\nBeneath her skin, identical black, twisting veins pulse faintly along her forearm. \n\nDallas sees it. He rips back his own jacket sleeve. His wrist is covered in the same creeping rot. \n\nHe looks up at the towering shadows at the edge of the property. The hum from the tall grass is deafening. \n\nMAKAYLA\nDo you think this will work?\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDallas nods. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla drops to her knees, ripping open Dallas's gear bag. She scrambles out a portable speaker, slamming it onto the porch railing, aiming it directly at the creeping burn mark like a shotgun. \n\nDallas rips the wire with his teeth and bridges the crystal into the circut. \n\nMAKAYLA\n Asher—the numbers!\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nAsher's hands fly over the oscillator dial with  1-1-5-3. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla hits the trigger. \n\nA sound like thick glass cracking under pressure pierces the air. A high-pitched, localized frequency beam hits the lawn. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nThe grass at the edge of the yard sways rhythmically,in a direction opposit of  the wind. \n\nDallas, Makayla, Asher and Dominic watch, stunned, as the \"vein\" burn mark physically recoils. \n\nIt turns from a dark black—to a sickly brown—and back to a vibrant, natural green. The acoustic beam healed the earth.\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla looks back at the tree line.\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDallas nods, his jaw tight. He looks at Dominic. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDominic looks at the fading burn mark on the grass. He looks at Asher, vibrating with anxiety in the cold. Finally, Dominic exhales sharply. \n\nDOMINIC\nI think I am going to sit down, not feeling so good. \n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nDominic sits down on the outside porch.\n\n<!-- scene: 20 file: s20.md nickname: red-eyes -->\n\n(action)\nMakayla lifts the sparking portable speaker. She sweeps the invisible acoustic beam across the yard like a lighthouse beam. The a small glint of a red eye - is glimmering in the distance.  A wall of Red-Eye shadows violently flinches, peeling back into the reeds and leaving a temporary, circular safe zone in the pouring rain. \n\nThe orbs turn into red orb and then grow into a shadow which takes shape into a humanoid darkness with red eyes.\n\nBut there are too many. Hundreds of red eyes begin to dot the tree line. The sheer numbers are overwhelming the small portable speaker.\n\nThe crew turn and sprint back into the house, slamming the door.\n\n\n---\n\n\n### Scene 21: Creature Missing\n\n*ACT II — The Creature | ID: creature-missing | File: s21.md*\n\n---\n\n<!-- scene: 21 file: s21.md nickname: creature-missing -->\n\n# Scene 21: The Burn Marks\n\nINT. DALLAS LIVING ROOM\nThe crew hold the door down.\n\nDOMINIC\nOkay - what is happening. \n\n<!-- scene: 21 file: s21.md nickname: creature-missing -->\n\n(action)\nMakayla and Asher run towards the window. \n\nMakayla's eyes widen as she see the glow from the creature in the tall grass. \n\nMakayla abruptly turns, grabs a flashlight and runs out the front door. \n\nEXT. DALLAS'S BACKYARD - NIGHT \nDominic bursts through the porch door after her. The wind whips his hair. Asher and Dallas follow close behind. \n\nMakayla runs straight for the tall grass at the edge of their house. Dominic follows her.\n\nDallas and Asher stop at the edge of the porch. In the distance: a pair of eyes. Bright. Dim. Bright. Red. And then gone. \n\nThey look again. Closer. The eyes reappear. Swirling through the beating wind and the tall grass. They seem like they following Makayla's flashlight. \n\n\n---\n\n\n## ACT III — The Return\n\n---\n\n\n### Scene 22: Marsh Confrontation\n\n*ACT III — The Return | ID: marsh-confrontation | File: s22.md*\n\n---\n\n<!-- scene: 22 file: s22.md nickname: marsh-confrontation -->\n\n# Scene 22: The Load-Out\n\nEXT. DALLAS'S BACKYARD - CONTINUOUS\nThe burn marks lead from the driveway toward the house—crawling along the siding and spider-webbing up toward the windows. A corrupt vein system trying to infect the home. \n\nThe wind drops, the howling stops. Then it starts. The Hum. \n\nIt rises from the marsh, a dense, low-grade vibration that rattles Dallas’s teeth. Slowly, at the edge of the tall grass, the darkness itself seems to thicken. \n\nAsher and Dallas look at each other. \n\nASHER\n(pointing into the void)\nThey're coming.\n\n<!-- scene: 22 file: s22.md nickname: marsh-confrontation -->\n\n(action)\nFrom the edge of their property, through \nPairs of red eyes blink into existence. Two. Then four. Then a dozen. They drift back and forth. aren't walking—they are drifting, heavy and crushing, actively erasing the sound of the wind as they move closer to the yard. \n\nThe house shudders violently. The rotting black veins are creeping under the front door. The red glowing eyes bleed through the window panes.\n\nEXT. MARSH - CONTINOUS \nMakayla runs towards the golden light. Hums around her grow deafening. Dominic chases after her. \n\nEXT. DALLAS HOUSE - CONTINOUS\nIt’s a frantic, desperate load-out. Dallas and Asher heave the massive speakers onto their shoulders, wrapping heavy nylon straps around their chests to distribute the weight. \n\nThe front door bows inward, the wood groaning and cracking under immense, unseen pressure. Black rot explodes across the grass towards the door. \n\nThey burst out the back door, burdened by the heavy equipment, just as the living room windows shatter inward behind them. \n\nThe massive, formless shadows pour into the house—but the crew is already sprinting toward the edge of the tall grass. They plunge into the suffocating darkness of the marsh.\n\n---\n\n\n### Scene 23: Predator Attack\n\n*ACT III — The Return | ID: predator-attack | File: s23.md*\n\n---\n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n# Scene 23: The Trench Run\n\nEXT. TALL GRASS - CONTINUOUS\nDallas and Asher enter the tall grass carrying all of the equipment. \n\nThe nylon straps bite into Dallas' shoulders - straining the fabric. \n\nDallas stops for a moment in pain, almost dropping the speaker on Asher. He looks down at his hand - the black veins pulse under his skin, Dallas in pain, drops the speaker into into the mud with a wet heavy thunk.\n\nDallas looks at his arm it begins to look transulent. \n\nIn the distance Makayla begins to cry. \n\nSuddenly, Dominic appears and runs towards Dallas and Asher.\n\nDOMINIC\nI can't find Makayla.\n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDominic begins to pace around and hits his inhaler. \n\nDOMINIC\nMAKAYLA!  \n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDallas and Asher continue to make their way with the spaeker. Dallas drops to the ground.  \n\nDOMINIC\nDallas you okay?\n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDallas grips his arm tightly and stoticly marches onward.  Dominic takes a big hit of his inhaler. \n\nAs they cross into the threshold, they plunged into  sensory deprivation. \n\nThe tall grass towers over their heads, ten feet high and thick like jungle vines. The wind is howling, whipping the stalks in violent, unpredictable rhythms. \n\nIt is pitch black. The only light is the small, blinking green LED on Makayla’s chest rig. Dallas, Dominic and Asher follow it.\n\nDallas and Asher catch up with Dominic and Makayla who are out of breath in the pitch black. \n\nDOMINIC\nMakayla, lets go back.\n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nMakayla moves forward.\n\nEverybody moves quickly in single file. Makayla is leading, sweeping the handheld speaker back and forth like a flashlight. Behind her is Asher, hunched low, clutching the backpack with the golden creature. Dallas and Dominic take up the rear, breathing heavily, their boots sinking deep into the marsh mud under the crushing eighty-pound weight of the massive speakers. \n\nMAKAYLA\nStraight ahead. \n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nThe air is thick, humid. Heavy. The \"veins\" of black rot are everywhere on the ground, hissing as the rain hits them. \n\nASHER\nThey're above us. \n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nDallas looks up. Above the swaying tops of the grass, massive, formless shadows drift lazily through the storm clouds like storm surges. They are hunting. Searching. Hundreds of glowing red eyes piercing the dark. \n\nSuddenly, a massive shadow drops down into the grass fifty feet ahead of them. \n\nThe concussive force of its landing knocks Dominic to his knees. His speaker groans, the heavy wood sliding dangerously on his shoulder. \n\nDOMINIC\nI'm slipping. \n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nMakayla freezes. The Red-Eye is directly in their path, thrashing through the reeds. Its black, rotting tendrils search the dirt in a wide arc. \n\nMAKAYLA\n(panic rising)\nIt's patrolling. \n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nThe shadow creeps closer. Forty feet. Thirty feet. The black rot spreads toward Dominic's boot. \n\nIt stops. Its massive red eyes scan the area. It senses something. The silence stretches. Dallas tightens his grip on the nylon strap holding his speaker. \n\nAsher steps forward from behind Makayla. He closes his eyes and reaches his hand out toward the swaying grass. He taps his leg twice. He begins to hum. \n\nIt's a bizarre, off-key sound—but mathematically perfect to the exact frequency he heard the creature make earlier. \n\nThe Red-Eye snaps its head in the opposite direction. Off to the right. Following the echo of Asher's voice, which he mysteriously managed to throw fifty feet away. \n\nThe massive shadow turns and drifts off into the darkness, chasing the ghost sound. \n\nMakayla exhales slowly. \n\nMAKAYLA\nAsher... how did you do that?\n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nAsher just points forward into the dark. \n\nASHER\nWe have to keep moving. The center is close. \n\nDominic groans, pulling his boot out of a foot of thick, sucking mud. He adjusts the eighty-pound weight on his shoulder. Dallas grabs his arm, helping him up. \n\nDALLAS\nYou good?\n\nDOMINIC\n(gritting teeth)\nNever better. Just a light hike in the country. Let's go. \n\n<!-- scene: 23 file: s23.md nickname: predator-attack -->\n\n(action)\nThey push forward, deeper into the howling void.\n\n\n\n---\n\n\n### Scene 24: The Perimeter\n\n*ACT III — The Return | ID: the-perimeter | File: s24.md*\n\n---\n\n<!-- scene: 24 file: s24.md nickname: the-perimeter -->\n\n# Scene 24: The Sanctuary & The Siege\n\nEXT. CENTER OF THE MARSH - LATER\n\nThe howling wind suddenly dies down. \n\nMakayla breaches through a thick wall of reeds and stops. Dallas, Dominic, and Asher break through behind her, collapsing to their knees in the mud under the weight of the speakers. \n\nThey are standing in a perfect, geometric ring of flattened grass. It’s almost perfectly circular, about fifty feet in diameter. The tall stalks around the edge are woven together tight like a wicker basket, forming an impenetrable wall. \n\nInside the ring, it is completely calm. The storm raging directly above them doesn't penetrate the space. It’s eerily tranquil. \n\nAnd it is glowing. \n\nSitting in a circle in the center of the flattened grass are the Golden Elders. They are slightly bigger than the injured creature. About a foot taller than the injured creature, covered in thick, iridescent golden fur. They look ancient. Wise. \n\nThey are humming. A deep, resonant, multi-chord frequency that visibly vibrates the air around them, creating a faint, shimmering golden dome over the sanctuary. \n\n The glowing pulse in its neck, which had been weak and erratic, suddenly flares bright gold as it hears the song. \n\nAsher lifts the small creature and gently sets it down in the mud. The tiny being stumbles forward, letting out a high-pitched chirp. \n\nOne of the giant Elders turns its head. It sees the baby. \n\nThe Elder approaches it with deliberate grace. And begins to gently sway. \n\nThe Elder looks up at Asher. Then at Dallas. It slowly bows its head, emitting a single, isolated note of pure, acoustic note that rattles Dallas's ribs in the best possible way. \n\nMakayla looks at her screen. The jagged red lines are spiking massively at the edge of the circle. They're blocking the shadows. \n\nA heavy, crushing sound slams into the woven wall of grass on the edge of the circle. The air shudders violently. \n\nThe peace is broken instantly. \n\nDozens of massive, corrupted Red-Eye shadows burst through the woven grass perimeter. The black rot spreads across the sanctuary floor instantly. \n\nThe Elders rise to their feet, roaring—and make sound, that act as acoustic blasts of golden light. From their backs, a fine golden mist sprays into the air, trying to weave the protective field thicker. \n\nIt’s a horrific clash of physics. The golden mist meets the black shadows in violent, ozone-scented snaps. The Red-Eyes begin to swarm like ghouls devour the light in their flight. \n\nDOMINIC\nWhat the heck is even that?\n\n<!-- scene: 24 file: s24.md nickname: the-perimeter -->\n\n(action)\nThe massive Red-Eyes swarm the largest Golden Elder, ripping into its acoustic field with jagged, corrupted static. The Elder is pushed back toward the center of the ring, shielding the injured one. \n\nDominic looks at the massive wooden speakers lying in the mud. \n\nDominic screams, an animalistic roar of adrenaline and fear, and heaves the eighty-pound speaker off the ground. Dallas grabs the other. \n\nThey wade through the chaotic crossfire of light and shadow, positioning the two massive wooden frames in a V-shape in the very center of the ring. \n\n\n\n\n---\n\n\n### Scene 25: The Last Dinner\n\n*ACT III — The Return | ID: the-last-dinner | File: s25.md*\n\n---\n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n# Scene 25: The Final Blast\n\nEXT. CENTER OF THE MARSH - LATER\n\nThe golden dome of the Elders is failing. \n\nRed-Eye shadows are ripping through the barrier, violently canceling out the light. The black rot is spreading rapidly inward across the flattened grass floor. \n\nDallas and Dominic are in the center, struggling to keep the massive eighty-pound wooden speakers standing upright in the thick marsh mud. They are aimed outward, creating a narrow funnel toward the advancing shadow horde. \n\nDALLAS\n(screaming over the chaos of frequencies)\nMakayla! The wires! Hurry!\n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nMakayla drops to her knees in the mud. She is trembling, cold, covered in rain and ozone. She pulls the thick copper wires from the speakers toward the oscillator strapped to her chest. \n\nShe twists the cold copper around the small, translucent crystal. Her fingers slip. \n\nMAKAYLA\nIt won't catch! The humidity is destroying the connection!\n\nASHER\nThey're breaking through!\n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nThe largest Elder groans, a deep sub-bass sound, as a massive Red-Eye slams into it, throwing it backward. The Elder falls to the mud, its golden fur dimming as the shadow begins to erase its frequency completely. \n\nThe horde of massive, formless red-eyed shadows surges forward toward the center. Toward the baby. Toward the crew. \n\nDOMINIC\n(holding a speaker steady)\nMakayla!\n\nMAKAYLA\n(frantically twisting bare wire)\nI'm trying. \n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nShe wraps the copper tight and bites down hard on the connection to crimp the cold wire against the crystal. The small screen on her chest flares green. The connection holds. \n\nAsher holds out his palm again and begins to trace his index finger along its edges. \n\nASHER\nWait!\n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nAsher runs over and adjusts the dial to 1154\n\nMAKAYLA \nHit it! \n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nAs Makayla goes to fire the pulse from the speaker.\n\nThey are suddenly hit from the side. A massive shadow sweeps its rotting tendrils across the mud. The concussive, silent force of its movement slams into the left speaker. \n\nThe heavy wooden frame groans, lifting dangerously out of the mud. It is tipping over. If it falls, the acoustic wall will fail and the feedback loop will kill them all. \n\nDOMINIC\nIt’s tipping! \n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nDominic throws himself entirely into the brutal, rotting mud. \n\nHe grabs the listing speaker stand, planting his boots deep into the dirt, using his own body weight to anchor the acoustic frame upright. The deafing sound begins to engulf him. He screams in agonizing pain but doesn't let go. \n\n\n<!-- scene: 25 file: s25.md nickname: the-last-dinner -->\n\n(action)\nDallas grabs the oscillator dial on Makayla's chest and forces it perfectly onto **115.3**, reinforcing the signal with everything the battery has left. \n\nThe golden creatures respond to this and begin to glow and hover closer together like a cluster. A massive, concussive **BOOM** of golden light shatters outward over the marsh. \n\nThe shockwave is incredible. It throws Dallas, Makayla, and Asher completely off their feet, knocking them backward into the mud. \n\nA brilliant flash of golden static erupts inside the claustrophobic walls of the flattened grass. The wall of Red-Eyes recoils violently, letting out a horrific gnashing shriek as the frequency literally burns them. \n\nThe sheer sonic force ripples through the entire marsh, flattening the tall grass for hundreds of yards in every direction. The massive shadows are instantly vaporized into thin, harmless grey smoke. \n\nSilence. \n\nTotal silence. \n\nThe wind stops. \n\nDallas slowly gets up, groaning. His ears are ringing furiously. He looks out at the marsh. \n\nThe red eyes are gone. The shadows are gone. \n\nThe tall grass is flattened all around them, illuminated by faint flashes of natural lightning. \n\nDallas looks down at his wrist. The black, rotting veins beneath his skin are gone. He looks over at Makayla. She is staring at her own forearm. Clean. He looks over at Dominic, who is lying in the mud, panting, completely unharmed. The shockwave purged the contagion from the earth and from their blood. \n\nThe Golden Elders rise to their feet. The baby chirps happily. \n\nThe largest Elder looks at the crew. It doesn't roar. It just nods its, turns, and leads its clan deeper into the remaining marsh, disappearing into the mist. \n\nMakayla lets out a massive, shuddering breath. \n\n\n\n---\n\n\n## ACT IV — Aftermath\n\n---\n\n\n### Scene 26: Final Echoes\n\n*ACT IV — Aftermath | ID: final-echoes | File: s26.md*\n\n---\n\n<!-- scene: 26 file: s26.md nickname: final-echoes -->\n\n# Scene 26: The Morning After\n<!-- scene: 26 file: s26.md nickname: final-echoes -->\n\n(action)\nEXT. TALL GRASS\nThe crew walk back through the tall grass, through neighborhoods, back and slow. \n\nINT. DOMINICS HOUSE\nThe crew huddle around Dallas' house and all sleep on the floor as Mr Mike watches a movie on TV. \n\nJanice makes her way through the door.\n\nJANICE\nLook at all of these sleeping beauties. \n\n<!-- scene: 26 file: s26.md nickname: final-echoes -->\n\n(action)\nMR. Mike walks in behind Janice and walks right over to Dallas - out for a good old fashion handshake. \n\nMR. MIKE\nDallas, wheres Dallas. Dallas my boy - you were spared from the storm. \n\nDALLASHow are you Mike. \n\nMR. MIKE\nThings are better - things are better than what they were. Yes. \n\nJANICE\nThanks for letting everyone crash here Dallas. Dominic, Makayla, lets go. \n\n\n\n---\n\n\n### Scene 27: Aftermath\n\n*ACT IV — Aftermath | ID: aftermath | File: s27.md*\n\n---\n\n<!-- scene: 27 file: s27.md nickname: aftermath -->\n\n<!-- nickname: little aftermath -->\n\nEXT. BRANFORD - DAY\n\nThe town is back to normal. People move through their routines. The strange occurrences of the last few days are still on everyone's lips—muted, half-disbelieved.\n\nEXT. CENTER OF THE MARSH - DAY\nDallas walks alone into the flattened ring of grass from the night before. The storm is gone. He finds his heavy equipment where they left it—speakers knocked face-down in the mud. The oscillator on its side, screen cracked. But the sensor Makayla wired between them is still blinking. He picks it up. The screen shows a saved file: one clean recording.\n\nHe presses play. The sound fills the quiet marsh— it is the tune from the golden furry creatures, captured clean. \n\nDallas holds play for a long moment. He looks at the photo of Sierra on his receiver. \n\nEXT. BRANFORD - OUTSIDE PIZZA PLACE - DAY\n\nPAT CLENDENEN stands outside a choppy PIZZA and POST OFFICE - place in Branford, CT. He is being interviewed by his news crew.\n\nPAT CLENDENEN\nThe Nor'easter's last-second shift—call it an unlikely miracle. Either way, a good safety warning. This town's prepared now.\n\nEXT. CHURCH GROUNDS - DAY\n\nA church event. Picnic tables. Nica's catered lunch. DOMINIC and DALLAS greet each other. They don't talk much. They sit next to each other and eat. \n\nDallas holds a tray of Chicken Primevera. \n\nMR. MIKE sits at the end of the table, peacefully eating a piece of cornbread. He looks out toward the edge of the woods and smiles softly. \n\nMR. MIKE\n(to himself)\nQuiet now. The numbers are finally right. Javarice would have loved the quiet.\n\nINT. DALLAS'S WORKSHOP / HOUSE - DAY\n\nDallas at his kitchen table and grabs a battery as he walks to his workbench. He begins to fiddle with a recording mechniasm. And feed water to a tiny plant. He finally gets it working. He hits record. From outside, a low hum, different from before, bleeds into the room. He listens. He begins to sketch—notations, marks. An alphabet. \n\n\n---\n\n\n### Scene 28: Full Circle\n\n*ACT IV — Aftermath | ID: full-circle | File: s28.md*\n\n---\n\n<!-- scene: 28 file: s28.md nickname: full-circle -->\n\n# Scene 28: Full Circle\n<!-- summary: Makayla sets up her new Lair in the woods to listen to the creatures. Dallas finds his wife's specific hum out in the marsh. -->\n\nEXT. MAKAYLA'S LAIR - DAY\n\nMakayla walks up to the wooden structure in the woods. Asher is already there, stringing up a new, much larger antenna between the trees. The trail cameras have been repositioned to face deeper into the marsh.\n\nMakayla pulls the small, translucent crystal out of her pocket.  She places it gently onto a newly built bay area device. \n\nThe screen flares to life, a clean, perfect, golden sine wave, emerges on screen. \n\nMakayla puts on a pair of headphones. \n\nINT. DALLAS'S BEDROOM - NIGHT\n\nDallas goes to bed. The device sits on the nightstand. He hears echoes. Something beyond the shadows he saw before. He lies there. Listening. He goes and checks on the plant.\n\nEXT. DALLAS'S DRIVEWAY - MORNING\n\nJANICE pulls up. She gets out. She and Dallas hug. She hands him HOWIE's leash. Dallas greets the little dog with affection. Howie's ears twitch. He's disturbed by something out in the tall grass. Dallas looks toward the creek.\n\nEXT. CREEK BEND - DAY\n\nDallas walks alone with his wife's receiver in hand. The place where the lawn becomes reed. The same bend from before. Dallas stops. He lifts the receiver. He tunes the dial. The hum rises, falls. He adjusts again. The dial clicks into place. He stands there. Recording. The tall grass does not move - and neither does Dallas. \n\nIn the Tall Grass Dallas senses the creature - and plays the pure recording of their hum - and realizes that it matches the exact cadence of Sierra's song.\n\n\n---\n\n";

        '</html>',
      ].join('\n'));
      printable.document.close();
      printable.focus();
      printable.print();
      printable.onafterprint = () => printable.close();
    }
    const container = document.getElementById('scriptContent');
    marked.setOptions({ breaks: true });
    container.innerHTML = marked.parse(markdown);

    // Export dropdown: toggle on trigger click, close on outside click or menu action
    (function initExportDropdown() {
      var trigger = document.getElementById('scriptExportTrigger');
      var menu = document.getElementById('scriptExportMenu');
      if (!trigger || !menu) return;
      function open() {
        menu.classList.add('is-open');
        trigger.setAttribute('aria-expanded', 'true');
      }
      function close() {
        menu.classList.remove('is-open');
        trigger.setAttribute('aria-expanded', 'false');
      }
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        if (menu.classList.contains('is-open')) close(); else open();
      });
      menu.querySelectorAll('button').forEach(function(btn) {
        btn.addEventListener('click', function() { close(); });
      });
      document.addEventListener('click', function() { close(); });
    })();

    // Format screenplay elements
    formatScreenplay(document.querySelector('.screenplay-container'));

    // Filmmaking-style page length & runtime (1 page ≈ 1 minute; ~250 words/page)
    // Count from raw markdown so we get the full script (DOM textContent can undercount)
    (function initScriptStatsAndProgress() {
      const WORDS_PER_PAGE = 250;
      const content = document.getElementById('scriptContent');
      const progressFill = document.getElementById('scriptProgressFill');
      const progressLabel = document.getElementById('scriptProgressLabel');
      const progressBar = document.querySelector('.script-progress-bar');

      if (!progressFill) return;

      const wordCount = (typeof markdown === 'string' ? markdown : (content && content.textContent) || '')
        .split(/\s+/)
        .filter(Boolean)
        .length;
      const MIN_PAGES = 90;
      const rawPages = Math.round((wordCount / WORDS_PER_PAGE) * 10) / 10;
      const estimatedPages = Math.max(MIN_PAGES, rawPages);
      const estimatedMinutes = Math.max(MIN_PAGES, Math.round(estimatedPages));

      function updateProgress() {
        const docEl = document.documentElement;
        const scrollTop = docEl.scrollTop || document.body.scrollTop;
        const scrollHeight = docEl.scrollHeight - docEl.clientHeight;
        if (scrollHeight <= 0) {
          progressFill.style.height = '0%';
          progressLabel.textContent = '0 / ' + estimatedMinutes;
          if (progressBar) progressBar.setAttribute('aria-valuenow', 0);
          return;
        }
        const pct = Math.min(1, Math.max(0, scrollTop / scrollHeight));
        const currentMinute = Math.min(estimatedMinutes, Math.floor(pct * estimatedMinutes));
        progressFill.style.height = (pct * 100) + '%';
        progressLabel.textContent = currentMinute + ' / ' + estimatedMinutes;
        if (progressBar) progressBar.setAttribute('aria-valuenow', Math.round(pct * 100));
      }

      updateProgress();
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress);
    })();

    // Scene nav: add ids to scene headings and wire dropdown to scroll
    (function initSceneNav() {
      const content = document.getElementById('scriptContent');
      const selectEl = document.getElementById('scriptSceneSelect');
      if (!content || !selectEl) return;

      const sceneHeadings = content.querySelectorAll('h3');
      const sceneHeadingRe = /^Scene \d+:/i;
      sceneHeadings.forEach((h3, i) => {
        const text = (h3.textContent || '').trim();
        if (sceneHeadingRe.test(text)) {
          h3.id = 'scene-' + (i + 1);
        }
      });

      selectEl.addEventListener('change', function() {
        const value = this.value;
        if (!value) return;
        const el = document.getElementById(value);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        this.value = '';
      });
    })();

    // Status bar: current scene, who's in scene, production tags (updates on scroll)
    (function initStatusBar() {
      const content = document.getElementById('scriptContent');
      const sceneEl = document.getElementById('scriptStatusScene');
      const charsEl = document.getElementById('scriptStatusCharacters');
      const prodEl = document.getElementById('scriptStatusProduction');
      if (!content || !sceneEl) return;

      function getSceneHeadingsInOrder() {
        const h3s = content.querySelectorAll('h3[id^="scene-"]');
        return Array.from(h3s).sort((a, b) => {
          const nA = parseInt(a.id.replace('scene-', ''), 10);
          const nB = parseInt(b.id.replace('scene-', ''), 10);
          return nA - nB;
        });
      }

      function getSceneBlock(sceneH3, nextSceneH3) {
        const chars = new Set();
        let firstSlug = '';
        let node = sceneH3.nextSibling;
        while (node) {
          if (node === nextSceneH3) break;
          if (node.nodeType === 1) {
            if (node.classList && node.classList.contains('character-name')) {
              const name = (node.textContent || '').trim();
              if (name) chars.add(name);
            }
            if (!firstSlug && node.classList && node.classList.contains('scene-heading')) {
              firstSlug = (node.textContent || '').trim();
            }
          }
          node = node.nextSibling;
        }
        return { characters: Array.from(chars), production: firstSlug };
      }

      function updateStatusBar() {
        const sceneHeadings = getSceneHeadingsInOrder();
        if (sceneHeadings.length === 0) return;
        const viewportThreshold = 160;
        let current = sceneHeadings[0];
        for (let i = 0; i < sceneHeadings.length; i++) {
          const top = sceneHeadings[i].getBoundingClientRect().top;
          if (top <= viewportThreshold) current = sceneHeadings[i];
        }
        const title = (current.textContent || '').trim();
        const nextId = current.id.replace('scene-', '');
        const nextNum = parseInt(nextId, 10) + 1;
        const nextScene = document.getElementById('scene-' + nextNum);
        const block = getSceneBlock(current, nextScene || null);
        sceneEl.textContent = title || '—';
        charsEl.textContent = block.characters.length ? block.characters.join(', ') : '—';
        prodEl.textContent = block.production || '—';
      }

      updateStatusBar();
      window.addEventListener('scroll', updateStatusBar, { passive: true });
      window.addEventListener('resize', updateStatusBar);
    })();
    
    function looksLikeActionIntro(text) {
      if (!text || text.length < 15) return false;
      if (/^\(.+\)$/.test(text)) return false;
      if (/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(text)) return false;
      if (/^[A-Z][a-z]+,\s*(?:Mid\s*\d+s|\d+s|[A-Za-z\s]+),/.test(text) && /[a-z]/.test(text)) return true;
      if (/^[A-Z][a-z]+,\s*(?:Mid\s*\d+s|\d+s)\s*[,.]/.test(text)) return true;
      return false;
    }

    function formatScreenplay(container) {
      const content = container.querySelector('.screenplay-content');
      if (!content) return;

      normalizeParagraphBreaks(content);

      const paragraphs = content.querySelectorAll('p');
      let inDialogueBlock = false;
      
      paragraphs.forEach((p, index) => {
        const text = p.textContent.trim();
        const nextP = paragraphs[index + 1];
        const prevP = paragraphs[index - 1];
        
        // Skip if already formatted (but allow normalizeParagraphBreaks output)
        if (!text) return;
        if (p.classList.length > 0 && !p.classList.contains('line-split')) return;
        
        // Scene headings (INT. or EXT. at start of line)
        if (/^(INT\.|EXT\.)/i.test(text)) {
          p.className = 'scene-heading';
          p.textContent = text.toUpperCase();
          inDialogueBlock = false;
          return;
        }
        
        // Transitions (right-aligned, uppercase)
        if (/^(FADE IN|FADE OUT|CUT TO|DISSOLVE TO|SMASH CUT|MATCH CUT)/i.test(text)) {
          p.className = 'transition';
          p.textContent = text.toUpperCase();
          inDialogueBlock = false;
          return;
        }

        // Action break: (action) on its own line — ends dialogue block, next line is action; line is hidden
        if (/^\(action\)$/i.test(text)) {
          p.className = 'action-break';
          p.textContent = '';
          inDialogueBlock = false;
          return;
        }
        
        // Parentheticals (text in parentheses, italic) - check before character names
        if (/^\(.+\)$/.test(text)) {
          p.className = 'parenthetical';
          inDialogueBlock = true;
          return;
        }

        // Action lines that introduce a character or describe action (e.g. "Janice, Mid 50s, puts her hand...")
        // Never treat these as dialogue so they don't get wrapped with the previous speaker
        if (looksLikeActionIntro(text)) {
          p.className = 'action-line';
          inDialogueBlock = false;
          return;
        }
        
        // Character names (all caps, typically short, not scene headings)
        const isAllCaps = /^[A-Z][A-Z\s\.'-]+$/.test(text) && text === text.toUpperCase();
        const isReasonableLength = text.length > 2 && text.length < 35;
        const isNotSceneHeading = !/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(text);
        
        if (isAllCaps && isReasonableLength && isNotSceneHeading) {
          const nextText = nextP ? nextP.textContent.trim() : '';
          const looksLikeDialogue = nextText && (
            /^\(.+\)$/.test(nextText) ||
            (!/^(INT\.|EXT\.|FADE|CUT|DISSOLVE)/i.test(nextText) && 
             !/^[A-Z][A-Z\s\.'-]+$/.test(nextText))
          );
          
          if (looksLikeDialogue || !prevP || prevP.classList.contains('action-line') || prevP.classList.contains('scene-heading')) {
            p.className = 'character-name';
            inDialogueBlock = true;
            return;
          }
        }
        
        // Dialogue (follows character name / parenthetical / dialogue)
        const looksLikeNewBlock = /^(INT\.|EXT\.|FADE IN|FADE OUT|CUT TO|DISSOLVE TO|SMASH CUT|MATCH CUT)/i.test(text);
        const looksLikeCharacter = isAllCaps && isReasonableLength && isNotSceneHeading;
        if (!looksLikeNewBlock && !looksLikeActionIntro(text) && inDialogueBlock && prevP && (prevP.classList.contains('character-name') || prevP.classList.contains('parenthetical') || prevP.classList.contains('dialogue'))) {
          p.className = 'dialogue';
          inDialogueBlock = true;
          return;
        }
        
        // If we're in a dialogue block but this doesn't match, end the block
        if (looksLikeCharacter || looksLikeNewBlock) {
          inDialogueBlock = false;
        }
        
        // Default: action line
        p.className = 'action-line';
        inDialogueBlock = false;
      });

      // Add markers for last line in dialogue / parenthetical blocks (spacing)
      const ps = content.querySelectorAll('p');
      ps.forEach((p, i) => {
        if (!p.classList.contains('dialogue') && !p.classList.contains('parenthetical')) return;
        const next = ps[i + 1];
        if (!next || (!next.classList.contains('dialogue') && !next.classList.contains('parenthetical'))) {
          if (p.classList.contains('dialogue')) p.classList.add('dialogue-last');
          if (p.classList.contains('parenthetical')) p.classList.add('parenthetical-last');
        }
      });
    }

    // Split <p> blocks that contain <br> into separate <p>s per line.
    // This lets screenplay formatting work even if the markdown uses single newlines.
    function normalizeParagraphBreaks(content) {
      const paragraphs = Array.from(content.querySelectorAll('p'));
      paragraphs.forEach((p) => {
        if (!p.querySelector('br')) return;
        const parts = p.innerHTML
          .split(/<br\s*\/?\s*>/i)
          .map((s) => s.replace(/&nbsp;/g, ' ').trim())
          .filter(Boolean);
        if (parts.length <= 1) return;

        const frag = document.createDocumentFragment();
        parts.forEach((html) => {
          const np = document.createElement('p');
          np.innerHTML = html;
          frag.appendChild(np);
        });
        p.replaceWith(frag);
      });
    }
  </script>
</body>
