    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400..700&display=swap');

        :root {
            --primary-bg: #0d1117;
            --secondary-bg: #161b22;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --glass-bg: rgba(22, 27, 34, 0.6);
            --glass-border: rgba(240, 246, 252, 0.1);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-serif: 'Newsreader', serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--primary-bg);
            color: var(--text-primary);
            margin: 0;
            overflow-x: hidden;
        }

        .gear-gallery-container {
            max-width: 935px;
            margin: 0 auto;
            padding: 0;
        }

        .gear-gallery-title {
            max-width: 935px;
            margin: 0 auto;
            padding: 40px 20px 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .gear-gallery-title h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0;
        }

        .gear-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            padding: 20px 0;
        }

        .gear-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: var(--glass-bg);
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .gear-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        .gear-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 2;
        }

        .gear-item:hover .gear-overlay {
            opacity: 1;
        }

        @media (min-width: 1024px) {
            .gear-grid {
                gap: 28px;
            }
        }

        @media (max-width: 768px) {
            .gear-gallery-title {
                padding: 20px;
            }

            .gear-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2px;
                padding: 0;
            }

            .gear-gallery-container {
                margin: 0;
            }
        }
    </style>
</head>

    <script src="/scripts/vault.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gearItems = document.querySelectorAll('.gear-item:not(.video-tile)');
            const videoItems = document.querySelectorAll('.video-tile');

            // Build gallery list for lightbox
            const galleryList = Array.from(gearItems).map(item => ({
                url: item.dataset.url,
                title: item.dataset.title,
                description: item.dataset.description
            }));

            // Image click handler
            gearItems.forEach((item, index) => {
                item.addEventListener('click', () => {
                    if (window.openGalleryModalWithList) {
                        window.openGalleryModalWithList(galleryList, index);
                    }
                });
            });

            // Video click handler
            videoItems.forEach(item => {
                item.addEventListener('click', () => {
                    if (window.openVideoModal) {
                        window.openVideoModal(item.dataset.videoUrl, item.dataset.title);
                    }
                });
            });
        });
    </script>
