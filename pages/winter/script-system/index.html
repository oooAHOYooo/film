<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Fall of Hibisicas - Scene Gallery</title>
  <link rel="stylesheet" href="script.css">
</head>
<body class="plot-cards-page">
  <div class="gallery-container">
    <header class="plot-cards-header">
      <h1>The Fall of Hibisicas</h1>
      <p class="plot-cards-subtitle">Scene gallery — <a href="full_script.html">Open Full Script</a></p>
    </header>

    <nav class="nav no-print plot-cards-nav">
      <div class="nav-left">
        <a class="nav-link" href="/pages/spring.html" title="Spring Hub">☀ Spring</a>
        <a class="nav-link nav-link--active" href="index.html" title="Gallery">▦ Gallery</a>
        <a class="nav-link" href="full_script.html" title="Full Script">Full Script</a>
      </div>
    </nav>

    <div class="plot-cards-grid" id="plotCardsGrid" aria-label="Scene index cards">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <script>
    (function() {
      const CARDS_DATA = [{"n":1,"id":"s01","title":"Scene 1","summary":"Scene 1","act":1,"actTitle":"Initial Act"},{"n":2,"id":"s02","title":"Scene 2","summary":"Scene 2","act":1,"actTitle":"Initial Act"},{"n":3,"id":"s03","title":"Scene 3","summary":"Scene 3","act":1,"actTitle":"Initial Act"},{"n":4,"id":"s04","title":"Scene 4","summary":"Scene 4","act":1,"actTitle":"Initial Act"},{"n":5,"id":"s05","title":"Scene 5","summary":"Scene 5","act":1,"actTitle":"Initial Act"},{"n":6,"id":"s06","title":"Scene 6","summary":"Scene 6","act":1,"actTitle":"Initial Act"},{"n":7,"id":"s07","title":"Scene 7","summary":"Scene 7","act":1,"actTitle":"Initial Act"},{"n":8,"id":"s08","title":"Scene 8","summary":"Scene 8","act":1,"actTitle":"Initial Act"},{"n":9,"id":"s09","title":"Scene 9","summary":"Scene 9","act":1,"actTitle":"Initial Act"},{"n":10,"id":"s10","title":"Scene 10","summary":"Scene 10","act":1,"actTitle":"Initial Act"},{"n":11,"id":"s11","title":"Scene 11","summary":"Scene 11","act":1,"actTitle":"Initial Act"},{"n":12,"id":"s12","title":"Scene 12","summary":"Scene 12","act":1,"actTitle":"Initial Act"},{"n":13,"id":"s13","title":"Scene 13","summary":"Scene 13","act":1,"actTitle":"Initial Act"},{"n":14,"id":"s14","title":"Scene 14","summary":"Scene 14","act":1,"actTitle":"Initial Act"},{"n":15,"id":"s15","title":"Scene 15","summary":"Scene 15","act":1,"actTitle":"Initial Act"},{"n":16,"id":"s16","title":"Scene 16","summary":"Scene 16","act":1,"actTitle":"Initial Act"},{"n":17,"id":"s17","title":"Scene 17","summary":"Scene 17","act":1,"actTitle":"Initial Act"},{"n":18,"id":"s18","title":"Scene 18","summary":"Scene 18","act":1,"actTitle":"Initial Act"},{"n":19,"id":"s19","title":"Scene 19","summary":"Scene 19","act":1,"actTitle":"Initial Act"},{"n":20,"id":"s20","title":"Scene 20","summary":"Scene 20","act":1,"actTitle":"Initial Act"},{"n":21,"id":"s21","title":"Scene 21","summary":"Scene 21","act":1,"actTitle":"Initial Act"},{"n":22,"id":"s22","title":"Scene 22","summary":"Scene 22","act":1,"actTitle":"Initial Act"},{"n":23,"id":"s23","title":"Scene 23","summary":"Scene 23","act":1,"actTitle":"Initial Act"},{"n":24,"id":"s24","title":"Scene 24","summary":"Scene 24","act":1,"actTitle":"Initial Act"},{"n":25,"id":"s25","title":"Scene 25","summary":"Scene 25","act":1,"actTitle":"Initial Act"},{"n":26,"id":"s26","title":"Scene 26","summary":"Scene 26","act":1,"actTitle":"Initial Act"},{"n":27,"id":"s27","title":"Scene 27","summary":"Scene 27","act":1,"actTitle":"Initial Act"},{"n":28,"id":"s28","title":"Scene 28","summary":"Scene 28","act":1,"actTitle":"Initial Act"},{"n":29,"id":"s29","title":"Scene 29","summary":"Scene 29","act":1,"actTitle":"Initial Act"},{"n":30,"id":"s30","title":"Scene 30","summary":"Scene 30","act":1,"actTitle":"Initial Act"}];
      const grid = document.getElementById('plotCardsGrid');

      function toRoman(num) {
        const map = [[10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']];
        let n = num, out = '';
        for (const [v, s] of map) {
          while (n >= v) { out += s; n -= v; }
        }
        return out;
      }

      function renderCards(cards) {
        if (!cards || !cards.length) {
          grid.innerHTML = '<p class="plot-cards-loading">No card data available.</p>';
          return;
        }
        
        let currentAct = null;
        cards.forEach(function(card) {
          if (card.act !== currentAct) {
            currentAct = card.act;
            const actLabel = document.createElement('div');
            actLabel.className = 'plot-cards-act-label';
            actLabel.textContent = 'ACT ' + toRoman(card.act) + ' — ' + (card.actTitle || '');
            grid.appendChild(actLabel);
          }
          const cardDiv = document.createElement('div');
          cardDiv.className = 'plot-card';
          cardDiv.innerHTML =
            '<span class="plot-card-number">' + card.n + '</span>' +
            '<h2 class="plot-card-title">' + card.title + '</h2>' +
            '<p class="plot-card-summary">' + (card.summary || '') + '</p>' +
            '<div class="plot-card-links" style="margin-top: auto; display: flex; gap: 0.75rem; border-top: 1px solid var(--border, #eee); padding-top: 0.75rem; margin-top: 1rem; font-size: 0.8rem;">' +
              '<a href="full_script.html#scene-' + card.n + '" class="plot-card-link" style="text-decoration: none; font-weight: 600;">Full Script</a>' +
            '</div>';
          grid.appendChild(cardDiv);
        });
      }

      renderCards(CARDS_DATA);
    })();
  </script>
</body>
</html>
