<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

</head>
<body class="plot-cards-page">
  <div class="gallery-container">
    <header class="plot-cards-header">
      <h1>The Fall of Hibisicas Script</h1>
      <p class="plot-cards-subtitle">Scene gallery — main beats per scene · <a href="full_script.html">Open Full Script</a> to jump to any scene</p>
    </header>

    <nav class="nav no-print plot-cards-nav">
      <div class="nav-left">
        <a class="nav-link" href="/pages/autumn.html" title="Autumn Hub">🍂 Autumn</a>
        <a class="nav-link nav-link--active" href="index.html" title="Gallery">▦ Gallery</a>
        <a class="nav-link" href="full_script.html" title="Full Script">Full Script</a>
        <a class="nav-link" href="scene_outline.html" title="Scene Outline">Scene Outline</a>
      </div>
    </nav>

    <div class="plot-cards-grid" id="plotCardsGrid" aria-label="Scene index cards">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <script>
    (function() {
      const CARDS_DATA = [{"n":1,"id":"s01","title":"Scene 1","act":1,"actTitle":"Act I","summary":"Scene 1 — Scene 1"},{"n":2,"id":"s02","title":"Scene 2","act":1,"actTitle":"Act I","summary":"Scene 2 — Scene 2"},{"n":3,"id":"s03","title":"Scene 3","act":1,"actTitle":"Act I","summary":"Scene 3 — Scene 3"},{"n":4,"id":"s04","title":"Scene 4","act":1,"actTitle":"Act I","summary":"Scene 4 — Scene 4"},{"n":5,"id":"s05","title":"Scene 5","act":1,"actTitle":"Act I","summary":"Scene 5 — Scene 5"},{"n":6,"id":"s06","title":"Scene 6","act":1,"actTitle":"Act I","summary":"Scene 6 — Scene 6"},{"n":7,"id":"s07","title":"Scene 7","act":1,"actTitle":"Act I","summary":"Scene 7 — Scene 7"},{"n":8,"id":"s08","title":"Scene 8","act":1,"actTitle":"Act I","summary":"Scene 8 — Scene 8"},{"n":9,"id":"s09","title":"Scene 9","act":1,"actTitle":"Act I","summary":"Scene 9 — Scene 9"},{"n":10,"id":"s10","title":"Scene 10","act":1,"actTitle":"Act I","summary":"Scene 10 — Scene 10"},{"n":11,"id":"s11","title":"Scene 11","act":2,"actTitle":"Act II","summary":"Scene 11 — Scene 11"},{"n":12,"id":"s12","title":"Scene 12","act":2,"actTitle":"Act II","summary":"Scene 12 — Scene 12"},{"n":13,"id":"s13","title":"Scene 13","act":2,"actTitle":"Act II","summary":"Scene 13 — Scene 13"},{"n":14,"id":"s14","title":"Scene 14","act":2,"actTitle":"Act II","summary":"Scene 14 — Scene 14"},{"n":15,"id":"s15","title":"Scene 15","act":2,"actTitle":"Act II","summary":"Scene 15 — Scene 15"},{"n":16,"id":"s16","title":"Scene 16","act":2,"actTitle":"Act II","summary":"Scene 16 — Scene 16"},{"n":17,"id":"s17","title":"Scene 17","act":2,"actTitle":"Act II","summary":"Scene 17 — Scene 17"},{"n":18,"id":"s18","title":"Scene 18","act":2,"actTitle":"Act II","summary":"Scene 18 — Scene 18"},{"n":19,"id":"s19","title":"Scene 19","act":2,"actTitle":"Act II","summary":"Scene 19 — Scene 19"},{"n":20,"id":"s20","title":"Scene 20","act":2,"actTitle":"Act II","summary":"Scene 20 — Scene 20"},{"n":21,"id":"s21","title":"Scene 21","act":3,"actTitle":"Act III","summary":"Scene 21 — Scene 21"},{"n":22,"id":"s22","title":"Scene 22","act":3,"actTitle":"Act III","summary":"Scene 22 — Scene 22"},{"n":23,"id":"s23","title":"Scene 23","act":3,"actTitle":"Act III","summary":"Scene 23 — Scene 23"},{"n":24,"id":"s24","title":"Scene 24","act":3,"actTitle":"Act III","summary":"Scene 24 — Scene 24"},{"n":25,"id":"s25","title":"Scene 25","act":3,"actTitle":"Act III","summary":"Scene 25 — Scene 25"},{"n":26,"id":"s26","title":"Scene 26","act":3,"actTitle":"Act III","summary":"Scene 26 — Scene 26"},{"n":27,"id":"s27","title":"Scene 27","act":3,"actTitle":"Act III","summary":"Scene 27 — Scene 27"},{"n":28,"id":"s28","title":"Scene 28","act":4,"actTitle":"Act IV","summary":"Scene 28 — Scene 28"},{"n":29,"id":"s29","title":"Scene 29","act":4,"actTitle":"Act IV","summary":"Scene 29 — Scene 29"},{"n":30,"id":"s30","title":"Scene 30","act":4,"actTitle":"Act IV","summary":"Scene 30 — Scene 30"}];
      const grid = document.getElementById('plotCardsGrid');

      function toRoman(num) {
        const map = [[10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']];
        let n = num, out = '';
        for (const [v, s] of map) {
          while (n >= v) { out += s; n -= v; }
        }
        return out;
      }

      function renderCards(cards) {
        if (!cards || !cards.length) {
          grid.innerHTML = '<p class="plot-cards-loading">No card data available.</p>';
          return;
        }
        let currentAct = null;
        cards.forEach(function(card) {
          if (card.act !== currentAct) {
            currentAct = card.act;
            const actLabel = document.createElement('div');
            actLabel.className = 'plot-cards-act-label';
            actLabel.setAttribute('aria-hidden', 'true');
            actLabel.textContent = 'ACT ' + toRoman(card.act) + ' — ' + (card.actTitle || '');
            grid.appendChild(actLabel);
          }
          const cardDiv = document.createElement('div');
          cardDiv.className = 'plot-card';
          cardDiv.innerHTML =
            '<span class="plot-card-number">' + card.n + '</span>' +
            '<h2 class="plot-card-title">' + escapeHtml(card.title) + '</h2>' +
            '<p class="plot-card-summary">' + escapeHtml(card.summary) + '</p>' +
            '<div class="plot-card-links" style="margin-top: auto; display: flex; gap: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 1rem; font-size: 0.8rem;">' +
              '<a href="full_script.html#scene-' + card.n + '" class="plot-card-link" style="text-decoration: none; font-weight: 600;">Full Script</a>' +
              '<a href="scene.html?id=' + encodeURIComponent(card.id) + '" class="plot-card-link" style="text-decoration: none; color: var(--muted); border-left: 1px solid var(--border); padding-left: 0.75rem;">Preview</a>' +
            '</div>';
          grid.appendChild(cardDiv);
        });
      }

      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      renderCards(CARDS_DATA);
    })();
  </script>
</body>
</html>
